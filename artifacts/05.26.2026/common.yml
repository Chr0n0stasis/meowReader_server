- article_update_date: 05.26.2026
  body_text: '| Next | Section menu | Main menu | Previous | Lexi Pandell The Big
    Story Jul 21, 2025 6:00 AM The Next Thing You Smell Could Ruin Your Life Millions
    of people suffer debilitating reactions in the presence of certain scents and
    chemicals. One scientist has been struggling for decades to understand why—as
    she battles the condition herself. Photograph: Amber Gomez After my birth, my
    mother became allergic to the world. That’s the only way I knew how to put it.
    So many things could set her off: new carpeting, air fresheners, plastic off-gassing,
    diesel. Perfumes were among the worst offenders. On top of that, she developed
    terrible food allergies. The sound of her sniffling became the chorus of my childhood.
    Some days she couldn’t get out of bed. I’d peek into her darkened room and see
    her face pinched in discomfort. Her joints ached, her head swam. Doctors suggested
    that maybe she was depressed or anxious. “Well, you’d be anxious too if you couldn’t
    lick an envelope, couldn’t pick up your daughter in a car,” she’d reply. She tried
    allergists, got nowhere. Finally, she found her way to holistic health, whose
    practitioners told her she had something called multiple chemical sensitivity.
    As long as people have complained that man-made stuff in their environment causes
    health problems—migraines and asthma, exhaustion and mood swings—the medical establishment
    has largely dismissed them. The American Medical Association, World Health Organization,
    and the American Academy of Asthma, Allergy & Immunology don’t recognize chemical
    sensitivity as a diagnosis. If they talk about it at all, they tend to dismiss
    it as psychosomatic, a malady of the neurotic and health-obsessed. Why, these
    authorities wondered, would people react to minute traces of a huge array of chemicals?
    And why couldn’t they ever seem to get better? This isn’t some trivial affliction.
    Roughly a quarter of American adults report some form of chemical sensitivity;
    it lives alongside chronic pain and fibromyalgia as both evidently real and resistant
    to mainstream diagnosis or treatment. My mom tried a thousand things—elimination
    diets, antihistamines, lymphatic massage, antidepressants, acupuncture, red light
    therapy, saunas, heavy-metal detoxes. Sometimes her symptoms eased, but she never
    got better. Her illness ruled our lives, dictating what products we bought, what
    food we ate, where we traveled. I felt there had to be an answer for why this
    was happening. It didn’t take me long to learn that, if there was one, it’d come
    from a figure as unassuming as she is provocative: the scientist Claudia Miller.
    On a warm Texas afternoon, Miller and her affable husband, Bob, lead me through
    the San Antonio Botanical Garden. A monarch flits by. “I’ve noticed so many fewer
    butterflies, so many fewer birds, even the last couple of years,” Miller observes.
    Her raspy voice comes out so quietly that, at times, my recording device fails
    to pick it up. People are perpetually leaning in close or asking her to repeat
    herself. At 78, Miller typically uses a cane, but Bob gets the walker out of the
    car so she can cover more distance. She wears her silver hair in a low side ponytail,
    fixed in place with a scrunchie. The line between science and wellness has been
    blurred beyond recognition. WIRED is here to help . With her wide, thin-rimmed
    glasses, Miller disappears into the scenery, but she’s a particularly visible
    presence in her field. Now a professor emeritus at the University of Texas Health
    Science Center at San Antonio, Miller has held several federal appointments, chaired
    National Institutes of Health meetings, testified before Congress, consulted for
    the Environmental Protection Agency, authored dozens of papers, and worked with
    the Canadian, German, Japanese, and Swedish governments. In all this, she has
    tried to make sense of and raise awareness for chemical intolerance. One patient
    advocate I interviewed called her “Saint Claudia” for her commitment to overlooked
    and misunderstood patients. Kristina Baehr, an attorney who defends victims of
    toxic exposures, told me, “To have experts like Dr. Miller tell them you’re not
    crazy, this is very real, is very life-giving to people. She’s able to validate
    their experience with facts, with science.” One such fact, Miller explains, is
    this: Over the past century, the United States has undergone a chemical revolution.
    “Fossil fuels, coal, oil, natural gas, their combustion products, and then their
    synthetic chemical derivatives are mostly new since World War II,” she says. “Plasticizers,
    forever chemicals, you name it: These are all foreign chemicals.” They’re everywhere
    you look, in homes and offices, parks and schools. They’re also, Miller believes,
    making people very sick. In 1997, Miller proposed a career-defining theory of
    how people succumb to this condition. It came with a technical-sounding name,
    toxicant-induced loss of tolerance, and a convenient acronym, TILT. You can lose
    tolerance after one severe exposure, Miller says, or after a series of smaller
    exposures over time. In either case, a switch is flipped: Suddenly, people are
    triggered by even tiny amounts of everyday substances—cigarette smoke, antibiotics,
    gas from their stoves—that never bothered them before. These people become, in
    a word, TILT-ed. It’s not unlike developing an allergy, when the body labels a
    substance as dangerous and then reacts accordingly. In 1999, Miller and her colleagues
    designed the Quick Environmental Exposure and Sensitivity Inventory, or QEESI
    (pronounced “queasy”), a survey to help doctors and researchers identify chemically
    intolerant patients. I’ve seen the QEESI cited in papers from 18 countries, but
    to date, most physicians still don’t know much about it. “It’s very frustrating
    to try to get these ideas across,” Miller says. The major problem is that, assuming
    TILT accurately describes the process of becoming chemically intolerant, we don’t
    know what biological changes occur inside the sensitized body, why so many symptoms
    crop up, or why one exposed person gets sick while others seem to walk away unscathed.
    But Miller thinks she’s closer than ever to an answer. At the botanical garden,
    we approach an orchid exhibit. Sticky heat engulfs us as we enter. Orchids of
    varying shapes and colors fill the greenhouse, including one with spindly chartreuse
    petals. “What do you call this?” Miller asks. My plant-ID app comes up empty.
    So it goes, too, for chemically intolerant patients: The condition defies easy
    observation. “The world becomes like a torture chamber, and then nobody believes
    you,” Miller says. “That’s the worst part.” After falling ill, some people become
    hermits out of fear of exposure, abandoning their friends and family to live in
    remote areas. For others, nothing can keep them from spinning out of control.
    My mother knew someone who tried to escape her triggers by moving to the country
    in a trailer. Eventually, even that became unmanageable, and the woman shot herself
    in the head. Imagine feeling incredibly sick every time you encounter a cloud
    of cologne or fresh paint, then being told you’re making it up. I thought about
    my mom. Sometimes, catering to her needs could feel exhausting. But what must
    that have been like for her? The thing was, I never doubted her condition—especially
    after what happened on one bad day. It’s time to tell you the worst thing I have
    ever done to another person. When I was 10, my parents and I attended a family
    reunion. The trip was difficult. We fought nonstop. Everyone cried. The photographer
    hired to capture a family portrait accidentally exposed the film to light, and
    it was just as well. If we could have wiped the whole week from our minds, we
    would have. During that ill-fated trip, my aunt gifted me a set of scented lip
    balms. My mom offered her a tight smile but, once we were alone, told me to toss
    them out. Instead, I hid them and, soon, weaponized them. After yet another argument,
    I sneaked into my mom’s room, peeled back her pillow case, and smeared the lip
    balms directly onto her pillow. Later that night, as she tried to sleep, she kept
    waking up, sicker and sicker, her head pounding. Finally, her nose helped her
    uncover what I’d done. She found the telltale smudges. The next day, my dad told
    me how she’d sobbed and howled, “Why would she do this to me?” It remains, for
    me, a source of immense guilt. Later, I realized it was also the crumb of proof
    I needed. This was not all in my mother’s head. I’m at Miller’s condo across the
    street from the UT Health Science Center, with Miller and two of her collaborators.
    Her dining room table is lined with household products—a votive candle, a box
    of matches, body lotion, scented dish detergent. Beside them are chunky gadgets
    that look like something out of Ghostbusters . These are particulate monitors,
    which measure down to parts per billion. They need to be hypersensitive, because
    products like the ones on the table expel tiny molecules, and people with chemical
    intolerance seem to react to even minuscule doses. It’s akin to someone having
    an allergic reaction to a bag of peanuts opened on the other end of the airplane.
    One of her collaborators strikes a single match in front of a sensor. The number
    on the screen rockets from 0 to almost 500,000 parts per billion. It’s not always
    about what the nose can detect—though, in this case, sulfur dioxide fills the
    room. Last year, Miller’s team published research on house calls for nearly 40
    people with chemical intolerance. They measured indoor pollution from products
    like these, as well as other irritants like dust and mold, and performed blood
    tests for allergies. Then they recommended tossing out scented candles or moving
    cans of gasoline from an attached garage to a separate storage unit, and gifted
    the subjects natural cleaning products. They retested the homes several more times
    over the course of the year. As the indoor pollution decreased, the subjects’
    symptoms improved. For years, research like this convinced Miller that there was,
    indeed, something very wrong with her patients. But, again, that pesky mechanism
    for disease eluded her. Then she learned more about mast cells. Mast cells are
    a type of white blood cell that exists in nearly every tissue, including the skin,
    airways, and gastro-intestinal tract. When they detect something harmful, they
    can release hundreds of mediators, including histamine, substances that create
    symptoms like hives or swelling during anaphylactic shock. If the cells become
    overreactive, releasing too many mediators at the wrong time, a person can end
    up flushed, dizzy, wheezy, or exhausted. This is called mast cell activation syndrome,
    or MCAS. When Miller came across a book on the subject by Lawrence Afrin, a hematologist
    and mast cell disease researcher based in New York, she thought it sounded a lot
    like chemical intolerance. She called him. Many of his MCAS patients, it turned
    out, were sensitive to fragrances and medications. In 2021, Miller published what
    she considers her second eureka moment: a paper, coauthored with Afrin and others,
    that explains a potential link between TILT and MCAS. The team surveyed MCAS patients
    and found that those who scored high on MCAS questionnaires scored high on the
    QEESI. These patient groups also had nearly identical symptom patterns. Had Miller’s
    patients had mast cell activation syndrome this whole time? MCAS is a tricky disease
    to diagnose and treat, but it was something. An answer for the scientific community.
    An answer for her patients. And an answer for herself. Because that’s the other
    part of this story, the part Miller hasn’t been comfortable talking about until
    now: She, the condition’s leading researcher, suffers from chemical intolerance
    too. Miller has difficulty searching her memory about her past. Exact years don’t
    come back to her, her retellings wander. Attribute it to age or brain fog or both.
    Still, over hours of conversations and dozens of emails, her story came together.
    Born in Milwaukee as the only child of a patent attorney and a teacher, Miller
    was drawn to science from a young age. After earning her BA in molecular biology
    from the University of Wisconsin–Madison and her'
