  body_text: 'Heat is expected to intensify across western parts of the US and Mexico
    this week as a ridge of high pressure pushes temperatures well above the seasonal
    norm. Daytime highs are forecast to reach 10-15C above average in some areas.
    The US National Weather Service has issued heat advisories for parts of California
    and Arizona, with extreme heat warnings in force on Monday and Tuesday in places
    such as Palm Springs, where temperatures could reach 40-43C (104-110F). More broadly,
    temperatures are expected to climb into the high 30s celsius before the heat shifts
    eastwards towards the midwest later this week. Meanwhile, severe weather is likely
    to continue across parts of South Africa, with disruptive rain and damaging winds
    raising the risk of flooding. Rain moved in from the Atlantic across the Western
    and Northern Cape on Sunday morning, bringing persistent downpours over much of
    the weekend. Between Monday and Wednesday, more than 200mm of rain could fall
    across parts of Western Cape, while mountainous regions could record totals approaching
    300mm. View image in fullscreen Workers repair a bridge damaged by flooding in
    Western Cape, South Africa. Photograph: Xinhua/Shutterstock The South African
    Weather Service has issued several warnings, highlighting the potential for flash
    flooding, mudslides, rockfalls and damage to infrastructure and property. Heavy
    rainfall is also expected to coincide with strong, potentially damaging winds.
    Large areas of southern South Africa, including Western and Eastern Cape, are
    forecast to experience north-westerly to westerly gusts exceeding 60mph (97km/h)
    early this week, with even stronger gusts likely over higher ground, particularly
    across the Cape Fold Mountains. The latest warnings come shortly after heavy rain
    triggered flooding, road closures and infrastructure damage across the Western
    and Eastern Cape on 5-7 May. More than 300mm of rain fell in some areas, forcing
    evacuations in Gamtoos Valley after the Kouga dam exceeded capacity. Power outages
    and at least 45 road closures left many communities isolated. One person died
    in Knysna, Western Cape, while more than 2,000 people were evacuated to emergency
    shelters.'
