- article_update_date: 04.19.2026
  body_text: 'Letters from Our Readers The Mail Letters from Our Readers Readers respond
    to E. Tammy Kim’s article about the Consumer Financial Protection Bureau, Nicholas
    Lemann’s report about the Trump Administration’s attack on higher education, and
    Jill Lepore’s piece about whether A.I. needs a constitution. April 13, 2026 A
    Credit to Them E. Tammy Kim, in her article about the Consumer Financial Protection
    Bureau, captures something important that has gotten lost in the broader story
    of the Trump Administration’s dismantling of federal agencies: Russell Vought,
    the director of the Office of Management and Budget, isn’t merely stripping the
    C.F.P.B. of its enforcement power, he’s actively using it to benefit the industries
    it was created to police (“ Pay Later ,” March 16th). As a consumer-protection
    attorney who represents people in disputes against earned-wage-access fintech
    companies, I’d like to more fully examine a point that Kim touched on. On December
    23rd, Vought’s bureau issued an advisory opinion concluding that certain earned-wage-access
    products are not considered “credit” under the Truth in Lending Act, the federal
    law that requires lenders to disclose costs and terms in a consistent manner to
    insure that consumers are able to understand what it is they’re signing up for
    and to compare products. It further determined that the fees such companies charge,
    which are, in practice, the way many of them make money, are not subject to those
    disclosure requirements. The opinion does not carry the force of law; it also
    runs against the recent current of federal-court decisions on the issue. Twelve
    courts have ruled, on motions to dismiss, that plaintiffs have sufficiently pleaded
    that these companies’ products constitute credit and that their accompanying fees
    are subject to the act’s protections. Five of the rulings came after the advisory
    opinion was published. Moreover, the Supreme Court’s 2024 decision in Loper Bright
    Enterprises v. Raimondo, one of the more consequential of the Court’s recent rulings,
    held that federal courts must exercise independent judgment on questions of statutory
    interpretation rather than deferring to agency readings of the law. Vought’s C.F.P.B.
    may be offering the industry reassurance, but the courts, it seems, are not deferring.
    Adrian Ward New York City Schooled Nicholas Lemann’s recent article details the
    Trump Administration’s attack on “élite” institutions over wokeness, D.E.I., antisemitism,
    transgender athletes, and hostility to conservative ideas in general (“ Severance
    ,” March 16th). The latest development in this relentless campaign is the Defense
    Department’s withdrawal of senior military leaders from academic programs at leading
    American universities. Each year, approximately a hundred senior officers from
    across all branches of the armed forces enroll in world-class courses of study
    at schools such as Harvard, Princeton, and Georgetown as part of the Senior Service
    College Fellows Program. These courses prepare senior servicepeople for positions
    of responsibility in the national-defense arena and also provide them with the
    opportunity to collaborate with their civilian counterparts, many of whom will
    go on to be leaders in a multitude of strategically important fields. But Defense
    Secretary Pete Hegseth has termed such civilian institutions “woke breeding grounds
    of toxic indoctrination,” and his visceral antipathy toward them will now preclude
    military leaders from gaining a broader understanding of national security. In
    1901, Secretary of War Elihu Root founded the Army War College, and at its dedication,
    in 1908, he addressed the faculty and students: “Do not cease to be citizens of
    the United States. The conditions of Army life are such as to narrow your views.
    Strive to broaden your sympathies by mingling with those outside of the service
    and learning from them the things they can teach you. . . . Let our Army be never
    one of aggression but devoted to the interests of justice and peace.” That was
    true then, and it is especially true now. We need military leaders whose education
    benefits both the military profession and the enduring interests of the U.S. This
    latest ideological assault on professionalism advances neither objective. Peter
    V. Huisking Colonel, U.S. Army (Retired) Pasadena, Calif. Mind and Matter Jill
    Lepore’s reporting on whether A.I. needs a constitution illuminates the ways that
    tech companies are grappling with the genie they’ve already released (“ We, the
    Robots ,” March 30th). I’ve read a number of other pieces about efforts to teach
    large language models to be more human (but only in a good way, of course), and
    the idea seems to be that, if we feed them enough nutritious input, they will
    serve us well. However, what I never see in these articles is a full discussion
    of the futility, as far as I can tell, of teaching A.I. anything without imparting
    embodied elements of the human experience: pain, hunger, pleasure, to name just
    a few of the more insistent ones. Once again, people have separated the mind from
    the body—perhaps as acutely as we’ve ever done. Until we figure out how to reach
    beyond the current discourse around training Claude and his cousins—dominated
    as it is by technology, philosophy, economy, and politics—to the physicality of
    the biological world, we will have taught A.I. almost nothing about how to behave.
    We can try to think like mothers, but if we don’t bridge the gap between the offerings
    of a wire mother, like those used by Harry Harlow in his sad mid-century experiments
    conducted on baby monkeys, and actual human mothering in all its messy, touching
    ways, A.I. will be clinging to the cold lessons of metal, silicon, and data. Marie
    Malchodi Cranston, R.I. • Letters should be sent with the writer’s name, address,
    and daytime phone number via e-mail to themail@newyorker.com . Letters may be
    edited for length and clarity, and may be published in any medium. We regret that
    owing to the volume of correspondence we cannot reply to every letter.'
