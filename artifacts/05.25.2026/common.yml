  body_text: '| Next | Section menu | Main menu | The Midlife Crisis Comes for Millennial
    Pop On her first album in eight years, Robyn reckons with motherhood and midlife
    desire. by Spencer Kornhaber O nce upon the ’90s , a teenage girl named Robin
    Miriam Carlsson was crowned a pop princess. Her crystalline voice and secretive
    smile caught the attention of the Swedish record industry, whose producers and
    songwriters helped her create the swooning global hits “Show Me Love” and “Do
    You Know (What It Takes).” But Carlsson, first discovered at age 13, realized
    she didn’t want to be a singing automaton, a mere vessel for the pop machine.
    She turned down a deal from the U.S. branch of Jive Records, which then set out
    to find an American version of her—and landed on Britney Spears. By then, Robin
    Carlsson had become Robyn. A few years later, in 2005, she founded her own label
    to make her own kind of music. Her new sound combined firm dance beats, campy
    hip-hop flourishes, and synth riffs that spiraled and tessellated like the instruments
    in a Bach fugue. Her lyrics declared independence from clingy lovers and assorted
    social expectations, often through analogies inspired by technology. To simply
    quote her song titles from 2010’s Body Talk , a now-classic album, she was an
    “Indestructible” “Fembot” warning, “Don’t Fucking Tell Me What to Do.” Beneath
    the metallic veneer, though, her songs had the tenderness and precision of a homily.
    The effect was to make solitude sound sexy, sad, and hopeful at once. The timing
    had been right for her to liberate herself. The traditional music business was
    collapsing, as the internet cut into CD sales while letting listeners elevate
    their own niche idols. Mainstream pop was going maximalist by overloading its
    production with digital whizbangery; indie rock had risen as a rawer alternative.
    Robyn split the difference. She expressed a rebellious worldview in a sleek and
    organized way, like a manifesto in a well-formatted Word doc. That manifesto was
    one that 21st-century pop culture wanted to hear. Spears had become a cautionary
    tale: The girl who gave her youth to the record industry ended up losing her legal
    sovereignty (via the establishment of a conservatorship in 2008 that remained
    intact until 2021). Robyn did not become nearly as famous, but her emo bangers
    pointed the way for the likes of Lorde, Ariana Grande, and even Taylor Swift once
    she started playing with keyboards. Poptimism, the ascendant belief that a genre
    ruled by formulas and artifice can contain plenty of originality and humanity,
    made Robyn its mascot. And with time, her outlook on music came to seem like an
    insight into life itself. Or at least, that’s how many Millennials felt. Though
    Robyn is Gen X, she captivated my generation of idealists, who were out to upgrade
    the world that our parents had built and express ourselves in the process. Young
    adults in the early earbuds age used her songs as fuel for runs, laptop work,
    Tinder hookups, and the solitary, self-reflective mornings after. We also bopped
    along to her with our friends. HBO’s Girls cemented her status in a legendary
    scene : Hannah Horvath carefully drafts a killer tweet in her bedroom, then starts
    jumping around to Robyn’s defining single, “Dancing on My Own.” Her roommate,
    back from her yuppie adventuring, walks in and joins the party. The assurance
    of being yourself and being liked, fulfilling your purpose while climbing life’s
    rungs, has obvious appeal in youth, before compromises and obligations start to
    pile too high. But Robyn is now 46 and back with her first album in eight years.
    She is somehow singing the same song—even if the fable it spins seems more fantastical
    than ever. Many pop stars mellow into stately eminence in middle age, as Madonna
    (temporarily) did in her late 30s with 1998’s Ray of Light . Robyn appeared to
    be trending that way with her last album, 2018’s Honey —a dreamy beatscape that
    signaled appreciation for the mid-range of life after chasing many highs. Anthemic
    action was giving way to chill mantras, as if to regulate the ever noisier, ever
    more distracting world. Robyn performs “Sexistential” on The Late Show With Stephen
    Colbert in January. (Scott Kowalchyk / CBS) But Sexistential , released in March,
    pushes in the opposite direction, toward starry-eyed excess and abandon. The cover
    art shows Robyn screaming and topless. The title track features her rapping the
    word boner . Echoes of earnest 2000s indie pop, including from Robyn’s own catalog,
    abound. When she humped the air during a performance on The Late Show With Stephen
    Colbert in January, much of the internet snickered: Had the coolest girl in pop
    finally become cringe? Read: Robyn’s Honey : The thrill is gone, and that’s okay
    Perhaps so—cringe appears to be the fate of anyone older than 25 in the TikTok
    age. And pop culture has rarely allowed its female stars to grow older without
    mockery. But Sexistential may discomfit listeners for reasons other than ageism.
    After Honey , Robyn broke up with her on-and-off partner of more than a decade
    and then had a son through IVF. To judge by the disorienting sound of this album,
    middle-aged motherhood for her has been less an experience of setting down roots
    than of ripping them up. The title song sets her pregnancy saga—scrolling through
    dating apps amid doctor visits and hormonal spikes—to fast-paced club music while
    filtering her voice for cartoonish effect. “Blow My Mind” is a cover of her own
    song from 24 years ago, but this version rewrites lyrics about romantic infatuation
    into ones about finding your baby to be ridiculously cute. On the final track,
    “Into the Sun,” distorted bass roars like a rocket engine—evoking her many previous
    sci-fi references—as Robyn propels herself into the unknown: “Look what I’ve done
    / So brave and dumb.” The music amplifies both her giddiness and her uncertainty.
    Sexistential ’s production judders and glitches in ways that call to mind ’80s
    synth experimentalists such as Art of Noise and the rowdy sample collaging of
    the Beastie Boys in the ’90s. Its messiness is also in step with 2020s hyperpop—scruffy,
    topsy-turvy electronic music that seeks to harness, not counteract, modern overstimulation.
    The wooziest moments sacrifice Robyn’s easy-listening appeal for the sake of surprise.
    On the album opener, “Really Real,” a shattered-glass sound effect rings out before
    she sings, “We’re splitting up reality / And I slip out through the crack in between
    it.” What makes this chaos delightful rather than annoying is Robyn’s unshakable
    sense of control, grounded in pop principles and thoughtful craft. Sexistential
    ’s many catchy melodies bounce atop bright, blocky synth lines. Its psychedelic
    interludes exist to snap back into satisfying rhythms. Its lyrics brim with depersonalized
    language (“This is where the shared experience ends”), self-help real talk (“Fuck
    a therapist, it’s not mental / I need philosophy, this shit is existential”),
    and biological determinism (as in the lead single, “Dopamine”). She’s mapping
    out the way that even life’s strangest chapters unfold logically. The album, Robyn
    has said, was partly inspired by hearing André 3000 , of the hip-hop duo Outkast,
    explain that he’d pivoted to instrumental music because no one wants to hear a
    48-year-old man rap about his colonoscopy. In Robyn’s view, the unglamorous milestones
    of middle age are plenty deserving of pop treatment. Two years ago, a 33-year-old
    Charli XCX dominated pop culture with a similarly unruly album called Brat . It
    dwelled on the question of whether Charli would ever give up her hard-partying
    ways and settle down with kids. Robyn is now arguing that the choice is a false
    one. That argument is certainly upbeat in its implications—but the sound of Sexistential
    suggests the limits of maturing hedonistically. As I’ve been playing the album
    on repeat, savoring its intricate details and humming its candied choruses, I’ve
    felt a little self-conscious: Sexistential ’s childlike glee raises the specter
    that Robyn and her listeners still have some growing up to do. But I’ve also felt
    grateful for how playfully she’s engaging with midlife vertigo. The generation
    that grew up listening to Robyn is full of people whose blend of careerism and
    individualism has made them delay or skip marriage and children. Have we compromised
    too much, or not enough? Is there time for a reset? These sorts of questions are
    timeless rites of passage at the end of youth. Barreling ahead, Robyn is yet again
    modeling how to find meaning in the conventional—by doing it our own way. This
    article appears in the April 2026 print edition with the headline “Robyn Is Still
    Dancing On Her Own.” This article was downloaded by calibre from https://www.theatlantic.com/magazine/2026/04/robyn-sexistential-album/686065/
    | Section menu | Main menu |'
