  question_type: Reading Comprehension
  questions:
  - answer: B
    explanation: 文章指出，2025年冲突驱动的国内流离失所人数创下历史新高，首次超过了由自然灾害驱动的人数。选项A与文章信息相反。选项C和D是冲突驱动流离失所的后果或原因之一，但B是直接导致纪录高位的主要原因。
    options:
      A: An increase in natural disasters globally.
      B: A significant rise in conflict-driven displacements.
      C: More people returning to destroyed homes.
      D: The dismantling of protection systems for refugees.
    q_number: 1
    stem: According to the passage, what is the primary reason for the record high
      number of internal displacements in 2025?
  - answer: C
    explanation: 文章明确提到，2025年冲突驱动的国内流离失所人数（32.3m）首次超过了自然灾害驱动的人数（29.9m）。选项A与此信息相反。选项B是关于总流离失所人数而非仅灾害驱动的。选项D与文章关于增长的数据不符。
    options:
      A: Disaster-driven displacements were significantly higher than conflict-driven
        ones.
      B: The number of disaster-driven displacements decreased for the first time.
      C: Conflict-driven displacements surpassed disaster-driven displacements for
        the first time.
      D: Both types of displacements remained stable compared to the previous year.
    q_number: 2
    stem: What does the report by the Internal Displacement Monitoring Centre (IDMC)
      reveal about the relationship between conflict-driven and disaster-driven displacements
      in 2025?
  - answer: B
    explanation: Egeland将数据描述为“全球基本保护平民的崩溃”，并提到“无数家庭返回被摧毁的家园和消失的服务”。这表明保护平民的基本机制正在瓦解，即选项B所指的“广泛的保护平民的崩溃”。选项A过于具体，选项C与文章强调的冲突原因不符，选项D是流离失所的结果，而非Egeland评论的核心。
    options:
      A: International aid organizations are failing in their missions.
      B: There is a widespread breakdown in safeguarding civilians from harm.
      C: Natural disasters are overwhelming the capacity to protect people.
      D: Fewer people are choosing to return to their homes.
    q_number: 3
    stem: 'Jan Egeland''s statement, “a sign of a global collapse in basic protection
      of civilians,” suggests that:'
  - answer: A
    explanation: 文章解释说，“国内流离失所（internal displacements）是指一个人在本国边界内被迫逃离的每一个新实例。同一个人可能被迁移数次。”
      这意味着“internal displacements”计算的是事件次数，而“people displaced”指代的是个体。因此，选项A准确地描述了这种区别。选项B、C、D与文章内容不符。
    options:
      A: Internal displacements count each instance of fleeing, while people displaced
        counts unique individuals.
      B: People displaced refers only to those displaced by conflict, not disasters.
      C: Internal displacements are always permanent, unlike people displaced.
      D: The number of internal displacements is always lower than the number of people
        displaced.
    q_number: 4
    stem: The passage distinguishes between 'internal displacements' and 'people displaced'.
      What does this distinction imply?
  - answer: B
    explanation: 文章指出，尽管2025年流离失所的总人数有所下降，但报告强调“不应将其误认为是进步”，因为“背后是数十万次的强制遣返、被摧毁的基础设施以及日益加深的社会和环境压力”，使得永久解决方案不切实际。这表明回归的民众仍面临严峻挑战，即选项B所指的情况。选项A、C、D与文章内容不符或不完全准确。
    options:
      A: The decrease is solely due to improved data collection methods.
      B: Many of those who returned still face severe challenges and unstable conditions.
      C: The number of conflict-driven displacements is still rising rapidly.
      D: International conflicts have completely ceased.
    q_number: 5
    stem: 'According to the report, the decrease in the total number of people displaced
      in 2025 is attributed to several factors, but the report cautions against interpreting
      this as progress because:'
