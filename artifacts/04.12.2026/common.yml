  source_journal: Economist
  title: China is breaking into one of the world’s weirdest car markets
- article_update_date: 03.31.2026
  body_text: At least 70 people have been killed and 30 injured during an attack in
    Haiti’s breadbasket Artibonite region, significantly more than official estimates,
    a human rights group has said. Police initially reported 16 dead and 10 injured,
    while a preliminary report from civil protection authorities suggested 17 had
    died and 19 were wounded. The Collective Defending Human Rights group, which reported
    the higher death toll, said the “massacre” on Sunday had forced nearly 6,000 people
    to flee their homes. “The lack of a security response and the abandonment of Artibonite
    to armed groups demonstrate a complete abdication of responsibility by the authorities,”
    the group said. A spokesperson for the UN secretary general told reporters on
    Monday that he strongly condemned the gang attack. They said the violence underscored
    the gravity of the security situation in the country and urged a thorough investigation.
    Armed members of the Gran Grif gang attacked the Jean-Denis area at approximately
    3am on Sunday, local civil protection authorities said. The attack followed UN
    reports that more than 2,000 people were recently displaced by armed raids in
    nearby Verrettes, prompting residents in Petite-Riviere to flee their homes. The
    Artibonite department, a key agricultural area, has seen some of Haiti’s worst
    violence as gang conflict spreads beyond the capital, Port-au-Prince. In March,
    the US offered a reward of up to $3m for information on the financial activities
    of the Gran Grif and Viv Ansanm groups. Washington has designated both, which
    represent coalitions of hundreds of gangs, as terrorist organisations. Haitian
    security forces, supported by a UN-backed international mission and a US private
    military company, have intensified operations against gangs that control most
    of the capital. However, authorities have yet to arrest a major gang leader. More
    than a million people have been displaced by the conflict with gangs, which has
    exacerbated food insecurity, and close to 20,000 have been reported killed in
    Haiti since 2021. The death toll has climbed every year.
  difficulty_constant: 8.5
  question_type: Reading Comprehension
  questions:
  - answer: C
    explanation: 文章明确提到人权组织报告的伤亡人数远高于官方预估，且使用“massacre”一词，说明实际袭击严重程度远超官方初步统计，故C正确。
    options:
      A: Official reports were intentionally falsified by the UN.
      B: The human rights group has more reliable investigative access than local
        police.
      C: The actual severity of the attack was significantly higher than initial governmental
        estimates.
      D: The Collective Defending Human Rights group provided the lowest death toll
        estimate.
    q_number: 1
    stem: 'According to the passage, the discrepancy in the casualty figures suggests
      that:'
  - answer: B
    explanation: abdication意为“放弃、退位”，结合上下文，人权组织批评当局面对帮派暴行时未提供安全响应，即“完全放弃了责任”，故B正确。
    options:
      A: They successfully protected the agricultural interests of Artibonite.
      B: They failed to provide necessary security and governance in the face of violence.
      C: They were intentionally funding the gang activities in the region.
      D: They lacked the financial resources to conduct any security operations.
    q_number: 2
    stem: What does the phrase 'a complete abdication of responsibility' imply about
      the authorities?
  - answer: B
    explanation: 文章提到Washington将这两个组织列为恐怖组织，并指出它们是数百个帮派组成的联盟(coalitions)，故B项表述符合事实。
    options:
      A: They are individual criminal gangs operating exclusively in Port-au-Prince.
      B: They are identified by the US as coalitions of multiple gangs classified
        as terrorist organizations.
      C: They have been successfully dismantled by the UN-backed international mission.
      D: Their leaders have been arrested following a $3m reward offer from Washington.
    q_number: 3
    stem: Which of the following is true about the Gran Grif and Viv Ansanm groups
      according to the text?
  - answer: C
    explanation: 文章结尾段落明确提到：冲突导致的流离失所加剧了粮食不安全(exacerbated food insecurity)，故C正确。
    options:
      A: A decrease in the global market price of agricultural products.
      B: A significant increase in international military investment.
      C: A worsening of food insecurity due to mass displacement.
      D: An improvement in the security situation in the capital city.
    q_number: 4
    stem: The passage suggests that the violence in Haiti has caused which of the
      following secondary effects?
  - answer: B
    explanation: 文章通过具体惨案引出海地日益严重的帮派暴力、流离失所和人道主义危机，目的是客观报道当前的局势，故B最符合文意。
    options:
      A: To advocate for increased US military intervention in Haiti.
      B: To report on the escalating gang violence and security crisis in Haiti.
      C: To analyze the economic impact of the civil war on Haiti's agricultural region.
      D: To criticize the UN secretary general's lack of action in local conflicts.
    q_number: 5
    stem: What is the primary purpose of the text?
  source_journal: The Guardian
  title: At least 70 people killed and 30 injured in Haiti gang attack
