- article_update_date: 05.11.2026
  body_text: Bad government statistics can cost the economy billions Finance & economics
    | Disfigured Bad government statistics can cost the economy billions A new study
    tries to put a number on the value of reliable numbers May 7th 2026 THE LIFE of
    American government beancounters is tough, and not just at cocktail parties. They
    have a hard time persuading people to talk to them at work, too. A decade ago
    nearly nine in ten Americans, when approached, agreed to fill out the Current
    Population Survey, which is administered to about 60,000 households each month
    and asks about, among other things, employment. Fewer than seven in ten do so
    now (see chart 1). For the Consumer Expenditure Survey, which tries to capture
    3,700 households monthly, the response rate is down from 68% to 40%. Low engagement
    is a problem because the surveys are much more than a way to satisfy Uncle Sam’s
    curiosity about the citizenry. Bosses and investors rely on accurate data about
    GDP growth, joblessness, inflation and much else besides to manage businesses
    and allocate capital. When the information becomes less reliable, investment decisions
    get more difficult to make. Some may be delayed, creating a potential drag on
    the economy. But how much of a drag? A new working paper by Nicholas Bloom of
    Stanford University, Erica Groshen, former head of the Bureau of Labour Statistics
    (BLS) now at Cornell University, and Duncan Hobbs and Michael Strain of the American
    Enterprise Institute, a think-tank, hazards an estimate. Preserving trust in “the
    integrity and quality of official statistics”, the authors claim, generates economic
    benefits of about $25 for every $1 spent on the BLS, the agency with an annual
    budget of $700m that is responsible for many of these data. To arrive at their
    conclusion the quartet analysed an ignoble episode in the BLS’s recent history.
    On August 1st 2025 Donald Trump sacked Erika McEntarfer , appointed as the agency’s
    commissioner by his predecessor, Joe Biden. The president alleged, without evidence,
    that the BLS’s steep downward revision to recent jobs numbers had been “RIGGED
    in order to make the Republicans, and ME, look bad”. In fact, it was the wanton
    dismissal that looked bad in the eyes of many observers. In the following seven
    days there was a 50% leap, relative to the week before, in the average value of
    the index of Economic Policy Uncertainty (EPU), which tracks the number of articles
    mentioning such uncertainty that are published daily in American newspapers. This
    was a discernible jump even when compared to the chaos caused by Mr Trump’s trade
    war in April 2025 and his real one in Iran in the past two months (see chart 2).
    Based on Mr Bloom’s earlier study with other colleagues of the EPU’s impact on
    business investment, industrial production and employment, the authors estimate
    that the jump reduced American GDP by over $100bn (0.3%) and non-farm payrolls
    by 168,000 (0.1%). Some of this may not have been the direct result of Ms McEntarfer’s
    firing. A part was probably due to the big jobs revision itself. The unrelated
    resignation of a Federal Reserve governor on the same day may have played a role,
    too. But even after controlling for those variables, the researchers reckon that
    the McEntarfer affair trimmed GDP by at least $20bn and employment by 31,000 jobs.
    A brazen presidential attack on statisticians’ dependability may, admittedly,
    do more damage than a slow-motion crisis caused by unco-operative respondents.
    But the study shows that reliable statistics have real value. Forsaking them would
    be an incalculable loss. ■ For more expert analysis of the biggest stories in
    economics, finance and markets, sign up to Money Talks , our weekly subscriber-only
    newsletter. This article was downloaded by zlibrary from https://www.economist.com//finance-and-economics/2026/05/04/bad-government-statistics-can-cost-the-economy-billions
  difficulty_constant: 8.5
  question_type: Reading Comprehension
  questions:
  - answer: B
    explanation: 文章第二段明确指出，调查数据不仅仅是满足好奇心，更是企业主和投资者分配资本、管理业务的关键依据（Bosses and investors
      rely on accurate data... to manage businesses and allocate capital）。调查回复率下降导致信息可靠性降低，从而干扰经济决策。
    options:
      A: It indicates a lack of interest in the social status of American citizens.
      B: It undermines the data quality necessary for effective economic decision-making.
      C: It reflects the inefficiency of the Bureau of Labour Statistics in collecting
        data.
      D: It proves that Americans are becoming more skeptical of the government's
        intentions.
    q_number: 1
    stem: According to the first two paragraphs, why is the declining response rate
      of government surveys a concern?
  - answer: A
    explanation: 文中提到 beancounters（计较琐事的人/会计人员）时使用了转折语境，并提到他们的工作不仅在社交场合受冷遇，在工作中也难以说服人们参与调查，暗示了其职业的艰巨性和受到的社会阻力。
    options:
      A: underappreciated and face practical obstacles.
      B: meticulous professionals obsessed with trivial figures.
      C: excessively cautious in their public appearances.
      D: struggling to secure adequate funding for their surveys.
    q_number: 2
    stem: 'The author mentions ''beancounters'' in the first paragraph to suggest
      that government statisticians are:'
  - answer: A
    explanation: 文章通过唐纳德·特朗普解雇McEntarfer事件分析了其对经济政策不确定性（EPU）指数的负面影响。这证明了政府对统计机构专业性的攻击会导致经济损失，直接说明了政治干预对统计数据公信力的破坏。
    options:
      A: The negative impact of political interference on economic data integrity.
      B: The inevitable nature of presidential power in administrative appointments.
      C: The correlation between jobs revisions and Federal Reserve resignations.
      D: The inefficiency of the Bureau of Labour Statistics in handling media reports.
    q_number: 3
    stem: What does the 'McEntarfer affair' illustrate according to the study mentioned
      in the text?
  - answer: C
    explanation: 原文提到：'But even after controlling for those variables, the researchers
      reckon that the McEntarfer affair trimmed GDP by at least $20bn...'，说明研究者通过控制其他干扰变量（如工作修正和美联储官员辞职）来量化该事件的独立影响。
    options:
      A: By ignoring the Federal Reserve governor's resignation.
      B: By focusing solely on the rise in the EPU index.
      C: By statistically controlling for the jobs revision and other concurrent events.
      D: By comparing the 2025 data to similar crises in the early 2020s.
    q_number: 4
    stem: How did the researchers isolate the impact of the 'McEntarfer affair' from
      other economic variables?
  - answer: C
    explanation: 文章结尾强调可靠的统计数据具有真实的价值，放弃它们将造成难以估量的损失。通篇探讨了政府统计数据对经济稳定的重要性，指出其质量的下降会引发经济代价。
    options:
      A: Their value is often overstated due to political propaganda.
      B: They are becoming obsolete in the age of private market data.
      C: They are essential public assets whose degradation carries significant economic
