  questions:
  - answer: A
    explanation: 文章主要讲述放射性碳定年法在考古遗骸定年中的应用，determine表示确定、查明，符合语境。
    options:
      A: determine
      B: exaggerate
      C: neglect
      D: replicate
    q_number: 1
    stem: Radiocarbon dating is a standard method used to _____ the age of biological
      remains, especially when contextual information is limited.
  - answer: C
    explanation: 文章提到“no corrections for marine reservoir effect were applied”，意为校正。correct在此意为对误差进行校准。
    options:
      A: account
      B: compensate
      C: correct
      D: adjust
    q_number: 2
    stem: When dietary information suggests a marine diet, researchers must _____
      for the marine reservoir effect in carbon dating.
  - answer: C
    explanation: 原本认为该遗骸属于新石器时代，但新的碳定年结果将其划分至铁器时代或维京时代，即推翻（overturning）了旧结论。
    options:
      A: confirming
      B: supporting
      C: overturning
      D: maintaining
    q_number: 3
    stem: The re-dating of the Frälsegården dog changed its cultural attribution,
      effectively _____ its previous classification as Neolithic.
  - answer: D
    explanation: 文章提到“on the basis of available archaeological context”，指基于现有的考古背景。
    options:
      A: potential
      B: obscure
      C: unreliable
      D: available
    q_number: 4
    stem: For remains lacking radiocarbon data, researchers relied on the _____ archaeological
      context to estimate a plausible date.
  - answer: A
    explanation: 为了避免同一个体样本多次采样导致的数据冗余或混淆，故选redundancy（冗余）。
    options:
      A: redundancy
      B: integrity
      C: confusion
      D: scarcity
    q_number: 5
    stem: When sampling skeletal remains for DNA, researchers aimed to collect one
      sample per biological individual to avoid data _____.
  - answer: C
    explanation: 原文提到“we merged those data”，即合并数据，以提供更完整的个体信息。
    options:
      A: segregated
      B: abandoned
      C: merged
      D: discarded
    q_number: 6
    stem: In cases where multiple remains clearly derived from the same individual,
      the researchers _____ those data to ensure accuracy.
  - answer: D
    explanation: 原文中“it was unambiguous that data... came from the same individual”，指证据链明确，故选evidence。
    options:
      A: connection
      B: separation
      C: similarity
      D: evidence
    q_number: 7
    stem: Researchers often adopt a cautious approach, treating remains separately
      unless the _____ is unambiguous.
  - answer: D
    explanation: 紫外线照射是实验室处理样本的标准流程（procedure），以灭活表面DNA。
    options:
      A: remedy
      B: prohibition
      C: policy
      D: procedure
    q_number: 8
    stem: To prevent contamination during DNA extraction, all samples were subjected
      to UV radiation, a standard _____ in cleanroom facilities.
  - answer: B
    explanation: 骨粉是提取DNA的初始材料（raw material），即原始样本。
    options:
      A: waste
      B: raw
      C: final
      D: synthetic
    q_number: 9
    stem: After decontamination, specimens were drilled to produce powder, which served
      as the _____ material for subsequent DNA extraction.
  - answer: A
    explanation: 文章提到optimized to recover short DNA fragments，指从古代样本中回收（recover）降解的DNA片段。
    options:
      A: recover
      B: duplicate
      C: conceal
      D: degrade
    q_number: 10
    stem: The extraction process used silica-based methods specifically optimized
      to _____ short, degraded DNA fragments.
  - answer: C
    explanation: 将双链DNA变性为单链是为了后续的接头连接和测序（sequencing）准备。
    options:
      A: amplification
      B: stabilization
      C: sequencing
      D: neutralization
