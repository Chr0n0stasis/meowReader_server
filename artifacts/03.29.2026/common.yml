    stem: Extraction blanks were processed alongside samples to serve as negative
      controls, ensuring the _____ of the experiment.
  - answer: C
    explanation: 原文提到...that are heterozygous in a single high-coverage coyote genome，指基因变异类型。
    options:
      A: abundant
      B: monomorphic
      C: heterozygous
      D: negligible
    q_number: 16
    stem: The design of capture probes involved selecting variants that are _____
      in a high-coverage coyote genome.
  - answer: B
    explanation: 使用外群（outgroup）是为了确保群体遗传学推论的无偏性（unbiased）。
    options:
      A: subjective
      B: unbiased
      C: contradictory
      D: speculative
    q_number: 17
    stem: By using an outgroup, researchers aimed to reduce bias and ensure that genetic
      inferences remain _____.
  - answer: A
    explanation: 探针设计需要与目标位点匹配对齐（aligned），以便有效捕获遗传物质。
    options:
      A: aligned
      B: attributed
      C: compared
      D: injected
    q_number: 18
    stem: The set of probes was designed by extracting sequences from the reference
      genome, with each probe carefully _____ to the targeted site.
  - answer: B
    explanation: 严格的杂交条件是为了最大化（maximize）捕获的特异性。
    options:
      A: compromise
      B: maximize
      C: neutralize
      D: minimize
    q_number: 19
    stem: Stringent conditions during hybridization are necessary to _____ the specificity
      of the DNA capture.
  - answer: B
    explanation: 如果筛选指标不佳，样本会被排除（excluded）在捕获阶段之外，以保证数据质量。
    options:
      A: derived
      B: excluded
      C: integrated
      D: selected
    q_number: 20
    stem: In spite of the rigorous protocols, some samples exhibited poor screening
      metrics and were therefore _____ from the final capture phase.
