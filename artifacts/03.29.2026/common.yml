    stem: During library preparation, DNA molecules were dephosphorylated and denatured
      to create single strands, a necessary step for _____.
  - answer: A
    explanation: 经过洗涤步骤，最终的（final）DNA文库被纯化。
    options:
      A: final
      B: previous
      C: subsequent
      D: external
    q_number: 12
    stem: The unincorporated primers were removed during a bead wash to ensure that
      the _____ DNA library was pure.
  - answer: D
    explanation: Amplified to plateau... enable simultaneous sequencing（测序）是后续步骤，此处填入意为为了能存储或保存样本量，选D（storage）在此语境中侧重于保留样本以备后续研究。
    options:
      A: computation
      B: analysis
      C: sequencing
      D: storage
    q_number: 13
    stem: After quantification via qPCR, the libraries were amplified to plateau to
