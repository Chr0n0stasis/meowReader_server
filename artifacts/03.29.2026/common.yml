- article_update_date: 03.29.2026
  body_text: 'Radiocarbon and contextual dating We generated eleven new radiocarbon
    dates (Supplementary Data 2). Dates were calibrated using the IntCal20 calibration
    curve, using the OxCal v.4.4 software. For samples where δ¹³C values were obtained
    independently of accelerator mass spectrometry using high-precision stable-isotope
    mass spectrometry—providing dietary information—no high values indicative of potential
    marine diets were observed, and therefore no corrections for marine reservoir
    effect were applied. The previously published C88 dog from the site of Frälsegården,
    Gökhem in southwestern Sweden had been attributed to a Neolithic cultural context
    and an approximate age of 5,000 years bp13, but the new radiocarbon date of 1,154
    calibrated years bp instead places it in the Late Iron Age or Viking Age. For
    remains that did not have radiocarbon dates, we assigned dates usable in analyses
    on the basis of available archaeological context. The ‘Analysis date’ column in
    Supplementary Data 3 holds the best available single number date estimate, with
    a value of ‘NA’ if we were not able to confidently assign a date. Sampling, DNA
    extractions and library preparation When sampling skeletal remains for DNA, in
    most instances we aimed to take one sample per biological individual. In some
    instances, samples were obtained from different remains that possibly could derive
    from the same individual, based on the zooarchaeological context (in particular
    this was the case for the Kesslerloch site). In a few cases in which it was unambiguous
    that data from multiple remains came from the same individual, we merged those
    data. But in most cases, we treated data from different remains separately, to
    err on the side of caution and not incorrectly merge data. The true number of
    sampled individuals is thus not precisely known, but we provide a table listing
    the groups of remains where archaeological information suggest they might derive
    from the same individual (Supplementary Data 5). University of Tübingen A number
    of samples had already been processed in the cleanroom facilities of the University
    of Tübingen and analysed for DNA preservation, as previously described47. In brief,
    samples were subjected to UV radiation for 30 min, followed by DNA extraction48
    and double-stranded library preparation49. For the current project, these double-stranded
    libraries were transferred to the Max Planck Institute for Evolutionary Anthropology,
    where they were enriched for targeted canid single nucleotide polymorphisms using
    an in-solution capture as described below. Max Planck Institute Material from
    the Kesslerloch site was sampled and processed into powder at the cleanroom facilities
    of the Institute of Evolutionary Medicine, University of Zurich. All bone and
    teeth were decontaminated via UV irradiation for 30 min in a cross-linker on at
    least two sides before drilling. For some specimens, the external surface was
    lightly ablated by hand with a dentist drill to access more sterile tissue. Samples
    were then drilled using a dentist drill with sterilized bits to produce powder.
    The powders were then transferred to the Max Planck Institute for Evolutionary
    Anthropology for further processing. Three samples of the Senckenberg dog (a vertebra,
    a foot phalanx and a rib), and 25 new specimens from Gnirshöhle, were sampled
    in the designated clean room laboratories at the Max Planck Institute for Evolutionary
    Anthropology, in which they were decontaminated under ultraviolet irradiation
    for 30 min on each side and drilled with a sterile dentist drill to produce bone
    powder. DNA extractions for all of the aforementioned samples were then performed
    at the Max Planck Institute. We extracted DNA from between 6 mg and 104 mg of
    the powdered sample applying a silica-based method optimized to recover short
    DNA fragments48,50. In brief, lysates were prepared by adding 1 ml lysis buffer
    (0.45 M EDTA at pH 8.0, 0.25 mg ml–1 proteinase K, 0.05% Tween-20) to the sample
    material in a sterile 2.0 ml BioPure Eppendorf tube, which was rotated at 37 °C
    overnight. DNA was purified from 125 µl of the lysate using silica-coated magnetic
    beads and the binding buffer D (ref. 50) on an automated liquid-handling system
    Bravo NGS Workstation B (Agilent Technologies). Purified DNA extracts were eluted
    in 30 µl Tris–EDTA–Tween buffer (TET). Extraction blanks without sample material
    were processed with the samples. Single-stranded DNA libraries were built using
    a protocol adapted for automated library preparation51,52 on the Bravo-B NGS Workstation
    (Agilent Technologies). In short, all DNA molecules in the complete volume of
    the DNA extract (30 μl) were dephosphorylated at the 5′ and 3′ ends and denatured
    into single strands by heating. A 3′-biotinylated synthetic DNA adaptor was attached
    to the 3′ ends of the DNA fragments using T4 DNA ligase and a splinter oligonucleotide
    carrying a sequence of six random nucleotides. Ligation products were then immobilized
    on streptavidin-coated magnetic beads and splinter oligonucleotides were removed
    by washing beads at elevated temperature. The second DNA strand was synthesized
    using the Klenow fragment of Escherichia coli DNA polymerase I. The unincorporated
    primers were removed during a bead wash at elevated temperature. After the blunt-end
    ligation of the second DNA library adaptor, the final synthesized strand was released
    from the beads by heat denaturation. Extraction blanks were turned into single-stranded
    DNA libraries alongside the samples. DNA libraries were diluted tenfold and quantified
    via qPCR in the LightCycler 96 (Roche). DNA fragments in each library were extended
    via PCR with a sample-unique pair of indices in 100 μl reactions using AccuPrime
    Pfx DNA Polymerase (Thermo Fisher Scientific) and amplified to plateau to enable
    simultaneous sequencing of multiple libraries later on. Indexed libraries were
    purified using the solid-phase reversible immobilization method with magnetic
    beads, eluted in 20 µl Tris–Tween buffer (EBT) and quantified using a NanoDrop
    8000 spectrophotometer (Thermo Fisher Scientific). Half of the indexed purified
    library was amplified again for 15 cycles in a 100 µl reaction using Herculase
    II Fusion DNA Polymerase (Agilent Technologies) to increase the concentration
    and were purified with the SPRI bead approach. Before sequencing, DNA libraries
    were normalized to the final concentration of 200 ng μl–1, reconditioned with
    a single PCR cycle and pooled in equal volumes. Library pool was purified over
    silica columns using the MinElute PCR Purification Kit (QIAGEN N.V.), and eluted
    in a 30 µl EBT. The pool was quantified using the Agilent TapeStation System 4200
    (Agilent Technologies). Equimolar pools of libraries and of extraction blanks
    were shotgun-sequenced on the Illumina HiSeq 4000. Five million reads (single-end,
    75 cycles) were generated for each library and analysed to obtain basic quality
    metrics. The Francis Crick Institute For material processed at the Francis Crick
    Institute, powders were obtained using an Emax EVOlution fine dentistry drill
    in a cleanroom. Cementum samples were taken by removing a thin layer of powder
    from the surface of the tooth root, while the dentine was accessed by drilling
    a small hole directly into the root to access and hollow out the pulp cavity.
    Petrous bones were sampled by drilling a hole directly into the bone to access
    the cochlea, and the cortical bone was sampled on postcranial material. The initial
    lysis extraction protocol was performed manually, where extraction buffer (HPLC
    water, 0.5 M EDTA pH 8.0, Tween-20, 0.25 mg ml–1 Proteinase K; ref. 51) was added
    to the powders based on weight: 300 µl for <10 mg of powder, 500 µl for 10–15
    mg, 700 µl for 15–25 mg and 1,000 µl for >25 mg. These were incubated and rotated
    for 24 h at 37 °C before being centrifuged for 2 min at 13,200 r.p.m. Then, 140
    µl of the supernatant was transferred into LVL tubes with 10 µl EBT (HPLC water,
    1 M Tris–HCL pH 8.0, Tween 20; ref. 51) where automated extraction, indexing and
    library preparation on an Agilent Bravo Workstation was then undertaken. For the
    samples from Denmark, sampling and DNA extraction was performed in the ancient
    DNA facility of the PalaeoBARN laboratory at the University of Oxford. Sampling
    was performed by removing a small area of the outer surface layer, cutting off
    a small piece and then pulverizing it with a mixer mill to produce 50–70 mg of
    bone powder. DNA extraction was performed following the Dabney protocol48 but
    with the addition of 30 min pre-digestion. The DNA extracts were transferred to
    the Francis Crick Institute for further processing. All samples, including those
    extracted in Oxford, were prepared as single-stranded libraries and amplified
    with unique double index combinations50,53. A qPCR quality control step was undertaken
    in between library preparation and indexing, using a QuantStudio 7 Flex machine.
    The sample plates were processed with negative extraction controls and positive
    and negative library controls. All samples underwent paired-end sequencing with
    a 2 × 100 paired-end read configuration on Illumina HiSeq4000, NovaSeq 6000 and
    NovaSeqX platforms. Capture design Single-nucleotide variants from the nuclear
    genome to include on the capture were taken from three sets: 1) SNVs ascertained
    for population genetics. We first identified transversions SNVs that are heterozygous
    in a single high-coverage coyote genome (Coyote01 from California, BioSample:
    SAMN02921301). Ascertainment in an outgroup should ensure unbiased population
    genetic inferences21,54. To reduce the number of variants that are monomorphic
    in dogs, we further ascertained the list by requiring a minor allele count of
    at least 2 in a set of 44 Eurasian grey wolves. This set had 311,037 SNVs. 2)
    SNVs found on commonly used dog genotyping arrays. We downloaded the list of variants
    used by the Embark company for a dog genome-wide association study55 and excluded
    variants that cannot be unambiguously strand-flipped (C/G and A/T variants). This
    set had 178,357 SNVs. 3) A small number of SNVs hand-picked due to potentially
    being associated with trait variation in dogs, taken from previous studies56,57.
    This set had 273 SNVs. We merged the above three sets, which overlapped to some
    degree, and then designed probes. For each targeted SNV, we designed four probes,
    each of 52 base pair (bp) length, by extracting sequences from the canFam3.1 reference
    genome. Two probes of 52 bp centre on the SNV, but carry the two different alleles
    at the SNV. The other two probes end 1 bp upstream and start 1 bp downstream of
    the SNV, respectively. We excluded SNVs where any of the four probes contained
    a 15-mer that was found more than 100 times in the reference genome, or contained
    N’s. The final set contained 486,547 SNVs. An additional 8-bp linker sequence
    (CACTGCGG) was added to each probe, and the complete set of probes was ordered
    on two Agilent SureSelect DNA Capture Arrays, which were turned into an in-solution
    DNA capture library as previously described20. In-solution capture Capture was
    performed at the Max Planck Institute for Evolutionary Anthropology. Targeted
    single nucleotide variants (SNVs) were enriched from the total DNA in a library
    by applying an in-solution capture technology that is based on synthetic modified,
    immortalized probe sequences58,59. DNA (1,000 ng) was hybridized with the single-stranded
    capture probes for 24 h under stringent conditions in the thermocycler at 65 °C
    with a heated lid. Hybridization reactions were subjected to multiple automated
    washing steps on magnetic beads using the Bravo-B NGS Workstation. Purified enriched
    libraries were eluted in 30 μl TT and 1 μl was quantified via qPCR in the LightCycler
    96 (Roche). The complete remaining eluate was amplified to the plateau using Herculase
    II Fusion DNA Polymerase (Agilent Technologies), purified with the SPRI method
    and eluted in 20 μl EBT. Purified enriched libraries were quantified on the NanoDrop
    8000 spectrophotometer (Thermo Fisher Scientific) and normalized to 100 ng μl–1.
    Normalized libraries were reconditioned and prepared for sequencing following
    the same protocol as for shotgun sequencing. Enriched libraries were sequenced
    for 20 million reads per library single-read on the Illumina HiSeq 4000 with 75
    cycles. Decisions on which libraries to subject to capture were made slightly
    differently for different sets of samples. For libraries built at the University
    of Tübingen and the Francis Crick Institute, all libraries were captured regardless
    of what the screening metrics looked like. An exception to this was the set of
    libraries built from Danish samples at the Francis Crick Institute, seven of which
    showed poor screening metrics and were not captured. Three samples (two La Fru,
    Boncuklu) were processed later in the project and not'
