    Toward the end of 2024, West became so fed up with the US government’s failure
    to do anything about the pig butchering epidemic that she’d retired early from
    her position as a deputy district attorney and was now focused full-time on running
    her own anti-scam organization, called Operation Shamrock. I asked West for advice
