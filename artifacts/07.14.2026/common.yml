  body_text: For/Against Summer, a Spell Poems For/Against Summer, a Spell By Valzhyna
    Mort May 18, 2026 Despite the chill in the spine, by the sweat of dust, by the
    dew on sorrel, the bile in the buttercup, in sorrowship dues, in sap, on the spines
    of pines, despite the winter of hearts, summer came. Despite the speech-made wind,
    summer came, by the sweat of crickets, the spin of drones, by the spat of stomachs,
    by toot, by the rat-a-tat, despite the sore-throat roosters, summer came. Despite
    the sore-throat swallows and one stone, despite the planted crosses and flowers
    cut, despite the planted crosses and flowers cut, despite the hush of children,
    summer came. Despite the chill of children, summer came, despite the winter of
    children, summer came.
