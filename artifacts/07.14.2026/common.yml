    q_number: 3
    stem: 'The reference to Armin Papperger’s ''Lego'' remark serves to illustrate:'
  - answer: B
    explanation: The passage explicitly states that, according to Andryi Zagorodnyuk,
      the most important development is that countries 'see Ukraine not as a supplicant
      but as a valuable security partner'.
    options:
      A: From a source of geopolitical instability to a neutral mediator.
      B: From a vulnerable supplicant in need of charity to a valuable security partner.
      C: From an unreliable combatant to an dominant global superpower.
      D: From a military testing ground to an isolated regional actor.
    q_number: 4
    stem: Which of the following best describes the strategic shift in how Ukraine
      is perceived by international partners?
  - answer: C
    explanation: The text explains that expensive missiles should be 'reserved, respectively,
      for taking out ballistic and cruise missiles' and that Ukraine has become proficient
      at 'matching the shooter to the target,' indicating that rational defense requires
      using the right tool for the right cost-benefit profile.
    options:
      A: It renders traditional interceptors obsolete in all modern combat scenarios.
      B: It forces nations to prioritize cruise missile defense over drone defense.
      C: It creates a strategic necessity for matching specific defense tools to specific
        threat levels.
      D: It encourages nations to rely exclusively on AI-based systems to avoid human
        error.
    q_number: 5
    stem: What is the implied consequence of the 'cost differential' mentioned in
      the text for the defense industry?
  source_journal: Economist
  title: In the Gulf, Ukraine flaunts its skill at intercepting drones
