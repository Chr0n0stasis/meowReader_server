- article_update_date: 03.24.2026
  body_text: '| Next | Section menu | Main menu | Previous | Tommy Craggs The Big
    Story Oct 27, 2025 6:00 AM Ed Zitron Gets Paid to Love AI. He Also Gets Paid to
    Hate AI He’s one of the loudest voices of the AI haters—even as he does PR for
    AI companies. Either way, Ed Zitron has your attention. Photographs: Ali Cherkis
    In his day job, Ed Zitron runs a boutique public relations firm called EZPR. This
    might surprise anyone who has come to know Zitron through his podcast or his social
    media or the newsletter in which he writes two-fisted stuff like “Sam Altman is
    full of shit" and “Mark Zuckerberg is a putrid ghoul.” Flacks, as a rule, tend
    not to talk like this. Flacks send prim, throat-clearing emails to media people
    who do, on rare occasions, talk like this. Flacks want to touch base, hop on the
    phone, clear up a few things about the allegation that their CEO is a “chunderfuck.”
    "And that really is one of the things with guys like Sam Altman and Dario Amodei
    from Anthropic,” Zitron was saying over burgers on a fine Manhattan afternoon
    in September. “I work with founders all the time. I’m a founder myself, I guess—I
    don’t like the title. But when you are a person that has to make more money than
    you lose, otherwise you lose your business, and you see these chunderfucks burning
    5, 10 billion dollars in a year—and everyone''s celebrating them? It''s offensive
    .” We were talking about whether any of Zitron’s ranting about the AI industry
    had cost him business on the PR side of the ledger. He said no. There was the
    one client who felt Zitron was being a little mean toward Altman, the CEO of OpenAI
    and the biggest chunderfuck of all, as far as Zitron is concerned. Founding a
    company is hard, the client said. “I said, ‘I appreciate the comment, but, like,
    this isn''t about you,’” Zitron told me. “His company is burning billions of dollars.
    He''s a terrible businessman.” It was, in all, a very Ed Zitron sort of riff,
    pitched in the key of personal affront, populist in the manner of a small business
    owner stink-eyeing the unpunished wastefulness of big industry. (Would these CEOs
    be any less offensive, one wonders, if their companies were making billions of
    dollars?) He has built an improbable little empire for himself out of tart commentary
    like this. His weekly podcast, Better Offline , about “the tech industry''s influence
    and manipulation of society,” has cracked Spotify’s top 20 among tech shows, and
    his newsletter, Ed Zitron’s Where’s Your Ed At , has grown north of 80,000 subscribers.
    The Ed Zitron media experience also includes a scrappy Bluesky account, a football
    podcast, some occasional baseball writing, a lot of to-and-froing with the users
    of r/BetterOffline, and a book due next year about, as he puts it, “why everything
    stopped working.” In other media, he has become a go-to source for AI naysaying.
    When Slate’s What’s Next: TBD podcast or WNYC’s On the Media needed someone to
    talk about the bursting of the AI bubble, they called on Zitron. It isn’t just
    the volume of output that has put him on the map; it is the aggrieved style that
    he brings to criticisms of media figures and industry titans alike. AI of a Thousand
    Faces Two WIRED editors peer into their crystal ball—and glimpse humanity’s post-phone,
    post-screen salvation. Not long ago, volume and style came together to produce
    the quintessential bit of Zitron media: a piece for his newsletter titled “How
    to Argue With an AI Booster.” It was 15,000 words long. Edheads abound now. Nearly
    200 people have purchased a $24 Better Offline challenge coin, engraved with what
    has become the Zitron mantra: “NEVER FORGIVE THEM FOR WHAT THEY''VE DONE TO THE
    COMPUTER.” I have seen someone put Ed’s words on a motivational poster, operating
    at some ambiguous register of irony. One Threads user described her “parasocial
    crush on a tech critic & writer” who is not named but who is quite obviously Zitron.
    “I just want him to take me to dinner, take me gently but firmly by the hand,
    and tell me in his confusing, muddled British accent to throw away my goddamn
    phone,” she sighed. “This would fix me. I’m sure of it.” (As one tech journalist
    who’d seen the Threads post put it to me, “If you’re getting to a point where
    your writing is causing people to lust after you, you’re doing something either
    very right or very wrong.”) As a functional matter, Zitron is meeting a demand
    for an equal-and-opposite voice to counter the inescapable AI hype. Critics of
    AI approach from any number of angles. There are doomers who fear the industry
    is ushering in some world-shattering superintelligence; there are denialists who
    don’t believe AI will ever replace human decisionmakers. Zitron is up to something
    different. What he offers people, in a time of amoral boosterism and amid a free-floating
    revulsion for the tech industry, is a moral language for hating generative AI.
    “He approaches the subject like a journalist in that he’s ravenous for information,
    but he is unshackled by the institutions,” says Allison Morrow, a business reporter
    at CNN and a frequent guest on Better Offline . “Most journalists don’t want to
    root for an industry’s demise. The institutions we work for don’t want to be engaged
    in that kind of mission.” Maybe more importantly, for his readers and listeners,
    Zitron holds out the seductive promise of some great comeuppance for the industry.
    Justice, of some kind, for an audience that isn’t seeing much of it in evidence
    anywhere. “I do not think this is a real industry,” he has written, “and I believe
    that if we pulled the plug on the venture capital aspect tomorrow it would evaporate.”
    When On the Media asked how he could be so certain that a collapse was coming,
    he replied, “I feel it in my soul.” So his analysis may wobble here and there
    on the abstruse particulars of, say, inference costs. He will not be deterred
    from his overall message: Judgment Day is just over the horizon. Somewhat lost
    in all the frog-raining opprobrium is the obvious contradiction of his work, which
    Zitron doesn’t hide but which he rarely discusses: that he makes a living, in
    part, from trying to gin up attention for AI companies. Can a flack be a prophet
    on the side? Today, Zitron divides his time between New York and Las Vegas. He
    is 39, having spent the first half of his life in England and the latter in the
    United States, developing along the way a taste for such raffish but doomed Americana
    as minor-league baseball and the Las Vegas Raiders. But in many ways the Cassandra
    of the AI boom was shaped by his adolescence in London, where he grew up practically
    friendless, a “very fat and not particularly bright child,” who had the misfortune
    of attending a school known for theater kids and smarties. “From pretty much the
    moment I walked in to the moment I walked out,” he says, “I was bullied.” What
    friends Zitron did have as a kid, he found via the computer. His dad had a laptop
    and a PCMCIA card, and Zitron would dial up and play Ultima Online and EverQuest
    , finding himself in mIRC chat rooms devoted to the games. “My initial experience
    with the internet was just kind of wonderment, but also wonderment at the chaos,”
    he says. “It wasn’t like I thought, ‘This is perfect.’” He was amazed at all the
    “real freaks” who’d exiled themselves there, interacting in a space that, unlike
    other realms of life, seemed “very egalitarian.” Here, in the loneliness of a
    kid making connections through technology that he couldn’t forge in person, a
    sort of tech fetishism took root. It informs his work even today: the notion that
    tech drives social processes, not the other way around; that it is, in its very
    circuits, sociality itself . In this light, it isn’t hard to understand where
    his well-developed sense of personal outrage comes from. To misuse tech in some
    way, to exploit it or undermine it for personal or class gain, is to deny people
    the thing he’d found in those chat rooms with the freaks: the possibility of social
    connection. It is to be something like that very worst of things, a bully. When
    he says “never forgive them for what they’ve done to the computer,” it sounds
    a lot like “never forgive them for what they’ve done to me .” The once-friendless
    Zitron now talks warmly of his many friendships, of his good mates and his dear
    mates and his best mates . During CES in Las Vegas, Zitron recorded his podcast
    from a makeshift studio in a hotel room, 13 and a half hours in all, guest after
    guest after guest popping by as if it were the Dean Martin Show . CES was a triumph
    for Zitron. Thanking some of the people in the room near the end of his final
    episode, Zitron began to choke up a little. “I was telling everyone how much I
    love them,” he tells me, only a little embarrassed. “I think we need way more
    of that in fucking media. We need more friendship.” It was how he approached PR.
    Zitron had come to the industry in 2008, having studied communications at Penn
    State and completed a brief tour back in London writing about video games for
    PC Zone . He worked for a New York City PR firm, unhappily, then as the communications
    director for Hometalk, a startup social platform for home improvement. He made
    a point of cultivating relationships with media types. He said as much in his
    first book, This Is How You Pitch: How to Kick Ass in Your First Years of PR .
    “Getting to know your contacts on a personal level is a great way to make friends
    out of the people—like bloggers and journalists—who cover the industry. Let them
    be the one to bring up your field or your client. It will make you appear human,
    rather than just another hungry flack looking to get a story planted.” It comes
    off so cynical there on the page, but maybe that was only for effect. Tech bloggers
    who can’t remember having ever been pitched by Zitron recall drinking with him
    at New York City bars in the 2010s, a guy on the scene but not on the make. In
    his book, Zitron marveled, “Some of these people may end up going to your wedding,”
    and indeed that’s what happened. John Herrman, the indispensable tech columnist
    at New York magazine, was there at Zitron’s first wedding. In attendance at his
    second wedding, in 2017, were a number of media people with the mordant sensibilities
    that would come to characterize Zitron’s own writing and podcasting later on:
    Chapo Trap House ’s Felix Biederman, the acid polemicist Jeb Lund, sharp-eyed
    tech journos Mike Isaac and Sarah Emerson. In 2012, Zitron the flack went indie.
    He was pretty good at this PR stuff, too. I know this because Forbes published
    a thousand-word story the next year about just how good he is at this PR stuff.
    In fact, some of his best message-shaping work was done on behalf of the brand
    known as Ed Zitron. The field of PR was a “fetid shit-pile,” he told one reporter
    in 2014. Zitron wanted people to know he was different. One year, he pranked his
    PR colleagues who were blasting out pitches in advance of CES, asking each to
    send him more information “via Updog.” He explained to Newsweek: “The first one
    to respond was, ‘I''m sorry, what''s Updog?’ The glint in my eye that is just
    despising most of my industry is like, ‘Oh, nothing much, what''s up with you?’
    Screenshot, post.” Zitron would write the odd piece on a freelance basis,'
