  - answer: B
    explanation: 这是引用了“If you can't stand the heat, get out of the kitchen”这句谚语，用来批评领导者如果无法承担政治压力（take
      the heat）去推行他坚信的政策，那么担任最高权力职务也就失去了意义，故选B。
    options:
      A: It highlights Sir Keir’s professional experience as a former chef.
      B: It questions the purpose of holding power if one is unwilling to face the
        consequences of necessary but difficult actions.
      C: It suggests that Sir Keir should focus more on domestic economic issues.
      D: It warns that the prime minister is suffering from too much pressure in his
        current role.
    q_number: 5
    stem: What is the intended meaning of the phrase 'what is the point of being in
      the kitchen?' at the end of the text?
