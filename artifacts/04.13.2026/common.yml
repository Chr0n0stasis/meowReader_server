- article_update_date: 04.03.2026
  body_text: Holly Newson 00:00 Welcome to Working Scientist, a Nature Careers podcast.
    I’m Holly Newson, and in this series, you’ll hear from authors who can help you
    in your career. In this episode, I am joined by Simon May, visiting professor
    of philosophy at King’s College London, and the author of Jump, a New Philosophy
    for Conquering Procrastination, a book that helps you understand what’s holding
    you back from getting on with your biggest, deepest goals, and how procrastination
    forms part of the human experience. Simon, thank you so much for joining me. (Great
    pleasure). So to start off with, I wanted to ask, you mention the cult of work
    in your book. What is that? Simon May 00:37 So, the cult of work is the idea that
    our identity is our work, is fundamentally our work. Of course, there are other
    things that contribute to our identity, some of them extremely important, but
    that without work, we’re, in a sense, an empty shell. And the cult of identity,
    I trace back to the 16th-17th century, essentially to the birth of Protestantism
    in Europe. And I mean, I need to emphasize, I’m really talking about the West
    here, so I don’t want to presume to know about, you know, all the other rich cultures
    in the world. It essentially, I trace it back to the rise of Protestantism, when
    work became a form of godliness, of devotion. So that godliness was no longer
    confined, say, to charitable acts, to proper procedures of, you know, church worship.
    But the amount of work you did, which you did for the sake of God made you, in
    some sense, helped you, as it were, towards salvation. (Okay). I mean, in those
    days, obviously, it had this very religious purpose. That got secularized, you
    know, with the Enlightenment in the 18th century, and then with its development
    in the 19th century. So that, you know, work became, in the words of several people
    in the 19th century, a sacred duty. In our day, work has become reduced in many
    ways, not entirely, but there’s a big element of that to a sort of treadmill of
    productivity, so that we ourselves value ourselves by our outputs. And even the
    very word outputs is a bit like a factory, yeah. And so work has become, in some
    ways, what would be the word. Depersonalized, cold, mechanical production line,
    spirit. And I trace one of the causes, (and I go through a number of causes of
    procrastination) to that. So that it’s extremely frustrating, as on the one hand,
    we’re gripped by the cult of work, so that, you know, if we are our work, it’s
    tremendously important other people value us based on our achievements, our outputs
    and so on. You know, the maximum number of scientific papers we can churn out,
    sometimes writing the same paper in different ways twice. And some of the philosophers
    do this too. Many academics do this. Because output, you have a number of papers,
    you have on your on your CV, in some ways you know, will determine your career
    and your future. So, and I’m saying paradoxically, it’s a tremendous motivator,
    of course, but it’s also a tremendous inhibitor. Holly Newson 03:25 Yeah. And
    so, in what ways does it make procrastination worse, the fact that work is now
    such a part of our identity? Simon May 03:34 Well, really, as I was just suggesting,
    it makes it worse. Because, you know, if something becomes cold and alienating
    and simply production-oriented, it ceases to engage, you know, our real. It sees,
    it leaves, it becomes cold, and we don’t respond to, you know, when we engage
    in processes that we see as essentially cold and alien and from which we’re alienated,
    but which we feel compelled to do, you know, we lose a certain amount of motivation.
    Above all, we lose the motivation to really invest ourselves in it. It just becomes,
    look, I need to churn this out. I need to get this out by Monday morning. I need
    to, you know, my, my, you know, my competitor in the next lab has produced three
    papers this year. I’ve only produced one. I better get on with it. It’s a, it’s
    a sort of, it’s not just the competitive element. It’s the coldness that the process
    acquires. Holly Newson 04:35 And in terms of career procrastination on the largest
    scale, what can that look like in terms of someone’s life if they are putting
    maybe their biggest goals and their biggest hopes off? Simon May 04:49 Well, what
    it can look like, ultimately, and I go into this in my book, is that you actually
    put off the very career, the very vocation that you’re actually deeply devoted
    to. (Mmm). And I mean, the stakes are so high, in the sense, you’ve got so far
    to fall if it doesn’t work. And of course, we never know in advance if it’s going
    to work, if anything’s going to work. You know, relationship, a marriage, a career,
    a vocation, whatever, that we can actually avoid an entire vocation, so we, in
    a sense, procrastinate on our life, not just on, you know, on that particular,
    on becoming a scientist or or becoming a philosopher, or becoming whatever it
    is, a gardener, whatever it is. I mean, that’s what really motivated me in this
    book, is not why do I put off, you know, trivial tasks like cleaning up the lab
    or, you know, getting my tax return in on time and so on, which a lot of books
    about procrastination deal with. You know, why do I keep putting off these things
    I need to do? But why do I put off my life? Why do I put off what I’m really devoted
    to. And I’ve personally known, you know, people who have done that, and the very,
    very gifted people, and you know, they can be very good at their displacement
    activities, that’s the point. So you can spend your whole life doing something.
    I mean, I don’t want to name any particular professions, but it just happens that
    one particular person I’m thinking of, you know, became an investment banker.
    I’m not knocking investment banking at all, but it wasn’t their true love. But
    it was, in a sense, the path to, it enabled them to avoid what they really wanted
    to do, which was pottery, believe it or not. You know, you never know whether
    you’re going to make any money, whether you’re going to succeed, whether you’re
    going to buy your products and so on. And this was a way to more easier status
    in a sense, or more readily available status, money, a clearly established career
    hierarchy. And they, they actually did return to their first love, you know, but
    it was only in their 60s, and that’s okay. I mean, one of the wonderful things
    about today is that we do not frown anymore, society doesn’t frown anymore, on
    people who change their minds throughout their lives. But you know, it’s very
    different if you do it in your 20s than if you do it in your 60s. I mean, you
    just have less time and perhaps less energy, and so on. So I think that’s an example.
    That’s the sort, of kind of procrastination, you know, that I find really fascinating,
    and it can extend in many other fields, putting off the relationship you think
    is the right one, and knowingly marrying the wrong person, and all this sort of
    thing. Holly Newson 07:33 So tell me a bit more about what role fear plays in
    procrastination. Simon May 07:39 Well, fear is fundamental to it, because everything
    I’ve spoken about is a kind of, it’s something you’re frightened of, (yeah), you
    know, you’re frightened of, above all, not succeeding. You’re frightened of not
    getting status. You know, just being hidden away somewhere, doing your thing,
    but no one’s recognizing you. So you choose a career path which is clearer, where
    there are clear levels, you know that they’re clear promotions, you get promoted
    to whatever it is, B3 then B1 then A10, or whatever it is, and it’s more predictable.
    So fear is, I mean, fear is a very interesting thing, because, of course, you
    can have….so I’ve really been alluding to fear of failure. But then, of course,
    there’s the other thing which is very well known, which is fear of success. Holly
    Newson 08:31 Why does fear of success exist? It sounds like such a counterintuitive
    thing. Simon May 08:37 It does. And it’s a it’s a very difficult, it’s a very
    mysterious. I mean, I can’t say I’ve, you know, got to the bottom. I know I have
    it myself to some degree. Not that I’ve been that successful. And I think there
    are a number of factors to it. One is the fear of death, and I’ll come to that.
    And the other is the fear of becoming real to yourself. This is a very difficult
    thing, and maybe some of our viewers might think, what the hell is he talking
    about? And maybe they’re both linked. In a sense, becoming real, well, firstly,
    it’s nice to exist in the eyes of other people, so recognition, as we know from,
    you know, social media sites and so on. I mean, we do have a deep hunger for other
    people to recognize. Almost more important than recognizing ourselves, which is
    somewhere crazy because we don’t have any control over whether other people…and
    their recognition of us might be very fleeting. I mean, they’ve got lives to get
    on with. They haven’t got time to be, you know, focused on us, unless we’re incredibly
    famous, and even then, we can go out of fashion. So to me, the nub of it is there’s
    a, is the fear of death. Because there is a certain sense…I remember that when
    I was a teenager, I was terribly afraid of getting married, (okay), which I did
    in the end, but I was and the reason was that I thought, once I’ve made that choice,
    that will be for life. I mean, that’s, you know, the way what I thought. And once
    I’ve made a choice for life, my whole life is determined. I’m then on a path towards
    whenever it ends. Whereas if I keep my options open, (this is my teenage sort
    of intuition). If I keep my options open, if I don’t commit myself, and that could
    apply to a career, to anything, then I’ve always got a chance to kind of live
    life again. I don’t know if that makes any sense, (it does make sense). So fear
    of success to come back to that is, in a sense, something very similar. It’s,
    it’s, it’s not that I’m always moving towards some horizon as it were, that I
    never attain. I’m remaining slightly vague about also my self definition, because
    success, if I’ve achieved a goal, you know, I’m helping to, as it were become
    real to myself. I mean, right? (You become defined) by becoming defined exactly.
    And the fear is of we all want definition, but I think we don’t want too much
    definition, such that we become so defined to ourselves, that there’s a possibility
    of becoming who we are, of becoming real to ourselves. I can only allude to this,
    and I only allude to it in the book, yeah. But I think fear of success is a deeply,
    deeply powerful thing. And it’s, and it’s, you know, its origins are very mysterious.
    I mean, I’ve been speculating just based on my own experience, but others might,
    you know, have other explanations for it. Holly Newson 11:39 Yeah. And this book
    in general, I mean, it’s titled A new Philosophy for Conquering Procrastination.
    Why did you want to write something that was slightly different to
