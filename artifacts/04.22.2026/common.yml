  body_text: 'Britain’s diplomatic footprint is diminishing Britain | Losing grandeur
    Britain’s diplomatic footprint is diminishing The country’s overseas estate is
    crumbling and shrinking March 26th 2026 “Hard power”, Sir Keir Starmer told the
    Munich Security Conference in February, “is the currency of the age.” Such thinking
    helps explain his Labour government’s plans to downsize Britain’s Foreign, Commonwealth
    and Development Office. Spending is expected to fall by an average of 6.1% a year
    in real terms between now and 2028-29, estimates the Institute for Fiscal Studies,
    a think-tank: the largest cut to any department, compared with a 1.5% increase
    across government. The prime minister wants to boost spending on defence; diplomacy
    will be squeezed. Foreign aid will be hit hardest . But the Public and Commercial
    Services Union, which represents some foreign-office staff, expects cuts to all
    roles, including diplomatic and consular positions. Under current plans, between
    15% and 25% of the workforce could lose their jobs. In some sections, the cuts
    will reportedly be even more severe. There are plans to chop 35% of roles in the
    analysis directorate, which is made up of subject-matter experts. Entire research
    areas will stop. On March 16th the union began balloting its members about taking
    industrial action. In addition to staff cuts, the foreign office plans to sell
    off more of its overseas estate, continuing a decades-long process. This has happened
    under Conservative and Labour governments alike. Under the Conservatives in 2018,
    for example, when Boris Johnson was foreign secretary, the British embassy in
    Bangkok was sold for £420m ($580m). The grand old building was demolished to make
    way for offices and shops. Edward Lister, a former aide to Mr Johnson, says he
    argued against the decision, as embassies are “a little bit of England, with the
    Union Jack flying”, and laments the loss to the country’s stature. The staff decamped
    to a nondescript corporate tower nearby. A valuable chunk of Britain’s compound
    in Tokyo was sold to Mitsubishi Estate Group, a developer, in a deal completed
    in 2022. A regular visitor to the embassy calls the sale “distasteful”. The site
    has a prestigious position opposite the Imperial Palace. “It is now”, one former
    government adviser says ruefully, “a building site.” More recently, the former
    British consulate-general’s office in Paris (pictured) was sold for £6.2m. Britain
    has also offloaded properties in Bilbao, Bogota, Lusaka and Montserrat. The bean-counters
    are eyeing a £12m apartment that was bought for a diplomat in New York. However,
    large embassy sales of the Bangkok sort are no longer in fashion. Sir Oliver Robbins,
    the foreign office’s top civil servant, told a committee of MPs in December that
    flogging historic properties could be “more hassle than it is worth”. Besides,
    there aren’t all that many left to choose from. According to the National Audit
    Office, today the foreign office owns only 27% of its properties. Fifteen years
    ago the foreign office’s figure was 46%. Some of those remaining have been gifted
    by host countries, with conditions stipulating that they cannot be sold. As for
    the 73% of its premises that Britain occupies but does not own, the government
    has often disposed of buildings to raise money, only to have to rent elsewhere
    or indeed in the exact same place. The consulate-general’s office in Munich was
    sold under a previous Labour government and then leased straight back. Some of
    the buildings that comprise the remaining £2.5bn portfolio are in a poor, sometimes
    even unsafe, condition—15% have been rated as such by the foreign office. Over
    the past 15 years, according to the response to a freedom-of-information request
    from The Economist, £1.46bn has been raised from auctioning off 215 assets overseas,
    largely to help fund repairs and upgrades elsewhere. A long, laborious process
    of minor sales now looks likely: an office here, a garden there. It promises to
    be an undignified, if discreet, syphoning off of assets. “We shape our buildings,”
    Winston Churchill said of the reconstruction of the House of Commons after the
    second world war, “and afterwards our buildings shape us.” Britain’s crumbling
    diplomatic footprint will do much the same. ■ For more expert analysis of the
    biggest stories in Britain, sign up to Blighty, our weekly subscriber-only newsletter.
    This article was downloaded by zlibrary from https://www.economist.com//britain/2026/03/26/britains-diplomatic-footprint-is-diminishing'
