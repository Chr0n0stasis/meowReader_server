    Dec 10, 2025 6:00 AM Scientists Thought Parkinson’s Was in Our Genes. It Might
    Be in the Water New ideas about chronic illness could revolutionize treatment,
    if we take the research seriously. Photograph: Rachel Jessen Amy Lindberg spent
    26 years in the Navy and she still walked like it—with intention, like her chin
    had someplace to be. But around 2017, her right foot stopped following orders.
    Lindberg and her husband Brad were five years into their retirement. After moving
    10 times for Uncle Sam, they’d bought their dream house near the North Carolina
    coast. They had a backyard that spilled out onto wetlands. From the kitchen, you
    could see cranes hunting. They kept bees and played pickleball and watched their
    children grow. But now Lindberg’s right foot was out of rhythm. She worked hard
    to ignore it, but she couldn’t disregard the tremors. And she’d started to misplace
    words and thoughts, especially when she got excited. Was this normal? She was
    57, fit and clean-living. Could the culprit be menopause? The diagnosis took all
    of five minutes. Lindberg had Parkinson’s disease, the neurologist said, with
    all the classic symptoms. PD—as the scientists she would meet call it—is a neurological
    disorder, and a life sentence. Sufferers gradually lose control of their muscles,
    their bowels, their esophagus. Doctors told Lindberg that there was no way to
    know what had caused it. Lindberg spent years in the military, around Camp Lejeune.
    Photograph: Rachel Jessen The daughter of a sailor, Lindberg had built her life
    around the military. She was commissioned in the Navy out of college and became
    an officer at 23. Her first posting was to Marine Corps Base Camp Lejeune in North
    Carolina, a city-sized training hub that supports more than 60,000 sailors and
    marines. There were murmurs even then—whispers of weird cancers and stillbirths—but
    Lejeune was one of the prettier pieces of land in the Navy’s property portfolio.
    The bachelor officers’ quarters were on a grassy thumb of shoreline called Paradise
    Point, where the New River meets the Atlantic. “Lejeune was just picturesque,”
    Lindberg says. “We had a river right there, and the beach wasn’t far away, and
    you worked half a mile from where you lived.” She loved her job at the hospital
    and made lifelong friends. She met her husband—a photo on her desk shows a blond
    Lindberg beaming beneath her Navy cap while Brad smiles broadly in his dress blues.
    “It was really nice,” she says. “You’d never suspect the water.” Parkinson’s is
    the second most common neurological disease in the United States, after Alzheimer’s;
    each year 90,000 Americans are diagnosed. For decades, Parkinson’s research has
    focused on genetics, on finding the rogue letters in our genome that cause this
    incurable misery. Today, published research on the genetics behind Parkinson’s
    outnumbers all other potential causes six to one. This is partially because one
    of the disease’s most generous benefactors, Google cofounder Sergey Brin, can
    tie Parkinson’s to his genetics. Some Parkinson’s patients diagnosed before age
    50—as Michael J. Fox was—can trace the disease to their genes; Brin, whose mother
    has the disease, carries a mutation of the LRRK2 gene, which significantly increases
    the likelihood of him developing PD. Over the years, Fox’s foundation has raised
    billions for Parkinson’s research, and Brin has personally committed $1.8 billion
    to fighting the disorder. All told, more than half of Parkinson’s research dollars
    in the past two decades have flowed toward genetics. But Parkinson’s rates in
    the US have doubled in the past 30 years. And studies suggest they will climb
    another 15 to 35 percent in each coming decade. This is not how an inherited genetic
    disease is supposed to behave. Despite the avalanche of funding, the latest research
    suggests that only 10 to 15 percent of Parkinson’s cases can be fully explained
    by genetics. The other three-quarters are, functionally, a mystery. “More than
    two-thirds of people with PD don’t have any clear genetic link,” says Briana De
    Miranda, a researcher at the University of Alabama at Birmingham. “So, we’re moving
    to a new question: What else could it be?” Briana De Miranda, a researcher at
    the University of Alabama at Birmingham. Photograph: Lynsey Weatherspoon “The
    health you enjoy or don’t enjoy today is a function of your environment in the
    past,” says Ray Dorsey, a physician and professor of neurology at the University
    of Rochester. Your “environment” could be the refinery a town over, the lead in
    the paint of your mother’s home, the plastic sheath of the Hot Pocket you microwaved
    in 1996. It is air pollution and PFAS and pesticides and so much more. And this
    environment of yours—the sum of all your exposures, from conception to the grave—could
    be making you sicker than you realize. In a study of half a million Britons, Oxford
    researchers determined that lifestyle and the environment is 10 times more likely
    to explain early death than genetics. But that also offers a tantalizing prospect.
    If Parkinson’s is an environmental disease, as Dorsey and a small band of researchers
    emphatically believe, then maybe we can end it. In 1982, two years before Lindberg
    was stationed at Camp Lejeune, a 42-year-old heroin addict named George Carillo
    was wheeled into the Santa Clara Valley Medical Center in San Jose, California.
    A few days earlier, Carillo had been perfectly able-bodied. Now he was mute and
    unable to move. Baffled, the neurologists on call came to an impossible diagnosis:
    The patient, over a long weekend, had developed Parkinson’s disease. Carillo would
    probably have spent the rest of his short life in a psych ward had a pioneering
    young neurologist named Bill Langston not intervened. The way Parkinson’s takes
    over the body is distinct, Langston told me. The disease attacks the neurons in
    a region of the brain called the substantia nigra, a small dark structure that
    stands out amid the squirms of beige. The neurons here release dopamine, which
    sends signals to other neurons that help the body to move smoothly and effectively.
    In Parkinson’s these neurons die off; by the time a patient is diagnosed, they
    have often lost 60 to 80 percent of them. The process usually takes years, Langston
    says. But in the case of Carillo, all the neurons had disappeared almost overnight.
    Genetics became the “800-pound gorilla,” as one scientist put it. “All the research
    dollars went toward genetics.” Over the summer of 1982, Langston found five more
    “frozen addicts” across the Bay Area. Through gumshoe detective work, he discovered
    they had all injected a batch of what they believed to be a designer drug called
    MPPP, cooked in a Morgan Hill basement. But the chemistry had gone awry. Instead
    of 1-methyl-4-phenyl-4-propionoxypiperidine, a potent opioid with morphine-like
    effects, the dime-bag chemist had accidentally made 1-methyl-4-phenyl-1,2,3,6-tetrahydropyridine,
    or MPTP, a pharmacological slipup that would rewrite neurology textbooks. When
    Langston and colleagues secured a batch of MPTP and tested it on primates, they
    knew they had uncorked a revolution. “Any neurologist could see these monkeys
    and immediately know that’s Parkinson’s,” Langston says—which was especially compelling,
    since monkeys do not get Parkinson’s in the wild. In a first, Langston showed
    that MPTP killed the dopamine-producing neurons in monkeys’ substantia nigra.
    The discovery made him the most famous Parkinson’s researcher in the country and,
    Langston wrote at the time, promised to “turn the entire field of Parkinson’s
    disease upside down.” Parkinson’s, it appeared, could be caused by a chemical.
    Amy Lindberg settled quickly into life at Lejeune. She played tennis and ran on
    her lunch breaks, flitting through sprinklers in the turgid Carolina summers.
    But something dark was lurking beneath her feet. Sometime before 1953, a massive
    plume of trichlorethylene, or TCE, had entered the groundwater beneath Camp Lejeune.
    TCE is a highly effective solvent—one of those midcentury wonder chemicals—that
    vaporizes quickly and dissolves whatever grease it touches. The spill’s source
    is debated, but grunts on base used TCE to maintain machinery, and the dry cleaner
    sprayed it on dress blues. It was ubiquitous at Lejeune and all over America.
    And TCE appeared benign, too—you could rub it on your hands or huff its fumes
    and feel no immediate effects. It plays a longer game. For approximately 35 years,
    Marines and sailors who lived at Lejeune unknowingly breathed in vaporized TCE
    whenever they turned on their tap. The Navy, which oversees the Marine Corps,
    first denied the toxic plume’s existence, then refused to admit it could affect
    Marines’ health. But as Lejeune’s vets aged, cancers and unexplained illness began
    stalking them at staggering rates. Marines stationed on base had a 35 percent
    higher risk of developing kidney cancer, a 47 percent higher risk of Hodgkin’s
    lymphoma, a 68 percent higher risk of multiple myeloma. At the local cemetery,
    the section reserved for infants had to be expanded. Meanwhile, Langston had spent
    the remainder of the 1980s setting up the California Parkinson’s Foundation (later
    renamed the Parkinson’s Institute), a lab and treatment facility equipped with
    everything needed to finally reveal the cause of the disease. “We thought we were
    going to solve it,” Langston told me. Researchers affiliated with the institute
    created the first animal model for Parkinson’s, identified a pesticide called
    Paraquat as a near chemical match to MPTP, and proved that farm workers who sprayed
    Paraquat developed Parkinson’s at exceedingly high rates. Then they showed that
    identical twins developed Parkinson’s at the same rate as fraternal twins—something
    that wouldn’t make sense if the disease were purely genetic, since identical twins
    share DNA and fraternal twins do not. They even noted TCE as a potential cause
    of the disease, Langston says. Each revelation, the team thought, represented
    another nail in the coffin of the genetic theory of Parkinson’s. When Goldman
    compared both populations, the results were shocking: Marines exposed to TCE at
    Lejeune were 70 percent more likely to have Parkinson’s than those stationed at
    Pendleton. But there was a problem. The Human Genome Project had launched in 1990,
    promising to usher in a new era of personalized medicine. The project’s goal,
    to identify all of the genes in man, was radical, and by the time it was completed
    in 2000, frothy comparisons to the moon landing were frequent. Unraveling our
    genome would “revolutionize the diagnosis, prevention, and treatment of most,
    if not all, human diseases,” then president Bill Clinton said. But for Langston
    and his colleagues, the Human Genome Project sucked the air out of the environmental
    health space. Genetics became the “800-pound gorilla,” as one scientist put it.
    “All the research dollars went toward genetics,” says Sam Goldman, who worked
    with Langston on the twin study. “It’s just a lot sexier than epidemiology. It’s
    the latest gadget, the bigger rocket.” A generation of young scientists were being
    trained to think of genetics and genomics as the default place to look for answers.
    “I characterize science as a bunch of 5-year-olds playing soccer,” says another
    researcher. “They all go where the ball is, running around the field in a herd.”
    And the ball was decidedly not environmental health. “Donors want a cure,” Langston
    says. “And they want it now.” In 1997, researchers found a family in Italy that
    had passed along Parkinson’s disease for generations. Although the gene in question
    would later be shown to cause just a fraction of Parkinson’s cases, the damage
