- article_update_date: 04.09.2026
  body_text: 'Holly Newson 00:00 Welcome to Working Scientist, a Nature Careers podcast.
    I’m Holly Newson, and in this series, you’ll hear from authors who can help you
    in your career. In this episode, I’m joined by Sonali Majumdar, a scientist and
    higher education expert, and the author of Thriving as an International Scientist,
    a book that looks at the challenges facing global STEM PhDs, and offers advice
    and solutions to help. Sonali, thank you so much for joining me. Sonali Majumdar
    00:27 Thank you so much for inviting me Holly. I’m excited for this conversation.
    Holly Newson 00:31 To kick off with, how would you define an international scientist?
    Sonali Majumdar 00:35 Yeah, for the purposes of my book, the way that I think
    about the population that are foreign-born. And most of them are typically on
    visas, are the ones that I call international scientists. For those who have somehow
    acquired a permanent residency in the country that they’re in. In the case of
    the book, mostly the United States. Those are defined. Those people are defined
    more as immigrants. And so for internationals, I am mostly catering to the visa-holders
    who are more early in their career, are just kind of training in their PhD or
    postdoc, or are in their first job after. Holly Newson 01:09 Great. That makes
    complete sense. So why did you personally want to pursue your science career in
    the United States? Sonali Majumdar 01:19 So I’ve had a fairly non-linear career
    path. And I’ve been actually thinking on different moments of my life that kind
    of steered me towards the path I was in. And I think the farthest I can kind of
    go is more like my high school. When I came across one of these, actually one
    of these afternoons when my father left me in the British Library, and I spent
    the day kind of reading papers. And I somehow came across the Human Genome Project.
    At that point, and there was a report on it. And I was so fascinated by the whole
    idea of genomics, And so I really wanted to study that. And this was in India
    in early 2000s. There weren’t that many programmes on genetics or molecular biology.
    So I ended up doing my undergraduate in microbiology and masters in biotechnology.
    And worked after that for a few years as a clinical embryologist. I was part of
    a healthcare team that started an IVF clinic in a maternity health hospital. I
    was like, as has been the story of my life, since, every few years I kind of get
    bored with what I’m doing because my interests evolve. And one of my family members,
    who was an academic in the United States, told me you should think about research
    seriously. Because they actually pay you to do research, and you will get funding.
    And the US has, like, really a lot of breadth of research going on in molecular
    biology, especially in RNAs, which I was interested in. And so that’s when I started
    really looking into it. I was still working. So I remember taking, like, during
    my lunch break, going and doing training and taking the tests in the middle of
    all that. And I pretty much, like, gave my notice a week before I came to the
    US for my PhD. Or, like, I finished my job a week before I came to the PhD. And
    so there wasn’t a lot of, like, gap between that. So yeah, I mean, it’s, I kind
    of, like, came at it more with the idea of I wanted to really learn what research
    was and learn more about RNAs. So it was very open-ended in my mind. And I was
    thrilled by the whole experience. Holly Newson 03:24 What was that first year
    in the US like for you? Sonali Majumdar 03:29 So I came to the University of Georgia
    at around 2007. And like I said, because I was working, I didn’t spend a lot of
    time onboarding and thinking more about the systems, etc. I figured I’d just figure
    it out when things happen. But thankfully, the Indian Student Association in UGA
    was very strong. And they got in touch with us in terms of like: do you want housing
    help, do you want roommate matching? And so it was very convenient. And they kind
    of placed us in this community of apartments. And that helped me build a community
    with a lot of international students early on. The university also, the International
    Office did a lot of like orientation. They really helped us, like, open a bank
    account, social security networks, accounts, etc, in the first week before we
    even knew what was going on. So I felt like I was always surrounded by community
    and people who knew what was going on, and they helped me kind of think this through.
    Holly Newson 04:35 Yeah, and so what proportion of PhDs and postdocs in the US
    are international scientists? Sonali Majumdar 04:41 So there, there’s some like
    data from NSF that’s called the Survey of Graduate Students and Postdoctorates.
    And one of the latest data is from 2023 where they estimated about 40.7, approximately
    41% of PhD students in the United States are visa-holders. And it’s a much higher
    population in the postdocs. It’s almost about 58% of postdocs in the United States
    are visa-holders. And again, this is survey-based. It’s as comprehensive as it
    gets in terms of the data landscape. But we have taken with a pinch of salt that
    it might not be completely robust. Holly Newson 05:19 It’s such a huge number
    in terms of the context of United States science, like, for having read the book
    and reading about the struggles that international scientists face, it’s kind
    of crazy to imagine that it could be like half of people facing these struggles.
    So I wondered, what would you say are the biggest sacrifices in being an international
    scientist? And what are the greatest benefits? Sonali Majumdar 05:50 Yeah, let
    me start with the benefits first. I, you know, I can speak to my experience as
    well as a lot of my peers. And now students when I talk to them. Everyone’s thrilled
    with their academic experience in the US, right? The higher ed universities and
    higher ed system in general, there’s people, it’s a global melting melting pot,
    is what I want to say. Because people from all across the world come and convene
    here with a shared purpose, for their love of science or research, and really
    being passionate about solving a problem. And so I love the atmosphere of universities,
    where you’re always around new ideas, new knowledge, creative ideas being brought
    up everywhere. People really intent on thinking through a problem. And you know,
    I mean, that’s not something you find every day. And clearly, I haven’t left universities
    yet, so that’s one of the reasons why. But the climate for internationals has
    been bad for a while. It’s got really bad in the last decade, on and off. And
    so going to the sacrifices and challenges, they’re mostly linked to the US immigration
    system, which is fairly restrictive and dated. And so you may not be able to meet
    your family as regularly and miss out on a lot of, like, milestones, whether they’re
    happy or sad and badly or grieving. In my situation, I lost out on going to my
    parents’ funerals in both cases, which was probably the most, like, the biggest
    sacrifice I’ve had in my life. The second one is a relate related to this is every
    time as long as I was doing research, every time I went back to get my visa extended,
    they would put me on background check or administrative processing, is what it’s
    called. And so you don’t know how long it takes. If they say it’s four to six
    weeks. Sometimes it could be longer. So you’re kind of stuck. And your advisors
    are, you know, nervous because they don’t know when you’re coming back. Research
    might get delayed or stalled. And so that’s been sort of like a challenge and
    a, you know, really sticky point among the international population. The other,
    other big, major point in terms of access to opportunities, when it comes to funding
    fellowships, as well as career mobility. Being an international puts you at a
    disadvantage, because there’s the system, the way the system works here, you’re,
    you kind of have an ease in moving into jobs that are narrowly-defined as related
    to the research training you had in your PhD or postdoc or since. And so you have
    to use very creative ways to really make a case for why you are skilled for a
    wide variety of careers, outside of just the topics that you’ve done research
    on. Holly Newson 08:50 And so tell me a bit more about the creative solutions
    that international scientists can use when it comes to funding? Sonali Majumdar
    08:57 Yeah, let me, I mean, it’ll be helpful to kind of talk about the scale of
    the problem first. And so just when I say access to opportunities, there’s, again,
    data from NSF, from the Survey of Earned Doctorates, where they really evaluated
    those who graduated from US universities, from PhD programs. They looked at what
    the primary source of their funding was while they were doing their PhD here.
    And you saw a pretty, like, stark difference between the domestic PhD graduates
    and the international PhDs here. About 1/3 or 30% of domestic PhDs were getting
    funded through research assistantships, which are typically faculty-directed.
    Whereas more than 50% of internationals relied on faculty-directed research assistantships.
    When it comes to independent fellowships, about 28% or so of domestic PhDs could
    avail independent fellowships. Yes, whereas only 17-ish% of international PhDs
    were funded through independent fellowships. And those could be graduate fellowships,
    dissertation grants, institutional fellowships, etc. Why is this a problem, right?
    Like, the independent fellowships really give you more autonomy to follow research
    directions that you have. If you are under a faculty-directed funding model, you
    have to work with your faculty on their research ideas and negotiate on, like
    whether you can follow some of the ideas if they think that’s feasible. And so
    when I talk to a lot of our graduate students and postdocs who are international,
    (and I’ve been advising folks across the country on this), I really talk about,
    like, use the creative thinking that you develop in your research. Going through
    this problem, and see what are some different ways that you can get to sort of
    the goal. And right, like that starts with, really understand what your idea of
    success is, why you want to get funding, or, you know, and then kind of figuring
    out what are the two or three different paths you can take. And in the book, I’ve
    created this framework called The Creative Design, which is adapted from the Designing
    Your Life or Odyssey Plan by Dale Evans and Bill Burnett, where we look at, you
    know, three different paths of going through any challenge. One is your ideal
    traditional path, like, you know, in the case of funding, it’s the most ambitious,
    the most high reward funding, like your NSF, NIH, graduate fellowships, etc, which
    a lot of, most of them, are not open to international. So your ideal path is restricted.
    Let’s say there’s a barrier. So then you look at two different ways to get through
    it. One is an incremental path. And in that incremental path, you can look at,
    if you are really interested in funding for establishing a record of fundability,
    then you can look at how you can stack up funding that is open to internationals.
    Like, funding that’s institutional, that your university is providing as fellowships,
    private sector funding, philanthropic funding. There’s a lot of these fundings'
