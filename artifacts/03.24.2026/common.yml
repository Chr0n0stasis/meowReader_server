    options:
      A: It suffered from minor scratches and was released.
      B: It required immediate surgery for broken limbs.
      C: It was in a stable state but had severe injuries.
      D: It died shortly after arriving at the wildlife center.
    q_number: 2
    stem: Which of the following best describes the condition of the capybara after
      the attack?
  - answer: C
    explanation: 文中提到该meme受到2021年水豚“入侵”阿根廷一处建在湿地上的豪华门控社区事件的启发。
    options:
      A: A protest against deforestation in Brazil.
      B: A response to the illegal pet trade of rodents.
      C: A reaction to an incident involving a luxury estate.
      D: An attempt to promote animal rights through satire.
    q_number: 3
    stem: What is the primary reason behind the "Comrade Capybara" meme mentioned
      in the text?
  - answer: C
    explanation: 文章指出袭击者是"identified through CCTV footage"（通过监控录像识别），因此是C选项。
    options:
      A: Through anonymous tips provided by local residents.
      B: By monitoring the animal's tracking collar.
      C: Through the analysis of security camera footage.
      D: By tracing the iron bars used in the crime.
    q_number: 4
    stem: According to the passage, how were the attackers apprehended?
  - answer: A
    explanation: 在描述网络受众对某种事物的喜爱时，devoted表示“热情的、忠实的、入迷的”，与enthusiastic同义。
    options:
      A: highly enthusiastic
      B: morally upright
      C: extremely skeptical
      D: narrowly defined
    q_number: 5
