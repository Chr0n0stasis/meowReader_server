  - answer: B
    explanation: Robust在这里意为“强有力的、可靠的”，符合科学指标对于长期气候分析的要求。相比之下，A、C、D项语义不符。
    options:
      A: resilient
      B: robust
      C: explicit
      D: transient
    q_number: 4
    stem: The passage highlights that the vast majority of excess heat is absorbed
      by the oceans, which makes ocean heat content a more ________ metric for long-term
      climate analysis.
  - answer: D
    explanation: 文章提到平均气温会由于火山爆发等短期事件而波动，导致数据失真。Skewed意为“偏斜的、有偏差的”，最准确地描述了短期事件对长期温度趋势统计的影响。
    options:
      A: compromised
      B: impacted
      C: obscured
      D: skewed
    q_number: 5
    stem: Unlike atmospheric temperature, which is often ________ by short-term events
      like volcanic eruptions, EEI provides a more stable view of the climate.
