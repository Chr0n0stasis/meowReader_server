  body_text: 'Ever since Charles Darwin, scientists studying evolution have grappled
    with how cooperative behaviours that are costly to an individual but beneficial
    to others can be consistent with maximal fitness. In 1981, writing in Science,
    Robert Axelrod and William D. Hamilton1 presented key findings on how such cooperation
    can evolve. They accomplished this by weaving together two emerging ideas of the
    time in this area of research. Nature 651, 894-895 (2026) doi: https://doi.org/10.1038/d41586-026-00802-7
    References Axelrod, R. & Hamilton, W. D. Science 211, 1390–1396 (1981). Maynard
    Smith, J. & Price, G. R. Nature 246, 15–18 (1973). Trivers, R. L. Q. Rev. Biol.
    46, 35–57 (1971). Hamilton, W. D. J. Theor. Biol. 7, 1–16 (1964). Rapoport, A.
    & Chammah, A. M. Prisoner’s Dilemma: A Study in Conflict and Cooperation (Univ.
    Michigan Press, 1965). Hammerstein, P. in Genetic and Cultural Evolution of Cooperation
    (ed. Hammerstein, P.) 83–93 (MIT Press, 2003). Clutton-Brock, T. Nature 462, 51–57
    (2009). Wu, J. & Axelrod, R. J. Conflict Resolut. 39, 183–189 (1995). Sugden,
    R. The Economics of Rights, Co-operation and Welfare (Blackwell, 1986). Lenfesty,
    H., Mathew, S., Fikes, T., Ross, C. T. & Boyd, R. Proc. R. Soc. B 291, 20240861
    (2024). van Veelen, M., García, J., Rand, D. G. & Nowak, M. A. Proc. Natl Acad.
    Sci. USA 109, 9929–9934 (2012). Graser, C. & van Veelen, M. Tinbergen Institute
    Discussion Paper No. TI 2024-022/I (2024). Mathew, S. & Boyd, R. Preprint at PsyArXiv
    https://doi.org/10.31234/osf.io/e5zuc_v1 (2026). Hruschka, D. J. & Henrich, J.
    J. Theor. Biol. 239, 1–15 (2006). Leimar, O. & Bshary, R. Proc. Natl Acad. Sci.
    USA 121, e2317736121 (2024). Xue, M. & Silk, J. B. Evol. Hum. Behav. 33, 17–25
    (2012). Download references Competing Interests The authors declare no competing
    interests. Related Articles Subjects'
