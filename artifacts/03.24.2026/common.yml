    If you want to put people back on the moon, don’t gut the agency in charge of
    getting them there. ILLUSTRATION: Jiawen Chen The senator wanted a promise. A
    solemn vow. For the last six years—or maybe the last decade or quarter century,
    depending on how you count it—the United States and China had been locked in a
    space race, a contest to see which nation could put its people on the moon . Senator
    Ted Cruz wanted President Donald Trump’s nominee to run NASA, Jared Isaacman,
    to pledge that the US would not lose. Cruz brought a little surprise to Isaacman’s
    confirmation hearing last April. It was a poster of the moon. On one side stood
    three astronauts and a giant Chinese flag. On the other were two more figures
    in space suits, with the tiniest Stars and Stripes planted in the lunar soil .
    Cruz apologized for the imbalance. “My team used ChatGPT,” explained the senator,
    who chairs the committee that oversees NASA. Then Cruz, with a bit more seriousness,
    asked Isaacman, “Do we have your commitment that you will not allow the scenario
    on the right of this poster to happen? That China will not beat us to the moon?”
    Isaacman, a billionaire entrepreneur who had paid for his own missions to space,
    replied, “Senator, I only see the left-hand portion of that poster.” It was a
    red-meat, fuck-yeah, pitch-perfect response. And Isaacman may have meant it. But
    by the time of his testimony, the Trump administration had started a process that
    would lay waste to NASA , pushing nearly 4,000 agency employees to quit. Then
    the White House proposed a massive, 24 percent cut to NASA’s budget. Then Trump
    yanked Isaacman’s nomination and named a new part-time acting chief, a fellow
    who boasted in his official NASA biography that he is one-half of “America’s first
    and longest-married reality TV couple.” Then that guy picked a fight with Elon
    Musk , who’s building NASA’s moon lander. And Isaacman was back in the running.
    In December, Trump capped off the year with an executive order pushing Americans
    to get back to the moon by 2028. If all of this sounds suboptimal to you, welcome
    to the club, space ranger. That dysfunction is one of many reasons why the vast
    majority of the two dozen sources I interviewed for this story believe that China
    will put people on the moon first. I spoke with nine former NASA officials who
    served at the highest rungs of the space agency under presidents Trump and Biden;
    none of them were optimistic about America’s chances. “We did the worst of all
    worlds,” one of the nine tells me. “We positioned it as a race without planning
    to win.” The China Issue PHOTOGRAPH: ANDRIA LO Here are 23 ways China is rewiring
    the future . The original space program was the ultimate symbol of America at
    its screaming-eagle apex. Rocket scientist was shorthand for brilliant, and many
    of them were working in Huntsville, Alabama, aka Rocket City. The word astronaut
    was synonymous with grit, and you could find the gutsiest of them in Houston.
    Moonshot was (and is) code for something borderline impossible. Space races have
    helped spur the development of everything from the integrated circuit to the solar
    panel to 5G. But that was before America decided to stab itself in the brain.
    Today, much of the world drives Chinese electric cars , powers their homes with
    Chinese solar panels , and stays in touch with made-in-China phones. Chinese scientists
    have eclipsed their American counterparts in the production of high-quality research,
    and the White House has responded by gutting American science funding and charging
    $100,000 to let in highly skilled immigrants. So if Chinese astronauts step down
    from their lander and livestream the results in 4K—and to be clear, it’s still
    an “if” at this point—it’ll be more than a point of national pride for Beijing.
    It’ll be a declaration that the American Century is officially over. ILLUSTRATION:
    Jiawen Chen About 18 months ago and some 3,000 miles above the Earth, the Chinese
    robotic spacecraft Chang’e-6 released its reentry capsule, which skipped in and
    out of the atmosphere before parachuting into the grasslands of China’s Inner
    Mongolia. Inside were about 4 pounds of moon rocks and soil. It was the first
    sample return from the far side in human history. Putting people on the moon might
    seem like a so-what sequel, coming 50-plus years after Apollo. But there’s a reason
    no one’s been back to the moon in half a century. It is maddeningly difficult
    to put anything down there, even little unmanned landers. A handful of soft-landing
    missions have succeeded, most of them Chinese. More numerous are the flops of
    the Japanese, Russian, Israeli, American, and Indian space programs. The reasons
    for failure are many—light gravity and uneven terrain make it easy for a lander
    to tip over; no atmosphere means firing rockets to brake; that firing kicks up
    clouds of dust that can limit visibility. “Once you start slowing down, within
    a matter of single-digit seconds, you are on an intercept course with the moon,
    and you don’t have enough propellant to go back to lunar orbit and try again,”
    says Will Coogan, a chief engineer at Firefly Aerospace, the only company to pull
    off a fully successful robotic moon landing , ever. Operations around the lunar
    poles are an “order of magnitude” tougher, a person who oversaw NASA’s lunar program
    tells me. Getting into the proper orbital plane requires more maneuvering. For
    consistent communication with ground control, you need to position a relay satellite
    around the moon. (As China did, about six weeks before landing Chang’e-6.) Once
    you’re there, be careful. Miles-deep craters are shadowed in near-eternal night,
    which means no solar power and temperatures that can drop below –200 degrees Celsius.
    Yet that’s exactly where China’s heading. Scientists believe the poles have enormous
    pockets of ice—and potentially helium-3, an isotope that’s extremely scarce on
    Earth. Helium-3 could unlock quantum computing and possibly nuclear fusion, many
    experts believe. “Let’s say on the lunar surface, helium-3 becomes a new source
    of fusion power,” as Isaacman told Cruz at that April confirmation hearing. “It
    could shift the balance of power here on Earth. I don’t think we can afford to
    find that out the hard way.” Both the US and China have dreamed of building a
    base at the south pole, and both would like to claim the prime landing sites.
    The upcoming Chang’e-7 mission aims to be the first to extract water from the
    moon. One desirable landing site is a spot high on the ridge of the Shackleton
    Crater, near the lunar south pole, at a location that’s almost always light. Chang’e-7
    will carry instruments from Russia and several American allies—Italy, Switzerland,
    Thailand, Egypt, and Bahrain. The Chinese National Space Administration says the
    launch should happen in August. “When they say they’re going to do something by
    x, they tend to do it,” says Dean Cheng, a senior fellow at the Potomac Institute
    for Policy Studies who’s been tracking the progress. China’s space efforts aren’t
    as sophisticated as America’s; Beijing is only now testing reusable rockets. And
    every space program faces mishaps. In November, three Chinese astronauts were
    stranded aboard their space station for nine days after a piece of orbiting junk
    damaged their return capsule. But China’s crewed lunar effort, for now, seems
    to be more or less on target. The idea is that a pair of rockets—one carrying
    the crew and service capsules, the other a lander—will head to the moon. They’ll
    rendezvous in lunar orbit, and a pair of astronauts will set foot on the surface.
    Exactly where they’ll land hasn’t been confirmed. But testing for all of the components
    is well under way. A spokesperson for the China Manned Space Agency has said the
    mission will launch “before 2030.” When will American astronauts get there? That’s
    a bit more complicated. Warning: the recent history of the US program to return
    astronauts to the moon is so contradictory, so politicized, so frustrating, it’s
    going to make your head hurt. As Jim Bridenstine, who served as Trump’s first
    NASA administrator, recently told Congress, “This is an architecture that no NASA
    administrator that I’m aware of would have selected.” “No way to run a program,
    in my opinion,” says the NASA official who helped oversee the lunar initiative.
    “You can’t make this shit up. Really can’t. It’s really crazy.” The original Apollo
    program was insanely ambitious, but there was a clarity to the mission. One giant
    rocket, carrying one tiny crew capsule and one even tinier landing module. The
    capsule would orbit the moon, and the lander would ferry astronauts to and from
    the surface. That was all. The new US moon program— Artemis , named after Apollo’s
    twin sister—isn’t nearly so neat. For starters: The main rocket and capsule are
    made up of leftovers. Back in 2010, the Senate ordered NASA to build a rocket
    with old engines from the space shuttle program and repurpose a capsule from a
    Bush-era deep-space project. The rocket, known as the Space Launch System, would
    lift off carrying astronauts in a capsule named Orion. The combination of SLS
    and Orion has cost taxpayers tens of billions of dollars. It has flown exactly
    once. A second flight is slotted for February. The Orion capsule was built on
    the heavy side, to give astronauts extra protection against radiation and other
    risks. But the capsule’s propulsion was under-powered to reach a tight lunar orbit.
    (The European Space Agency, which provided the thing, said it couldn’t afford
    to supply more.) NASA engineers figured out, however, that the capsule could reach
    a farther-out, super-elliptical orbit, and that orbit would still allow for landings
    on the lunar poles. The drawback: At that orbit, completing a circuit of the moon
    takes nearly a week. Once you drop astronauts off, they’re stuck on the surface
    for days and days. A tear in a spacesuit or a malfunction in the lander’s life
    support system might turn into a nightmare. NASA also concluded that it needed
    to put a miniature space station in orbit around the moon. I must’ve heard a half-dozen
    rationales for this space station. It wouldn’t necessarily help with rescue efforts,
    but it could communicate with astronauts on the ground. And during later, longer-duration
    missions, it would give astronauts a more hospitable place to work and rest. Maybe.
    Some at NASA view the so-called lunar “Gateway” as a kind of insurance policy.
    As one former official told me, “There’s the belief that if you have these pieces
    pre-positioned in space, we’ll have a long-term program that Congress is less
    willing to walk away from.” All of this was meant to take a decade or so to come
    together—like, 2028 or 2029. Until Mike Pence stepped up to the mic. ILLUSTRATION:
    Jiawen Chen The American flag behind the vice president was large, almost comically
    so. Also behind him was an original space capsule from the Apollo days. Pence
    was exuding confidence that day in the spring of 2019. He proclaimed to the crowd
    at the Marshall Space Flight Center in Huntsville that “the first woman and the
    next man on the moon will both be American astronauts, launched by American rockets,
    from American soil.” He also announced out of nowhere that the schedule was cut
    in half. It would all be done in five years, by 2024. The end of what the administration
    hoped would be a second Trump term. People in the room—and around the space agency—were
    stunned. As a former top NASA official recalls, “Everyone knew from the moment
    Pence said that, that it was pretty much bullshit.” Reporters quizzed NASA’s leaders
