  body_text: Briefly Noted Books Briefly Noted “On Morrison,” “Scale Boy,” “Sisters
    in Yellow,” and “White River Crossing.” March 16, 2026 On Morrison , by Namwali
    Serpell (Hogarth) . This collection of essays, by a novelist and literary scholar,
    considers the writer Toni Morrison’s varied body of work. Serpell homes in on
    its challenging qualities—including its unique orchestration of voice, unconventional
    chronologies, and layered metaphors—unearthing fresh insights about Morrison’s
    themes and craft. In a close reading of Morrison’s famed story “Recitatif,” for
    example, Serpell examines the ways that “race, often relegated to a visual regime,
    fundamentally works through language.” Enriching her research with letters, draft
    manuscripts, and other sources, Serpell captures Morrison’s “masterful difficulty”
    without sanding down its edges. Scale Boy , by Patrice Nganang (Farrar, Straus
    & Giroux) . In this unhurried, lyrical memoir, a novelist remembers his youth
    in Cameroon in the nineteen-seventies and eighties. Anchored by Nganang’s years
    as a “scale boy”—weighing people and products for a small fee—the narrative wends
    through anecdotes that depict a young man discovering his artistic and intellectual
    powers along with his nation’s colonial history. Reflecting on the meaning of
    the scale as an object, Nganang draws an ominous historical line from the present
    to the past, noting that “the scale was the very last instrument Black people
    stepped onto before boarding the slave ships, before entering the soul-wrenching
    and dreaded institution of their despair.” What We’re Reading Discover notable
    new fiction, nonfiction, and poetry. Sisters in Yellow , by Mieko Kawakami, translated
    from the Japanese by Laurel Taylor and Hitomi Yoshio (Knopf) . This engrossing
    novel follows a teen-age girl coming of age in working-class Tokyo as she desperately
    tries to achieve financial stability. At the novel’s outset, Hana lives in a cramped
    apartment with her mother, a sweet but hapless bar waitress, and longs to escape
    from a home life that her bullies condemn as “not normal.” Then she meets a charismatic
    friend of her mother’s, and the two begin running a bar; together with two other
    girls who become Hana’s friends, they soon form a kind of makeshift happy family.
    But, when a series of events threatens their ability to earn, Hana discovers how
    difficult class ascension really is. “I’m trying so hard,” she says at one point.
    “But I always wind up back here.” White River Crossing , by Ian McGuire (Crown)
    . Set in 1766, this harrowing novel centers on an expedition organized by the
    head of a Hudson’s Bay Company trading post, in Canada, who dispatches a group
    to secretly search for a gold deposit on remote lands inhabited by Indigenous
    tribes. Led by Inuit guides, the three white men in the party form an uneasy mix
    of personalities. There is the trading-post head’s “scrawny” young nephew; his
    deputy, “an oaf and a scoundrel”; and a former aspiring minister who has lost
    his faith. Briskly paced, immersive, and often violent, McGuire’s novel depicts
    the destructive and corrupting effects of the colonists’ gold lust on themselves
    and the Native people in their path. As one of the guides, Keasik, observes, this
    greed “leaves behind, like a falling tide, a tangled wrack of wariness and fear.”
