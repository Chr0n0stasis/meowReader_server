  - answer: B
    explanation: 文中提到消防车当时正在响应另一起事故（responding to a separate incident），即一架联合航空的航班报告了异味并宣布了紧急状态。
    options:
      A: It was performing a routine safety inspection of the landing strip.
      B: It was responding to a mechanical failure involving a different aircraft.
      C: It was attempting to clear debris left by an earlier landing.
      D: It was transporting airport staff to the scene of a ground incident.
    q_number: 3
    stem: Why was the fire truck present on the runway when the collision occurred?
  - answer: C
    explanation: 文中明确指出官方调查人员将研究航空交通管制的人员配置水平（air traffic control staffing levels）是否是导致这起致命事故的一个问题。
    options:
      A: The training standards of Jazz Aviation pilots.
      B: The structural integrity of the CRJ-900 jet model.
      C: The sufficiency of air traffic control staffing levels.
      D: The impact of severe weather conditions on airport visibility.
    q_number: 4
    stem: Which of the following is highlighted as a potential focus of the official
      investigation?
  - answer: B
    explanation: 文章主要通过引用各方官方声明（NTSB、FAA、航司代表）和客观记录（录音、数据、事实描述）来陈述事实，整体语调保持了新闻报道的客观性和陈述性。
    options:
      A: Critically condemnatory.
      B: Objective and reportorial.
      C: Speculative and alarmist.
      D: Subjectively empathetic.
    q_number: 5
    stem: What is the tone of the passage regarding the incident at LaGuardia airport?
  source_journal: The Guardian
  title: Two pilots killed after Air Canada jet collision at LaGuardia in New York
- article_update_date: 03.24.2026
  body_text: 'Kerry Sui and Francis Carty perform on the dance floor at Blackpool
    Dance Festival in November. [Photo provided to chinadaily.com.cn] Kerry Sui, a
    10-year-old Chinese-Irish dancer, and her dance partner Francis Carty are set
    to compete in Italy and perform on Chinese TV after winning the British juvenile
    ballroom championship. Kerry and Francis, who is also 10, won the British National
    Juvenile Ballroom trophy and took first prize last month in the juvenile Latin
    category at the Blackpool Dance Festival. Kerry was born in Dublin and lives there
    with her parents, who emigrated from China. Her Chinese name is Sui Yuanjing.
    She started ballroom and Latin dancing four years ago and was partnered earlier
    this year with Francis, who lives in the English county of Shropshire. The two
    were friends before they performed together and Kerry said their friendship is
    one of the best things about her dancing partnership with Francis. Their hard
    work, under the guidance of teachers Laura O''Brien and David and Helen Truman,
    meant Kerry and Francis have seen quite a lot of success. "When Francis is stressed,
    I can calm him down, because he hasn''t really been in many big competitions,
    such as the nationals and internationals," Kerry said. "My mum said I have to
    guide him." Francis said Kerry has a positive attitude and described her as always
    remaining upbeat. And they both have a dance that they like the least: the tango.
    "The tango is like an angry dance, you have to be sharp," Kerry said. The dancers
    often visit each other''s families and describe their friendship and their teachers''
    involvement as like being in a big family. She said a visit to China put a strain
    on the close bonds. "I was in China for six weeks and there was a dance studio
    there where I would practice, but I felt lonely," Kerry said. Francis described
    the time they spent apart as "horrible". Kerry and Francis were training on Saturday
    in Wolverhampton, a city in England''s West Midlands region, in advance of a competition
    in Stoke-on-Trent on Sunday. The event was cancelled due to the heavy snowfall
    across parts of the United Kingdom. The pair head to Italy in January for a competition,
    before jetting off to China to appear on a TV show.'
