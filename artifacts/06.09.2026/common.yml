  body_text: '| Next | Section menu | Main menu | Previous | Henry Farrell Abraham
    L. Newman The Big Story Jul 15, 2025 6:00 AM The Enshittification of American
    Power First Google and Facebook, then the world. Under Trump 2.0, US statecraft
    is starting to mimic the worst tendencies of Big Tech. Illustration: Petra Péterffy
    For decades, allies of the United States lived comfortably amid the sprawl of
    American hegemony. They constructed their financial institutions, communications
    systems, and national defense on top of infrastructure provided by the US. And
    right about now, they’re probably wishing they hadn’t. Back in 2022, Cory Doctorow
    coined the term “enshittification” to describe a cycle that has played out again
    and again in the online economy. Entrepreneurs start off making high-minded promises
    to get new users to try their platforms. But once users, vendors, and advertisers
    have been locked in—by network effects, insurmountable collective action problems,
    high switching costs—the tactics change. The platform owners start squeezing their
    users for everything they can get, even as the platform fills with ever more low-quality
    slop. Then they start squeezing vendors and advertisers too. People don’t usually
    think of military hardware, the US dollar, and satellite constellations as platforms.
    But that’s what they are. When American allies buy advanced military technologies
    such as F-35 fighter jets, they’re getting not just a plane but the associated
    suite of communications technologies, parts supply, and technological support.
    When businesses engage in global finance and trade, they regularly route their
    transactions through a platform called the dollar clearing system, administered
    by just a handful of US-regulated institutions. And when nations need to establish
    internet connectivity in hard-to-reach places, chances are they’ll rely on a constellation
    of satellites—Starlink—run by a single company with deep ties to the American
    state, Elon Musk’s SpaceX. As with Facebook and Amazon, American hegemony is sustained
    by network logic, which makes all these platforms difficult and expensive to break
    away from. For decades, America’s allies accepted US control of these systems,
    because they believed in the American commitment to a “rules-based international
    order.” They can’t persuade themselves of that any longer. Not in a world where
    President Trump threatens to annex Canada, vows to acquire Greenland from Denmark,
    and announces that foreign officials may be banned from entering the United States
    if they “demand that American tech platforms adopt global content moderation policies.”
    Ever since Trump retook office in January, in fact, rapid enshittification has
    become the organizing principle of US statecraft. This time around, Trumpworld
    understands that—in controlling the infrastructure layer of global finance, technology,
    and security—it has vast machineries of coercion at its disposal. As Mark Carney,
    the prime minister of Canada, recently put it, “The United States is beginning
    to monetize its hegemony.” So what is an ally to do? Like the individual consumers
    who are trapped by Google Search or Facebook as the core product deteriorates,
    many are still learning just how hard it is to exit the network. And like the
    countless startups that have attempted to create an alternative to Twitter or
    Facebook over the years—most now forgotten, a few successful —other allies are
    now desperately scrambling to figure out how to build a network of their own.
    Infrastructure tends to be invisible until it starts being used against you. Back
    in 2020, the United States imposed sanctions on Hong Kong’s chief executive, Carrie
    Lam, for repressing democracy protests on China’s behalf. All at once, Lam became
    uniquely acquainted with the power of the dollar clearing system—a layer of the
    world’s financial machinery that most people have never heard of. Here’s how it
    works: Global banks convert currencies to and from US dollars so their customers
    can sell goods internationally. When a Japanese firm sells semiconductors to a
    tech company in Mexico, they’ll likely conduct the transaction in dollars—because
    they want a universal currency that can quickly be used with other trading partners.
    So these firms may directly ask for payment in dollars, or else their banks may
    turn pesos into dollars and then use those dollars to buy yen, shuffling money
    through accounts in US-regulated banks like Citibank or J.P. Morgan, which “clear”
    the transaction. So dollar clearing is an expedient. It’s also the chief enforcement
    mechanism of US financial policy across the globe. If foreign banks don’t implement
    US financial sanctions and other measures, they risk losing access to US dollar
    clearing and going under. This threat is so existentially dire that, when Lam
    was placed under US sanctions, even Chinese banks refused to have anything to
    do with her. She had to keep piles of cash scattered around her mansion to pay
    her bills. That maneuver against Lam was, at least on its face, about standing
    up for democracy. But in his second term, Trump has wasted no time in weaponizing
    the dollar clearing system against any target of his choosing. In February, for
    example, the administration imposed sanctions on the chief prosecutor of the International
    Criminal Court after he indicted Benjamin Netanyahu for alleged war crimes. Now,
    like Lam in Hong Kong, the official has become a financial and political pariah:
    Reportedly, his UK bank has frozen his accounts, and Microsoft has shut down his
    email address. Another platform that Trump is weaponizing? Weapons systems. Over
    the past couple of decades, a host of allies built and planned their air power
    around the F-35 stealth fighter jet, built by Lockheed Martin. In March, a rumor
    erupted online—in Reddit posts and X threads—that F-35s come with a “kill switch”
    that would allow the US to shut them down at will. Sources tell us that there
    is no such kill switch on the F-35, per se. But the underlying anxiety is not
    unfounded. There is, as one former US defense official described it, a “kill chain”
    that is “essentially controlled by the United States.” Complex weapons platforms
    require constant maintenance and software updates, and they rely on real-time,
    proprietary intelligence streams for mapping and targeting. All that “flows back
    through the United States,” the former official said, and can be blocked or turned
    off. Cases in point: When the UK wanted to allow Ukraine to use British missiles
    against Russia last November, it reportedly had to get US sign-off on the mapping
    data that allowed the missiles to hit their targets. Then, after Trump’s disastrous
    Oval Office meeting with Volodymyr Zelensky in late February, the US temporarily
    cut off intelligence streams to Ukraine, including the encrypted GPS feeds that
    are integral to certain precision-guided missile systems. Such a shutoff would
    essentially brick a whole weapons platform. Communication systems are, if anything,
    even more vulnerable to enshittification. In a few short years, Elon Musk’s Starlink
    satellites—which now make up about 65 percent of all active satellites in orbit—have
    become an indispensable source of internet access across the world. On the eve
    of Trump’s second inaugural, Canada was planning to use Starlink to bring broadband
    to its vast rural hinterlands, Italy was eyeing it for secure diplomatic communications,
    and Ukraine had already become dependent on it for military operations. But as
    Musk joined the Trump administration’s inner circle, a dependence on Starlink
    came to seem increasingly dangerous. In late February, the Trump administration
    reportedly threatened to withdraw Starlink access to Ukraine unless the country
    handed over rights to exploit its mineral reserves to the US. In a March confrontation
    on X, Musk boasted that Ukraine’s “entire front line would collapse” if he turned
    off Starlink. In response, Poland’s foreign minister, Radek Sikorski, tried to
    stand up for an ally. He tweeted that Poland was paying for Ukraine’s access to
    the service. Musk’s reply? “Be quiet, small man. You pay a tiny fraction of the
    cost. And there is no substitute for Starlink.” It isn’t just big US defense contractors
    that might enforce the administration’s line. European governments and banks often
    run on cloud computing provided by big US multinationals like Amazon and Microsoft,
    and leaders on the continent have begun to fear that Trump could choke off EU
    governments’ access to their own databases. Microsoft’s president, Brad Smith,
    has claimed this scenario is “exceedingly unlikely” and has offered Europeans
    a “binding commitment” that Microsoft will vigorously contest any efforts by the
    Trump administration to cut off cloud access, using “all legal avenues available.”
    But Microsoft has failed to publicly explain its reported denial of email access
    to the International Criminal Court’s chief prosecutor. And Smith’s promise may
    not be enough to ward off Europeans’ fears, to say nothing of the Trump administration’s
    advances. The European Commission is now in advanced negotiations with a European
    provider to replace Microsoft’s cloud services, and the Danish government is moving
    from Microsoft Office to an open source alternative. Of course, the American tech
    industry has famously cozied up to Trump this year, with CEOs attending his inauguration,
    changing content moderation policies , and rewriting editorial missions in ways
    that are friendlier to administration priorities. And as always, what Trump can’t
    gain through loyalty, he’ll extract through coercion. Either way, the traditional
    platform economy is being reshaped as commercial platforms and government institutions
    merge into a monstrous hybrid of business monopoly and state authority. Mark Zuckerberg,
    Jeff Bezos, Sundar Pichai, and Elon Musk attend Trump''s inauguration on January
    20, 2025. Photograph: JULIA DEMAREE NIKHINSON/Getty Images In the face of all
    these affronts to their sovereignty, a chorus of world leaders has woken from
    its daze and started to talk seriously about the once-unthinkable: breaking up
    with the United States. In February, the center-right German politician Friedrich
    Merz—upon learning that he’d won his country’s federal election— declared on live
    TV that his priority as chancellor would be to “achieve independence” from the
    US. “I never thought I would have to say something like this on a television program,”
    he added. In March, French president Emmanuel Macron echoed that sentiment in
    a national address to his people: “We must reinforce our independence,” he said.
    Later that month, Carney, the new Canadian prime minister, said that his country’s
    old relationship with the US was “over.” “The West as we knew it no longer exists,”
    said Ursula von der Leyen , the head of the EU Commission, in April. “Our next
    great unifying project must come from an independent Europe.” But the reality
    is that, for many allies, simply declaring independence isn’t really a viable
    option. Japan and South Korea, which depend on the US to protect them against
    China, can do little more than pray that the bully in the White House leaves them
    alone. For now, Denmark and Canada are the other US allies most directly at risk
    from enshittification. Not only has Trump put Greenland (a protectorate of Denmark)
    and Canada at the top of his menu for territorial acquisition, but both countries
    have militaries that are unusually closely integrated into US structures. The
    “transatlantic idea” has been the “cornerstone of everything we do,” explains
    one technology adviser to the Danish government, who asked to remain anonymous
    due to the political sensitivity of the subject. Denmark spent years pushing back
    against arguments from other allies that Europe needed “strategic autonomy.” And
    according to a former adviser on Canadian national security, the “soft wiring”
    binding the US and Canadian military systems to each other makes them nearly impossible
    to disentangle. That explains why both countries have been slow to move away from
    US platforms. In March, the outspoken head of Denmark’s parliamentary defense
    committee grabbed attention on X by declaring that his country’s purchase of F-35s
    was a mistake: “I can easily imagine a situation where the USA will demand Greenland
    from Denmark and will threaten to deactivate our weapons and let Russia attack
    us when we refuse,” he tweeted. But in reality, the Danish government is even
    now considering purchasing more F-35s. Canada, too, has already built its air-strike
    capacities on top of the F-35 platform; switching to another would, at best, require
    vast amounts of retooling and redundancy. “We’re going to look at alternatives,
