- article_update_date: 04.01.2026
  body_text: 'Attosecond pulses produced by high-harmonic generation (HHG) consisting
    of extreme-ultraviolet (XUV) radiation can ionize any conceivable compound, leading
    to the formation of a bipartite ion–photoelectron system that is entangled whenever
    the total wavefunction cannot be written as a single direct product: \(|{\varPsi
    }_{{\rm{total}}}(t)\rangle \, e \) \(|{\varPsi }_{{\rm{ion}}}(t)\rangle \otimes
    |{\phi }_{{\rm{photoelectron}}}(t)\rangle \). This occurs routinely in ionization
    experiments with narrowband light sources, in which the ion may be left in different
    eigenstates, each accompanied by photoelectrons with corresponding, well-defined
    kinetic energies. Ultrashort pulses excite coherent superpositions of states,
    creating a path towards observation of their time-resolved dynamics. This concept
    is taken to the extreme in attosecond science, in which bandwidths spanning several
    tens of eV permit the coherent excitation of several electronic configurations
    and the creation of electronic wave packets. Attosecond laser-induced ionization
    can initiate correlated dynamics of the ion and the photoelectron or in the individual
    subsystems. In the latter case, examining coherent dynamics in the ion (photoelectron)
    is only possible if a correlated observation of the accompanying photoelectron
    (ion) does not enable identification of the ion’s (photoelectron’s) quantum state.
    This situation may be compared with a multi-slit interference experiment, in which
    a (partial) observation of the slit through which a quantum particle moves reduces
    or completely removes the interference pattern on a detector: similarly, the existence
    of an ‘observer’ holding quantum path information compromises the coherence required
    for observation of a pump–probe signal (Fig. 1a). In other words, coherent dynamics
    in the ion or photoelectron subsystem is only possible if it is not compromised
    by quantum entanglement. Fig. 1: Experimental concept and approach. Full size
    image a, Time-resolved pump–probe experiments rely on interference, in which each
    interfering path corresponds to a coherently prepared intermediate state. Observation
    of the coherent evolution is possible if, and only if, the quantum path cannot
    be identified. In an entangled ion–photoelectron pair, a photoelectron measurement
    can provide information on the ionic quantum state, compromising the observation
    of coherent ionic dynamics. This situation resembles that of the passage of a
    quantum particle through a pair of slits monitored by two observers (O1 and O2):
    the modulation depth in the interference pattern is inversely proportional to
    the overlap between the observations by observers O1 and O2 (see, for example,
    ref. 39). b, Experimental set-up: a pair of IAPs, created by HHG, and a few-cycle
    NIR pulse are used to dissociatively ionize H 2 . The left–right asymmetry in
    the H+ ejection along the XUV/NIR polarization axis is measured using a VMI spectrometer
    and is used to quantify the electronic coherence in the dissociating H 2 + ion.
    AF, aluminium filter; BPF, band-pass interference filter; BS, beam splitter; Cam,
    camera; CW, continuous-wave laser; DM, drilled mirror; EX, extractor; FT, flight
    tube; NIR, near-infrared laser; PID, proportional-integral-derivative controller;
    REP, repeller; TM, toroidal mirror; VLG, variable line-space grating. c, Typical
    VMI measurement: the 3D H+ momentum distribution is obtained by Abel inversion
    of the measured 2D projection. d, Typical XUV spectra recorded during the experiments,
    consisting of broad harmonics with a separation of about 3 eV on a continuous
    background, consistent with the formation of a dominant IAP with a very low intensity
    of the adjacent XUV pre- or post-pulses. The observed narrow fringe structure
    depends on the delay between the two IAPs τ XUV–XUV . arb.u., arbitrary units.
    Building on several early results5,6,9,10,11, recent research aims to achieve
    a better understanding of the role of quantum entanglement7,8,12,13,14,15,16 and
    other sources of decoherence17 in attosecond experiments. This includes previous
    work on H 2 , investigating the relationship between ion–photoelectron entanglement
    and the occurrence of vibrational coherence7,8, as well as observations of molecular
    frame asymmetries in the ejection of photoelectrons15. In the former work, vibrational
    wave packets were formed in H 2 + by ionizing neutral H 2 with a pair of attosecond
    pulse trains and the degree of entanglement with the accompanying photoelectrons
    was measured by dissociating the ions, at a variable delay, using a few-cycle
    NIR pulse. A main objective in attosecond molecular science is, however, the observation
    of ‘electronic’ coherences in ions formed by attosecond photoionization, commonly
    referred to as ‘attosecond charge migration’. Its interest arises from the fact
    that, by eliciting an electronic response on timescales preceding nuclear motion1,18,
    charge-directed reactivity2, that is, controlled chemistry, may be achieved. Several
    successful experiments have been reported3,4,19,20. However, the precise role
    of entanglement and its potential use to control coherent charge dynamics is unknown.
    Ideally, studies of ion–photoelectron entanglement would use coincident detection
    of the ions exhibiting electronic coherence together with their corresponding
    photoelectrons. However, experiments combining the use of isolated attosecond
    pulses (IAPs) and coincident electron-ion detection have not yet been realized.
    Therefore, we focus on the dependence of the degree of (1) electronic coherence
    in an ion and (2) quantum entanglement between the ion and the photoelectron on,
    first, the delay between a pair of IAPs used to produce the ion and, second, the
    delay of a co-propagating NIR pulse. We present experiments and theoretical modelling
    on H 2 , showing how the kinetic energy and—in particular—the orbital angular
    momentum of the outgoing photoelectron, control the ion–photoelectron entanglement
    and electronic coherence in the ion. Dissociative ionization by photons below
    about 35 eV (Fig. 2) induces fragmentation into H+ + H and provides a direct signature
    of electronic coherence in the ionic subsystem through the phenomenon of electron
    localization, that is, a laboratory-frame asymmetry in the ejection of the H+
    fragment ion signifying a preferred localization of the single remaining bound
    electron. Following dissociation, the two lowest electronic states of H 2 + can
    be written as $${\psi }_{1{\rm{s}}{\sigma }_{{\rm{g}}}}=\frac{1}{\sqrt{2}}[{\psi
    }_{1{\rm{s}}}^{{\rm{left}}}+{\psi }_{1{\rm{s}}}^{{\rm{right}}}],\,{\psi }_{2{\rm{p}}{\sigma
    }_{{\rm{u}}}}=\frac{1}{\sqrt{2}}[{\psi }_{1{\rm{s}}}^{{\rm{left}}}-{\psi }_{1{\rm{s}}}^{{\rm{right}}}]$$
    (1) in which \({\psi }_{1{\rm{s}}}^{{\rm{left}}}\) and \({\psi }_{1{\rm{s}}}^{{\rm{right}}}\)
    represent 1s atomic orbitals on the left and right atoms, respectively. Rewriting
    this to $${\psi }_{1{\rm{s}}}^{{\rm{left}}}=\frac{1}{\sqrt{2}}[{\psi }_{1{\rm{s}}{\sigma
    }_{{\rm{g}}}}+{\psi }_{2{\rm{p}}{\sigma }_{{\rm{u}}}}],\,{\psi }_{1{\rm{s}}}^{{\rm{right}}}=\frac{1}{\sqrt{2}}[{\psi
    }_{1{\rm{s}}{\sigma }_{{\rm{g}}}}-{\psi }_{2{\rm{p}}{\sigma }_{{\rm{u}}}}]$$ (2)
    Fig. 2: Potential curves of H 2 and concept of the experiment. Full size image
    Left, relevant potential energy curves of the H 2 molecule: the \({{\rm{X}}}^{1}\,{\sum
    }_{{\rm{g}}}^{+}\) ground state, the 1sσ g and 2pσ u ionization thresholds (that
    is, the ground and first excited states of the remaining molecular cation H 2
    +), the Q 1 and Q 2 series of resonant autoionizing states and the double-ionization
    threshold. The pale grey shaded area represents the ionization continuum and the
    more intense grey shaded area the double-ionization continuum. A pair of identical
    approximately 250-attosecond-long XUV pulses with central frequency 25 eV, delayed
    by τ XUV–XUV , ionize the molecule from the \({{\rm{X}}}^{1}\,{\sum }_{{\rm{g}}}^{+}\)
    ground state (vertical blue arrow). Right, the spectra of the XUV pulse pair at
    selected delays are shown. For non-zero τ XUV–XUV , the XUV spectrum is modulated
    with a frequency \(\Delta {\omega }_{{\rm{XUV}}}=\frac{2{\rm{\pi }}}{{\tau }_{{\rm{XUV}}-{\rm{XUV}}}}\).
    Owing to the large bandwidth of the XUV pulses, ionization leads to photoelectrons
    with a wide range of kinetic energies, and nuclear wave packets, represented by
    orange Gaussian shapes, are launched in the 1sσ g and 2pσ u ionization continua
    and the Q autoionizing states. The NIR pulse induces transitions between the ionic
    states and between the Q autoionizing states and the 2pσ u continuum (small red
    arrows). This creates the possibility to generate a photoelectron wavefunction
    that is common to the 1sσ g and 2pσ u channels and hence a coherent superposition
    state of the molecular cation. The efficiency of the latter process depends on
    τ XUV–XUV . When τ XUV–XUV is an integer multiple of the NIR period, that is,
    ω NIR = NΔω XUV , pairs of XUV photons differing in energy by the energy of one
    NIR photon can readily be found, favouring the appearance of electronic coherence
    in the H 2 + cation. By contrast, when τ XUV–XUV is a half-integer multiple of
    the NIR period, that is, \({\omega }_{{\rm{N}}{\rm{I}}{\rm{R}}}=\left(N\pm \frac{1}{2}\right)\Delta
    {\omega }_{{\rm{X}}{\rm{U}}{\rm{V}}}\), this is more difficult. a.u., atomic units.
    illustrates that asymmetries in the H+ ejection reflect the existence of a coherent
    superposition of the 1sσ g and 2pσ u states. Electron localization has been observed
    using strong-field ionization by linearly polarized21 and circularly polarized22
    laser pulses and in two-colour laser fields15,23,24,25, including our earlier
    work combining an IAP and a few-cycle NIR field24, without however considering
    the role of entanglement. A new feature of the present experiment is its use of
    a phase-locked pair of IAPs. In the experiment (Methods), H 2 was ionized by an
    IAP pair (hν ≤ 45 eV), with a variable relative delay τ XUV–XUV ∈ ⟨4, 12.5 fs⟩.
    A 25-fs-long NIR pulse (about 1012 W cm−2) followed the two IAPs after a delay
    τ XUV–NIR ∈ ⟨3, 15 fs⟩, with τ XUV–NIR defined as the delay between the second
    IAP and the peak of the NIR pulse (with an uncertainty ±1 fs). H+ fragments were
    measured using a velocity map imaging (VMI) spectrometer26 and the asymmetry along
    the common XUV/NIR polarization axis was determined (Methods). In Fig. 3, the
    H+ fragment asymmetry is shown as a function of τ XUV–NIR and the H+ momentum,
    for four different τ XUV–XUV . As illustrated in Fig. 2, the slowest H+ fragments
    (kinetic energy release (KER) ≤ 1 eV) are formed by XUV-only dissociative ionization
    on the 1sσ g potential energy curve. Intermediate KER values are produced by resonant
    excitation of the neutral doubly excited Q 1 state followed by autoionization
    and the highest KER values are mostly produced by dissociation on the 2pσ u potential
    energy curve, which is reached by either XUV single-photon ionization or NIR ionization
    of the Q 1 states. Notably, in all four cases shown, the measurement reveals an
    asymmetry that oscillates as a function of τ XUV–NIR with a momentum-dependent
    phase, in agreement with the results reported in ref. 24. We note that the use
    of IAPs is essential for obtaining this result, because ionization by pre- and
    post-pulses emitted at adjacent NIR half-cycles would reduce or even cancel the
    observed asymmetry. In Fig. 3, the asymmetry oscillations are very pronounced
    for τ XUV–XUV = 7 or 10 fs and relatively weak for τ XUV–XUV = 8 or 11 fs. To
    show this more clearly, a fit of the asymmetry oscillations was performed for
    each H+ momentum. Momentum-averaged oscillation amplitudes are shown in the middle
    of Fig. 3, along with a fit for τ XUV–XUV ≥ 6 fs. Smaller τ XUV–XUV were rejected
    owing to non-negligible interference of the two NIR driver pulses during the HHG
    process. The average asymmetry amplitude oscillates as a function of τ XUV–XUV
    with a period equal to the NIR laser optical period T NIR . The decay of the amplitude
    for increasing τ XUV–XUV is caused by the finite duration of the NIR pulse. We
    emphasize that, in contrast with ref. 8, the results shown in Fig. 3 are influenced
    by the existence of entanglement after the combined XUV + NIR interaction (as
    opposed to the entanglement that is investigated in ref. 8 after the XUV ionization).
    Fig. 3: Comparison between the experimental and theoretical results. Full size
    image Top and bottom, normalized difference between the number of H+ fragment
    ions flying left or right along the XUV/NIR polarization axis as a function of
    the H+ momentum and the delay τ XUV–NIR between the XUV and NIR lasers, for four
    different values of τ XUV–XUV , the delay between the two IAPs. The asymmetry
    is shown on a linear colour scale between −0.15 (dark blue) and +0.15 (dark red).
    The H+ momentum is given in atomic units. Note that uncertainties in the calibration
    of the VMI spectrometer introduce an uncertainty of up to 10% in the absolute
    values shown. For τ XUV–XUV = 7 and 10 fs, a large amplitude of the asymmetry
    oscillation is observed, whereas for τ XUV–XUV = 8 and 11 fs, the asymmetry oscillates
    with a greatly reduced amplitude. Middle, average amplitude of the asymmetry oscillations
    as a function of τ XUV–XUV . The asymmetry amplitude oscillates with a period
    that corresponds to the optical period of the NIR laser T NIR .'
