- article_update_date: 04.08.2026
  body_text: 'At the fundamental level, the strong nuclear force between nucleons
    arises from quantum chromodynamics (QCD), a quantum field theory formulated in
    terms of their ‘colour-charged’ elementary constituents, the quarks and gluons.
    The interaction between these constituents is characterized by being weak at very
    high energies and short distances, a phenomenon known as asymptotic freedom5,6,
    whereas, in contrast to the other forces, it is so strong at nuclear distances
    that thinking of quarks and gluons as individual particles makes no sense at all.
    We speak of ‘confinement’: fundamental quarks and gluons cannot be directly observed,
    but instead, only composite ‘colour-neutral’ states, such as protons, neutrons
    or π-mesons, are observed in experiments. This fact poses several challenges,
    including the fundamental question of how to determine the strength of the interaction
    between quarks and gluons at high energy. The quark–gluon coupling, α x (μ), depends
    on the energy scale, μ, of the interaction and also on its detailed definition,
    summarized as the ‘scheme’, x. Owing to confinement, we cannot collide quarks
    with quarks or gluons and determine α x (μ), directly in experiments. Instead,
    phenomenological estimates of the strong coupling are obtained by examining different
    processes, such as electron–positron or proton–proton collisions at various energy
    scales. After decades of theoretical and experimental efforts to parameterize
    the effects of confinement and to identify observables in which these effects
    are minimized, significant uncertainties persist. In particular, in determining
    a world average of α x (μ), notably by the Particle Data Group (PDG), different
    categories still exhibit uncertainties in the range of 1.5–3% (compare ref. 3
    and Fig. 5). In fact, in most cases, these are not simply due to the limited precision
    of the experimental data, but include significant systematic uncertainties originating
    from the lack of an analytic understanding of confinement. In this situation,
    we cannot profit much from having more experimental data in reducing the uncertainty
    in α x (μ). The inaccuracy of α x (μ) limits the potential of current experiments
    that test the fundamental laws of nature4. Even when all phenomenology extractions
    of the strong coupling are combined, they lead to an error of about 1%. This uncertainty
    propagates, for example, into a 2–4% uncertainty in the rate of production of
    Higgs particles by gluon fusion7 or its decay into gluons8. Furthermore, reducing
    the current uncertainty in the strong coupling by a factor of 2 turns out to be
    crucial9 for finding out whether the vacuum of the Standard Model is stable10
    and to constrain extensions of the Standard Model, which cure the possible instability11,12.
    A first-principles, robust, free of modelling uncertainties determination of the
    strong coupling avoids the limitations of extractions from experimental data and
    will affect ongoing searches for new physics. Here we provide such a determination.
    We analyse the scale dependence of the strong coupling, as described by its β-function:
    $$\mu \frac{{\rm{d}}}{{\rm{d}}\mu }{\alpha }_{{\rm{x}}}(\mu )={\beta }_{{\rm{x}}}({\alpha
    }_{{\rm{x}}}(\mu )),$$ (1) which has an expansion of the form \({\beta }_{{\rm{x}}}({\alpha
    }_{{\rm{x}}})=-{\beta }_{0}{\alpha }_{{\rm{x}}}^{2}-{\beta }_{1}{\alpha }_{{\rm{x}}}^{3}+{\rm{O}}({\alpha
    }_{{\rm{x}}}^{4})\), with leading positive coefficients β 0 , β 1 , which are
    independent of the scheme. This implies that α x (μ) runs with the scale μ, decreasing
    with increasing μ, with a leading behaviour proportional to 1/ln(μ/Λ x ), as shown
    in Fig. 1. This phenomenon, known as asymptotic freedom5,6, implies that perturbative
    series expansions in powers of the strong coupling become accurate at high energies,
    as shown by the β-function itself. The scheme independence of the leading coefficients,
    β 0 , β 1 , implies that the asymptotic scale dependence is universal, and the
    Λ-parameters of different schemes are simply related by exactly calculable constants.
    Conventionally, we use the modified minimal subtraction scheme13 (\(\overline{{\rm{M}}{\rm{S}}}\))
    to quote the coupling \({\alpha }_{{\rm{s}}}\equiv {\alpha }_{\overline{{\rm{M}}{\rm{S}}}}\)
    and \({\Lambda }_{{\rm{Q}}{\rm{C}}{\rm{D}}}\equiv {\Lambda }_{\overline{{\rm{M}}{\rm{S}}}}\).
    Fig. 1: Scale dependence of the strong coupling. Full size image The strong coupling
    for a wide range of energy scales, as determined from our result for Λ QCD , is
    represented by the red band. The data points show the experimental determinations
    from various processes with their uncertainties as quoted by the PDG3. Knowledge
    of Λ QCD and the β-function is equivalent to knowing the coupling at any given
    scale μ. In the \(\overline{{\rm{M}}{\rm{S}}}\) scheme, the expansion coefficients
    of \({\beta }_{\overline{{\rm{M}}{\rm{S}}}}\) are known up to high order, including
    β 4 , that is, five-loop order14,15,16,17,18, so that the scale dependence of
    \({\alpha }_{\overline{{\rm{M}}S}}(\mu )\) can be accurately predicted down to
    μ of the order of 1 GeV. In this paper, we determine Λ QCD with two independent,
    dedicated strategies replacing the modelling of confinement by numerical simulations
    of lattice QCD. Our α s -uncertainty of about 0.5% is due to the finite computational
    resources and not due to our limited theoretical understanding. (The total cost
    of our α s -dedicated simulations is 400 million core hours). Combined with \({\beta
    }_{\overline{{\rm{M}}{\rm{S}}}}\), our determination of the coupling can be compared
    with experimental estimates at various energies, as shown by the data points in
    Fig. 1. The new, precise result also provides opportunities for better understanding
    of how confinement manifests itself in different processes and for extracting
    more detailed information from the experimental data. The role of lattice QCD
    The modelling of confinement is entirely by-passed in lattice QCD, a genuinely
    non-perturbative formulation of QCD on a (Euclidean) space–time lattice with spacing
    a. Quark and gluon fields are sampled on the lattice points and edges, respectively.
    If the space–time volume is finite, the number of QCD degrees of freedom is reduced
    to a finite albeit large number, enabling the numerical evaluation of observables
    by large-scale computer simulations. Predictions for hadronic observables, such
    as the mass of the proton, m p , or the leptonic decay width of π-mesons, can
    be obtained for a given choice of the Lagrangian parameters, the bare quark masses
    and bare coupling g 0 . To make contact with the natural world, we need to take
    the continuum limit, a → 0, based on numerical data for a range of a values. This
    is achieved by simulating lattices with decreasing values of the bare coupling,
    \({g}_{0}^{2}\to 0\) and thus a → 0, while the bare quark masses are tuned to
    match the physical values of the chosen experimental inputs. In lattice QCD, confinement
    is a direct consequence of the simulated nonlinear dynamics of QCD, not of some
    model. Still, conventional lattice QCD determinations of the strong coupling are
    typically limited by systematic uncertainties. In a volume large enough to accommodate
    hadrons, the typical momentum cutoff π/a is 6−15 GeV. This is one order of magnitude
    below the universal large energy region, in which low-order perturbation theory
    is accurate. Together with the basic requirement that physical scales have to
    be well below the cutoff, μ ≪ π/a, a large-volume approach to determine the strong
    coupling would require lattices with significantly more than 100 million lattice
    points (the current state of the art), along with computational resources several
    orders of magnitude beyond what is presently available. Instead, most lattice
    QCD determinations of α x (μ) make compromises, performing the extraction at intermediate
    energies with estimates of what is the effect on α x (μ). Different strategies
    exist, as reported in the FLAG (Flavour Lattice Averaging Group) review19, with
    estimated precisions of 1–2%. Similar to the phenomenological situation, these
    uncertainties are not the result of the limited statistics in the computer simulation,
    but they are limited by our insufficient analytical control over QCD at low energies.
    A notable increase in precision can only be reached with a dedicated strategy
    reaching high energy non-perturbatively. This strategy, known as step scaling,
    was suggested more than 30 years ago20. Then it was tested in a model with one
    space dimension. The distinguished idea is to use a scheme for the running coupling,
    in which the energy scale is given by the size of the simulated world, μ = 1/L.
    Small volumes probe the high-energy regime of QCD, whereas large volumes probe
    low-energy scales. The energy dependence of the coupling is obtained by simulating
    pairs of lattices with extents L/a and 2L/a, and a subsequent continuum extrapolation.
    This relates the values of the coupling separated by a factor of 2 in scale. By
    iterating this step scaling n times, a scale change of 2n is achieved. For QCD
    with N f = 3 flavours, the method was developed and applied21,22,23,24 over many
    years. As of today, this result dominates the world average and is the only determination
    with negligible perturbative uncertainties. Here, we use this step-scaling approach
    to not only reach a significant increase in precision but also have better control
    of the potential remaining systematic effects. We show that the continuum limit
    is approached smoothly and that the perturbative inclusion of dynamical charm
    and bottom quark effects is well under control. But most crucially, we complement
    the step-scaling approach with the ‘decoupling technique’ described in refs. 25,26.
    In our previous implementation, we had discretization errors linear in am q removed
    only at one-loop order. In ref. 27, we determined the improvement coefficient
    non-perturbatively. With this knowledge, we now eliminate the so-far dominating
    systematic effect. The decoupling strategy is based on the observation that QCD
    with very heavy quarks can be expanded in the inverse quark mass, and the lowest-order
    term is the theory without quarks. This observation allows us to relate the QCD
    coupling and the coupling in a world without quarks. Results from lattice simulations
    come in units of the lattice spacing a. To express them in physical (energy) units,
    the units of the lattice spacing a must be established through an experimental
    input, for example, \(a={\widehat{m}}_{{\rm{p}}}/{m}_{{\rm{p}}}^{\exp }\), where
    \({\widehat{m}}_{{\rm{p}}}\) is the dimensionless proton mass measured in lattice
    simulations, and \({m}_{{\rm{p}}}^{\exp }\) is the physical, experimentally measured,
    one. To minimize the uncertainty from the conversion between lattice and physical
    units, it is common19 to introduce an intermediate step, by first relating the
    experimental input to a technical, not experimentally accessible, (length-) scale,
    \(\sqrt{{t}_{0}}\), derived from the Yang–Mills gradient flow (GF)28. Nominally
    quite precise values \(\sqrt{{t}_{0}}\) are available from the literature29,30,31,32,33,34,35.
    They differ by the discretization of QCD, and some results include the heavier
    charm quark in the simulations. They also use various experimental inputs, from
    baryon octet masses, the Ω-baryon mass, to leptonic decay rates of pion and/or
    kaon19 for the overall scale, whereas the physical quark masses are set by the
    experimental masses of pions and kaons (Fig. 2, top box). Fig. 2: Overview of
    our computation. Full size image We have colour-coded experimental inputs in red
