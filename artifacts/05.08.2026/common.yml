  body_text: 'The number of Catholic saints is climbing heavenwards Culture | A boom
    in the canon The number of Catholic saints is climbing heavenwards It is not necessarily
    a good sign April 1st 2026 In a chilly church in Assisi, Italy, a line formed.
    In silence (and in coats) the queue shuffled forwards, snaking between ribboned
    posts like a popish passport queue. The line had the processing power of a passport
    queue, too: 1,500 passed through in an hour; 11,000 on a weekday; almost 20,000
    on a weekend. And, as in a passport queue, at the front they were met by a forbidding
    person behind plexiglass. In this case, however, it was the skeletal remains of
    St Francis of Assisi (see picture, above). Last month, to mark the 800th anniversary
    of his death, the remains of St Francis were put on prolonged public show for
    the first time. Few of Catholicism’s over 10,000 saints have remained so relevant
    centuries later. St Polycarp—first a martyr to the Romans, then to a silly name—is
    rarely remembered today. St Fiacre, patron saint of syphilis sufferers, has similarly
    fallen out of fashion. St Francis, by contrast, is thriving: films are made about
    him; the last pope was named after him; environmentalists adore him. Inasmuch
    as a medieval skeleton can be modish, St Francis is. To revere a religious relic
    feels like an act that is itself something of a relic. Making a pilgrimage to
    the bones of a long-dead saint seems a medieval rather than a modern habit: an
    antique indulgence that, along with actual indulgences, was done away with in
    the Reformation. And yet, in the month that St Francis’s remains were on show,
    he was viewed by around 370,000 people. Giulio Cesareo, a friar, says that every
    ninth or tenth person cried. Indeed, these are unusually saintly times. Pilgrimages
    are in fashion: in 2025 over half a million walked the Camino de Santiago in Spain,
    up from a few thousand people in the late 1980s. And the number of saints is rising.
    In 2013 Pope Francis canonised around 800 saints in one go, more than had been
    canonised from the 16th century to the 20th. More have been canonised in the past
    40 years than the previous 400 (see chart). In September Carlo Acutis, who died
    of leukaemia in 2006, became the first millennial saint. Some call him “God’s
    influencer ”. This is not to say Europe is in the grip of a religious revival.
    The number of saints has an inverse relationship with the number of believers:
    according to the World Christian Database, 32% of Europeans were Catholic in 2025,
    compared with 37% in 1975. Besides, no one needs to be wholly holy to go on a
    pilgrimage (as the Wife of Bath, Chaucer’s lustiest character, knew). It is also
    worth treating numbers with caution. For centuries, canonisation was not the only
    way to make a saint. The Vatican still does not officially “make” saints, anyway,
    but merely anoints their already-existing virtue. “Only God”, it has been said,
    “knows how many saints there are”—and His data are not publicly available. Nonetheless,
    something is changing. To understand what, it is necessary to grasp how saints
    first appeared. Much of what seems quintessentially Catholic is not in the Bible.
    The holy book contains no pope, no guilt, no fish on a Friday—and no saints, at
    least not in the halos-and-holiness sense. In biblical times the word “saint”
    simply meant “holy” and the bar to achieving that status was low. Back then “saints”,
    says Robert Bartlett, a scholar of medieval history at the University of St Andrews,
    “just means ‘Christians’”. In time, the meaning shifted. The first centuries of
    Christianity saw a raising of the bar. By the fourth century, there were two main
    ways you could become a saint: by dying a very bad death or by living a very good
    life. The “good” life involved a lot of bad things (lentils, lepers, desert living).
    A bad death was brisker, but bloodier. St Lawrence was roasted. St Sebastian was
    shot with arrows then clubbed. St Francis had a good life (there were lepers)
    and a bad death (thanks to doctors’ red-hot pokers). He was primed for popularity
    from the off. In Assisi he is treated as something between a saint and a pop star.
    There are coach loads of crowds, weeping fans and an abundance of merchandise
    from the cheap (fridge magnets) to the more middle-class (olive-oil drizzlers).
    But what makes saints really popular is not merely how they endure the miseries
    of their own life but how they might intervene in the miseries of yours, a process
    known as “intercession”. To understand saints—or indeed Catholicism—just look
    at a list of their areas of intercessionary expertise. Look up the letter “A”
    and you are offered “Animals” (St Francis), “Appendicitis” (St Erasmus) and “Archers”
    (suitably, if arguably a little insensitively, St Sebastian). Such lists show
    the centuries outspread. St Joseph of Cupertino, patron saint of those who travel
    by air, is presumably busier than ever; St Giles, patron saint of “spur makers”,
    much less so. The lists can feel almost comic: “S” offers, in quick succession,
    “ Sexual temptation” , “Sheds” and “Sheep” (presumably not all together). Some
    feel closer to tragedy: “C” offers “Children, sick”, “Cholera”, “Coffin-bearers”.
    What you are seeing is an index of anxiety: an attempt to control the uncontrollable.
    What you are looking at is Catholicism, categorised. In around 1,000AD the church
    started to acquire the power of canonisation, then entrenched it over the centuries.
    Today saints are approved by the Dicastery for the Causes of Saints, which uses
    criteria for the sacred process of canonisation: a would-be saint should have
    been dead for five years, have performed verified miracles and so on. Saint-making
    became a bureaucratic project. The bump in 2013 was due to a backlog of 800 martyrs
    from the 15th century. Italy still provides most of the chosen ones: of the 388
    saints with known birthplaces, 156 were born in Italy. (God moves in mysterious
    ways, but He appears not to move very far.) Pope John Paul II sped up the canonisation
    process, part of the reason for the rise. Candidate selection has become entwined
    with church politics: he made an effort to canonise saints from outside Europe,
    thereby reflecting the growth of Catholicism in other parts of the world. Canonisation—who,
    where, when—thus reflects the changing nature of the Catholic church’s authority.
    Saint-making is not an accurate measure of the world’s religiosity, but it is
    revealing about papal control. Popes who have a zeal for canonisation are like
    presidents who issue a lot of pardons: they do it because they can. Saints offer
    a legacy of sorts. And in a complicated world, the appeal of saints is clear.
    In Assisi, some visitors peered at St Francis and whispered; others kissed the
    plexiglass. After they moved on, a worker appeared and discreetly squirted disinfectant.
    The event offered an odd blend of the sacred and the mundane; of sanctity and
    modernity; of suffering and redemption; of a centuries-old saint and 21st-century
    cleaning products. It offered Catholicism in microcosm. ■ This article was downloaded
    by zlibrary from https://www.economist.com//culture/2026/04/01/the-number-of-catholic-saints-is-climbing-heavenwards'
