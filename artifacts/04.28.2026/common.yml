  body_text: The holographic minaret of Al-Shafi’i drilled the Adhan straight into
    the mastoid bone behind my ear. A neural vibration, not a sound. Maghrib. Above
    the coral houses of Al-Balad, the Ministry’s drones buzzed back to their hives,
    glutted on our biometric data. I sat on my synthetic rug in a shop squeezed between
    a hissing falafel printer and a stall selling ‘Vintage Oud’ — chemically scented
    motor oil. “Uncle Ibrahim?” The whisper came from the shadows. I didn’t look up
    from my antique coffee grinder. Grind. Crack. Grind. The only analogue rhythm
    left in a digital world. “You’re late.” The boy stepped into the flickering neon
    light. Sixteen, skin too smooth, eyes glassy. Side effects of the Ministry’s latest
    ‘Optimism Patch’. He looked like a doll left out in the Jeddah sun. Read more
    science fiction from Nature Futures “The patrols,” he stammered, scratching the
    raw skin around his neural port. “Scanning for negative micro-expressions near
    Bab Makkah. I had to maintain a smile for 20 minutes. My jaw aches.” “Sit.” I
    shoved a cup of dark sludge at him. “Drink. It’s bitter. It’ll clear that sugar-rot
    from your synapses.” He took the cup with shaking hands. “The Algorithm scans
    my cortisol levels every eight minutes. If I dip below ‘Joyful’, they send a Correction
    Drone.” I knew the Correction. A zap to the amygdala. Forced serotonin and dopamine
    flood. ‘therapeutic realignment’, they called it. Lobotomy by Wi-Fi, I called
    it. “You came for the hard stuff,” I said, leaning back. “Do you have it?” I reached
    under the rug, pulling out the rusted drive wrapped in oily cloth. An artefact
    from the Time Before Silence. “Raw memory,” I whispered. “Uncut. No AI polish.
    No emotional dampeners. Just jagged human experience.” “Whose is it?” “My grandmother’s,”
    I lied. It was mine. Forty years ago. “What happens in it?” My cybernetic eye
    whirred, focusing on his sweat. “Grief. Pure, unadulterated grief. The day her
    cat died.” He recoiled. “A cat? I’m risking my Neural Score for a dead cat? I
    thought you had revolution codes.” “Revolution isn’t code,” I rasped. “It’s feeling
    something they didn’t script. Real isn’t the taste of fresh dates. Real is the
    ache in your throat when you try to swallow but can’t.” He stared at the drive.
    “Why would anyone want that?” “Because you’re drowning in light, habibi. You float
    in eternal mid-afternoon sunshine. This drive? This is three minutes of ugly crying.
    Chest heaving. But at the end … a silence. A clean, heavy silence called catharsis.
    The Algorithm can’t synthesize it because it requires breaking first.” He looked
    at his hands. “I feel empty, Uncle. My stats are perfect. But inside … it’s just
    static. White noise.” “That’s the price. It eats the noise, but it eats the music,
    too.” I remembered my wife, Salma. Before the patches. We fought over burnt rice.
    We screamed. Then we made up, and the quiet was sweet. Then the Ministry ‘fixed’
    her anxiety. She became pleasant furniture, until she died of a heart attack watching
    a comedy, a frozen grin on her face. “How much?” the boy asked. “No credits. A
    bio-trade.” “What?” “Give me five minutes of your ‘joy’. That synthetic, high-grade
    sugar they pump into you during exams.” “But … you call it poison.”
