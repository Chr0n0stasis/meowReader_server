  body_text: '| Next | Section menu | Main menu | Previous | John Semley The Big Story
    Jul 29, 2025 6:00 AM Psychedelic Therapy Crashed and Burned. MAHA Might Bring
    It Back Abuse allegations and infighting helped kill a campaign to legalize MDMA
    for medical use. Trumpworld is giving the therapy’s advocates hope for a second
    shot. Photograph: Tonje Thilesen This was supposed to be the year of the MDMA
    revolution. About this time last year, prescription MDMA looked like a sure thing.
    After decades of clinical research, political wrangling, and aggressive promotion,
    the popular underground club drug was set to be tamed and medicalized, with a
    stamp of approval from the US Food and Drug Administration. Then, it wasn’t. In
    a stark change of course, the FDA rejected the MDMA therapy it had been considering
    by a 10-1 vote. The decision derailed psychedelic medicine for the foreseeable
    future. Except for one thing—an unexpected lifeline from the Trump administration.
    In May, the FDA’s new commissioner, surgical oncologist Marty Makary, appeared
    on cable news to declare MDMA and other Schedule 1 narcotics “a top priority for
    this FDA and this administration.” Elsewhere, Mr. MAHA himself, the US Health
    and Human Services secretary, Robert F. Kennedy Jr., has spoken positively about
    the psychoactive stems-and-bark tea ayahuasca. Matt Zorn, a lawyer recently appointed
    to RFK Jr.’s department, had previously fought the US government to allow access
    to cannabis and psychedelic mushrooms. Casey Means, Trump’s nominee for surgeon
    general, has spoken of the benefits of psilocybin-assisted therapy, claiming that
    psychedelic mushrooms helped her find love and made her feel like “part of an
    infinite and unbroken series of cosmic nesting dolls.” Psychedelic medicine ,
    as it turns out, slots rather comfortably into the burn-it-all ethos of RFK Jr.’s
    movement. But as MDMA’s advocates regroup to take advantage of this surge of support,
    they’re also reckoning with why they failed to win over the FDA—and whether a
    second attempt could go better. Could the psychedelic world’s new Trumpworld allies
    be the ones who finally help it achieve its goal? Photograph: Tonje Thilesen For
    almost half a century, American psychedelic medicine—and MDMA in particular—has
    had one indispensable advocate: Rick Doblin. On a cool December morning, I met
    Doblin at his bright purple craftsman home in the Boston suburbs. Dressed in a
    well-worn chamois shirt and khakis and with a wiry tangle of hair, he was cheery
    and avuncular. His look was classic New England and a bit bedraggled, befitting
    the scion of a wealthy industrialist family turned elder statesman of the counterculture.
    Doblin first tried LSD in 1971 as a freshman studying psychology at Florida’s
    experimental New College. By 1982, he was studying under pioneering psychedelics
    researcher and therapist Stanislav Grof at the Esalen Institute in Big Sur, California.
    At the time, many at Esalen were excited about a legal chemical called MDMA, which
    was said to help people conquer fear and forge profound connections with others.
    Doblin sampled the drug with a girlfriend and was shocked at how easy it became
    to talk through their issues. But then, to Doblin’s chagrin, the US criminalized
    MDMA, and in 1986 he founded a nonprofit called MAPS—the Multidisciplinary Association
    for Psychedelic Studies. For the next several years, MAPS was a one-man operation.
    To advocate for MDMA’s legalization, Doblin collected reports from animal studies
    on the drug’s toxicity and lined up experts to argue with Drug Enforcement Administration
    officials on Phil Donahue . He slipped into Nicaragua during its civil war and
    provided the drug to clinicians to treat traumatized soldiers and civilians. He
    even subjected himself to excruciating spinal taps in an attempt to disprove a
    prevalent belief that MDMA depleted natural stores of serotonin. Doblin believed
    early on that it was essential to distance MAPS from the counterculture to gain
    mainstream credibility. (The organization’s first Psychedelic Science conference
    in 2010 instituted a “no tie-dye” rule for staff.) He set out to collect clinical
    evidence on the benefits of MDMA and other prohibited drugs. He then used those
    results to wage a campaign to change public opinion and ultimately end prohibitions.
    Between 2005 and 2017, MAPS refined a model for clinicians to administer MDMA
    to patients suffering from post-traumatic stress disorder, guide their experiences,
    and provide post-trip emotional support. Its 74-page manual stressed the importance
    of “inner healing intelligence”—a concept touted by Doblin’s mentor Grof, which
    holds that the human psyche has an “innate capacity” to heal itself. During this
    time, MAPS operated as a charity, taking in over $6.7 million in 2013 to fund
    its research and advocacy. The organization prided itself on living its values
    of drug destigmatization; it had a policy where employees could consult with their
    managers on “smokable tasks” that could be completed under the influence of drugs.
    (“I personally feel like strategizing and brainstorming goes better when I’m high,”
    Doblin explains.) But the cornerstone of Doblin’s plan—establishing MDMA’s efficacy
    in a clinical trial—required resources of a different magnitude. MAPS needed to
    raise more than $100 million for research and operational costs. So in 2014 the
    organization minted a for-profit subsidiary, which came to be known as Lykos Therapeutics.
    Courtesy of MAPS Seeking to change the public perception of MDMA as a party drug,
    Doblin decided to focus on a sympathetic patient population: military veterans
    diagnosed with PTSD. MAPS formed partnerships with veterans’ groups and secured
    a $1 million donation in 2018 from the Mercer Family Foundation, run by Rebekah
    Mercer, the conservative donor some have dubbed “the First Lady of the alt-right.”
    Mercer was a notable departure from the most prominent psychedelic philanthropists,
    like the Silicon Valley venture capitalist and longtime MAPS donor George Sarlo,
    podcaster and lifestyle guru Tim Ferriss, and David Bronner, an executive who
    is currently the “cosmic engagement officer” of Dr. Bronner’s empire of “magic
    soaps.” In 2017, the FDA granted MAPS’ MDMA treatment a Breakthrough Therapy designation,
    providing a fast-track through the agency’s arduous trialing and review process.
    In December 2023, Lykos submitted an application to the FDA including data from
    hundreds of patients. The data showed that the treatment had a remarkable 70 percent
    success rate. An expedient review would follow. On June 4, 2024, Jonathan Lubecky,
    a 48-year-old ex-Marine and US Army sergeant, appeared via webcam before an FDA
    advisory committee and told the story of how MDMA had saved his life. Lubecky
    had deployed to Iraq in 2005 and completed a yearlong tour of duty. After he returned
    home, he was plagued by nightmares, anxiety, depression, and thoughts of suicide.
    Triggered by fireworks during a Fourth of July celebration, Lubecky hid in a closet
    with his service dog. He had a meltdown at Disney World after spotting a guest
    in Islamic garb with a backpack. After exhausting the treatment options offered
    by Veterans Affairs, Lubecky had lost all hope. He was taking 42 prescription
    pills a day and had made five attempts on his life. Then, one day in 2014, an
    intern at a South Carolina hospital slid him a piece of paper scrawled with the
    words “Google mdma ptsd.” When he did, Lubecky came across a clinical trial for
    MDMA therapy, run by MAPS, that was enlisting veterans. Figuring he had nothing
    to lose, he signed up. Under the psychoactive sway of MDMA and the attention of
    a therapist, Lubecky found himself opening up about his wartime horrors. And then
    he kept going. “I went in thinking I was going to talk about Iraq,” he says, “and
    I ended up talking about my whole fucking life.” The treatment, which consisted
    of three drug-assisted therapy sessions as well as regular therapy, “healed me,”
    Lubecky told the panel. Since then, he has even made multiple trips to the front
    lines of the Ukraine-Russia war as a volunteer, resupplying Ukrainian medical
    stockpiles. Lubecky also became a dedicated advocate for the clinical use of MDMA
    and served as a government liaison for MAPS between 2018 and 2023. Like Doblin,
    Lubecky was optimistic that the treatment would get approved. But during the proceedings,
    a statement was entered into the record on behalf of a woman named Meaghan Buisson.
    In 2014, Buisson was recruited into a Phase 2 clinical trial run by MAPS. While
    under the influence of MDMA, she said, she had been “blindfolded, gagged, pinned,
    cuddled, and caressed” by the therapists, a married couple. She had attempted
    suicide afterward, she said; a doctor later told her she had effectively been
    “drugged, raped, blamed, and held as a sex slave.” Another speaker, Neşe Devenot,
    a senior writing lecturer at Johns Hopkins University, recounted an incident in
    which a therapist pinned down a patient “as their distress escalated to the point
    of shouting, quote, ‘Go away. Get your effing hands away from me.’” In a 17-page
    document submitted to the FDA, Devenot alleged that the MAPS therapy wasn’t a
    scientific treatment at all: It was a “therapy cult,” comparable to NXIVM, the
    notorious sex-trafficking pyramid scheme. When the hearing concluded, after some
    eight exhausting hours of testimony, Lubecky stepped onto the balcony of his Washington,
    DC, apartment, inhaled deeply, and yelled, “FUCK!” He was sure Buisson’s and Devenot’s
    accounts would doom the treatment’s chances of approval. Here, he believed, was
    a medical innovation that could save thousands of lives, and it had been torpedoed
    not by its usual opponents, like law enforcement agencies or opponents of drug
    legalization, but by warring factions of the psychedelic community itself. Or,
    as he described them, “a bunch of fucking hippies who fucked it up.” Photograph:
    Tonje Thilesen Until fairly recently, the “psychedelic space” was a small and
    somewhat parochial collection of academics, research chemists, and recreational
    trippers, all loosely connected to the drug underground or the vestigial 1960s
    counterculture. Then, in 2018, author Michael Pollan published How to Change Your
    Mind, his bestselling account of the “psychedelic renaissance,” and helped popularize
    drugs like LSD, MDMA, psilocybin, and mescaline. The community’s gatherings outgrew
    church basements and Holiday Inn ballrooms and relocated to glass-and-steel convention
    centers swarming with pharmaceutical salespeople and venture capitalists. To many
    in the left-wing, anticapitalist psychedelic scene, Neşe Devenot told me, it was
    like the evil Eye of Sauron from The Lord of the Rings had swiveled in their direction.
    Devenot, who uses they/them pronouns, first took LSD as a freshman at Bard. It
    was “the most profound experience of my life,” they said. Until that point, they
    had been terminally shy and suffered from intrusive thoughts about dying. But
    under the influence of LSD, Devenot says, “the finality and fearfulness I associated
    with death disappeared.” They fell in with the community of researchers and enthusiasts
    in which Doblin was regarded as a pioneer. “Before this field became financialized,”
    Devenot told me, “it was a domain for a lot of weirdos and misfits … people looking
    for community and meaning and connection.” In 2018, Devenot joined an advocacy
    group called Psymposia, which was founded to advocate for drug policy reform.
    The group began working diligently to conduct policy research and rail against
    the corporate capture of psychedelia. A Psymposia cofounder named Brian Normand
    told me that he finds the incursion of Silicon Valley and Big Pharma into psychedelia
    “incredibly cheesy.” With open letters, articles, academic papers, podcasts, and
    voluminous social media posts, Psymposia called attention to abusive practitioners
    of psychedelic therapy and right-wing uses and abuses of mind-expanding compounds,
    among other topics. Early on, Psymposia and MAPS worked together. But a few years
    after MAPS spun off its for-profit arm, the alliance splintered. In 2021, Psymposia
    and New York magazine coproduced an investigative podcast called Cover Story:
    Power Trip . One of its most damning episodes was deeply critical of MAPS and
    featured Meaghan Buisson—the woman whose story of assault came up in the FDA hearings.
    The podcast, along with accompanying video footage of her therapy, covered many
    of the details she would later recount to the FDA. Buisson had been homeless around
    the time she enlisted in the trial in 2014, which was conducted by two MAPS-trained
    clinicians, Richard Yensen'
