  body_text: Stephon Alexander 00:08 He was the one that really impressed somebody,
    the importance of intuition. He said intuition is the lifeblood of a good physicist,
    of a great physicist. David Payne 00:18 This is Creativity in Science, a series
    brought to you by Nature Careers. Stephon Alexander 00:24 I would not be the physicist
    I am today if weren't for my practice as a musician, especially as an improvisational
    musician. Working on my improvisation, just actually improvising as a musician,
    somehow makes me more fluid and flexible mentally in terms of approaching and
    attacking physics problems. David Payne 00:42 …a podcast about how science and
    creativity go hand in hand. And about how one can nurture the other. Stephon Alexander
    00:52 …and it turned out to really work for me. It really helped me become a more
    creative physicist, to think about ideas that I ordinarily would not have thought
    of. David Payne 01:02 This time, a physicist who skillfully weaves his passion
    for jazz Improvisation with his understanding and teaching of complex ideas. Stephon
    Alexander 01:20 Hi, I'm Stephon Alexander. I'm a theoretical physicist, and the
    director for the Brown University Center for Theoretical Physics and Innovation,
    in Providence, Rhode Island, a small, beautiful state with a lot of ocean. And
    I'm also a jazz saxophonist. Yeah, how I got interested in music started way back
    when I was eight years old. My family immigrated to the Bronx, New York. My grandmother,
    who had been in the country for about a decade prior, sent for us, and so it was
    always in her mind that I would become a concert pianist. So she signed me up
    for classical piano lessons starting at eight. I did not enjoy practicing the
    piano, as I think most young people probably don't, but I continued with that
    until I was 12 years old. But then my father brought home a used saxophone from
    a garage sale. He actually bought it from a former New York Yankees pitcher, I
    believe. His wife, I think, bought it for him as a birthday present, but he never
    played it. So my dad got it for a very cheap price. But the saxophone was really
    not introduced to me as something you have to practice, right? So it started there,
    and then I had a little radio, one of these radios that would, you know, old school
    radios, where you turn a dial. And I used to randomly, you know, surf radio channels
    back in the 80s. This is in my little attic room in the Bronx. And there was this
    saxophone playing that was completely out there, completely wild. And it said,
    this is the music of Ornette Coleman. And this is free jazz. I was like, oh, this
    free jazz thing. What does this mean? You could just play whatever you want and
    make up whatever you want. So my introduction to really getting into the practice
    of music and being an improvisation musician actually, this really started with
    Ornette Coleman, when I was probably like 13 years old. Knew nothing about the
    guy, knew nothing about free jazz, but just the idea of a young person being able
    to pick up his horn and just play it without being judged was actually an important
    first step. Stephon Alexander 03:27 In high school, I had another inspiration,
    Mr. Daniel Kaplan at my high school, at Duarte Clinton High School, which is a
    wonderful place. I've been a high school student, although it was a wild place,
    all sorts of interesting people, six thousand students, all, a whole wide range
    of students, which is actually very important to experience. And I was in an honors
    program within this high school. So we took physics, and this physics teacher,
    Mr. Daniel Kaplan, was also a jazz musician. He was a professionally-trained jazz
    musician. He went out to the Korean War and then worked on radar, so he kind of
    caught the physics bug when he came back. He became also a physics teacher and
    a music teacher. He was the one that really impressed on me the importance of
    intuition. He said intuition is the lifeblood of a good physicist, of a great
    physicist. And he would do a lot of exercises, and he would teach, to also to
    help us value the intuition, not just only solving equations (and those things
    are important) and developing skills, (those things were important), but also
    this idea of the intuition. So that was an important development too, having this
    amazing teacher who had a wider appreciation for intelligence, that it could also
    include these forms of creativity in physics. Stephon Alexander 04:57 How did
    my physics, and my doing in physics, and my knowledge of physics, influence how
    I play, how I approach music? It's really been a process over, like, the last,
    I don't know, 35 years, maybe, where I started to experiment or allow those roles
    to speak to each other. Sometimes, I look back, it was a bit of a shameful act.
    Because, you know, those two worlds we're talking about, we talk about, you know,
    music is about the human, human emotion. And it's, maybe it's about being entertained.
    It's about the party. It's about these, it's an art form. It's all these other
    things. But no, no, let's not talk about… It reminds me of one of times is in
    a jazz club I used to bring my my physics research papers and maybe sometimes
    sketch a little calculation while I'm listening to the jazz in this club in New
    York. And I was friends with many of these musicians. And after set, one guy,
    he was a pianist, I said, Yeah, your playing is really geometric. And there was
    this other guy, I'm not going to mention his name, he's a very famous sax player.
    He goes, “I don't know what you're talking about, man.” That just, it just sounds
    good. Okay, so, so anyway, you could see why these, why it was a shameful act.
    Stephen Alexander 06:11 But I would say that in physics we're in search of beauty
    in our equations, and also maybe the economy, like the fact that F = ma, Newton’s
    law, is because one simple equation, force is equal to mass times acceleration,
    that equation can economically, in one shot, describe how an airplane lands in
    Chicago, to how an apple falls off a tree, to how a speed car turns around the
    corner, to how a planet goes around the sun, and how a comet flies around a galaxy.
    So this one equation has an economy, an efficiency, and a logic. And in a lot
    of ways, music for me, or some of my approach to my sax playing, is that you have
    infinite amount of these scales and chords, and I've always been in search of
    economic ways, like ways to summarize different patterns, different chord changes.
    Can I economically find a hack, find a trick, just like a physics equation, to
    help me go through a jazz improvisation while the chords are changing? So it's
    things like that, where I take some of the logic or the patterns and the way we
    find patterns in physics and physics equations and concepts, and look for similar
    types of hidden patterns. And as a strategy for improvisation. Stephen Alexander
    07:44 I would not be the physicist I am today if it weren't for my practice as
    a musician, especially as an improvisational musician. One thing that I found
    over the years is that I've played in, I've had the fortune to play in many different
    settings, so maybe in Latin jazz to a little bit of classical here, obviously
    free form jazz to very standard, what we call standard jazz, where you play through
    chord progressions and things like that. I've played, yes, I've had that fortune.
    I am, as you know, I even have my own band with Melvin Gibbs and Will Calhoun
    and Jaron Lanier called God Particle. So we write our own music. So there's also
    creating and writing music. And I find that one example, when you play in these
    different settings and you play with different types of musicians who may have
    different skillsets, they may be hearing the music differently, rhythmically things
    may be different. You have to work with them. You have to be able to coexist and
    play with them in service of the music. At the end of the day it don't matter
    if you're on stage and somebody's playing the loudest, whatever. If the overall
    effect of the music isn't good, then you've all failed. And similarly, I find
    that, like, as a physicist, it's important to be able to, you know, be in dialogue
    with other physicists from different schools of thought. So I was brought up as
    a quantum field theorist and a string theorist, and in terms of my formal training
    and relativity in the practice of being a theoretical cosmologist. But I've learned
    that it's also important to talk to skilled physicists with different perspectives,
    just like playing in a different musical genre. And I find working at that interface
    and learning how to, how to be in dialogue with others, that people will say that,
    why talk to them? They don't know physics. They're, you know, they work on this
    type of physics, and we work on the other kind of physics. I'm the exact opposite.
    I say I need to talk to them because I need to learn something from them. Now,
    having said that, it's also important. I call that like listening to your ear.
    But if you don't have a well-developed ear, well, you also need your technique.
    You need your skill. You need to know your skills. You need to practice your etudes
    so it doesn't get you away from being solid and, well, you know, and well-skilled.
    It's not an either or, it's a both. So if I am confident, you know, or I'm always
    working on my physics chops. It gives me some, you know, I think, permission to
    go and talk to others in the pursuit of doing better physics. So that's one way
    I think, playing, you know, my musical practice has influence. Stephon Alexander
    10:43 The second one is improvisation. The art of improvisation is an endless
    thing, by the way. It's never ending. That's why I'm attracted to it. Just when
    I think I've reached somewhere, it's like, you know, there's a, there's an asymptote
    at infinity, right, of ways to develop in my improvisational skills. And I find
    very simply, that working on my improvisation, just actually improvising as a
    musician, somehow makes me more fluid and flexible mentally in terms of approaching
    and attacking physics problems. There are, other, I don't. It's not, it's important
    that you don't give up in a physics problem when you're working on something.
    And part of not giving up is to maybe improvise and, you know, make a silly guess.
    And try it and see how that sounds, so to speak, metaphorically. See what path
    it takes you down. And so that's another place I find my music influence in my
    physics. For me, the other thing that's very important, and I think the way my
    music has really helped me as a physicist, is it's one thing to say, oh, you know,
    it's important to keep an open mind that, you know, as you're approaching your
    research, or it's important to be flexible in your thinking, or it's important
    to embrace and maybe try to be outside the box. But to actually be there, I think
    it's important for me. Those are all ideals. For me, it's actually hard to practice
    that. And for me, where my music has really helped me is that I'm still a student.
