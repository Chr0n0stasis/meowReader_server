  body_text: 'Briefly Noted Books Briefly Noted “The Power of Life,” “How It Feels
    to Be Alive,” “Go Gentle,” and “Exemplary Humans.” April 20, 2026 The Power of
    Life , by Jessica Riskin (Riverhead) . The subject of this engaging biography
    is the eighteenth-and-nineteenth-century naturalist Jean-Baptiste Lamarck, who
    is often ridiculed as a faulty precursor to Darwin. Long associated with the idea
    that giraffes developed long necks because they stretched to reach trees (even
    though giraffes, Riskin points out, barely figure in his writings), Lamarck was
    in reality a complex thinker working in an age of upheaval, who introduced the
    radical concept that “living things are in a continual state of self-transformation,”
    and popularized the term “biology” itself. In a time when science’s boundaries
    were less stable, Lamarck’s poetic theories had significant influence, and its
    traces can even be detected in contemporary epigenetics. How It Feels to Be Alive
    , by Megan O’Grady (Farrar, Straus & Giroux) . Moving between memoir and criticism,
    this essay collection documents O’Grady’s lifelong fascination with works of art
    that refuse easy interpretation, beginning with the painter Agnes Martin’s “Friendship.”
    O’Grady goes on to examine pieces by artists including Carrie Mae Weems, Barbara
    Kruger, and Pope.L, whose performances, O’Grady writes, obliterated “the distance
    between the spectacles we’re supposed to look at and those we’re supposed to look
    away from.” Threaded throughout are recollections of O’Grady’s youth in Kansas,
    where museum exhibitions that she encountered disrupted the visual monotony around
    which she grew up. ——————————— What We’re Reading Discover notable new fiction,
    nonfiction, and poetry. —————————— Go Gentle , by Maria Semple (Putnam) . This
    comic novel is narrated by Adora, a divorced, middle-aged philosopher who lives
    in Manhattan as part of what she calls a “coven”: a cluster of three accomplished
    single women who all purchased apartments on the same floor of a famed Beaux-Arts
    building. The women plan to support one another as they grow old so that each
    can “go out in a blaze of independence,” but Adora’s course changes when she falls
    for an alluring man and embarks on a hard-charging escapade that’s equal parts
    screwball comedy, international-intrigue caper, and feminist comeuppance story.
    The novel swings between the trivial and the dire, and in her bleakest moments
    Adora leans on the Stoics for guidance, thinking, C’mon, boys, don’t fail me now!
    Exemplary Humans , by Juliana Leite, translated from the Portuguese by Zoë Perry
    (Two Lines) . Natalia, a lonely Brazilian centenarian, anchors this searching
    novel. “The problem with living too much,” she reflects, “is that you witness
    a world that is being erased right in front of you, person by person.” Natalia,
    with nowhere to be and no one to see, recognizes that “the past is the only future,”
    and so she dwells on her life—on her roles as a daughter and a schoolteacher,
    as a wife and a mother, and, most important, as a political dissident who resisted
    Brazil’s military dictatorship. At the heart of Natalia’s account is the question
    of how one continues to exist. The book ventures an answer, one found in its very
    form: by transmitting memories, both our own and others’.'
