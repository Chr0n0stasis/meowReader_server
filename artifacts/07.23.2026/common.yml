  body_text: '| Next | Section menu | Main menu | Previous | Cindy Bi is not supposed
    to be telling me this story. First, there’s the confidentiality clause. When Bi,
    a venture capitalist who claims to have invested in a dozen unicorns, hired a
    surrogate to carry her only male embryo in 2023, both parties agreed to keep the
    details private and away from the media. Then there’s the restraining order against
    Bi, followed by a court-ordered agreement saying she would not so much as mention
    the “surrogate” involved in Baby Leon’s stillbirth. Finally, there are social
    norms to consider when publicly attacking the woman who says she almost died carrying
    your child. Still, Bi is talking to me. She sends me a nearly 3,000-item folder
    filled with legal filings; reports to professional organizations, insurance companies,
    employers, and the police; emails with her attorneys; and correspondence between
    her and the “Egg Whisperer” influencer, Dr. Aimee. Bi considers herself a whistleblower
    out to protect “unborn children via surrogacy.” Her website invokes scripture:
    “Establish justice in the courts. Amos 5:15.” Indeed, Bi has racked up nearly
    a million dollars in legal bills since 2024, in what she views as a fight to honor
    her son. “I want the surrogate to be known for what she did, to be set as an example,”
    Bi tells me. “I hope she goes to jail.” Ideally, for murder. American surrogacy
    is an enormous industry, taking in approximately $5 billion in 2024, and the practice
    is expected to explode globally almost tenfold in the next decade. It seems especially
    popular in Silicon Valley, where a growing cadre of investors and executives,
    from OpenAI’s Sam Altman to Dropbox’s Drew Houston, have used it to grow their
    families . More than a dozen big tech companies provide five-figure subsidies
    to any employee who needs or wants to outsource gestational labor. A shocking
    number of techies now believe growing a baby can be a straightforward business
    transaction. But intended parents and gestational carriers—IPs and GCs, as they’re
    somewhat dehumanizingly known—are often uninformed about the dearth of regulation
    and completely unprepared for what can go wrong. Only one state, New York, requires
    agencies to be licensed. Although America is the world leader in surrogacy, it’s
    also the developed nation with the highest maternal mortality rate and one of
    the highest stillbirth rates, a situation described by many as “ a public health
    crisis .” Compared to natural conception, carrying a genetically unrelated fetus
    more than triples the risk of severe, potentially deadly conditions, a statistic
    surrogates are rarely given. IPs do not always have to disclose complete medical
    information, including histories of certain conditions that may harm their GCs.
    They don’t have to be honest about how many kids they have, why they are hiring
    a surrogate, or how many other surrogates they have simultaneously pregnant. Do
    you really know who is carrying your child—or whose child you are carrying? Meanwhile,
    the US is torn over who controls a pregnant woman’s body. The increasing acceptance
    of “fetal personhood” means that, in many states, losing a pregnancy can be charged
    as a felony and potentially punished with life in prison. This is thorny enough
    when it’s a woman’s own baby. It’s exponentially more fraught when the carrier
    isn’t the parent. Many of the issues Bi and her surrogate encountered on their
    “journey” are likely far more common than you’d ever imagine. But you haven’t
    heard about them. They won’t influence policy or case law, because they tend to
    unfold in private, shrouded by confidentiality clauses and handled in closed arbitration
    proceedings. A stark power differential means that intended parents often have
    the means to file lawsuits and wage yearslong campaigns, while surrogates who
    feel screwed are forced to rely on free legal help and GoFundMe. The case of Bi
    and her surrogate shows how, in an environment with little regulation and extreme
    inequality, the miracle of life can mutate into a death sentence. Cindy Bi met
    her future husband on April Fools’ Day, 2016. It was a warm Friday night at Molly
    Magees, an Irish pub-slash-discotheque in Mountain View, California. Jorge Valdeiglesias
    spotted Bi on the dance floor: heart-shaped face, long black hair, snatched size-zero
    waist. He brought over shots of Don Julio. Bi, a Chinese immigrant and founder
    who’d later appear on a list of “30 of the Most Successful Early-Stage Startup
    Investors,” inspected his Google badge to make sure it was real. “I’m older than
    you,” Bi told him. She was 36 to his boyish, rumpled 28. “But it’s OK, I froze
    my eggs.” Valdeiglesias was shocked by Bi’s forwardness—he was just looking for
    a fun night—but it worked. When she and Valdeiglesias were ready to start a family
    six years later, surrogacy was the obvious choice. At 43, Bi felt she was too
    old to be pregnant; she also said she was on a medication that could lead to complications.
    Bi didn’t grieve the decision. In a Facebook group for future IPs, she wrote:
    “I’ve been prepared for this for almost a decade.” At first, Bi and Valdeiglesias
    considered implanting two embryos at once to have twins. Bi’s fertility doctor
    strongly discouraged that because of risks to the babies and surrogate. Instead,
    Bi and Valdeiglesias settled on “twiblings” gestated by separate women but born
    a few weeks or months apart. They’d have a protective big brother and a sweet
    little sister, fortuitously born in the year of the Dragon, the most auspicious
    sign of the Chinese zodiac. They signed up with a Southern California–based agency,
    Surrogate Alternatives Inc. According to their psychological consult, Bi took
    an SSRI for PTSD spurred by work-related stressors, but hoped to wean off soon.
    SAI quickly matched the couple with a college-educated bank manager in Virginia.
    “She was perfect,” Bi told me. “Tall, healthy, young, good job. I showed her off
    to my friends. The only thing I was concerned with was she’s a single mom, but
    I saw past it.” Rebecca Smith was a former professional athlete who became interested
    in surrogacy after watching a close friend struggle to conceive. (Although Smith’s
    real name is public, I’m using a pseudonym to protect her privacy. She declined
    to be interviewed on the record, citing the confidentiality clause and ongoing
    litigation.) The 34-year-old wanted to help a family who couldn’t carry their
    own child. As she put it in a Facebook post, she wanted to give them “the same
    love I found in becoming a mom.” In her profile photos, the pale, lanky Smith
    mugged in denim jackets and athleisure with her 6-year-old biracial son, whom
    I’ll call Ellis. Smith had previously dated but told her psych evaluator that
    “it doesn’t work when you are a single mom.” She spent her free time coaching
    her son’s sports teams; she ran errands on weekends when Ellis was with his dad,
    who remained a good friend. She was the type of person who preferred cooking at
    home to eating out, who made sure to eat breakfast, lunch, and dinner. Ellis was
    an almost 10-pound baby. The pregnancy had been unremarkable but for the fact,
    perhaps, that her belly hadn’t shown until she was seven months along. Smith signed
    up with SAI, a well-regarded agency founded by a surrogate more than two decades
    earlier. She liked that it offered its GCs numerous safeguards: IPs went through
    thorough vetting, including psychological screening, and all had a medical reason
    for pursuing surrogacy; a detailed contract between the GC and the IPs would dictate
    the terms; a third-party escrow would hold the money and pay Smith; she’d get
    allowances and reimbursements for housekeeping and maternity clothes; if Smith
    had to be hospitalized or miss work, she’d receive payments for lost wages and
    childcare. Also, Smith’s employer-provided insurance would treat the pregnancy
    as if it were her own baby—a major boon. Although directly paying a woman to carry
    your child is technically illegal in Virginia, Smith’s contract specified that
    all payments were “reimbursements.” She planned to use the $45,000 “reimbursement”
    to pay off her student loans and build an emergency fund. Smith met Bi and Valdeiglesias
    in a standard video call facilitated by SAI. In her psychological evaluation,
    Smith seemed smitten with the couple, calling them “amazing.” The therapist wrote,
    “She feels they are ‘100% compatible.’” In the summer of 2023, Smith and Ellis
    flew out to San Francisco for the embryo transfer. Bi put them up in a nice hotel
    for 12 days, close to her apartment, and planned a detailed sightseeing itinerary.
    Smith didn’t even request reimbursement for her lost wages. A doctor implanted
    Bi and Valdeiglesias’ only male embryo inside of Smith. Everyone was elated when
    it stuck. Bi asked Smith for permission to share a photo of the test result on
    Facebook, and Smith quickly agreed, inviting Bi to tag her. Bi and Smith texted
    all the time: Smith shared her happy nausea and impressions of Baby Leon; Bi detailed
    her constant travels and her search for a second GC. Smith tried to recruit her
    own sister for the job, then a coworker. When scary but benign early bleeding
    brought Smith to the ER, Bi sent her a DoorDash gift card. But in the wake of
    the bleeding, Smith found something out. Bi had been posting about Smith’s health
    in Facebook groups, sharing test results and crowdsourcing suggestions for her
    treatment. Bi didn’t refer to Smith by name but included distinctive details that
    allowed members of the tight-knit community to identify her, which violated their
    contract. Smith alerted SAI but didn’t confront Bi, perhaps calculating that it
    was better not to risk tainting their rapport. After all, the surrogacy relationship
    was unlike almost any other. Once you were pregnant, there was no going back.
    A new human had been—had to be—created. In late 2023, a little more than halfway
    through the pregnancy, Bi got a Facebook comment that scared her. She had posted
    about Smith getting a new, better job; the COO of ART Risk Solutions, an insurance
    agency, replied, suggesting that Bi double-check whether Smith’s new policy would
    cover the pregnancy. Outreach like this wasn’t uncommon: The Facebook groups often
    teemed with industry professionals peddling their wares. The ART Risk COO offered
    to look into it. While SAI’s standard process had determined that Smith’s new
    insurance would cover the pregnancy, ART Risk disagreed. Bi was spooked by what
    she saw as SAI’s oversight on a major issue: Pregnancy complications could rack
    up five- or six-figure bills. To Bi, the people she had paid to ensure her only
    son’s healthy birth seemed asleep at the wheel. Since Bi alleged SAI had “made
    a mistake,” she demanded they pay for Smith’s backup insurance policy. When it
    stood by its assessment and refused, Bi was irate. She began posting about SAI,
    sometimes multiple times a day, to warn other IPs. Sometimes she said that Smith
    had told her about the job change, other times she claimed that Smith hadn’t notified
    her. She didn’t want to burden Smith. “It’s not your fault,” she assured Smith,
    trying to protect her from the stress while keeping her in the loop. It seemed
    like they were on the same page. “I just hate that it all happened!” Smith texted
    Bi. “I was so excited thinking the new job was surrogate-friendly.” Bi was sure
    that if Smith had known otherwise, she wouldn’t have taken the job. It wasn’t
    about the money. Smith’s new, subsidized Affordable Care Act plan, at $391 a month,
    was a drop in the bucket compared to the estimated $200,000 Bi had budgeted for
    the pregnancy. Bi told Smith that they would lay low until Leon was born and then
    go after SAI: “I want to show them what justice should look like.” On December
    15, a day on which Bi sent her more than 50 texts about the insurance, Smith felt
    liquid between her legs. She was 26 weeks pregnant and afraid her water had broken.
    The emergency room sent her home,'
