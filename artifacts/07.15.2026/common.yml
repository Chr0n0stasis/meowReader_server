  body_text: '| Next | Section menu | Main menu | Previous | The Man Who Broke Physics
    Even before competing in his first Olympics, 21-year-old Ilia Malinin has transformed
    the sport of figure skating. by Sally Jenkins One of the pleasures of watching
    Ilia Malinin, apart from his indifference to gravity, is to witness him becoming.
    Becoming a world champion, as opposed to a juvenile with a skate-park mentality
    and a face like a Disney prince. Becoming a master of quadruple jumps that no
    one else can land, rising with all the ease of a young Michael Jordan—before landing
    on a pair of butcher knives, on ice. Sometimes there are evolutionary leaps in
    sport, the arrival of athletes so physically dynamic, they widen the eyes with
    incredulity: the gymnast Simone Biles thundering in the air, the swimmer Michael
    Phelps coursing through the water with a wake like an attack boat’s. Malinin is
    one of these. In December, while refining his routine for his first Olympic Games,
    in Milan, the 21-year-old figure skater landed seven quadruple jumps in competition,
    spinning like a weather vane in a windstorm. No other competitor landed more than
    four. In a sport in which medals can be determined by fractions of a point, Malinin
    wins by 30, 40, sometimes even 70 points , and he does so with style, sliding
    on his knees and cartwheeling on one hand to medleys of classical cello mixed
    with Gen Z electronic power bass. His signature is a quadruple axel—a jump that
    only he has ever successfully completed in competition, earning him his self-styled
    nickname, the “Quad God.” Late in his routines, he likes to toss off one more
    maneuver, just to commence the crowd-roar: He high-kicks his skates over his head
    into a backflip, and lands on one foot. Malinin’s confidence would be insolent
    if his acrobatics weren’t so astonishing. “I broke physics,” he told me recently,
    only half-kidding during a conversation in the back hall of a practice rink in
    Leesburg, Virginia. “Now I think physics doesn’t apply to me.” He stood 5 foot
    8 and 140 pounds in shapeless sweats and Nikes, his pale triangle of a face topped
    by flaxen hair. He did not yet have his own car. He was waiting for his dad to
    pick him up. The first quadruple jump of any kind was landed in 1988 by a Canadian
    champion named Kurt Browning, but it was a one-off. Quads wouldn’t be performed
    consistently until about 15 years later, after an American named Timothy Goebel
    became the first man to hit three in a single program, in 1999, and did so again
    to win a bronze in the 2002 Winter Games, earning the nickname “Quad King.” By
    the mid-2000s, doing one or more quads was practically a necessity, because they
    were scored almost twice as high as triples. Quads became part of everyone’s repertoire,
    with five different varieties and degrees of difficulty: the toe loop (worth up
    to 9.5 points), salchow (9.7), loop (10.5), flip (11), and lutz (11.5). But one
    particular quad jump was so demanding that even the most elite champions could
    not perform it: the axel, valued at 12.5 points. To the casual viewer, most jumps
    are indistinguishable from one another, but anyone can detect an axel, because
    it’s the sole jump that requires the skater to take off facing forward, then execute
    a blind backward landing, on the opposite foot. The skater actually rotates four
    and a half times, in less than a second. As of 2021, only one man had even tried
    a quad axel in competition: The 27-year-old Olympic champion Yuzuru Hanyu of Japan
    went for it in his country’s national championships that year, but he under-rotated
    and two-footed his landing. Malinin landed it smoothly in 2022 , when he was 17.
    He was a skinny-chested boy who had just begun competing in major international
    events, and he knew that the entire skating world considered it nearly impossible.
    The word provokes him. “It just screams ‘I’m possible,’ ” he said, as he walked
    through the hall of the practice rink and grabbed a snack of Auntie Anne’s pretzel
    bites. Malinin has a typical 21-year-old’s crush on profundity; his long program,
    titled “A Voice,” opens with his own voice narrating a series of pontifical maxims,
    such as “Begin where light no longer reaches, where no path has yet been made.”
    If he can sound sophomoric, well, he is a sophomore, enrolled at George Mason
    University. But a mature, obsessive work ethic turns his big ideas into big jumps
    and one-of-a-kind routines. “If I find a passion for something, I will really
    get down to just hammering away at it, until I get it,” he said. Once Malinin
    gets it, the next boundary comes into view. One quad axel? Well then, how about
    two in a row? To fully appreciate how revolutionary Malinin is, consider some
    fundamental physics and biomechanics. The gold-medal-determining long program,
    also known as the “free skate,” lasts for four and a half minutes. Roughly 30
    seconds in, Malinin’s heart rate rises to 90 percent of its capacity, about 180
    beats a minute, and stays there for the duration. The effort is comparable to
    that sustained by the world’s fastest milers. Wearing carbon-composite skates
    that weigh about two pounds each, Malinin reaches a vertical leap of approximately
    30 inches on his quad axel— one kinematic study captured it at 33 inches , similar
    to the standing vertical leaps of NBA players such as Stephen Curry, Devin Booker,
    and Kevin Durant. He lands on a blade that is just 3/16 of an inch wide. Malinin
    enters the jump skating at about 15 miles an hour. As he snaps into his shoulder
    turn, he draws his arms and legs inward, creating a spin. At this stage, he experiences
    at least 180 pounds of centripetal force . By way of comparison, a NASCAR driver
    rounding a corner will experience about 400 pounds of centripetal force, while
    wearing a seat belt. As he reaches his apex, Malinin is spinning at 350 revolutions
    per minute. This is about the same as a kitchen stand mixer or the marine engine
    of an oil tanker. A human being turning at such a rate experiences serious disorientation.
    Somehow, Malinin must find a way of “undizzying” himself, as Goebel told me. Skaters
    do this by spotting certain visual markers in the rink, but they don’t always
    succeed in reorienting. Once, after completing one routine, Goebel nearly skated
    into the Zamboni tunnel by mistake. As Malinin comes out of his spin, his backward
    boot strikes the ice with a landing force between five and eight times his body
    weight , or upwards of 700 pounds. In other sports, athletes distribute shocks
    to both feet, in soft shoes or on forgiving surfaces. “He’s going to land on one
    foot,” on a sheet of ice atop concrete, Deborah King, a biomechanics professor
    at Ithaca College, told me. Adding to the stress on his leg, she said, is the
    rotational energy he’ll need to stop so he can glide out of his landing. Still,
    none of this captures the totality of Malinin’s performances. There are spins,
    jumps into spins, jumps out of spins, fast steps, crossovers, rapid changes from
    inside to outside edge. Even a single misstep or break in a leg line will be marked
    down by the judges. “You know, when you kick a soccer ball, you don’t have to
    look perfect,” Malinin said. “You don’t have to point your toe.” Malinin spends
    up to six hours a day on the ice, in morning and afternoon sessions, rehearsing
    his footwork and doing as many as 50 jumps, six days a week. “Your whole body
    dies at the end of the day,” he said. Malinin was merely on the threshold of public
    awareness late last year, as the Olympics approached, but seemed ripe for a “holy
    shit” audience moment. Only in the past few months has he begun to get endorsement
    deals with big companies—Xfinity, Coca-Cola, Google, Honda. “At first it was like,
    Who? ” Sheryl Shade, Malinin’s co-agent, told me as she described her initial
    meetings with potential sponsors, a year and a half ago. But then “he started
    winning everything. It was like, Oh! You mean the Quad God .” The Honda deal will
    finally get Malinin his own wheels and liberate him from the family car. The day
    I met him in November, he was at the Leesburg rink to film a commercial for the
    company. That morning, his father had dropped him off with the understanding that
    he wouldn’t take any unnecessary risks. But as the camera crew darkened the arena,
    Malinin was isolated in a spotlight. Unable to resist, he performed a quadruple
    jump, and then a second one. Then he ordered the camera crew to take up a different
    angle, blazed across the ice, and arched into a backflip, his skates lightly touching
    down with a tch sound. Ilia Malinin does a backflip in practice before the U.S.
    Figure Skating Championships in January. (OK McCausland for The Atlantic ) Afterward,
    he sat with damp hair on a sofa in a back room of the arena. When I asked if what
    he’d just done felt particularly hard, he shrugged and said no. Then he glanced
    up and said, “Don’t tell my dad.” Malinin is the son of two former Olympic skaters,
    Tatiana Malinina and Roman Skorniakov , Russian emigrants who competed for Uzbekistan
    but came to Virginia in 1998. Skating is a “family tradition, family business,
    family ritual, whatever you can name it,” Malinin said. Without the coaching and
    influence of his parents, “I’d be nowhere.” Malinina and Skorniakov seldom comment
    on their son or their methods for coaching him, wary of creating any more pressure
    for him. They declined to be interviewed for this story. Malinina does not attend
    most of her son’s events, because she gets too anxious. “We have a strong connection,
    and as soon as I get nervous, he can feel that,” she said in a rare 2024 joint
    interview with her husband for the International Skating Union. Skorniakov, too,
    gets nervous—the first time he watched his son perform a double lutz, he said,
    “I remember I almost passed out.” But he is better at concealing it, with a stoic
    rink-side presence that his son describes as “chill.” If figure skating is one
    of the most demanding sports in the world, then the hardest version of it is Russian.
    Malinin has never been to Russia, but its traditional skating commandments, heavily
    influenced by ballet, are stamped on him. His maternal grandfather, Valeri Malinin,
    coaches at a small rink in Novosibirsk, and during visits to the States, he had
    an early hand in teaching his grandson. “It is clear that there is only one correct
    technique”—the Russian one, Valeri told the state-owned news channel Russia 24
    in a 2023 interview . Malinina and Skorniakov were born in Siberia and raised
    in the old Soviet sports system. Skaters trained as much off the ice as they did
    on it, and form was everything: Even an incorrect jaw bite could lead to a slight
    bend in the backbone, affecting a jump. A preeminent coach of that era once made
    a skater change his bangs, believing that hair below the eyebrows caused a wilting
    of the spine. Skorniakov and Malinina, out in distant Ural mining country, could
    never quite crack the inner circle of the major training center in Moscow. For
    years there was just one rink in Sverdlovsk, where they trained, and it had to
    be shared by all, including hockey players. Practice time was precious, and bureaucrats
    carefully allocated the hours. After the collapse of the Soviet Union, Skorniakov
    and Malinina’s coach, Igor Ksenofontov, became the national coach for Uzbekistan
    in 1993, and they followed him to Tashkent seeking better resources and opportunities.
    At roughly the same time, small enclaves of Russian-émigré skaters began forming
    in out-of-the-way places in the United States,'
