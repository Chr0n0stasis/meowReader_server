- article_update_date: 04.11.2026
  body_text: '| Next | Section menu | Main menu | Previous | Inside the Dirty, Dystopian
    World of AI Data Centers The race to power AI is already remaking the physical
    world. by Matteo Wong Three Mile Island’s cooling towers have until recently served
    as grave markers for America’s nuclear-power industry. A s we drove through southwest
    Memphis, KeShaun Pearson told me to keep my window down—our destination was best
    tasted, not viewed. Along the way, we passed an abandoned coal plant to our right,
    then an active power plant to our left, equipped with enormous natural-gas turbines.
    Pearson, who directs the nonprofit Memphis Community Against Pollution, was bringing
    me to his hometown’s latest industrial megaproject. Already, the air smelled of
    soot, gasoline, and asphalt. Then I felt a tickle sliding up my nostrils and down
    into my throat, like I was getting a cold. As we approached, I heard the rumble
    of cranes and trucks, and then from behind a patch of trees emerged a forest of
    electrical towers. Finally, I saw it—a white-walled hangar, bigger than a dozen
    football fields, where Elon Musk intends to build a god. This is Colossus: a data
    center that Musk’s artificial-intelligence company, xAI, is using as a training
    ground for Grok, one of the world’s most advanced generative-AI models. Training
    these models takes a staggering amount of energy; if run at full strength for
    a year, Colossus would use as much electricity as 200,000 American homes. When
    fully operational, Musk has written on X, this facility and two other xAI data
    centers nearby will require nearly two gigawatts of power. Annually, those facilities
    could consume roughly twice as much electricity as the city of Seattle. To get
    Colossus up and running fast, xAI built its own power plant, setting up as many
    as 35 natural-gas turbines—railcar-size engines that can be major sources of smog—according
    to imagery obtained by the Southern Environmental Law Center. Pearson coughed
    as we drove by the facility. The scratch in my throat worsened, and I rolled up
    my window. xAI’s rivals are all building similarly large data centers to develop
    their most powerful generative-AI models; a metropolis’s worth of electricity
    will surge through facilities that occupy a few city blocks. These companies have
    primarily made their chatbots “smarter” not by writing niftier code but by making
    them bigger: ramming more data through more powerful computer chips that use more
    electricity. OpenAI has announced plans for facilities requiring more than 30
    gigawatts of power in total—more than the largest recorded demand for all of New
    England. Since ChatGPT’s launch, in November 2022, the capital expenditures of
    Amazon, Microsoft, Meta, and Google have exceeded $600 billion, and much of that
    spending has gone toward data centers—more, even after adjusting for inflation,
    than the government spent to build the entire interstate-highway system. “These
    are the largest single points of consumption of electricity in history,” Jesse
    Jenkins, a climate modeler at Princeton, told me. Even conservative analyses forecast
    that the tech industry will drop the equivalent of roughly 40 Seattles onto America’s
    grid within a decade; aggressive scenarios predict more than 60 in half that time.
    According to Siddharth Singh, an energy-investment analyst at the International
    Energy Agency, by 2030, U.S. data centers will consume more electricity than all
    of the country’s heavy industries—more than the cement, steel, chemical, car,
    and other industrial facilities put together. Roughly half of that demand will
    come from data centers equipped for the particular needs of generative AI—programs,
    such as ChatGPT, that can produce text and images, solve complex math problems,
    and perhaps one day inform scientific discoveries. Colossus, Elon Musk’s data
    center in Memphis, can consume as much electricity over the course of a year as
    200,000 American homes. (Landon Speers for The Atlantic ) To power AI, energy
    and tech companies are turning to fossil fuels, which they regard as more reliable
    and readily available than wind, solar, or nuclear. Asked where the energy for
    data centers should come from, OpenAI CEO Sam Altman has repeatedly said , “Short-term:
    natural gas.” (OpenAI and The Atlantic have a corporate partnership.) A Louisiana
    utility plans to build three natural-gas plants for a Meta data center that, upon
    completion, will be among the largest in this hemisphere. The lifespans of coal
    plants, too, are being extended to power new data centers. And the IEA estimates
    that data-center emissions could more than double by 2030—becoming one of the
    fastest-growing sources of greenhouse gases in the world. The optimist’s case
    is that, by then, advanced nuclear reactors will have obviated many of the new
    fossil-fuel plants, and AI tools will have invented technologies that can solve
    the climate crisis. That may well happen. But today, “the market has converged
    on Add gas now, and then add nuclear later ,” Jenkins said. In other words, if
    natural-gas turbines seem to offer the most expedient path to an AI-enhanced future,
    then clean air may have to wait. A data center is a planet of contradictions:
    heat without motion, shelter without bodies, light without sky. “The lifeblood
    of the internet is essentially flowing through these sites,” Jon Lin, the chief
    business officer at Equinix, one of the world’s largest data-center companies,
    told me in an Equinix facility in Loudoun County, Virginia. Behind Lin, someone
    in a green hoodie fiddled with computer chips shelved in a row of humming, refrigerator-size
    cabinets on the data-center floor. There were no windows, to keep the facility
    secure and to guard against the sun’s heat. As we walked along a corridor of cabinets,
    motion-activated lights illuminated the way. Farther ahead, only faint blue lights
    and blinking computer equipment pierced the darkness. Ever since the first data
    centers were built, in the mid-20th century, their purpose has remained constant
    : pack computer equipment close together to store and send information as efficiently
    as possible. But their scale has grown dramatically. The original data centers
    were simply large rooms housing mainframe computers. With the rise of the internet,
    in the 1990s, backroom computers gave way to entire buildings, such as the one
    Lin and I stood in—facilities that enable us to stream movies, trade stocks, store
    medical records, manage supply chains, and make military decisions. Now the AI
    race is requiring vastly greater computing power, which has led to even bigger
    data centers, ones filled with computer chips that are much hungrier and run much
    hotter. Read: The lifeblood of the AI boom In a traditional data center, the cabinets
    are cooled by industrial fans—as we walked through the Equinix facility, I felt
    a constant breeze on my cheek—and rooftop cooling towers eventually expel the
    heat. The cabinets in a generative-AI data center use dozens of times more electricity.
    Lin showed me a row of AI-specialized cabinets used by Block, the firm that owns
    Square and Cash App, which radiated enough heat to make me break a sweat; to cool
    them, water runs into special metal plates that sit atop the chips inside the
    cabinets. AI data centers are filled with similar equipment, and cooling thousands
    of cabinets can require a lot of water . Public records from the Memphis water
    utility, for instance, show that the address for Colossus used more than 11 million
    gallons in September alone, as much as 150 homes use in an entire year. When a
    data center’s cooling equipment malfunctions, spiraling heat combined with humid
    air has yielded that rarest of meteorological events: indoor rain. Placing servers
    in the same or neighboring buildings allows them to exchange information seamlessly
    and quickly, and Loudoun County has the highest concentration of data centers
    in the world, with 199 already operating and another 30 or so on the way. According
    to one report, 13 percent of global data-center capacity is squeezed into the
    county’s 520 square miles. One particularly dense stretch is called “Data Center
    Alley.” Cabinets of computer chips at a data center in Loudoun County, Virginia
    (Landon Speers for The Atlantic ) Northern Virginia offers a glimpse into what
    the AI rush may bring to the rest of the nation. Loudoun is running out of space,
    but new data-center hubs are popping up in Phoenix, Atlanta, and Dallas. Amazon
    and Meta are building AI data centers in Indiana and Louisiana, respectively,
    that will each require more than two gigawatts of electricity, dozens of times
    more than standard facilities. OpenAI has proposed that the U.S. establish “AI
    Economic Zones”: little Loudouns everywhere. As I drove into Data Center Alley
    with Julie Bolthouse, the director of land use at the Piedmont Environmental Council,
    she explained how to distinguish data centers from warehouses: cooling towers
    on the roof, dozens of backup diesel generators to one side, no windows (or false
    ones, decorative glass panels backed by a wall of concrete). There didn’t seem
    to be any warehouses, though, and I gave up counting data centers within minutes,
    unable to tell where one facility ended and the next one began. Bolthouse helps
    run a coalition aiming to slow data-center development throughout Virginia, but
    in Loudoun, it is too late. So many data centers are under construction just north
    of Dulles International Airport that hills of freshly dug dirt loom over roads
    and orange dust tints the air. Should Musk successfully colonize Mars, the early
    stages of terraforming might look like this. The architect of this labyrinth is
    Buddy Rizer, Loudoun’s longtime executive director of economic development. Rizer
    has courted data centers with regulatory and state tax incentives, and when we
    met in his office, he told me that since 2009, at least one has been under construction
    at any given time. Data centers are typically operated by only a few dozen staff
    members, but building them has produced a steady source of employment. They also
    provide nearly 40 percent of the county’s budget, helping to pay for police, schools,
    and parks for a population that has grown steadily since 2010. Within a 1.5-mile
    radius of us, Rizer said, were 12 substations: small jungles of metal poles and
    wiring that convert high-voltage electricity into a form you’d use to charge your
    iPhone or, in this case, run a data center. All around us were towering utility
    poles strung with high-voltage transmission lines that carry raw electricity from
    power plants to those substations; they hang over Loudoun like a canopy, or a
    cobweb. Follow any one cable far enough, and you’re likely to reach a data center.
    For years to come, the AI race is projected to be the main force driving roughly
    2 percent annual growth in U.S. electricity demand, which has been stagnant for
    nearly two decades. Nationally, this is not a crisis; regionally, it may be. Dominion
    Energy, the major electrical utility in Virginia, predicts growth of 5.5 percent
    each year, with overall electricity demand doubling by 2039. Aaron Ruby, a spokesperson
    for Dominion, told me that the company is preparing to meet that surge, though
    he was frank about the challenge: “We are experiencing the largest growth in power
    demand since the years following World War II.” By the end of the decade, training
    the industry’s most powerful AI model could require as much electricity as millions
    of American homes. In China, hundreds of data centers have been announced since
    2023, and additional facilities are planned for beneath the ocean and in the desert
    . China’s biggest advantage in the AI race is not the talent of its software engineers
    or the quantity of its data centers, but its abundance of energy: In 2024, the
    nation produced nearly as much electricity as the U.S., Europe, and India combined.
    President Trump has declared that the nation is in an “energy emergency,” and
    been vocal about the need to build more power plants for the U.S. to win the AI
    race. A senior executive at OpenAI told me that the U.S. needs to activate every
    resource at its disposal—solar panels, natural-gas turbines, nuclear reactors.
    And Anthropic, OpenAI’s top rival, published a report arguing that the U.S. should
    streamline permitting'
