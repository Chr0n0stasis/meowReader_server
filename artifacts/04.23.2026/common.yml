  body_text: 'The Camps Promising to Turn You—or Your Son—Into an Alpha Male American
    Chronicles The Camps Promising to Turn You—or Your Son—Into an Alpha Male At the
    Men of War Crucible, you bear-crawl through rivers. At Warrior Week, you dig your
    own grave. At the Squire Program, your teen-ager can take part, too. By Charles
    Bethea March 30, 2026 Among the written works credited to Donald Trump is the
    foreword to a book from 2024 called “Alpha Kings.” The book’s author, Nick Adams,
    is a bearded and broad-faced former deputy mayor of a suburb of Sydney, where
    he tried and failed to get rid of the local pigeon population. In the foreword,
    Trump calls Adams, who is now an American citizen and an internet personality,
    “one of my favorite authors,” and praises his commitment to “fighting for the
    qualities that make alpha males so special.” Adams loves the restaurant chain
    Hooters, “ice cold domestic beers,” and belittling women. “Let me explain something
    to you, sweetheart,” one dialogue between Adams and a probably apocryphal woman,
    which he posted on X, begins. “I am an alpha male . . . I lead, you follow. You
    are the supporting cast, I am the main character.” In the book, Adams calls Trump
    a “study in peak alpha masculinity for the ages,” but “Alpha Kings” also has a
    larger agenda: “organizing thousands of alpha males in a way that hasn’t been
    done since Dwight Eisenhower assembled the troops to storm the beaches of Normandy
    in 1944.” His target readers are men between the ages of fifteen and thirty-five
    who, Adams writes, “love America, love sports, have traditionally male interests
    and activities, and are sick of being told that their masculinity is toxic and
    that their generation will and should be led by women.” He offers them “Nick Adams’
    Commandments for Alpha Males,” a list of forty-five (Trump, numerically) short
    dicta, including “Success is a low-maintenance woman, not just a hot one” and
    “Never apologize.” Adams does most of his lecturing on X, where he has more than
    six hundred thousand followers, but he also likes lecterns. In Washington, D.C.,
    he warned one audience of Young Republicans, “It starts with the Fortnite controller
    and boneless chicken wings, and ends in gender pronouns and Communism.” Last year,
    Trump nominated Adams to become the U.S. Ambassador to Malaysia. Trump was no
    doubt trolling the libs with this nomination. But the elevation of so-called alpha
    masculinity has not been incidental during his second term, which was midwifed
    in part by Joe Rogan, Jordan Peterson, and lesser gods of the manosphere. Alpha-ness
    has become the official demeanor of American power. A few months before Charlie
    Kirk was killed, he visited Greenland with Trump, and subsequently said, of the
    President’s imperialist vision for the island, “It makes America dream again—that
    we’re not just this sad, low-testosterone beta male slouching in our chair.” Mark
    Zuckerberg recently reinvented himself as a leather-clad cage fighter, insisting
    that there isn’t enough “masculine energy” in corporate America. Zuck evidently
    can’t grow a beard, but Ezra Klein and Senator Chris Murphy have. There’s also
    the rise in facial plastic surgery for men—Elon Musk and John Mulaney are rumored
    to be among the recipients—seeking stronger chins. Penis implants have, well,
    risen. Trump’s Cabinet displays its alpha plumage, too: Pete Hegseth’s Crusade
    tattoos and “warrior ethos”; Robert F. Kennedy, Jr.,’s bench-pressing videos;
    Sean Duffy’s lumberjacking résumé; the mixed-martial-arts background of Markwayne
    Mullin, Trump’s new Secretary of Homeland Security. Even some of Trump’s female
    Cabinet members are cast this way. Tulsi Gabbard enjoys “Green Beret Tactical
    Challenges.” Linda McMahon, a former C.E.O. of World Wrestling Entertainment,
    is “very comfortable in a guy environment.” Recently, Kash Patel, the F.B.I. director,
    put agents through U.F.C. training, and Trump gave an endorsement of sorts to
    the influencer and boxer Jake Paul for political office, despite the fact that
    he’s not—yet—running for anything. In the past several years, the phrase “alpha
    male” has seeped into the language around us, like the contamination of an underground
    aquifer. By the time former Representative Marjorie Taylor Greene called Will
    Smith’s attack on Chris Rock during the 2022 Oscars an “alpha male response,”
    I was using the term ironically. But there are plenty of American men these days
    who regard alpha masculinity—or “warrior mode,” or “modern knighthood,” or other
    such appellations—not ironically but aspirationally. There are now programs offering
    to help such men achieve these aspirations, or something close. On a hot morning
    last August, I tailed a van speeding through the countryside of central Virginia.
    The vehicle contained nine blindfolded men wearing black, as they had been instructed
    to do. Each had paid three thousand dollars to take part in a three-day program
    called RISE , which stands for Ruthless Integrity and Simple Execution. It offers
    men an opportunity to crawl through mud, carry heavy objects, and, as its website
    puts it, “ CHANGE YOUR STORY & UNF**K YOUR LIFE .” The van’s speakers played a
    high-volume mashup of construction sounds, Jordan Peterson lectures, Marine Corps
    drills, and mumbling voices. “All designed to keep them in the present moment
    and separate them from the life they were coming from,” Brendan King, RISE ’s
    founder, told me. The van’s first stop was a gravel lot off the Blue Ridge Parkway.
    After allowing a porta-potty “leak-out,” King ordered the blindfolded men to march
    down a trail, holding one another’s shoulders, for nearly a mile. Occasionally,
    King’s assistants, a pair of bulky guys with law-enforcement backgrounds, offered
    the stumbling line a corrective shove. Weekend hikers gave the group a wide berth.
    Among the sightless were Justin, a martial-arts instructor from the Seattle area;
    Adam, who owns a lawn-mowing business in Indiana and had lost a baby; Kevin, a
    people-pleasing I.T. salesman from Dallas; and James, an unemployed Army veteran
    living in Phoenix with his second wife. James broke down crying when King asked
    him why he was there. “A lot of reasons,” James stammered. “Blocks and barriers.”
    The men, ranging in age from twenty-nine to sixty-four, carried rucksacks containing
    the few items that they were allowed to bring. Sleeping bags were permitted, but
    not pillows or pads. Eventually, King ordered them to stop and remove their blindfolds.
    The air was now cool and moist. They saw that they were standing at the midpoint
    of a tunnel carved into a mountain. “You see that light at the end of the tunnel?”
    King shouted, his voice echoing. The men squinted. “That’s where you’re headed.
    But you’ve got to go backwards first.” They put their blindfolds back on, turned
    around, and wobbled out of the tunnel. In 1982, Frans de Waal’s book “Chimpanzee
    Politics” helped popularize the term “alpha male.” The book is an account of power
    struggles within a colony of male chimps at a zoo in the Netherlands. De Waal,
    a Dutch primatologist who taught at Emory University and was a director at the
    Yerkes National Primate Research Center, challenged a number of assumptions about
    nonhuman primates. He noticed that the leaders of the chimps he studied were not
    necessarily the strongest or most intimidating but, rather, the ones who excelled
    at coalition-building. They kept the peace impartially, often by protecting underdogs
    when conflicts arose. De Waal called his alphas the “consolers-in-chief.” It’s
    not clear how closely people read the book. In the nineties, Newt Gingrich handed
    out copies to freshman congressmen. “After that, the term ‘alpha male’ became
    very popular,” de Waal explained in a TED talk, a few years before his death.
    He continued, “On the internet, you will find all these business books that tell
    you how to be an alpha male. And what they mean is how to beat up others and beat
    them over the head and let them know that you are boss and ‘Don’t mess with me’
    and so on. And, basically, an alpha male for them is a bully. And I really don’t
    like that.” This was hardly America’s first brush with hypermasculinity. “The
    alpha male keeps returning as a heroic trope,” Michael Kimmel, a former professor
    of sociology at Stony Brook University and the author of “Manhood in America:
    A Cultural History,” told me. At the beginning of the twentieth century, men were
    increasingly working in offices, rather than in factories or on farms. Women joined
    them. “This was an ‘assault’ on masculinity,” Kimmel said. “People were freaked
    out that men were being feminized.” Scientists suggested gendered cures. In the
    eighteen-seventies, the physician Silas Weir Mitchell had begun advocating a “rest
    cure” for nervous women, sending them to bed and encouraging them to “live as
    domestic a life as possible.” Men, meanwhile, were told to act like cowboys, in
    what came to be known as the “West cure.” Theodore Roosevelt was prescribed this
    treatment, and later co-founded the Boone and Crockett Club and championed “rough-and-tumble”
    sports. The Boy Scouts and 4-H Clubs arrived in the early twentieth century, during
    what was later dubbed the golden age of fraternalism. More than a quarter of American
    men joined orders like the Knights of Pythias, and gyms grew in popularity. All
    of this, Kimmel explained, “was meant to help boys get away from female teachers,
    and, of course, Mom.” After a great depression and two world wars, this culture
    began to shift. By the nineteen-fifties, efforts were under way to nurture traumatized
    young men who had served overseas. More public schools were built, and veterans
    took advantage of the G.I. Bill. “We encouraged these men to move with their families
    to the suburbs, where they could have a little lawn and a barbecue,” Kimmel said.
    Another reorientation arrived in the seventies and eighties, in response to gay
    liberation, feminism, and greater workplace equality. In 1990, the poet Robert
    Bly published “Iron John: A Book About Men,” which spent more than a year on the
    Times best-seller list. “The grief in men has been increasing steadily since the
    start of the Industrial Revolution and the grief has reached a depth now that
    cannot be ignored,” Bly wrote. The book spawned the “mythopoetic men’s movement,”
    which sought a return to a “deep masculinity” through all-male wilderness retreats
    and the use of Native American rituals. “Mythopoetic man,” though, wasn’t quite
    as catchy as “alpha male.” Kimmel thinks that George W. Bush’s victory over Al
    Gore, in 2000, stemmed partly from this new dichotomy. “I remember Gore was called
    a beta,” Kimmel told me. “And Bush was alpha-male-ish.” The latter term, Kimmel
    came to believe, “means completely embodying the traditional notions of masculinity—the
    most important of which is being without apology.” In 2022, the social scientist
    Richard Reeves published “Of Boys and Men,” which describes how men are falling
    behind in contemporary society. In the past forty years, men’s wages have decreased
    as a percentage of over-all family income, while broader wealth inequalities and
    job insecurity have grown. Girls now perform better than boys in high school and
    are more likely to enroll in college, setting them up for better careers. Men
    today are five times likelier than they were in the nineties to say that they
    don’t have any close friends. They are also much less likely to receive mental-health
    treatment than women, and four times more likely to die by suicide. “There are
    very good reasons for large numbers of young men to feel anxious, to worry about
    their future, including their relationships with women,” Raewyn Connell, a retired
    sociologist at the University of Sydney who is credited with co-founding the field
    of masculinity studies, told me. “That is perhaps what drives the circulation
