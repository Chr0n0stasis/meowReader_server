  body_text: 'Michel Rolland was the world’s first flying winemaker Obituary | The
    vine whisperer Michel Rolland was the world’s first flying winemaker The controversial
    oenologist died on March 20th, aged 78 April 1st 2026 WINE is a simple product:
    yeast converts the sugar in grape juice into alcohol and carbon dioxide through
    fermentation. People have been making it—or, for much of human history, allowing
    it to be made by stepping back and letting nature and wild yeasts take their course—for
    more than 8,000 years. After the flood, Noah planted a vineyard (and then “drank
    of the wine and became drunk and lay uncovered”). Jesus’s first miracle was turning
    water into wine. Nearly a millennium ago Omar Khayyam, a Persian mathematician,
    astronomer and poet, asserted that “Wilderness would be paradise” with just “a
    jug of wine, a loaf of bread and Thou / Beside me singing”. And yet most of it—probably
    most of the wine ever drunk for most of human history—was probably not very good.
    Nature takes a long time to turn juice into wine; sometimes what it made was delicious,
    but sometimes it was undrinkable, or at best generously called “complex”. Even
    after Louis Pasteur proved that yeasts turned glucose into ethanol, and winemakers
    identified an optimal strain (Saccharomyces cerevisiae), climatic conditions,
    storage, soil quality and a thousand other variables all made the final product
    equally variable. Some consider this part of wine’s romance. It is, after all,
    a living thing, as people are. And like people, it starts out immature and uninteresting,
    but gradually grows into itself. It encompasses countless variations in upbringing,
    care and temperament that produce wildly different results, not all of which are
    to everyone’s taste. People develop their own preferences, in wines just as in
    friends or mates. Michel Rolland had little patience for such starry-eyed babble.
    Wine is an agricultural product made by human hands, and like anything else people
    make, it could be improved. Which is not to say that he scorned the romance and
    lineage of wine—especially French wine. He was, after all, born into a family
    of vintners in Pomerol, on Bordeaux’s right bank. His grandparents founded Château
    Le Bon Pasteur, which still produces velvety, elegant reds, and he spent his school
    holidays riding the tractor and helping with the harvest: “There was no question
    of doing anything else,” he once said. But he left the vineyards first for university,
    where he studied oenology, and then for a laboratory that he joined with his wife
    in Libourne, on the banks of the Dordogne, to chemically analyse wines. This was
    in the mid-1970s, in the midst of a bad stretch for Bordeaux. Poor weather led
    to a series of bad vintages; rumours of adulterated wine had crippled sales; and
    financial pressures left many chateaux strapped for cash. Vintners, by and large,
    made wines the way their parents and grandparents did, relying on intuition and
    tradition. Mr Rolland started consulting for local wineries, advising them on
    how to produce better products based on his observations in the lab. He stressed
    the importance of waiting to pick grapes until they were fully ripe, avoiding
    the lean, thin flavours that once defined Bordeaux, and reminding vintners that
    winemaking starts in the field, not the cellar. Burly and bearded, with a ready
    laugh and a renowned gift for blending grapes, he also started visiting California
    just as Napa and Sonoma valleys were coming into their own, and the newly flush
    baby-boom generation began taking a serious interest in wines. Robert Parker,
    a critic who ranked wines on a 100-point scale and who, like Mr Rolland, became
    equally renowned and reviled, began his career at around the same time (the two
    were born just months apart), and the confluence of their tastes changed the wine
    industry. They both liked ripe, plush and fruit-forward red, high in alcohol and
    low in acidity, with heavy notes of sweetness and roundness from new oak barrels
    used for ageing. Mr Parker rated such wines favourably, which boosted sales, and
    Mr Rolland helped vintners produce them. Mr Rolland, who consulted for vintners
    as far afield as India, South Africa and Israel, insisted that he did not impose
    a style; he simply helped ambitious vintners understand what their terroir could
    produce. His critics did not let him off so easily. “Mondovino”, a muckraking
    documentary about wine and globalisation released in 2004, showed him being chauffeured,
    barking into a mobile phone (before they were ubiquitous) and calling himself
    winkingly, in English, a “flying winemaker”. Small-scale winemakers talked reverently
    about (and sometimes to) their vines, and discussed the wines they produce as
    a religious experience and a communion with their earth and climate, and deriding
    contemporary Bordeaux because it “worships only money”. Mr Rolland, meanwhile,
    derided the “peasants, bumpkins [and] hicks” standing in the way of progress.
    He told a chateau owner to “micro-oxygenate” her wines. Asked if she understands
    what micro-oxygenation means, Mr Rolland answered: “No, but she doesn’t give a
    damn. If she understood everything she wouldn’t need me. If I say micro-oxygenate,
    she micro-oxygenates. If it doesn’t work, she fires me.” Mr Rolland said the film
    was good for business. After all, it showed him as he was: decisive and thoughtful,
    with a ready laugh, and above all, successful. Vintners took his advice because
    it worked. People liked, and bought, the wines he helped create. Nostalgia was
    a mug’s game: in a late-career interview with the New York Times, he recalled
    that when he first started going to Napa, you could taste all the good wine produced
    in the county “in an hour”. Now, he “couldn’t taste all the good wines in a week”.
    Some may complain that too many wines taste too similar, but if that’s what the
    market wants, that is what vintners will make. “Wine is done for what? The public!
    Wine is a business. They want to make wine to sell wine.” ■ This article was downloaded
    by zlibrary from https://www.economist.com//obituary/2026/04/01/michel-rolland-was-the-worlds-first-flying-winemaker'
