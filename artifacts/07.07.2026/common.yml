    analysis of MetaGen and RFdiffusion designs. Supplementary Figs. 7-9. OPS-RD assay
    development and optimization. Supplementary Figs. 10-15. Discovery, optimization,
    and characterization of MRGPRX1 binders. Supplementary Figs. 16-19. NK1R binder
    screening and pharmacological characterization. Supplementary Figs. 20-21. Cryo-EM
    structures of MRGPRX1-miniprotein complexes. Supplementary Figs. 22-25. CXCR4
    binder screening and characterization. Supplementary Figs. 26-30. CCR5 binder
    screening and pharmacological characterization. Supplementary Figs. 31-32. OXTR
    binder identification and pharmacological characterization. Supplementary Figs.
    33-39. Structural and functional characterization of CXCR4 maxibinder dCX1_001.
    Supplementary Figs. 40-47. Yeast display, biophysical and pharmacological characterization
    of GLP1R, GIPR, and GCGR binders. Supplementary Figs. 48-49. OPS-RD-based PTH1R
    binder identification and functional screening. Supplementary Figs. 50-60. CGRPR
    miniprotein in vitro and in vivo characterization. Supplementary Figs. 61-65.
    Structural analysis of CGRPR-miniprotein complexes and receptor mutagenesis. Supplementary
    Figs. 66-69. Computational analysis of design methods, in vivo studies of dCX1_001
    and surface analysis of chemokine receptors. Supplementary Table 1. OPS-RD assay
    performance parameters across GFP-tagged GPCRs. Supplementary Tables 2-3. Yeast
    display and OPS-RD binding data of PAC1R binders. Supplementary Tabes 4-5. Pharmacological
    data of MRGPRX1 and NK1R binders. Supplementary Table 6. Contact list between
    MRGPRX1 and adducts at distance of < 5 Å. Supplementary Tables 7-8. Pharmacological
    data of CXCR4, CCR5, OXTR, GIPR and PTH1R binders. Supplementary Table 9. Binding
    data of PTH1R binders. Supplementary Tables 10-11. Pharmacological data of CGRPR
    binders and sequences of functional GPCR binders extensively characterized in
    pharmacological assays.
