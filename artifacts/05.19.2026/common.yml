  body_text: Algeria's first communications satellite is launched on Monday. JU ZHENHUA/XINHUA
    A Chinese-made communications satellite became the first "export" of such a spacecraft
    to an Arab country when it was launched by China on Monday for Algeria. A Long
    March 3B carrier rocket blasted off at the Xichang Satellite Launch Center in
    the southwestern province of Sichuan at 12:40 am. It soared for about 26 minutes
    before placing the Alcomsat-1, the Algeria's first communications satellite, into
    geostationary transfer orbit, according to a news release from China Great Wall
    Industry Corp, the project contractor. President Xi Jinping and his Algerian counterpart
    Abdelaziz Bouteflika exchanged congratulatory messages on Monday morning on the
    successful mission. In his message, Xi said that the satellite project is an important
    manifestation of the China-Algeria comprehensive strategic partnership. It has
    become a good example of space cooperation between China and Arab countries and
    will play a significant role in promoting Algeria's economic and social development,
    he said. Xi said that Beijing is willing to work with Algeria to strengthen exchanges
    and cooperation in various fields, deepening the bilateral partnership so as to
    benefit the two countries and peoples. Bouteflika said that Alcomsat-1 is a remarkable
    achievement in space cooperation between the two countries and reflects the deep
    traditional friendship between the two sides. Algeria is willing to work with
    China to strengthen cooperation, he said. The satellite contract was signed in
    December 2013 between the Algerian Space Agency and China Great Wall Industry
    Corp, the country's largest space contractor in the international market. Alcomsat-1
    was designed and manufactured by the China Academy of Space Technology, part of
    China Aerospace Science and Technology Corp, based on the DFH-4 satellite platform.
    With a liftoff weight of 5.2 metric tons and a designed life of 15 years, the
    satellite will be used for a wide variety of public services such as television
    broadcasting, emergency communications, remote education and satellite-based signal
    augmentation, according to Great Wall Industry. Fu Zhiheng, vice-president of
    the company, said Alcomsat-1 is as good as Western communications satellites in
    terms of technology and capacity. He said there are other contracts between his
    firm and Arab countries, without elaborating. zhaolei@chinadaily.com.cn
  difficulty_constant: 6.8
  question_type: Reading Comprehension
  questions:
  - answer: B
    explanation: 文章第一段明确指出：A Chinese-made communications satellite became the first
      'export' of such a spacecraft to an Arab country，因此选项B符合文意。
    options:
      A: It marks the first time a Chinese satellite has been launched from the Xichang
        Satellite Launch Center.
      B: It represents the inaugural export of a Chinese communications satellite
        to an Arab nation.
      C: It is the first collaborative space mission between China and African countries.
      D: It signals the completion of the comprehensive strategic partnership between
        China and Algeria.
    q_number: 1
    stem: What is the significance of the launch of Alcomsat-1 as mentioned in the
      text?
  - answer: C
    explanation: 文章提到习近平主席的讲话：will play a significant role in promoting Algeria's
      economic and social development，直接对应选项C。
    options:
      A: It will establish a permanent space research center in Algeria.
      B: It will facilitate Algeria's entry into the international space market.
      C: It will contribute significantly to Algeria's social and economic advancement.
      D: It will replace Algeria's existing terrestrial communication infrastructure.
    q_number: 2
    stem: According to President Xi Jinping, how will the Alcomsat-1 project impact
      Algeria?
  - answer: B
    explanation: 文章提到：With a liftoff weight of 5.2 metric tons and a designed life
      of 15 years，因此B项正确。A项错误，设计制造者是China Academy of Space Technology。
    options:
      A: It was developed and built by the China Great Wall Industry Corp.
      B: It is expected to remain operational for approximately 15 years.
      C: It is heavier than most satellites based on the DFH-4 platform.
      D: Its primary purpose is to support military communications in the region.
    q_number: 3
    stem: Which of the following is true about the Alcomsat-1 satellite?
  - answer: A
    explanation: Fu Zhiheng的话：Alcomsat-1 is as good as Western communications satellites
      in terms of technology and capacity，意为在技术和能力上与西方卫星相当。
    options:
      A: It matches them in both technical capability and overall performance.
      B: It is superior in technology but inferior in terms of capacity.
      C: It is less expensive than Western models but offers similar durability.
      D: It represents an experimental design compared to the established Western
        ones.
    q_number: 4
    stem: What does Fu Zhiheng imply when comparing Alcomsat-1 to Western communications
      satellites?
  - answer: B
    explanation: 文中提到：He said there are other contracts between his firm and Arab
      countries，暗示中国与其公司与阿拉伯国家还有其他合同，故推断出B项。
    options:
      A: China intends to dominate the Arab space technology market.
      B: China has secured further space-related agreements with other Arab nations.
      C: The Algerian Space Agency is planning to launch more satellites with China
        soon.
      D: Western firms are likely to protest the increasing presence of Chinese satellites
        in the region.
    q_number: 5
    stem: What can be inferred from the final paragraph of the text?
  source_journal: China Daily
  title: Satellite lofted for first Arab country
