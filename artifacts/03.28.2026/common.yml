    stem: The author suggests that the Chinese government's biggest potential contribution
      to AI lies in ________.
  - answer: B
    explanation: 文章标题“drives and constrains”（驱动与制约）精准概括了全文主旨，即政府既通过资本和政策推动AI发展，又因担忧失业、安全及体制惯性而对新技术实施约束。
    options:
      A: China's AI progress is entirely hollow and reliant on Western open-source
        models.
      B: The government acts as both an engine for innovation and a regulator of disruption.
      C: The focus on state-owned enterprises ensures a stable and sustainable AI
        ecosystem.
      D: China will inevitably surpass America because of its centralized control
