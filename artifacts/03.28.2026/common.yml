  body_text: 'Materials The individuals in the study were selected from five imaging
    datasets: the BCP49, the development, young-adult and ageing cohorts of the Human
    Connectome Project (HCP-D, HCP-YA and HCP-A, respectively)50 and the Healthy Brain
    Network (HBN) dataset51. Individuals in the BCP ranged from 16 days to 6 years
    old, with 557 individuals scanned at 1,095 unique time points before gradient-based
    quality control. We initially used 652 individuals (age 5.6–21.9 years) from HCP-D,
    1,206 individuals (age 22–37 years) from HCP-YA, 725 individuals (age 36–100 years)
    from HCP-A and 772 individuals from the HBN (age 5.6–21.9 years). Across all five
    cohorts, our dataset included 3,912 individuals. Ethics All data were obtained
    from publicly available studies (BCP, HCP-D, HCP-YA, HCP-A and HBN). Each contributing
    study received ethics approval from its local institutional review board and obtained
    informed consent (and assent where appropriate). The present work analysed de-identified
    data and complied with all relevant data use agreements. Quality control We excluded
    infant data with excessive motion, cutting the BCP dataset from 557 individuals
    with 1,095 time points to 343 individuals with 760 time points. For the entire
    lifespan dataset, we used visual and clustering-based gradient quality control,
    excluding problematic gradients from the main analysis. Using this procedure,
    we excluded one additional data point from the BCP for a total of 759 time points
    and 343 individuals (158 male individuals, 176 female individuals and 9 unreported).
    We excluded 2 sets of gradients from the HCP-D for a total of 650 individuals
    (301 male individuals and 349 female individuals). We excluded 2 individuals from
    the HBN dataset for a total of 770 individuals (458 male individuals, 275 female
    individuals and 37 unreported). Preprocessing-related failures (for example, unsuccessful
    surface reconstruction or unusable resting-state fMRI data) led to the exclusion
    of 88 HCP-YA participants. Visual inspection and k-means clustering of Procrustes-aligned
    gradients identified an additional 50 corrupted gradient sets, yielding a final
    HCP-YA sample of 1,068 participants (482 male and 586 female). We excluded no
    data from the HCP-A (725 individuals; 319 male and 406 female). These decisions
    were justified by examining individual gradients as well as their associated metrics
    (dispersion, range and similarity to template) in combination with k-means clustering
    applied to the set of all individual gradients. In total, our final analysis included
    3,972 unique gradient sets from 3,556 individuals. Supplementary Fig. 3 shows
    the distribution of participants’ ages by cohort after quality control. Cohort-wise
    median mean Power’s frame-wise displacement (FD) after quality control is shown
    in Supplementary Table 3. fMRI preprocessing We used an rs-fMRI preprocessing
    pipeline that is consistent with the HCP52. The preprocessing pipeline includes
    (1) head motion correction using FMRIB Software Library (FSL) mcflirt; (2) echo-planar
    imaging (EPI) distortion correction using FSL topup to generate distortion correction
    deformation fields using a pair of reverse phase-encoded field maps (that is,
    anterior–posterior and posterior–anterior or left–right and right–left); (3) rigid
    (six degrees of freedom) registration of a single-band reference (SBref) image
    to field maps; (4) rigid boundary-based registration (BBR) of distortion correcting
    the SBref image to the corresponding T1-weighted (T1w) images, with pre-alignment
    using a mutual information cost function; and (5) one-step sampling using combined
    deformation fields and translation matrices, producing motion- and distortion-corrected
    fMRI data in each individual’s native space (T1w space). We denoised the fMRI
    data before further analysis. First, we detrended the data by high-pass filtering
    with a cut-off frequency of 0.001 Hz to remove slow signal drift. Next, we used
    independent component analysis based automatic removal of motion artefacts (ICA-AROMA)
    denoising53 to remove any residual motion artefacts. This involved performing
    a 150-component ICA on the fMRI data and classifying each component as either
    BOLD signal or artefact on the basis of high-frequency contents, correlation with
    realignment parameters from head motion correction, edge effects and cerebrospinal
    fluid fractions. Independent components classified as artefacts are (aggressively)
    removed by regression. Structural and diffusion preprocessing Structural data
    underwent automated quality assessment54,55, inhomogeneity correction and linear
    transformation of T2w images to the respective T1w images. We then delineated
    white matter, grey matter and the cerebrospinal fluid with automated segmentation
    (Supplementary Figs. 14 and 15). Usable diffusion data selected using a deep-learning-based
    semi-automated QC56 were corrected for signal drop-out, pile-up and eddy-current
    and susceptibility-induced distortions57. Co-registration between diffusion MRI
    (dMRI) and structural MRI (sMRI) using multi-channel nonlinear registration was
    performed with the symmetric normalization method available in Advanced Normalization
    Tools (ANTs)58. Finally, manual visual inspections were done to ensure quality.
    To establish a consistent coordinate system across the entire lifespan, we used
    in-house lifespan surface atlases extended from a previous study59. The reconstructed
    cortical surfaces of each individual were first registered to age-matched cortical
    surface atlases for vertex-wise correspondence among all the surfaces across the
    lifespan (Supplementary Fig. 14). Cortical surfaces were mapped onto a unit sphere
    and Spherical Demons60 was used to perform registration between the spherical
    surfaces of the individuals and the age-matched surface atlases. The vertex-wise
    correspondence established as a result of spherical registration was then propagated
    to the white and pial surfaces using one-to-one correspondence between the spherical
    and standard representations of the white and pial surfaces. Cortical surfaces
    used in the analysis comprised 20,484 vertices including the medial wall and 18,644
    vertices excluding the medial wall. Structural and diffusion indices were computed
    in the same manner for all cohorts. Specifically, cortical thickness is defined
    as the Euclidean distance between two correspondent vertices on the white and
    pial surfaces and myelination is quantified using the ratio between T1w and T2w
    images41. Spherical mean spectrum imaging (SMSI)61,62 was used to calculate intracellular
    volume fraction, extracellular volume fraction, intrasoma volume fraction, microscopic
    fractional anisotropy, microscopic mean diffusivity, microscopic anisotropy index
    and orientation coherence index. The diffusion tensor model was used to calculate
    fractional anisotropy and mean diffusivity. Functional gradients FC matrices were
    computed from the vertex-wise fMRI time series for each acquisition from each
    individual using the pairwise Pearson correlation coefficient. For individuals
    with repeated scans (BCP participants), acquisitions were grouped by time point,
    and we averaged FC matrices within each time point. We then subjected each mean
    FC matrix to row-wise thresholding (top 10% of connections retained), and computed
    the normalized angle matrix, in keeping with previous gradient literature1,14,63,64.
    Mean FC degree was computed for each individual as the average across vertices
    of the sum FC weights in the individual’s thresholded mean FC matrix. We computed
    ten FC gradients for each individual using the diffusion embedding implementation
    in BrainSpace64, with the normalized angle matrix as the input affinity matrix.
    To align individual-specific gradient axes consistently across the lifespan, we
    computed a set of ‘template gradients’ through weighted principal component analysis
    (WPCA) of all individuals’ gradients. We began by applying a controlled nonlinear
    transformation to each individual’s age, taking the square root of age to capture
    rapid changes in early life. The transformed ages were partitioned into ten equally
    spaced bins on the transformed scale and then mapped back to the original age
    units, yielding narrower bins (and thus finer sampling) for younger individuals.
    Each bin was assigned an equal total weight, and that weight was uniformly distributed
    among the individuals within the bin. After normalizing these weights to sum to
    1 across all individuals, we constructed a single matrix of dimension (N ind ×
    N grad ) × N vert by stacking each individual’s set of gradient maps (that is,
    N grad per individual). We then standardized each vertex column (z-scoring across
    all individual–gradient observations) before performing WPCA. In WPCA, each row
    (representing one individual–gradient combination) was assigned its individual-specific
    weight, ensuring that less densely sampled or younger age bins had a comparable
    overall influence relative to bins with many individuals. We extracted the top
    principal axes of variation (the first ten), and used the first three for subsequent
    analyses. This weighting strategy mitigates sampling imbalances and preserves
    important developmental transitions, ensuring that the template gradients capture
    large-scale connectivity variation equitably across the entire lifespan. For details
    of the validation analysis of our WPCA strategy for reducing age-related sampling
    bias in our gradient template, see ‘Bootstrap validation of WPCA gradient template’
    in Supplementary Methods (Supplementary Fig. 12). We aligned the gradient sets
    of all individuals to this template embedding space using one-shot Procrustes
    alignment64 without scaling or mean centring, after which gradients of the same
    order were correspondent across all individuals. Structural gradients and coupling
    We also computed cortical gradients based on microstructural features to assess
    structure–function coupling across the lifespan by applying diffusion embedding
    to morphometric similarity networks (MSNs)65. Our structural features included
    11 measures: cortical thickness, myelination, intracellular volume fraction, extracellular
    volume fraction, intrasoma volume fraction, fractional anisotropy, mean diffusivity,
    microscopic fractional anisotropy, microscopic mean diffusivity, microscopic anisotropy
    index and orientation coherence index. For each individual, we constructed feature
    vectors containing these features at each cortical surface vertex, and computed
    a structural affinity matrix using pairwise Pearson correlation between vectors
    of z-scored structural features. After setting negative correlations to zero,
    we then used this affinity matrix as input to the diffusion map embedding algorithm
    to obtain structural gradients. To compare structural and functional gradients
    across the lifespan, we aligned each individual’s structural gradients to that
    individual’s functional gradients, which were previously aligned to the functional
    template gradients comprising the SA, VS and MR axes. All subsequent comparisons
    between structural and functional gradients were based on these aligned structural
    gradients. We further assessed structure–function coupling within canonical resting-state
    networks defined by the Schaefer 7-network parcellation. For each network and
    axis, we quantified coupling as the cosine similarity between the individual’s
    aligned functional-gradient values and the corresponding aligned structural-gradient
    values across vertices belonging to that network, and modelled age effects using
    GAMMs (Supplementary Fig. 10a). To characterize network-level shifts in the structural
    gradients themselves, we computed the within-network centroid (mean) of the aligned
    structural-gradient values for each axis and fitted GAMMs to these trajectories
    versus age (Supplementary Fig. 10b). To examine how cortical microstructure relates
    to the principal functional hierarchy, we quantified individual-level coupling
    between the SA axis and multiple microstructural indices. For each individual,
    vertex-wise microstructural maps were correlated with that individual’s SA axis
    values using Pearson correlation across cortical vertices, excluding the medial
    wall. This yielded one SA–metric coupling score per individual and metric. Developmental
    trajectories of SA–metric coupling were then modelled as a function of age using
    GAMMs with a random intercept for cohort, as described below. Gradient measures
    To fully characterize how gradient architecture evolves throughout the human lifespan,
    we use and define a number of quantitative measures of their properties. The Euclidean
    distance between vertices in a diffusion embedding approximates the geodesic distance
    in the underlying graph from which it was computed. Thus, the Euclidean distance
    between vertices in our gradient embedding space approximates connectivity differentiation
    between those vertices. To measure the global degree of FC differentiation in
    an individual’s FC diffusion embedding, we define gradient dispersion as the mean
    Euclidean distance between the embedding coordinate of all vertices and the centroid
    of the embedding. For a diffusion embedding with embedding coordinates ξ i = (x
    i , y i , z i ) for each vertex i, where x, y and z refer to the SA, VS and MR
    gradient values, respectively, we define dispersion among N vert vertices as \({\sum
    }_{i=1}^{{N}_{\mathrm{vert}}})\parallel {\xi }_{i}-\bar{\xi }{)\parallel }_{2}/{N}_{\mathrm{vert}}\).
    Within-network dispersion was computed analogously for constituent vertices of
    each of the seven resting-state networks (RSNs)40. To characterize the degree
    of FC differentiation along each gradient axis individually, we compute gradient
    range. We compute gradient range for each individual and each gradient using the
    inter-vigintile range (5th percentile to 95th percentile). By using robust statistical
    measures, we reduce the influence of noise in FC gradients on these global estimates.
    Gradient range quantifies the degree to which FC is differentiated along a particular
    gradient axis. Notably, gradient range is highly correlated with gradient variance
    (median absolute deviation of gradient value) across individuals (ρ = 0.91, 0.86,
    0.89 for the SA, VS and MR axes, respectively), indicating consistent range in
    the diffusion embedding axes before scaling by eigenvalue. The topographic alignment
