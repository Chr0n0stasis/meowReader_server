  body_text: 'China’s government both drives and constrains the rise of AI China |
    Chaguan China’s government both drives and constrains the rise of AI Officials
    want to lead the world in the new technology, but are still wary of disruption
    March 26th 2026 It can seem as if artificial intelligence is suddenly everywhere
    in China. From banking to shopping and maps to ride-hailing, almost all major
    Chinese mobile apps now offer ai chatbots. Universities are creating courses in
    ai. To shop for a toilet seat is to learn of ai-enhanced options that monitor
    urine quality. To order yogurt from an upscale chain involves scanning your face
    so that its ai model can tailor its fermented product to your needs. Of course,
    ai is not actually everywhere. But this being China, a country that loves presenting
    positive data, the government will tell you exactly how far it has got: by 2025,
    42.8% of the country had “adopted” generative ai, double the share a year earlier.
    At this rate China will hit its target of a 90% ai “penetration rate” by 2030.
    Never mind the precise meanings of adoption or penetration. The questionable statistic
    itself is a small emblem of China’s ai story: the state’s hands-on role in pushing
    the technology. Ever since China’s “ DeepSeek moment ” last year, when an unknown
    startup shocked the world by exhibiting advanced capabilities at a fraction of
    the cost of Western competitors, attention has focused on the race to build the
    best ai models. But the more important question may be which country is better
    at applying ai, not just developing it. China has several things in its favour:
    open-source models that are cheap and customisable; a manufacturing base with
    a head start in weaving ai into physical products; and a deep pool of researchers
    working on the technology. Ultimately, though, the factor that most differentiates
    China from America is its strong state. Much as DeepSeek alerted the world to
    China’s prowess, China had experienced its own awakening in 2017 when Google DeepMind’s
    AlphaGo beat a leading Go master at the board game. A few months later China published
    its first national ai-development plan. It is now moving from research to application.
    Last year the government launched an “ai Plus” initiative to promote it in sectors
    from health care to energy. Of China’s 700bn yuan ($100bn) of capital spending
    on ai last year, estimates suggest the government accounted for about 60%. But
    the state’s leading role is not an unambiguous advantage. As soon as the government
    creates targets, there is a showy element. Officials seek to vaunt their achievements.
    Chaguan recently visited Yizhuang, a tech hub in Beijing developing “embodied
    ai”—integrating ai into robots. An industrial park features a restaurant with
    automated waiters and robot performances. At one point a small robo-triceratops
    glided along the floor, coyly sidling up to patrons. All very impressive, until
    Chaguan spotted the man operating the creature with a video-game controller behind
    his back. Another staff member sheepishly admitted there were no robots in the
    kitchen. “They still can’t cook well,” he said. These rough edges are a reality
    check about China’s deployment of embodied ai. The best-known examples are the
    humanoid robots that performed kung fu during the lunar-new-year gala on television,
    wowing hundreds of millions of viewers. But getting robots to perform a set routine,
    however elaborate, is not the same as getting them to move around unpredictable
    environments on their own. An executive with a big Chinese tech firm says that,
    at their core, the robots are finicky devices which are liable to overheat and
    wear down. China’s infamous “996” working culture—9am to 9pm, six days a week—might
    overwhelm them. Though the government has embraced ai, it remains conservative
    in some areas—reassuringly so for those who fret about the technology. In recent
    weeks a mini-craze swept China as thousands installed OpenClaw, an ai assistant,
    on their laptops. Unlike ai software that requires prompts, OpenClaw runs autonomously,
    handling tasks such as replying to emails. But officials swiftly restricted its
    use in state-owned firms and government work, fearful that it could expose sensitive
    information—a conclusion that some large Western firms have also reached. Chinese
    officials are worried, too, about jobs. When the government launched its ai Plus
    initiative it specified that it wanted to steer resources to where labour is scarce
    and working conditions hazardous. In a meeting with tech executives a senior leader
    had reacted with alarm to suggestions that ai might lead to mass layoffs, according
    to someone briefed on the interaction. His message was to avoid disruption in
    the labour market. In another way China’s strong state may also impede ai’s spread.
    A fifth of the country’s workforce is employed in the public sector and state-owned
    enterprises, which are notoriously slow to adopt new digital technologies. Again,
    hitting mandated targets can overwhelm the business aim of seeking profits. Following
    the release of the DeepSeek model, state firms and government agencies were instructed
    to harness its power. Jeffrey Ding of George Washington University says that many
    opted for an easy solution: they installed stand-alone machines, separate from
    their operations. “People used it for a quick pr win. It wasn’t sustainable integration,”
    he says. Indeed, the bigger contribution of the state may be in less glamorous
    policies, not in unleashing humanoids on the world. On March 13th the Communist
    Party announced its latest five-year plan, making ai the centrepiece. The plan
    calls for building high-quality datasets for sectors such as transport and health
    care. That is a “big deal”, says Kendra Schaefer of Trivium China, a consultancy,
    because the Chinese state sits on a huge reservoir of data. Granting access to
    domestic ai firms could give them an edge over foreign competitors. Yet that is
    a far cry from a country going full-bore on ai in all directions at once. Like
    most of the world, China believes that its future is bound to ai. But the state’s
    caution may matter as much as its enthusiasm. ■ Subscribers to The Economist can
    sign up to our Opinion newsletter , which brings together the best of our leaders,
    columns, guest essays and reader correspondence. This article was downloaded by
    zlibrary from https://www.economist.com//china/2026/03/24/chinas-government-both-drives-and-constrains-the-rise-of-ai'
