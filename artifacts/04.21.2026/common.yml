  questions:
  - answer: B
    explanation: The text states the apartment was for the commander, and Maxim notes
      that the commander 'did not spend a kopek,' using soldiers' money and labour
      to construct it. This illustrates the officer's exploitation of subordinates
      for personal enrichment.
    options:
      A: provide a safe space for soldiers to conduct training exercises.
      B: demonstrate his status and maintain a high standard of living using coerced
        funds.
      C: offer a luxury retreat for deserters seeking temporary shelter.
      D: establish a secure command center for planning infantry assaults.
    q_number: 1
    stem: 'According to the passage, the primary reason the commander in the Luhansk
      region built an elaborate underground apartment is to:'
  - answer: C
    explanation: The context throughout the article demonstrates that everything—from
      medical leave to avoiding the 'meat grinder'—is commodified. The 'marketplace'
      metaphor highlights how corruption has turned survival into something one must
      buy from corrupt officers.
    options:
      A: There is a diverse range of high-quality equipment available for purchase.
      B: Soldiers are encouraged to engage in private trade to boost morale.
      C: Extortion and corruption have reduced human survival and basic rights to
        transactional exchanges.
      D: The economy in the occupied territories has become more stable due to military
        regulation.
    q_number: 2
    stem: What does the author imply by describing the Russian front lines as a 'marketplace'?
  - answer: C
    explanation: The text explicitly states that officers view soldiers 'not just
      as grunts but as a source of enrichment' and describes them as 'cannon fodder'
      or 'free labour,' which supports the conclusion of exploitation.
    options:
      A: A symbiotic alliance where both parties benefit from nationalistic fervor.
