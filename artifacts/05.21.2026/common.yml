  body_text: For the love of sticky toffee pudding Britain | Sweet somethings For
    the love of sticky toffee pudding Thanks to nostalgia and novel iterations, a
    British favourite is in vogue April 1st 2026 FOR MANY Britons, sticky toffee pudding
    conjures up memories of school dinners. Grown men treat its discovery on menus
    with childlike excitement. STP consists of a date cake doused in butterscotch
    sauce, served with cream, custard, ice-cream or all of the above. Now the familiar
    classic is having a moment thanks to attempts to make it cool. Quirky reviews
    by “STP Guy”, a TikTok creator in England, have stirred up interest around the
    world. Since February—when he posted his first video—millions have viewed his
    dry commentary on sauce-to-pudding ratios, density and fancy additions (pecans
    and blueberries are not on). Like other British favourites, from tea to chicken
    tikka masala, STP is a mix of non-British influences. And like many beloved desserts,
    its origins are contested. By one account, its history begins with a recipe brought
    by Canadian servicemen during the second world war. Demerara sugar from the Americas
    gives the cake its lush brown colour; its eponymous stickiness comes from dates,
    probably first from the Middle East. Francis Coulson, a chef with a country-house
    hotel in the Lake District, adapted it for his menu in the 1970s, and is credited
    with its invention. A nearby hotel in Cartmel claims that it popularised the pud.
    By the 1990s it had become a pub staple, with devoted fans around the world. Inevitably,
    people have started to experiment with the old classic. An Australian cookbook
    writer suggests adding miso to the original toffee sauce for an umami edge. One
    New York chef adds a cocoa feuilletine crumble for crunch, another tops it with
    a green-apple sorbet. A Michelin-recommended spot in Manhattan makes a sticky
    toffee rice pudding with beans; another in California shaves persimmons into the
    mix. Foodies extol breakfast servings of STP overnight oats. STP Guy decries this
    “Wild West of sticky-toffee-pudding nomenclature”. STP-flavoured Easter eggs are
    on the shelf at Tesco, Britain’s biggest supermarket, and some loon in London
    markets STP-flavoured pizza. Health-minded types point out the pudding’s high
    calorie count (easily 600-800 calories with custard). Jamie Oliver, a British
    chef, suggests serving it with yogurt. Gym bros replace double cream with almond
    milk or add protein powder. Coulson rolls in his grave; STP Guy rolls his eyes.
    His highest-rated version comes from Hawksmoor, a British steakhouse chain. But
    beyond being rich, moist and having the perfect levels of sauce, what makes it
    the “Rolls-Royce of STPs” is not just how it tastes, he says, “but how it makes
    you feel”. ■ For more expert analysis of the biggest stories in Britain, sign
    up to Blighty, our weekly subscriber-only newsletter. This article was downloaded
    by zlibrary from https://www.economist.com//britain/2026/03/31/for-the-love-of-sticky-toffee-pudding
