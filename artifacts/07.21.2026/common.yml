    and neglects nationalist concerns. At the conference, Karp, dressed in a white
    T-shirt and jeans, began his opening remarks by saying, “We’ve been at odds with
    Silicon Valley on and off since our inception 20 years ago.” In 2020, Karp moved
    the company headquarters from Palo Alto to Denver, whereupon it became that state’s
    wealthiest corporation. Some see Karp as a dystopic supervillain. He responds
