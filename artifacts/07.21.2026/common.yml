    People are teaching pagan religion views—a new religion with sacrifices. Who’s
    the sacrifice? Me, I’m the sacrifice. You don’t seem constrained to me. You’re
    doing great. I’m not complaining. We’re not victims at Palantir. We’re doing very
    well. We might even do better. In your book you offer a harsh critique that tech
    companies are not sufficiently patriotic. In the beginning, we were at odds with
    Silicon Valley because we were pro-American, pro-West, and pro-making the government
