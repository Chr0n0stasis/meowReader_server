- article_update_date: 04.03.2026
  body_text: '| Next | Section menu | Main menu | Previous | Veronique Greenwood The
    Big Story Jul 17, 2025 6:00 AM Where Are All the AI Drugs? In an industry where
    90 percent of drug candidates fail before reaching the market, a handful of startups
    are betting everything on AI to beat the odds. Play/Pause Button Pause Video:
    Balarama Heller A new drug usually starts with a tragedy. Peter Ray knows that.
    Born in what is now Zimbabwe, the child of a mechanic and a radiology technician,
    Ray fled with his family to South Africa during the Zimbabwean War of Liberation.
    He remembers the journey there in 1980 in a convoy of armored cars. As the sun
    blazed down, a soldier taught 8-year-old Ray how to fire a machine gun. But his
    mother kept having to stop. She didn’t feel well. Doctors in Cape Town diagnosed
    her with cancer . Ray remembers going to her radiation treatments with her, the
    hospital rooms, the colostomy bags. She loved the beach, loved to walk along the
    line where the water met the land. But it got harder for her to go. Sometimes
    she came home from the hospital for a while and it seemed like things would get
    better. Ray got his hopes up. Then things would fall apart again. Surgery, radiation,
    chemotherapy—the treatments that were on the table in the 1980s—were soon exhausted.
    As she lay dying, he promised her he was going to make a difference, somehow.
    He was 13 years old. Ray studied to become a medicinal chemist, first in South
    Africa, taking out loans to fund his studies, then at the University of Liverpool.
    He worked at drug companies across the UK, on numerous projects. Now, at 53, he
    is one of the lead drug designers at a pharmaceutical company called Recursion.
    He thinks about that promise to his mom a lot. “It’s lived with me my whole life,”
    he says. “I need to get drugs on the market that impact cancer.” The desire to
    stop your own tragedies from happening to someone else may be a strong motivator.
    But the process of drug discovery has always been grindingly, gruelingly slow.
    First, chemists like Ray zero in on their target—usually a protein, a long string
    of amino acids coiled and folded upon itself. They call up a model of it on their
    computer screen and watch it turn in a black void. They note the curves and declivities
    in its surface, places where a molecule, sailing through the darkness like a spaceship,
    could dock. Then, atom by atom, they try to build the spaceship. Animation: Balarama
    Heller When the new molecule is ready, the chemists pass it along to the biologists
    , who test it on living cells in warm rooms. More tragedy: Many cells die, for
    reasons that are not always clear. Biology is complex, and the new drug doesn’t
    work as expected. The chemists will have to create another, and another, tweaking,
    adjusting, often for years. One biologist, Keith Mikule of Insilico Medicine ,
    told me of his experience at a different drug company. After five years of work,
    their best molecule had unforeseen, dangerous side effects that meant they could
    take it no further. “There was a large team of chemists, a large team of biologists,
    thousands of molecules made, and no real progress,” he said. If a team is very
    lucky, they get a molecule that, in mice, does what it’s supposed to. They get
    a chance to give it to a small group of healthy human volunteers, a phase I trial
    . If the volunteers stay healthy, then they give it to more people, including
    those with the disease in question, in a phase II. If the sick people don’t get
    sicker, they get a chance—phase III—to give it to more sick people, as many as
    they can find, as diverse a group as possible. At each stage, for reasons few
    people understand and fewer can predict, great rafts of drugs drop out. More than
    90 percent of hopefuls fail along the way. When you meet drug hunters, you might
    ask them, cautiously, tenderly, if they’ve ever had a drug make it. “It’s very
    rare,” says Mikule, who has one drug (niraparib, for ovarian cancer) to his name.
    “We’re unicorns.” But Mikule, Ray, and other chemists and biologists are trying
    a new approach. When I talk to Ray, he’s excited to show me a molecule he and
    his colleagues at Recursion have been working on. It’s a so-called MALT1 inhibitor,
    designed to interfere with the growth of blood cancer cells. On his screen, REC-3565
    is a series of rings and lines, another skeletal spaceship floating in the void.
    But it exists in the real world too: Just a few weeks before my chat with Ray,
    the first phase I volunteers swallowed it in a little pill. What’s special about
    this molecule, Ray says, isn’t just that it has survived the gauntlet thus far.
    It’s that REC-3565 “wouldn’t have come by human design.” Ray’s team, he believes,
    would not have made the logical leaps required to reach this point without using
    artificial intelligence . As the world’s pharma giants get caught up on AI , Recursion
    is among a group of startups betting everything on the technology. Founded 12
    years ago by academics in Utah, the company made its name by taking snapshots
    of cells under various conditions, creating a vast database of pictures, and turning
    AI on them to identify potential new targets. Last year, Recursion acquired another
    decade-old startup—Ray’s former employer, Exscientia—which pioneered the use of
    AI to design small molecules. There are others, including Mikule’s employer Insilico,
    which was founded in 2014. Just last year, Xaira Therapeutics launched with $1
    billion in venture capital—the biggest biotech funding round in years. (The only
    other new startup that pulled in as much in 2024 was Safe Superintelligence, cofounded
    by a former top OpenAI researcher.) Pipetting robots at work at Recursion’s automated
    lab in Oxford, England. Courtesy of Recursion There are no drugs on the market
    designed using AI. But both Recursion and Insilico have gotten candidates through
    phase II clinical trials, which means they’re safe in patients. REC-994 is for
    cerebral cavernous malformation, a disease that causes brain lesions, and ISM001-055
    is for idiopathic pulmonary fibrosis, a progressive, fatal lung condition. More
    AI-linked drug candidates are in development, from Insilico, Recursion, and other
    companies, including the one Ray showed me. All of these molecules, right now,
    are like cards lying face down on the table. Can AI help make drugs that actually
    work, faster and cheaper than usual, or are the drug hunters about to be dealt
    another losing hand? In the summer of 1981, a headline on the cover of Fortune
    magazine proclaimed that the age of digital drug discovery was at hand. The story
    explored how scientists were using computer visualization to select the best molecules
    to try in cells, hoping to break through the gridlock. Derek Lowe, a medicinal
    chemist who writes the long-running blog In the Pipeline , recalls that the Fortune
    article made some drug hunters at the time nervous. At the pharmaceutical company
    Schering-Plough, where he worked, there was a room labeled “Computer-Aided Drug
    Discovery (CADD),” packed with expensive equipment. “The medicinal chemists across
    the hall didn’t think too much of that,” Lowe told me, “so they put a sign over
    their door that said ‘BADD: Brain-Assisted Drug Discovery.’” Computers did revolutionize
    everything. But the hard problems of drug discovery didn’t evaporate with the
    touch of a cursor. Seasoned drug hunters refer in a jaundiced tone to combinatorial
    chemistry, an attempt to stumble across new kinds of drugs by assembling molecular
    pieces in random order. (It didn’t work, in part because the costs of such a wildly
    democratic approach were crippling.) Computational chemistry, which allows scientists
    to simulate how a target and a molecule will interact, gained grudging acceptance—but
    its success depends on accurate models of the target and the candidates, and for
    that you need old-fashioned elbow grease in the lab. If anything, the hard problems
    have grown harder as the full complexity of biology has come into focus. “We have
    more things to worry about than we used to,” says Lowe. Cancers with different
    mutations driving them respond to different therapies. Drugs that attached to
    a certain receptor were linked to heart problems, and thus any new drug candidate,
    no matter how promising, must be removed from the running if it shows affinity
    for that receptor. Cardiac cells Courtesy of Recursion Karen Billeci, a principal
    biologist at Recursion, still remembers one of the first times she heard a drug
    hunter mention artificial intelligence. One dawn in 1993, Billeci was walking
    across her company’s parking lot on the edge of the San Francisco Bay with a couple
    of other employees. They worked at a scrappy startup called Genentech (later acquired
    by Roche for $47 billion). Billeci’s programmer friends were exploring whether
    neural networks—a form of machine learning —could be used to find patterns in
    patient information and help reveal why some responded to a drug and others didn’t.
    “These great drugs would go into humans, and they would fail,” Billeci says. They
    talked in the parking lot about whether, someday, there would be software that
    could learn to see patterns they couldn’t. “We didn’t say ‘train,’” Billeci recalls.
    “We didn’t have the words for that yet.” It gradually became clear, over the next
    several decades, that AI might do more than pick out patterns in patient data.
    In 2020, something happened that crystallized what might be possible. In a global
    competition that fall, an AI built by Alphabet’s DeepMind showed it could correctly
    predict how a protein would fold up into its final form—a canonical hard problem
    in biology and a key task for drug hunters. DeepMind’s AI easily beat out all
    the other contestants. David Baker, a biochemist at the University of Washington,
    was inspired to dig deeper into using AI to design new drug proteins, work that
    later won him the 2024 Nobel Prize for Chemistry. “It didn’t take us long to develop
    methods that surpassed the ones we had been developing before,” he says. (Baker
    is one of the founders of Xaira.) After that, what else might be possible with
    AI? What if it were shown all the drugs that have ever existed, with all the data
    about how they work, and then set loose on a database of untried molecules to
    identify others to explore? What if—and this is where the discussion around machine
    learning has gotten to now, in 2025—the software could take in a decent chunk
    of all the information about biology generated by humankind and, in an act both
    spooky and profound, suggest entirely new things? Macrophage and lung fibroblast
    cells Courtesy of Recursion Sometimes, humanity is learning, AI produces things
    that look good at first glance but turn out to be whimsical potpourris of words
    or thoughts, mere nothingburgers. The fact that drug discovery involves extensive
    real-life testing makes it unlikely that such suggestions would survive the process.
    The biggest risk of AI hallucinations might be wasted time and resources. But
    the failure rate of new drugs is already so high that scientists at these startups
    think the risk is worth taking. Peter Ray looks at the MALT1 inhibitor floating
    in the void. “If I get a drug to market, I would feel I had fulfilled my promise,”
    he says. He points out where the AI revealed a way to remove a section of the
    molecule that could cause toxicity. It was a reaction that had not occurred to
    any of the humans involved. The real question is whether molecules designed using
    AI are any better at getting to market. The last few stages of the process are
    the most expensive, the most unpredictable. In any clinical trial, it’s hard to
    find the right people, says Carol Satler, the vice president of clinical development
    at Insilico. It’s slow.'
