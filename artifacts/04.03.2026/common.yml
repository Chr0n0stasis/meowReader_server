- article_update_date: 04.02.2026
  body_text: 'The Costa Rican government has agreed to receive up to 25 deported migrants
    a week from the United States, the latest deal in the Trump administration’s unprecedented
    efforts to deport scores of people to “third countries”. With the new agreement,
    Costa Rica seeks a closer alliance with Donald Trump’s government, which has been
    securing cooperation from other Central American countries in accepting deportees
    from other nations who have been detained by US immigration agents. “Costa Rica
    feels obligated to reciprocate at a time when the United States and its immigration
    services need the humanitarian cooperation of Costa Rican authorities,” the minister
    of public security, Mario Zamora, said in a video statement to the Guardian. “With
    financial support from the United States, they will be provided with housing and
    food on Costa Rican soil. Costa Rican immigration authorities will collaborate
    with US immigration authorities to carry out all the necessary immigration logistics
    to guarantee the return of these individuals to their countries.” Zamora said
    the agreement was voluntary, maintaining that the Costa Rican government had the
    discretion to decide the number of deportees it will accept, as well as their
    nationality. The Costa Rican ministry of public security said last week that the
    country would only receive deported migrants who do not hail from Latin America
    or any nation that refuses to take back their citizens, according to local reports.
    Zamora noted Costa Rica will only receive migrants without criminal records. According
    to the agreement shared with the Guardian, the US government will provide information
    about the individuals it intends to deport to Costa Rica 48 hours before a deportation
    flight. Upon their arrival, the Costa Rican government will give them a limited
    legal status on humanitarian grounds. The accord was signed during a visit by
    Kristi Noem, the recently departed homeland security secretary who is now overseeing
    the “Shield of the Americas” initiative, which the Trump administration says is
    designed to eradicate criminal cartels in the western hemisphere. Any US deportations
    to Costa Rica would be carried out by the Department of Homeland Security. The
    department did not respond to requests from the Guardian for details about how
    the removals would work. In a statement, the US Department of State said “implementing
    the Trump Administration’s immigration policies is a top priority for the Department
    of State. As Secretary [Marco] Rubio has said, we remain unwavering in our commitment
    to end illegal and mass immigration and bolster America’s border security.” The
    International Organization for Migration (IOM), an agency within the United Nations,
    is expected to provide assistance to deportees upon their arrival. A spokesperson
    for the organization said in a statement: “Where engaged, our support focuses
    on providing basic services and helping individuals navigate a limited set of
    options, including whether to remain, return to their country of origin, or pursue
    other available pathways.” The Costa Rican government is expected to meet with
    US authorities and IOM officials this week to determine where the deportees will
    be transferred once they arrive on Costa Rican soil, Zamora said. Trump’s expanding
    use of “third country” deportations has come under intensifying scrutiny by Democratic
    lawmakers in Congress. In February, Democrats on the Senate foreign relations
    committee published a report detailing “how the Trump Administration’s secret
    deportation deals are undermining US interests and coming at great cost to taxpayers”.
    Senator Jeanne Shaheen, a Democrat from New Hampshire who commissioned the report,
    said, “through its third country deportation deals, the Trump Administration is
    putting millions of taxpayer dollars into the hands of foreign governments, while
    turning a blind eye to the human costs and potentially undermining our diplomatic
    relationships. For an Administration that claims to be reining in fraud, waste
    and abuse, this policy is the epitome of all three.” The Trump administration
    has spent at least $40m to deport migrants to countries that are not their own,
    the report found. A congressional aide involved in the report said the state department
    was not tracking what happens to those deported to third countries. The Trump
    administration secured a deal with Costa Rica last year that allowed the US to
    send roughly 200 deportees to the Central American nation. The group of asylum
    seekers, which included 81 children from different countries in Asia and Africa,
    were flown to Costa Rica in chains after being denied a chance to request protection
    on US soil. Nearly 300 other African and Asian migrants were deported to Panama
    around the same time. A congressional aide added that the estimated cost for the
    roundtrip deportation flights to Costa Rica and Panama in February 2025 totaled
    about $1.4m. The Costa Rican government claimed at the time that it would be a
    temporary safe haven to the deportees and help them return to their home countries.
    But interviews from those deported to Costa Rica contradict these promises. “They
    threw us out like baggage to a country with a language we don’t speak. And no
    one was held accountable for this,” said a Russian man who remains in Costa Rica
    with his wife and child more than a year after their deportation. The deportations
    to Costa Rica were part of the many high-profile operations in the early days
    of the second Trump administration, which moved swiftly to unleash its anti-immigration
    and mass deportation agenda. View image in fullscreen An aerial view of the Temporary
    Care Center for Migrants (Catem) in Puntarenas, Costa Rica. Photograph: Armando
    Acevedo/AFP/Getty Images In June, Costa Rica’s supreme court ruled that the government
    had violated the rights of the 200 migrants during their detention at a migrant
    housing facility, known as Catem, located six hours away from San José, the country’s
    capital. When asked if the migrants deported from the US to Costa Rica under this
    new agreement would end up in Catem, Zamora did not address the question. The
    Guardian reported that the world’s largest pencil maker accused the Costa Rican
    government of misusing Catem, an old factory that the German manufacturer donated
    to the Central American country for humanitarian purposes. The new agreement between
    Costa Rica and the US alarmed lawmakers in the Central American country, especially
    during the transitional period in which Laura Fernández is scheduled to succeed
    Rodrigo Chaves as Costa Rica’s next president in May. The Guardian spoke with
    Monserrat Ruiz Guevara, whose term as a member of the Costa Rican legislative
    assembly ends next month. “In the face of a government transition, there is a
    well-founded concern regarding possible external pressure from the US, the normalization
    of agreements of this nature without due national debate, and the risk of the
    country assuming responsibilities that do not belong to us,” said Ruiz Guevara,
    who visited Catem shortly after the 200 migrants arrived in Costa Rica last year.
    “Our country has built a historical tradition of respect for human dignity, but
    this tradition demands concrete and verifiable actions. These types of agreements
    with the United States lead us to legitimate concerns about the real guarantees
    of respect for human rights.”'
