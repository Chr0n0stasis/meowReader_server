  body_text: '| Next | Section menu | Main menu | Previous | Steven Levy The Big Story
    Dec 3, 2025 8:00 AM Want This Hearing Aid? Well, Who Do You Know? AI-powered startup
    Fortell has become a secret handshake for the privileged hearing-impaired crowd
    who swear by the product. Now, it wants to be in your ears. Photographs: Ali Cherkis
    A secret is percolating at dinner parties, salons, and cocktail gatherings among
    the august New York City elite. It’s whispered in the circles of financial masters
    of the universe, Hollywood stars, and owners of sports teams. Have you heard about
    Fortell? Many haven’t—or if they did hear, they might not have made out the words
    through noisy cross-conversations. Once they do know—particularly if they’re boomers—they
    want it desperately. Fortell is a hearing aid, one that claims to use AI to provide
    a dramatically superior aural experience. The chosen few included in its beta
    test claim that it seems to top the performance of high-end devices they’d been
    unhappily using. These testers have made pilgrimages to Fortell’s headquarters
    on the fifth floor of a WeWork facility in New York City’s trendy SoHo neighborhood,
    where they were fitted for the hearing aids—which from the outside look pretty
    much like standard, over-the-ear, teardrop-shaped devices. But the big moment
    comes when a Fortell staffer takes them down to street level. There, among street
    clatter, honking cabs, and delivery trucks backing up to luxury stores, they are
    asked to conduct a conversation with a Fortell worker. Two other employees stand
    behind them, adding their own loud discourse to the urban cacophony. Despite the
    din, the testers clearly make out what the person in front of them is saying.
    The clouds lift. Angels croon. “This was so incredible that I burst into tears,”
    says Ashley Tudor, one of the seemingly few beta testers who isn’t famous or powerful
    (though she is married to a venture capitalist). Among the age-related-hearing-loss
    set, getting into the Fortell beta test has become a weird status symbol, the
    aural-prosthetics version of a limited-edition Birkin bag. “This product has become
    a major flex for the post-70 set,” says one investor. When entertainment lawyer
    Allen Grubman got his—he’s buddies with an investor—he began getting calls from
    “very substantial” people. “They said, ‘Allen, we hear that you have these new
    great hearing aids,’” he says of these callers, who all wanted in. Those who finagled
    their way into the program include multiple Forbes 400 billionaires, a chart-topping
    musician, the producer of a beloved TV series, and Hollywood A-listers, both old
    and not-so-old. KKR private equity co-executive chair Henry Kravis raves about
    his Fortells, as does performer and beta tester Steve Martin. One of Martin’s
    pals is actor Bob Balaban, who suffered from significant hearing damage on a movie
    set some years ago and was unhappy with the devices he used to mitigate the problem.
    Envious at Martin’s good fortune of obtaining these cutting-edge devices, he despaired
    that he might not get fitted himself. “God. I wish I had Steve’s hearing aids,”
    he told his wife. “But I think they’re movie-star hearing aids. I don’t think
    they’re character-actor hearing aids.” Happily, Balaban did make the cut. The
    people at Fortell say they hope eventually everyone who needs one can try it.
    The product goes on sale this month—but at only one location, with a daunting
    waiting list. It might be easier to procure Marty Supreme merch. The retail price
    will be $6,800. Fans rave about the new hearing aids'' ability to cut down on
    crowd noise. Courtesy of Fortell Fortell’s story begins with Matt de Jonge’s grandparents.
    “Four times, I watched them lose their hearing, get fancy hearing aids, and just
    drift away,” says de Jonge, who is Fortell’s cofounder and CEO. His grandparents
    tumbled down a decline that is all too familiar. At first they asked people to
    repeat what they said, but the repetition became annoying for both sides. Sooner
    or later, they stopped asking, tuning out conversations that were no longer clear
    to them. Ultimately, as de Jonge learned, the subsequent isolation hastened a
    journey toward dementia. He has remorseful recollections of holiday dinners where
    the grandparents were ignored by family. Including him. “I had given up on them,”
    he says. “I feel like I have blood on my hands.” At the time de Jonge, who is
    now 37, was employed at the giant hedge fund Bridgewater Associates, working on
    its AI team. On nights and weekends he began to research what it might take to
    make better hearing aids. The current state is not ideal. While it’s a nearly
    $14 billion industry, the few key players have not managed to develop products
    that users love. (Some might disagree: WIRED''s testers have found units worth
    recommending.) One 2007 study, mentioned again in 2013 —around the time de Jonge
    started looking into this—reported that 80 percent of adults between 55 and 74
    who could benefit from hearing aids don’t use them, including many who actually
    own them. Reasons vary from cost to comfort to the perception that the aids don’t
    work well enough. De Jonge realized that the key problem was in the area where
    hearing was most important: helping people hear conversations in social settings.
    Most hearing aids relied on amplifying sounds and using noise reduction, which
    didn’t do the trick in those scenarios. The problem was harder than it seemed.
    “It’s not about making sounds louder,” says de Jonge. “People with age-related
    hearing loss have lost some of the magic of focusing on the sounds that are important
    to them.” The worst situations occur in restaurants and social gatherings with
    lots of cross conversations. That’s known in the trade as the Cocktail Party Problem.
    While even people with normal hearing can struggle in those settings, those with
    hearing loss are lost in crescendos of conversational clatter, and costly hearing
    aids don’t help much. De Jonge reluctantly concluded that he had no answer for
    it. The exercise did motivate de Jonge to explore how technology could help solve
    other medical issues. He left Bridgewater and joined a startup making an AI-powered
    sensor called Butterfly IQ that provided “ultrasound on a chip.” He worked his
    way up to VP of product, and his shares in Butterfly became liquid when it went
    public in 2021. Fortell founders Matt de Jonge, Igor Lovchinsky, Andrew Casper,
    and Cole Morris. Courtesy of Fortell Soon after, de Jonge and Cole Morris, a friend
    from his Bridgewater days and former college roommate, began pursuing an ambitious
    idea from Joshua Kushner, a key investor in health care startup Oscar Health who
    heads the VC firm Thrive Capital. Kushner was exploring whether he wanted to buy
    a working hospital and use it as a test bed for software that could make the operation
    exponentially more efficient. Soon after they started the planning, de Jonge and
    Morris were having second thoughts. “After four months talking to doctors about
    buying a hospital and ripping out all the software in it, I realized I might kill
    somebody,” he says. Around that time his aunt chided him about abandoning his
    original quest. The next generation in his family was already experiencing hearing
    loss. “Weren’t you going to build a better hearing aid?” she asked him. That resonated
    with de Jonge, whose experience with Butterfly had hinted that AI could now handle
    bigger challenges. He and Morris told Kushner that they wanted to drop the hospital
    project and instead form an AI hearing aid company. Kushner immediately said he’d
    fund it. “A lot of people regard AI as something you’ll use to make businesses
    more efficient,” he says. “But people haven''t really internalized that you could
    use AI to make products exponentially better.” De Jonge and Morris eventually
    dubbed the new company Chromatic, a name they later ditched, settling instead
    on Fortell. They realized that there would be two critical components in an improved
    approach to a hearing aid. The first would exploit the recent advances in AI for
    a better algorithm to selectively augment conversation. And the second would be
    a custom chip to process that algorithm in real time. “Oh, man, if I could wear
    these to a loud coffee shop and have a meeting, it would change my life.” Founders
    Fund partner Trae Stephens The first requirement became the province of Igor Lovchinsky,
    who had been Butterfly’s AI wizard. He’d come to the field late in life; up until
    his mid-twenties he’d been a Juilliard-trained concert pianist but left the field
    when he became enamored with science. Lovchinsky felt that the AI claims made
    by some other hearing aid companies were overblown; they were simply tweaking
    the amplification, he says, or aiming the microphones in a different direction.
    Demonstration video, provided by Fortell, of its hearing aid technology in action.
    “What became clear is that what was needed is source separation,” he says. “Take
    an audio wave that contains both things you want to hear and things you don''t
    want to hear, and separate them into just speech and just noise.” Even in 2021,
    it wasn’t clear that this was possible. “We all have this incredible neural network
    in our heads honed by billions of years of evolution to recognize speech,” he
    says. “If you do the source separation with the slightest deviation from full
    naturalness, your brain will immediately hear it.” As the company’s cofounder
    and chief scientific officer, Lovchinsky and his team set about using cutting-edge
    AI to identify the aural fingerprints of the voices directed to the wearer, clean
    them up, and pass them on as if delivered in a quieter setting. A look at the
    AI-powered device. Courtesy of Fortell Having the right algorithms wouldn’t be
    worth much if you didn’t have a properly engineered chip to run them. To lead
    its silicon team, Fortell tapped as CTO Andrew Casper, another Butterfly alum
    who was a lead engineer on a Google team making AI chips. Casper also wasn’t sure
    that his task could be accomplished. “Your ear is very sensitive to latency,”
    he says, noting that if the altered sounds weren’t processed in 10 milliseconds—a
    hundredth of a second—it would throw users into a hellish uncanny valley. “We
    didn’t know if it could be done in that amount of time with a high enough fidelity
    so you aren’t going to notice distortions.” Only then, he says, could the company
    move to the final challenge: “Can we even put this thing into your ear?” It was
    going to take years before the startup got those things right and could even begin
    to test on humans. Fortunately, the $9 million initial stake, the majority of
    which came from Kushner, provided a long runway. “For the first few years of the
    company there was no hearing aid in sight,” says de Jonge. “We needed to build
    for ourselves to see if the science problems could be solved.” By 2023, Lovchinsky
    and Casper had made significant progress on their respective missions. Lovchinsky’s
    team realized that separating out the voices required creating a proprietary version
    of what is known in the industry as Spatial AI, involving a 3D understanding of
    the real world. (Confusingly, they also use the nonproprietary technology, spatial
    AI, in their product.) “It gleans perspectives from multiple microphones and can
    infer the same way that healthy people can, from both ears,” he says. His team
    also found a way to train their AI models with huge amounts of synthetic data
    that emulated all sorts of conditions. “It’s specifically useful in the most challenging
    environments,” he says. More rounds of funding followed, with $150 million invested
