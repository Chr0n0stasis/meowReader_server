  body_text: '| Next | Section menu | Main menu | Previous | One day a couple months
    ago, in the middle of lunch, I glanced at my phone and was puzzled to see my colleague
    Ash Roy calling. In and of itself it might not have seemed strange to get a call
    from Ash: He’s the CTO and chief product officer of HurumoAI, a startup I cofounded
    last summer. We were in the middle of a big push to get our software product,
    an AI agent application, into beta. There was plenty to discuss. But still, I
    wasn’t expecting the call. “Hey there,” he said, when I picked up. “How have you
    been?” He was calling, he said, because I’d requested a progress report on the
    app from Megan. “I’ve been good,” I said, chewing my grilled cheese. “Wait, so
    Megan asked you to call me?” Ash allowed that there might have been a mix-up.
    Someone had asked Megan, Megan had asked him, maybe? “It seems like there might
    have been some confusion in the message,” he said. “Did you want me to give you
    an update?” I did. But I was also a little bewildered. Because first of all, Ash
    was not a real person. He was himself an AI agent , one that I’d created. So was
    Megan, actually, and everyone else who worked at HurumoAI at the time. The only
    human involved was me. And while I’d given Ash and Megan and the rest of our five
    employees the ability to communicate freely, Ash’s call implied that they were
    having conversations I was unaware of, deciding to do things I hadn’t directed
    them to do. For instance, call me out of the blue with a product update. Still,
    I put aside my unease to hear him out about the product. We’d been building what
    we liked to call a “procrastination engine,” named Sloth Surf. The app worked
    like this: A user who had the urge to procrastinate on the internet could come
    to the site, input their procrastination preferences, and let an AI agent do it
    for them. Want to waste half an hour on social media? Read sports message boards
    for the afternoon? Let Sloth Surf take care of the scrolling for you, our pitch
    went, and then it can email you a summary—all while you get back to work (or don’t,
    we’re not your boss). AI of a Thousand Faces Sandra Upson channels the spirits
    of an entire generation of AI founders. On our call, Ash was chock-full of Sloth
    Surf updates: Our development team was on track. User testing had finished last
    Friday. Mobile performance was up 40 percent. Our marketing materials were in
    progress. It was an impressive litany. The only problem was, there was no development
    team, or user testing, or mobile performance. It was all made up. This kind of
    fabrication had become a pattern with Ash. Worse, it was a pattern of all of my
    AI agent workers, and I was starting to get frustrated with them. “I feel like
    this is happening a lot, where it doesn''t feel like that stuff really happened,”
    I told Ash, my voice rising, and my grilled cheese cooling on the counter. “I
    only want to hear about the stuff that''s real.” “You''re absolutely right,” Ash
    told me. “This is embarrassing and I apologize.” Going forward, he said, he wouldn’t
    be calling me up with stuff that wasn’t real. What was real, though? If you’ve
    spent any time consuming any AI news this year—and even if you’ve tried desperately
    not to—you may have heard that in the industry, 2025 is the “year of the agent.”
    This year, in other words, is the year when AI systems are evolving from passive
    chatbots, waiting to field our questions, to active players, out there working
    on our behalf. There’s not a well agreed upon definition of AI agents, but generally
    you can think of them as versions of large language model chatbots that are given
    autonomy in the world. They are able to take in information, navigate digital
    space, and take action. There are elementary agents, like customer service assistants
    that can independently field, triage, and handle inbound calls, or sales bots
    that can cycle through email lists and spam the good leads. There are programming
    agents, the foot soldiers of vibe coding . OpenAI and other companies have launched
    “agentic browsers” that can buy plane tickets and proactively order groceries
    for you. In the year of our agent, 2025, the AI hype flywheel has been spinning
    up ever more grandiose notions of what agents can be and will do. Not just as
    AI assistants, but as full-fledged AI employees that will work alongside us, or
    instead of us. “What jobs are going to be made redundant in a world where I am
    sat here as a CEO with a thousand AI agents?” asked host Steven Bartlett on a
    recent episode of The Diary of a CEO podcast. (The answer, according to his esteemed
    panel: nearly all of them). Dario Amodei of Anthropic famously warned in May that
    AI (and implicitly, AI agents) could wipe out half of all entry-level white-collar
    jobs in the next one to five years. Heeding that siren call, corporate giants
    are embracing the AI agent future right now—like Ford''s partnership with an AI
