  body_text: 'The Gulf war makes devastating oil spills more likely Middle East &
    Africa | Oil and troubled waters The Gulf war makes devastating oil spills more
    likely It would also make them harder to handle May 28th 2026 During the first
    Gulf war in 1991, Iraqi troops occupying Kuwait deliberately opened the taps of
    oil tankers, terminals and a refinery, releasing millions of barrels of crude
    into the Gulf. It was a last-ditch attempt to prevent American-led forces from
    making an amphibious landing. Saddam Hussein, Iraq’s dictator, then ordered his
    troops to set hundreds of nearby oil wells alight. One American official said,
    “if Hell had a national park”, it would look like the inferno that resulted. It
    took international firefighters six months to extinguish the fires. More than
    700km of Saudi coastline was coated in oil. The clean-up took decades and cost
    more than $500m (at the time). Some ecological damage along the coast proved permanent.
    The current Gulf war has produced nothing on that scale. But on May 6th a major
    spill west of Kharg island, Iran’s main crude-export terminal, became visible
    from space. Satellite images later showed the slick spreading across roughly 60
    square kilometres of the surrounding sea. The full extent of the damage is not
    yet clear: early estimates range from the equivalent of 3,000 barrels to almost
    90,000. This is a tiny fraction of the roughly 6m-10m barrels released into the
    Gulf in 1991. But it and other recent spills have prompted fears that the war
    could lead to a disaster—and then make it far harder to clean up, exacerbating
    the economic damage the war has already inflicted. Such harm could come in a number
    of ways. A strike on Kharg island has the clearest potential to cause a big, enormously
    damaging oil spill. Its oil infrastructure can store around 30m barrels. America
    has already struck the island’s military installations and Donald Trump has repeatedly
    threatened to take out oil infrastructure on Kharg. Tankers are the next risk.
    Until this week, neither side had hit a heavily laden one. But on May 26th the
    Olympic Life—a Greek-owned “supertanker” capable of carrying 2m barrels of crude
    oil—reported an “external explosion” while sailing off the Omani coast. It is
    not clear what caused the explosion; on the same day Iran vowed to avenge American
    air strikes. Disaster was avoided. Though she leaked an unknown amount of her
    own fuel, the Olympic Life was able to keep sailing (it is unclear how much cargo
    she was carrying). But the Gulf is crowded with vulnerable vessels. Earlier in
    May, Amin Nasser, the boss of Saudi Aramco, the kingdom’s state oil producer,
    estimated that more than 600 ships were stuck, unable to leave through the Strait
    of Hormuz. Nor are tankers the only danger. The Shahid Bagheri, an Iranian drone
    carrier, was attacked early in the conflict. It has been steadily discharging
    heavy fuel oil into the surrounding waters ever since the attack. America claims
    to have sunk at least 160 Iranian naval vessels in the course of the war. Each
    of these is a potential source of pollution. A serious spill in the strait would
    be much harder to deal with than usual. Normally, international maritime law means
    that when a spill occurs, nearby ships, port authorities and coastal states are
    all expected to help to contain it and assist the crew. The affected vessel’s
    insurer then pays for the clean-up. But third parties have grown increasingly
    wary of offering assistance in an active war zone. Early in the war, a salvage
    tug responding to a damaged vessel was itself struck and at least four of its
    crew were killed. Diplomatic solutions are harder to reach at the moment, too.
    With hostilities under way it is trickier to manage the international co-ordination
    needed to deal with a big incident. In theory diplomatic channels are still open
    between countries in the region. But as Neil Quilliam of Chatham House, a think-tank,
    notes, neither Saudi Arabia nor Iran, for example, would be likely to enter any
    kind of joint effort until a lasting peace agreement has been forged. All sides
    worry that offers to co-operate would be made in bad faith and could expose them
    to further attacks. The closure of the strait adds another complication. Iran
    has long circumvented sanctions by using shadow-fleet ships—vessels which conceal
    themselves or their identities. The use of such ships is now increasing. Shadow-fleet
    operators were the largest group to transit the strait between March 2nd and March
    9th, according to Windward, a maritime monitoring company, and their numbers are
    growing as the conflict drags on. That makes the clean-up of spills harder. Legitimate
    ships and salvage firms risk being accused of breaching sanctions themselves if
    they are seen to be “aiding or abetting” shadow vessels. Most take this risk so
    seriously that they are “almost fearful of doing the right thing by cleaning up
    pollution”, says David Smith of McGill Partners, a marine-insurance broker. Shadow
    vessels are often old and poorly maintained, so are more likely to leak if they
    are hit or run aground. And since they are unidentifiable and uninsurable, no
    government would take responsibility for a spill. Nor would any party be on the
    hook to fund a clean-up. The environmental stakes are high. Oil spills threaten
    sea life, including the strait’s important coral reefs. The human costs may be
    higher still. Around 100m people in the Gulf depend on desalination plants for
    drinking water (see map). Oil could contaminate the sea water with substances
    such as benzene, which is linked to leukaemia and other cancers, as well as to
    liver and kidney damage. The oil released back in 1991 disabled Kuwait’s desalination
    capacity for years. For the moment, the spill around Kharg island does not look
    big enough to hinder the movement of ships in the area. But bigger spills could
    complicate the resumption of normal oil flows from the Gulf once the strait is
    reopened. This is because tankers that get coated in oil by slicks can themselves
    contaminate the environment and in some countries they may be prevented from docking.
    In 1991 the oil spills were deliberate. Today an accident is more likely. But
    the consequences could be just as severe. ■ Sign up to the Middle East Dispatch
    , a weekly newsletter that keeps you in the loop on a fascinating, complex and
    consequential part of the world. This article was downloaded by zlibrary from
    https://www.economist.com//middle-east-and-africa/2026/05/28/the-gulf-war-makes-devastating-oil-spills-more-likely'
