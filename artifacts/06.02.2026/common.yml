  body_text: 'Radu Jude, the Bard of Bucharest Onward and Upward with the Arts Radu
    Jude, the Bard of Bucharest The director’s native city drives him crazy—and drives
    him to make loony, brilliant films. By Rebecca Mead April 13, 2026 A visitor to
    Bucharest, Romania’s capital, will notice that many of the city’s buildings—which
    range from graceful Belle Époque mansions constructed in the late nineteenth century
    to unlovely apartment complexes thrown up during postwar urbanization—are marked
    with a bright-red disk. Unlike the blue plaques affixed to residences in London,
    which indicate where notable figures once lived, or the Stolpersteine (or stumbling
    stones) embedded in the sidewalks of German cities to mark the former homes of
    Holocaust victims, Bucharest’s red disks are not commemorative but predictive.
    “It means that, in the next earthquake, this building could fall down,” Radu Jude,
    the Romanian film director, explained to me recently, when I met him in the capital,
    his native city. It’s been forty-nine years since Bucharest was last devastated
    by a major earthquake, on March 4, 1977. Dozens of flimsy apartment buildings
    collapsed; nearly fifteen hundred residents died. Nicolae Ceaușescu, Romania’s
    Communist leader, seized the opportunity to remake the ravaged city, ordering
    not just the demolition of compromised structures but a more extensive urban clearance.
    The entire neighborhood of Uranus, whose historic churches were built along hilly,
    cobblestoned streets, was razed. In its place rose the grandiose Palace of the
    Parliament—a neoclassical hulk that is the second-largest administrative building
    in the world, surpassed only by the Pentagon. Before the building was completed,
    Ceaușescu’s reign ended in revolution. In December, 1989, at the conclusion of
    a year when Communist regimes across Eastern Europe were collapsing, Ceaușescu
    ordered the violent quashing of demonstrations in the western city of Timișoara.
    Dozens of protesters died, and not long afterward Ceaușescu, while delivering
    a speech from the balcony of the Communist Party’s Bucharest headquarters, was
    jeered into silence by a furious public. He was soon captured by the Romanian
    Army as he attempted to flee the country. On Christmas Day, a military tribunal
    sentenced him to death and executed him by firing squad. Jude, who was born a
    month after the 1977 earthquake, was twelve when this political earthquake occurred.
    “The rumors about what had happened in Timișoara, and how many people were killed,
    were everywhere,” he recalled, as we sat in the office of his video editor, in
    an elegant villa in central Bucharest. When the revolution happened, he told me,
    he was spending the Christmas holidays with his grandparents, in a village outside
    the city, “but it was quite close to a military airport, so you could hear gunshots.”
    After footage of Ceaușescu’s corpse was broadcast on television, “there was a
    huge joy—you could feel the change.” His grandfather cursed the former leader
    while Jude’s grandmother wept at Ceaușescu’s execution—not because she admired
    him but because, Jude said, “it felt like a loss of something that was essential
    to her.” As it turned out, he noted, “many more people were killed after Ceaușescu
    left, because of the chaos.” The dictator’s successor, Ion Iliescu, viciously
    crushed pro-democracy demonstrations. It took until the end of 1991 for a new
    constitution to be established. Similarly, Ceaușescu’s authoritarian makeover
    of Bucharest has been dwarfed by unbridled development since the revolution. “The
    earthquake destroyed houses everywhere,” Jude said. “But there was much more destruction,
    in a paradoxical way, in a free society—by bad planning, bad management, corrupt
    politicians, and greedy real-estate investors. There are more monuments of architecture
    destroyed after the revolution than in Ceaușescu’s time.” We headed out into the
    streets, and Jude led me to sites of vanished historic structures: a nineteenth-century
    marketplace demolished to accommodate a widened road, an ornate cinema whose only
    remnants are a few bricks littering a parking lot. As we navigated sidewalks narrowed
    by late-winter heaps of dirty snow, Jude, who is a big, bearish man with bristly
    salt-and-pepper hair and a scruff of beard, pointed out the buildings marked with
    red disks. Other signs warned of danger from crumbling masonry overhead, though
    there was none of the scaffolding that might accompany such notices. Jude mentioned
    that a friend of his, who had recently returned from Odesa, in Ukraine, had said
    that Bucharest resembles a wartime city more than Odesa does. Jude isn’t particularly
    fond of Bucharest, which is traffic-clogged, bedevilled by corruption, and generally
    exhausting. And he is afraid of the next quake—a when-not-if proposition, given
    Romania’s turbulent geology. Still, apart from his preschool years, when he lived
    with his grandparents, and a few months in 2023, when he had a fellowship in Berlin,
    he has spent his entire life there. (He speaks fluent English, the lingua franca
    of the film industry in Eastern Europe.) Although Romania has a well-documented
    emigration problem—between the revolution and 2021, the country lost nearly a
    fifth of its population—Jude prefers to stay put. “For life, it’s terrible, but
    for cinema it’s a city that reveals itself—that shows what it has behind,” he
    explained. “Somehow, the ideologies, the politics, the philosophy, the aesthetics—it’s
    all very easy to grasp. It’s not like other cities, where they look clean but,
    behind, you find something more shady going on. Here, it’s nothing more complicated
    than what is obvious.” As we approached his apartment building, Jude pointed out
    a Beaux-Arts mansion that had been extended vertically into a complex of modern
    apartments, with glass balconies hovering above an intricately wrought frontage.
    “This was also considered a monument,” Jude said. “They had the right to develop
    it, but they had to keep the façade.” He rapped the surface with his knuckles.
    Instead of the dull solidity of stone, it had the resonance of hollow wood. Rather
    than restore the façade, as required, the developer had replaced it with a false
    one. “It’s just a fake thing, and it’s already falling apart—it’s insulting the
    intelligence of everyone,” Jude said. The wall was as insubstantial as a set on
    a film studio’s back lot. “I think they used the same carpenter that we do,” he
    said. The unanticipated consequences of transformational change are energetically
    explored in Jude’s films. He works in a bracingly wide variety of forms, from
    documentary shorts to dramatic features, and he sometimes combines them—say, with
    the incorporation of archival footage into a satire, or with an abrupt shift in
    tone from the essayistic to the narrative. Often, his subject is what he calls
    the “brutal capitalism” of contemporary Romania, as well as the country’s rising
    neofascist nationalist movement, which demonizes the European Union—the country
    became a member in 2007—and valorizes authoritarians of the past, from Vlad the
    Impaler to Ceauşescu. “To tell people, ‘Now you have freedom of travelling, or
    of speech’—they say, ‘The problem is we don’t have anything to eat,’ ” Jude explained.
    “In a certain way, the regime was better for them. The disaster of the new regime
    is that it rejected everything that was good, at least in intention, in the Communist
    society, so the capitalism we have is much harsher than in other, Western countries.”
    Jude’s first feature film, “The Happiest Girl in the World,” released in 2009,
    is a bittersweet drama centered on a provincial girl’s conflict with her parents;
    in its contemporary realism and nuanced social observation, it resembles the work
    of other directors belonging to the so-called Romanian New Wave, which flourished
    in the two-thousands. (Jude was an assistant director on one of the standouts
    from that period, Cristi Puiu’s “The Death of Mr. Lazarescu,” a 2006 film about
    a dying man who keeps getting turned away by Bucharest hospitals.) But Jude’s
    subsequent movies have gone in a less conventional direction. In “I Do Not Care
    If We Go Down in History as Barbarians,” released in 2019, he tackled an event
    from 1941 that had been expunged from classrooms during the Communist era: the
    dictator Ion Antonescu’s collaboration with the Nazis in the massacre of tens
    of thousands of Jews in Odesa. (The title, characteristic of Jude in its vibrant
    wordiness, comes from a speech by Romania’s foreign minister at the time.) In
    the film, a modern-day young female director, Mariana, played by Ioana Iacob,
    stages a reënactment of the massacre at a square in Bucharest. Jude juxtaposes
    archival footage of Nazi executions with a shocking yet appallingly entertaining
    reprise of the Odesa massacre; to depict it, he recruited battle reënactors on
    Facebook. The reputation of Antonescu, who was executed for war crimes in 1946,
    has been undergoing a perverse rehabilitation by Romania’s far right, and “Barbarians”
    decries not just the atrocities of the past but also the delusions of the present.
    “The idea was that Romanians were always victims, victims, victims, and that we
    never did anything wrong as a country, as a community, to anybody else,” he said.
    “And, even if you don’t buy the propaganda, it gets into you somehow. You say,
    ‘Well, I’m Romanian, I would never kill someone.’ And then, when you discover
    that’s not true, you feel really shaken. I felt really shaken.” In “Do Not Expect
    Too Much from the End of the World,” released in 2024, Angela Răducanu, an overworked
    producer of television commercials, spends a hectic day driving ceaselessly around
    Bucharest’s congested streets. The character, played by Ilinca Manolache, is meeting
    job candidates for a project commissioned by an Austrian corporation; she needs
    to cast an injured employee for a worker-safety film. This main narrative, shot
    in grainy black-and-white Super 16-mm. film, is intercut with color clips from
    a Romanian movie made during the Ceauşescu era—“Angela Goes On,” directed by Lucian
    Bratu—which dramatizes the life of a female taxi-driver. In a surreal intertextual
    turn, Bratu’s Angela, played by Dorina Lazăr, appears in Jude’s contemporary Bucharest.
    She is now the mother of a grownup son, Ovidiu, who uses a wheelchair because
    of a work-related injury—and who gets the dubious honor of appearing in the corporate
    video. The braiding of an old film into a new one is an inspired device for highlighting
    history’s continuities and discontinuities. Bratu’s movie was lighthearted in
    tone, but it had passages that betrayed some of the harsher dimensions of existence
    under Communism. Jude slows down Bratu’s footage when that director’s camera incidentally
    captures people waiting in a long line to buy groceries or pans across a street
    that was later flattened to make way for Ceaușescu’s Palace of the Parliament.
    Manolache, who has appeared in several of Jude’s movies, told me, “Radu’s films
    are political, like Godard’s films are. But it’s more than that. They are sensual,
    they have moments of extreme fragility, and they are very beautiful.” Her character
    spends her endless day of driving in a sequin-covered T-shirt minidress. The impractical
    outfit is an expression of Angela Răducanu’s suppressed creativity: her dress
    dances in the light even as she is immobilized behind the wheel. “End of the World”
    offers a potent counterpoint to the German director Maren Ade’s film “Toni Erdmann,”
    an acclaimed 2016 comedy that stars Sandra Hüller as a German business consultant
    making her way in Bucharest’s Wild West of neoliberal capitalism. In “Toni Erdmann,”
    the city is a depressing way station for a striving international executive. Jude,
    by contrast, looks at Bucharest from the perspective of Romanians, who understandably
    resent being poor subalterns within the European Union. To help make the point,
    Jude cast the distinguished German actress Nina Hoss as a haughty Austrian executive,
    who appears as a privileged outsider scanning the city’s streets from the back
    seat of Angela Răducanu’s vehicle. Andrei Gorzo and Veronica Lazăr, Romanian film
