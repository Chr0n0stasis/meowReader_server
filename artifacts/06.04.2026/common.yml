  body_text: 'NASA’s Moon-base plans mark a rethinking of its future Science & technology
    | Boots on the regolith NASA’s Moon-base plans mark a rethinking of its future
    The changes are welcome March 26th 2026 “THE UNITED STATES will never again give
    up the Moon.” This line in a memo that NASA staff received from their boss, Jared
    Isaacman, on March 24th, sought to recast the stakes in America’s race with China
    to put the next humans on the Moon . Since taking over NASA in December Mr Isaacman
    has added new realism to the timetable for Artemis, the late-running, over-budget
    and needlessly complex Moon programme. Nevertheless, the chances that its current
    target of boots on the lunar terrain by 2028 might slip again, and that China’s
    more streamlined programme might deliver people there first, are real. Some rate
    them as high. This is surely one of the reasons why Mr Isaacman’s memo, and the
    accompanying presentations made by him and senior members of his team during a
    daylong event at NASA’s headquarters, turned the agency’s vague aspirations towards
    a permanent Moon base into something far more concrete. During phase one of the
    new plan, the agency will send as many as 15 robotic landers to the Moon as it
    prepares for the first crewed landing; these will, among other things, scout out
    sites for subsequent landings and the base-to-come. Phases two and three will
    see astronauts visit the chosen site every six months as they and their robot
    helpers build out infrastructure including habitats that allow prolonged stays.
    The overall effect is to make the Moon more central to NASA’s objectives over
    the coming decade while diminishing the importance of the first crewed landing.
    A brief “here-today, home-tomorrow” visit by Chinese astronauts could be brushed
    off as a stunt. Though the Moon took pride of place at the event—which NASA called
    “Ignition”, in reference to what has to happen on the launch pad before lift-off—there
    were other shifts in thinking on display, most notably on nuclear power. The agency
    is taking its next steps seriously—and facing up to some past failures. A case
    in point: SLS, the ill-conceived, temperamental and outrageously expensive rocket
    around which Artemis has been built. It will serve for the mission that will carry
    astronauts past the Moon next month (Artemis II); for a mission to test lunar
    landers in Earth orbit (Artemis III); and for the first two crewed lunar landings
    (Artemis IV and V). But at the same time NASA will work with commercial providers
    on ways to put its astronauts into space much more cheaply and reliably. And although
    Mr Isaacman said that he imagined some SLS technology might make it into those
    private-sector bids, it would be remarkable if anything substantially SLS-like
    survived. Another improvement is the elimination of a space station, the Lunar
    Gateway, which was to be assembled in the vicinity of the Moon. Gateway was originally
    conceived as a way station where astronauts could disembark from the spacecraft
    taking them from and back to the Earth in order to get onto another to take them
    to and back from the Moon. It now appears that this transfer will be done elsewhere,
    probably in low Earth orbit. Last year the Trump administration cut Gateway from
    its NASA budget, only to see Ted Cruz, a senator for Texas, reinsert funding for
    it. This time Mr Cruz seems to be on board. So the already appropriated money
    he secured can be put towards the Moon base instead. Mr Cruz may be reconciled
    to the new plans, which will doubtless provide a lot of work for Johnson Space
    Centre in Houston. Josef Aschbacher, the director-general of the European Space
    Agency (ESA), who was in the audience at the NASA event, may be less pleased.
    Some bits of Gateway were to be contributed by other countries: ESA has been working
    on equipment for refuelling and communications and collaborated with JAXA, the
    Japanese space agency, on a module for astronauts to stay in; the Canadians were
    to provide a robot arm; and the Mohammed Bin Rashid Space Centre, the United Arab
    Emirates’ space agency, had taken on responsibility for an airlock. In all those
    cases, the quid pro quo was a promise by NASA to take astronauts to Gateway, a
    promise that now looks unlikely to be kept. NASA says—unconvincingly—that Gateway
    is paused indefinitely rather than cancelled. It also says that it will be working
    with its international partners to rework their contributions into stuff the Moon
    base will need. But this seems more a figleaf than a practical plan—a way for
    all concerned not to argue in public. Behind the scenes America’s space diplomats
    will be facing some hard work to maintain future collaborations with international
    partners. One already developed bit of Gateway, though, is assured of future use.
    Gateway’s Power and Propulsion Element (PPE), being built by Lanteris Space Systems,
    an American company experienced in building large commercial satellites, is to
    be at the heart of a new mission to Mars. Whereas on Gateway the PPE’s state-of-the
    art electric thrusters were to have been powered by solar panels, now they will
    be powered by a tiny nuclear reactor. This new mission, called Space Reactor 1
    Freedom (SR-1), will be the first NASA spacecraft with a nuclear reactor on board,
    and the first spacecraft to use a reactor to propel itself beyond Earth orbit.
    The plan is to launch it when Mars and Earth are suitably aligned at the end of
    2028. When it gets into orbit around Mars it will drop three small helicopter
    drones into the atmosphere, where they will scout out an area that might serve
    as a landing site for a future crewed mission. The cute drones on a neat mission,
    though, are not the underlying purpose of SR-1. It is there to herald a new commitment
    to nuclear power for deep-space propulsion, Moon-base operations and, eventually,
    human exploration of Mars. Steve Sinacore, the NASA official in charge of the
    programme, outlined new technologies this initiative would entail, including systems
    for protecting electronics from the reactor’s radiation and for getting rid of
    surplus heat, which would pave the way for future missions with bigger reactors.
    Mr Isaacman stresses that these new plans can provide better value for the money
    NASA is getting. Progress on eliminating the SLS and Gateway looks like a good
    start. Encouraging competition between private companies interested in providing
    services is also good. Lunar landers built by SpaceX (owned by Elon Musk) and
    Blue Origin (by Jeff Bezos) look increasingly headed for a fly-off, which will
    add some extra drama to proceedings, too. There are other welcome signs of change.
    Mr Sinacore prefaced his remarks with a frank account of NASA’s past failures
    in the area. Since the mid-1960s, he said, it has spent over $20bn on 12 different
    nuclear programmes that have produced, essentially, nothing. There was a similar
    forthrightness about the prospects for research and manufacturing in low-Earth
    orbit, which have routinely been hyped up in discussions of the International
    Space Station (ISS). Dana Weigel, who manages NASA’s ISS programme, broke with
    this tradition by telling the audience that “After more than 25 years of crewed
    operations…we haven’t yet seen breakthrough products, capabilities, or services
    that generate significant demand.” Contrary to the aphorism ascribed to Gene Krantz,
    Apollo 13’s flight director, failure is very much an option. If the agency’s historic
    character reasserts itself, everything will get delayed, costlier and more vulnerable
    to a less space-friendly administration. Having scads of landers visiting the
    Moon and a nuclear spacecraft on its way to Mars before January 20th 2029 may
    make that at least a bit less likely. With Ignition, NASA embraced the long haul.
    To deliver on its promises, the agency will need to be able to sprint as well.
    ■ Curious about the world? To enjoy our mind-expanding science coverage, sign
    up to Simply Science , our weekly subscriber-only newsletter. This article was
    downloaded by zlibrary from https://www.economist.com//science-and-technology/2026/03/25/nasas-moon-base-plans-mark-a-rethinking-of-its-future'
