  body_text: 'Juanita Gómez was reporting on an international assignment for Caracol,
    a Colombian television channel in 2015, when an older colleague attempted to forcibly
    kiss her by inside a lift. She only managed to break free from him by pushing
    him away several times. Fearing any complaint would come down to the word of a
    “girl” against that of a senior presenter, she did not report the incident. But
    when news broke last month that Caracol had suspended two journalists after sexual
    harassment allegations against them, Gómez decided to publicly share what had
    happened to her 11 years ago. Without naming her aggressor, she wrote in a social
    media post that the fact that others were now able to report cases of abuse gave
    her “what feels like a sense of divine justice”. Dozens of other female journalists
    in the country have also reported that they had been victims of sexual harassment
    at other media outlets, using the #MeTooColombia hashtag and sharing each other’s
    reports with #YoTeCreoColega, or “I believe you, colleague”. A few days later,
    Caracol announced it was terminating the contracts of two of the country’s most
    famous journalists: Jorge Alfredo Vargas, 59, and Ricardo Orrego, 51. Both denied
    the allegations. But the repercussions extended far beyond the country’s newsrooms,
    proving more impactful than the country’s first wave of #MeToo nearly 10 years
    ago. “These conversations have already happened elsewhere, so it was about time
    to put this on the table here as well,” said Gómez, 38, who left Caracol in 2022
    to join the weekly news magazine Semana. She prefered not to say whether or not
    her abuser was one of the two dismissed journalists. View image in fullscreen
    Jorge Alfredo Vargas’s contract with Caracol was terminated by mutual agreement.
    Photograph: Zuma Press, Inc./Alamy Given the volume of reports being shared, Gómez
    and four other journalists decided to create an email address for secure submissions:
    yotecreocolega@gmail.com. Another member of the group, Mónica Rodríguez, 52, a
    former Caracol presenter who now hosts an interview show on YouTube, said that
    the more than 220 emails they received did not only include accounts from journalists.
    “There are reports of harassment in the medical field, from school and university
    teachers, multinationals, and even NGOs. So, I believe this [movement] is opening
    up a conversation … because systematic and structural harassment exists in all
    public and private companies in the country,” she said. The aftershocks have also
    reached the government of the country’s leftwing president, Gustavo Petro, ahead
    of elections on 31 May. Paloma Valencia, the rightwing opposition candidate, released
    a screenshot in which the vice-minister of equality sent an unsolicited nude to
    a subordinate employee. He said the image had been sent in error and was meant
    for his partner but resigned after the backlash. The women’s caucus of Petro’s
    party in Congress released a statement demanding the immediate removal of the
    director of the state-run media network RTVC, Hollman Morris, a close ally of
    the president. Morris has been formally accused of sexual harassment by two women,
    one of them a journalist, but he sued both for libel and slander. “Women who claim
    to be victims of sexual harassment are being criminally prosecuted while the alleged
    aggressor remains the director of the largest public media network in the country,”
    said Colombia’s human rights ombudsman, Iris Marín Ortiz. “Victims of violence
    and sexual harassment still face enormous challenges in accessing justice here,”
    she added. Spurred on by the #YoTeCreoColega movement, the attorney general, Luz
    Adriana Camargo, issued a directive allowing investigations to begin, based on
    social media or press reports, removing the requirement for victims to file a
    formal complaint. She also created an email address for submitting reports privately,
    denuncia.acoso@fiscalia.gov.co, and opened an investigation into the Caracol case.
    View image in fullscreen Paloma Valencia, the rightwing opposition candidate,
    released a screenshot in which the vice-minister of equality sent an unsolicited
    nude to a subordinate employee. Photograph: Daniel Munoz/AFP/Getty Images When
    announcing the termination of the two journalists’ contracts – with Orrego, unilaterally;
    with Vargas, by mutual agreement – Caracol stated that it did “not constitute
    a judgment”, but “responds to the need to protect the integrity of all persons
    involved … and preserve the trust that society places in our organisation.” Vargas
    posted a statement saying that he faced this moment “with the peace of mind of
    having maintained the parameters of respect and good behaviour” throughout his
    career. “If at any moment someone had a different feeling, I respect it, while
    stating that my actions never had that intention,” he wrote. Orrego posted a statement
    signed by his lawyer that claimed his right to the presumption of innocence: “To
    date, there is no final decision, sentence, or pronouncement from a competent
    authority establishing any responsibility on the part of my client.” A 2020 survey
    of 160 Colombian female journalists by the University of the Andes found that
    60% had reported experiencing some form of gender-based violence at work. Most
    of the victims, 79%, identified their superiors as the aggressors. “I’m going
    to give every day of my life to ensure this movement is not in vain nor just a
    Twitter trend,” said Paula Bolívar Pinilla, 33, co-director of the website Brava
    News, which is also a part of the group that is receiving the #YoTeCreoColega
    allegations. “These women have trusted us,” said Catalina Botero, 30, a former
    Caracol presenter now at RTVC. “I sincerely hope that silence is no longer an
    option for anyone, for any young journalist who enters a media outlet with so
    many dreams in her head and heart. I hope no one ever again steals that dream
    from any woman,” she added.'
