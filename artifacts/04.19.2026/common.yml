  question_type: Reading Comprehension
  questions:
  - answer: B
    explanation: 文章指出，不同于富裕的侨民可以选择离开，大部分外籍劳工是由于战争和冲突的影响被迫离开，且许多企业停止招聘，如孟加拉国去往海湾国家的移民许可数量大幅下降。
    options:
      A: They are choosing to return home to pursue better local opportunities.
      B: Many are being forced to leave their jobs due to war-related instability.
      C: They are finding new, safer employment within the Gulf countries themselves.
      D: Their migration to the Gulf has increased despite the rising regional dangers.
    q_number: 1
    stem: Which of the following describes the impact of the conflict in the Gulf
      on South and South-East Asian migrants?
  - answer: C
    explanation: 文章提到，汇款对尼泊尔的GDP贡献达四分之一，对孟加拉国贡献达6.5%。对于像Saimum Islam这样的务工者而言，这些汇款是维持家庭生活的支柱。
    options:
      A: They are the main source of foreign direct investment for state-run firms.
      B: They serve as a secondary supplement to domestic agricultural productivity.
      C: They constitute a substantial portion of national GDP and support basic livelihoods.
      D: They are primarily used to repay debts incurred during the migration process.
    q_number: 2
    stem: According to the text, what is the primary significance of remittances for
      countries like Nepal and Bangladesh?
  - answer: B
    explanation: 研究指出，汇款常用于资助教育，从而帮助劳动力从低生产率的农业转向高薪工作。因此，汇款减少会导致长期的教育融资缺口，损害人力资本积累。
    options:
      A: To explain the economic rationale behind migrant workers' preference for
        the Gulf.
      B: To highlight the long-term negative effects of reduced remittances on human
        capital.
      C: To prove that farm labor is more productive than working abroad in the long
        run.
      D: To show that remittances are mainly used for luxury consumption by migrant
        families.
    q_number: 3
    stem: Why does the author cite the study by Gaurav Khanna and his colleagues?
  - answer: C
    explanation: 文章提到，通往海湾国家的迁移路径成熟且配套完善（中介、招聘人员等），而日本和韩国在接纳外籍劳工方面态度谨慎，且缺乏像海湾地区那样成熟的移民网络。
    options:
      A: The lack of interest among South Asians in working in Japanese or Korean
        markets.
      B: The superior human rights conditions already present in the Gulf compared
        to East Asia.
      C: The absence of established, efficient recruitment infrastructure in East
        Asian nations.
      D: The rapidly growing and youthful populations in Japan and South Korea.
    q_number: 4
    stem: What is the main obstacle to shifting migration flows from the Gulf to East
      Asia?
  - answer: C
    explanation: 文章结尾提到孟加拉国与马来西亚签署的双边协议，以及作者提出的“劳务外交”概念，暗示在海湾地区路径受阻的情况下，各国正被迫通过双边协议等方式开辟新的迁移途径。
    options:
      A: Diplomatic efforts are unlikely to yield significant results in opening new
        markets.
      B: Migrants will soon be able to return to the Gulf as the infrastructure is
        rebuilt.
      C: Countries may be compelled to develop alternative migration paths through
        bilateral agreements.
      D: The OECD average of migrant populations is expected to decrease globally.
    q_number: 5
    stem: What can be inferred about the future of Asian labor migration from the
      text?
  source_journal: Economist
  title: Collapsing remittances will compound Asia’s energy shock
