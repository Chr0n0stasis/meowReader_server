  body_text: 'Europe’s populist right should be outvoted rather than ostracised Europe
    | Charlemagne Europe’s populist right should be outvoted rather than ostracised
    Imagining there’s no fascists is a bad strategy March 26th 2026 Imagine there’s
    no fascists. It’s easy if you try. Even those harbouring merely populist right-wing
    opinions can be magicked out of mind, at least in Belgium. Since the 1980s its
    Francophone half has enacted a policy of shutting out any politicians with views
    beyond the centrist consensus. Under this cordon sanitaire, or political firewall,
    voters are meant to be protected from the wrong ideas—perhaps a politico’s argument
    that immigration should be curbed, or an intemperate diatribe against the European
    Union. Broadcasters stifle such demagogic views by refusing to interview politicians
    who spout them. Anyone with unpalatable leanings who is nonetheless elected can
    expect to be excluded from fellow parliamentarians’ coalitions. Even foreigners
    can fall foul of this ideological purity test. In 2025 J.D. Vance delivered a
    rabble-rousing speech at the Munich Security Conference, among other things denouncing
    the existence of such firewalls. Because of the American vice-president’s supposed
    extremism, a Belgian media outlet was reprimanded merely for transcribing his
    words. To admirers this is basic political hygiene: why should democracies provide
    a platform to those whose ideology might, given the opportunity, do away with
    democracy altogether? Have people learnt nothing from the 1930s? To critics the
    cordon is a velvet gag circumscribing free speech. Either way, a policy that once
    prevailed in much of Europe is fraying by the day. The xenophobic Alternative
    for Germany (AfD), illiberal National Rally (RN) in France, reactionary Brothers
    of Italy and their fellow travellers on the populist right remain beyond the pale
    for many voters—justifiably so. But their formal exclusion from the polity is
    no longer an article of political faith. Good. Though there is little to cheer
    about the march of populism, it is far better to take on Europe’s nastiest ideologies
    than to pretend they can be wished away. Once a continent-wide phenomenon, the
    cordon is these days a variable affair. In France it is still considered de rigueur
    for voters to plump for any run-off candidate standing against the RN—one factor
    behind the party’s relatively poor showing in mayoral elections on March 22nd.
    Centrist Germans, mindful of history, still apply a firewall against the AfD,
    refusing to forge coalitions with it whether nationally or at state level. (Plum
    jobs such as parliamentary-committee chairmanships are often denied, too.) In
    some Nordic countries the populists have been brought into government coalitions
    and came out somewhat moderated. By contrast Austrian and Dutch populist parties
    have taken part in governments, but with no indication they have since mellowed.
    Hence one argument against the cordon sanitaire: it simply has not worked. Both
    in France and Germany, parliamentary votes in recent months have passed only with
    the support of populist parties—a form of co-operation that would once have been
    unthinkable. But the most conspicuous breach of the cordon has taken place in
    Brussels, the home of the very institutions decried by so many populists. A slew
    of votes in the European Parliament have been carried through an alliance of the
    centre-right with populist parties that were once deemed on the wrong side of
    the firewall. In theory, mainstream parties working together have a majority to
    pass any legislation put forward by the European Commission. In practice, corralling
    all MEPs from centrist parties can be fiddly, so the centre-right has at times
    courted the votes of populists instead. Legislation relating to migration or business
    regulation has been passed only thanks to additional votes from politicians affiliated
    with the RN and the AfD. This has upset Friedrich Merz, the German chancellor,
    who has angrily denied that his centre-right group has co-ordinated votes with
    allies of the AfD. Worse still, in both Germany and France populist parties have
    if anything benefited from their status as pariahs. How better to show off your
    chops as political truth-telling outsiders taking on a rotten political cartel
    than to have centrist incumbents treat you with disdain? The AfD is neck and neck
    with the centrist Christian Democrats at the top of German polls; there is every
    chance the RN’s candidate will lead the first round of the French presidential
    election next year. The firewall thus looks less like a firm bulwark against extremism
    than an effective incubator for it. Centrists determined to counter populists,
    for example by forging unwieldy coalitions to keep them out, have turned the nasties
    into the only plausible political alternative. Ach je! Part of the issue of firewalls
    is that nobody agrees where they should be erected. Giorgia Meloni, Italy’s prime
    minister, was once dismissed as a barely reconstructed fascist; these days she
    is treated as an honorary centrist. Ursula von der Leyen, boss of the European
    Commission, has taken a pragmatic view over dealing with those from the political
    fringes. As long as they adhere to the rule of law, support Ukraine and don’t
    endlessly bash the EU, they can be included in potential coalitions. That provides
    an incentive to the likes of Ms Meloni to sand down rough edges. Other politicians
    wonder why the populist left, often as extreme as their right-fringe rivals, should
    not be subject to its own firewall. The cordon sanitaire has a more fundamental
    problem. To treat populists as pariahs is to belittle their supporters. Discomfiting
    as it may be, institutions should reflect all voters, not just those whose views
    incumbents agree with. The import of a vote cannot be conditional on people having
    plumped for the “right” ideas. It is defensible for centrist parties to avoid
    coalitions with rivals whose views they deem wholly at odds with their own. To
    disagree is the essence of politics. But that requires acknowledging the other
    side exists, and may even have a point. Yes, that might “normalise” the AfD and
    RN, to the horror of bien-pensants. But look at the polls: they are the norm now.
    ■ Subscribers to The Economist can sign up to our Opinion newsletter , which brings
    together the best of our leaders, columns, guest essays and reader correspondence.
    This article was downloaded by zlibrary from https://www.economist.com//europe/2026/03/25/europes-populist-right-should-be-outvoted-rather-than-ostracised'
