  body_text: 'Is Cuba Next? Letter from Havana Is Cuba Next? Trump’s campaign to topple
    foreign adversaries encounters a battered but defiant regime. By Jon Lee Anderson
    March 23, 2026 At the end of January, Havana was struck by a frente frío, a cold
    front that blew off the ocean and plunged the island into unaccustomed wintry
    weather. As high winds sent waves crashing over the seaside promenade, the city’s
    inhabitants wrapped themselves in whatever warm clothing they had, or else huddled
    inside against the chill. On the afternoon of the twenty-ninth, a group of senior
    Latin American diplomats were among those taking refuge from the weather. They
    had met at an ambassador’s residence, to discuss a new executive order from Donald
    Trump that declared Cuba a threat to “the national security and foreign policy
    of the United States.” The diplomats were shocked by its contents. “The perversion
    of the language is incredible,” one said. “Word by word, it’s harsher than the
    language that Kennedy used to talk about the Soviet missiles”—the crux of a standoff,
    in 1962, that brought the world close to a nuclear conflagration. Trump’s order
    had asserted, without any evidence, that Cuba “destabilizes the region through
    migration and violence,” promotes schemes “to harm the United States and support
    hostile countries,” and provides sanctuary to Hamas and Hezbollah. He vowed to
    cut the island off from oil imports and warned that any other nation that sought
    to supply fuel would be punished. Podcast: The New Yorker Radio Hour David Remnick
    talks with Jon Lee Anderson. For most Cubans, the order meant that their already
    difficult lives were about to get considerably worse. For months, the island had
    faced daily electricity blackouts owing to a lack of fuel, along with severe shortages
    of food, water, and medicine. Economic activity had all but stopped, and the government,
    which was essentially broke and unable to secure new loans, had been incapable
    of providing solutions. Even garbage collection was virtually nonexistent, with
    huge mounds of refuse piling up on street corners. In the past eighteen months,
    three powerful hurricanes have destroyed countless homes and vast expanses of
    cropland, displacing more than a million people. When the executive order came,
    Cuba was on life support; Trump’s action effectively shut the oxygen off. The
    diplomats had been meeting regularly to monitor Trump’s Cuba policy, which they
    viewed with increasing alarm. “They say they want to harm the government, not
    the people,” one told me. “Well, this is harming the people.” On January 3rd,
    U.S. Special Forces had abducted the Venezuelan President, Nicolás Maduro, from
    Caracas, in a raid that many Cubans regarded as both an act of imperialist aggression
    and a warning. For decades, Venezuela had been Cuba’s greatest sponsor; along
    with Mexico, it provided about seventy per cent of the island’s oil. After Maduro
    was seized, the U.S. military imposed what amounted to a blockade, intercepting
    tankers carrying Venezuelan oil to Cuba. Analysts predicted that the island’s
    petroleum reserves would run out in a matter of weeks. At Havana’s few functioning
    gas stations, vehicles lined up for as long as twenty-six hours. With supplies
    dwindling, the government instituted an emergency gas quota of five gallons a
    day, shortened school hours and government workweeks, and suspended some medical
    procedures in hospitals. Meanwhile, Trump issued a series of celebratory messages.
    “Cuba looks like it is ready to fall,” he told reporters. Asked whether he intended
    to intervene there, he demurred. “I don’t think we need any action,” he said.
    “It’s going down.” A few days later, he was back to posting threats on Truth Social:
    “ THERE WILL BE NO MORE OIL OR MONEY GOING TO CUBA – ZERO! I strongly suggest
    they make a deal, BEFORE IT IS TOO LATE .” He insisted that Cuba was desperate
    to negotiate. “They have no money,” he said at one point. “They have no anything
    right now.” The President of Cuba, Miguel Díaz-Canel, issued a defiant statement.
    “Those who turn everything into a business deal, even human lives, have no moral
    standing to call out Cuba,” he said. The Communist Party newspaper, Granma , ran
    a photograph of a crowd waving Cuban flags under the headline “Nobody Tells Us
    What to Do.” This turned out to be bluster, just as Trump’s statements were. Representatives
    of the Cuban government were already in negotiations with the U.S. about the countries’
    relationship, and about the future of the island. In March, Díaz-Canel finally
    acknowledged the talks, describing them as a diplomatic exchange between two sovereign
    nations. He said that the goal was to “identify the bilateral problems that need
    a solution,” adding, “This is a very sensitive process that is being approached
    with responsibility and great sensitivity.” Trump cast the talks instead as a
    matter of personal domination. “I do believe I’ll be having the honor of taking
    Cuba,” he said. “I think I can do anything I want with it.” When I visited Cuba
    earlier this year, the formerly bustling old city of Havana was nearly deserted.
    Since 2021, an estimated one in five Cubans has left the island, seeking a better
    life. Tourism has collapsed, too, removing a main source of foreign revenue and
    leaving a listless, despondent air. The Plaza de Armas, a sixteenth-century square
    that once drew crowds of visitors, was virtually empty, occupied by an elderly
    woman sitting alone, a man blowing softly into a trumpet, and a legless man in
    a wheelchair, staring into a fenced-off garden in the middle of the square. The
    stillness was broken only by the arrival of a local character known as La Marquesa,
    who strode across the plaza, wearing a cream-colored skirt and blouse and a white
    sun hat, shouting that he was the “boss of everything.” Everyone I talked with
    was organizing their days around dealing with the crisis. Leonardo Padura, Cuba’s
    best-known novelist, told me about his frustrated efforts to buy a home power
    station for his elderly mother-in-law, to provide light when the electricity goes
    out. Many of the island’s young people have left, and the elderly struggle to
    care for themselves. One friend couldn’t secure enough fuel to drive to the market
    for food, and couldn’t find medicine for a heart condition, so I brought some
    with me. Another, a widow in her late seventies, was hobbled by chikungunya, a
    mosquito-borne disease that causes painful swelling of the joints and extremities.
    (An anti-inflammatory was available on the black market, but at an unthinkable
    price.) Malnutrition and a breakdown in public-health services have led to an
    increase in viral illnesses. Since last autumn, tens of thousands of Cubans have
    been afflicted by chikungunya, along with dengue fever and Oropouche. Amid the
    crisis, President Díaz-Canel could offer only more of the same. Díaz-Canel took
    office in 2018, as Raúl Castro’s handpicked successor. He is sixty-five, a burly
    man with the slicked-back silver hair of a college basketball coach. Before Raúl
    elevated him, he was a provincial Party boss in Villa Clara—an unassuming apparatchik,
    so humble that he sometimes rode a bicycle to work. As the first President in
    half a century who is not a member of the Castro family, he has been careful to
    present himself as a loyalist. He routinely refers to Raúl—who remains the island’s
    crucial political voice, despite being ninety-four and officially retired—as his
    jefe máximo . When he ran for election, his campaign put up billboards with an
    image of Díaz-Canel and the Castro brothers alongside the slogan “Continuity.”
    As President, Díaz-Canel has widely been seen as hapless and jinxed. The month
    after he took office, a plane crash in Havana killed a hundred and twelve people.
    A devastating tornado landed the next year, and in 2022 an explosion from a suspected
    gas leak destroyed Havana’s historic Hotel Saratoga, killing forty-seven people.
    There was the COVID -19 pandemic, which vitiated the health-care system and the
    tourism sector; there was also a string of explosive nationwide protests, in 2021,
    which the government harshly put down, helping to spur the exodus. The electrical
    grid was decrepit, and blackouts were commonplace. Díaz-Canel blamed Cuba’s economic
    struggles, as the Castros had, on crippling U.S. sanctions, which have been in
    place since 1962. By early this year, Cuba was clearly weakened, and Trump always
    likes to negotiate from a position of strength. (As his Defense Secretary, Pete
    Hegseth, recently said about the U.S. bombardment of Iran, “We are punching them
    while they’re down, which is exactly how it should be.”) But Republicans were
    divided over the approach. America’s policy toward Cuba has been influenced for
    decades by Cuban American leaders in Miami, who have insistently ruled out negotiating
    with the Castro government. Last year, I saw Representative Carlos Giménez, an
    influential figure in Florida politics, and he likened the regime to a cancer,
    which needed to be forcibly extracted from the body. Trump’s Secretary of State,
    Marco Rubio, grew up in Florida, the son of Cuban immigrants. For most of his
    career, he held a similarly uncompromising position on the regime. In 2015, he
    wrote, “We must never forget that the only true form of independence for the Cuban
    people is freedom and democracy, and we must recommit our state and nation to
    the goal of helping them achieve that vital objective.” But, now that Rubio works
    for a President whose foreign policy is almost entirely transactional, he has
    often been willing to amend his old views. Rather than force out the Cuban government,
    the U.S. would try to choke it into submission. “We would love to see the regime
    there change,” Rubio told the Senate Foreign Relations Committee this winter.
    “That doesn’t mean we’re going to make a change.” During my visit, everyone I
    talked to was worried about the country’s vulnerability, but few were worried
    about whether the government would survive. As I arrived to visit one friend,
    who had spent decades in the service of the Revolution, he peered around the door
    and cracked, “Where’s Delta Force?”—a reference to the military unit that had
    snatched Maduro a few weeks earlier. He laughed bitterly. “I don’t care anymore
    how it happens, but this situation has to end.” As the oil blockade dragged on,
    Trump sometimes talked about “being kind” to Cuba. If this meant anything, it
    seemed to mean that he wasn’t rushing to launch a military strike. There was little
    incentive for one, especially when the U.S. had a large share of its military
    forces tied up in the war in Iran. Cuba has no unifying leader to remove, and
    not much oil to seize; its most valuable resources are cobalt, tobacco, nickel,
    and waterfront real estate. (One friend there asked, half joking, whether an attack
    could be averted by offering Trump beachside property in Varadero, the island’s
    most famous resort destination. “El Trump Varadero,” he said. “It has a ring to
    it.”) Last spring, Trump’s special envoy for Latin America, Mauricio Claver-Carone,
    called for “surgical” and “creative” measures to reshape Cuba. (Claver-Carone
    has since left the Administration, but several sources told me that he remains
    a key White House intermediary in Latin America.) Along with the oil embargo,
    the “surgical” measures included restricting tourists’ access to the island and
    deterring other countries from hiring Cuban doctors, a major revenue source for
    the regime. These efforts were augmented with a series of “creative” interventions.
    After Hurricane Melissa devastated eastern Cuba, in October, Ambassador Mike Hammer
    arranged for humanitarian aid—but he delivered it through the Catholic Church,
    circumventing the Cuban government and undercutting its own relief efforts. This
    winter, the Trump Administration enabled several American firms to sell fuel oil
    to companies in Cuba. Rubio made clear that they were forbidden to offer the oil
    to the government; the goal was to empower private enterprise at the expense of
    the state. At a dinner in January, Hammer gleefully predicted that the regime
    would fall before the year’s end. Cuba has been through hard times before. The
