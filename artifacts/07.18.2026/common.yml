  body_text: 'Mexico’s broken economy The Americas | Becalmed Mexico’s broken economy
    Claudia Sheinbaum’s government is tinkering, not reforming March 26th 2026 Mexico’s
    president, Claudia Sheinbaum, says the economy is ticking along. In private she
    and her government are more concerned. Mexico’s economy grew by 0.8% in 2025,
    Ms Sheinbaum’s first full year in power. It was Mexico’s worst growth rate since
    the pandemic, and the slowest growth of any large economy in Latin America. Mexico’s
    monthly labour-market survey shows that formal employment contracted. Investment
    fell too. Weak growth is not new for Mexico. In the past three decades the economy
    has expanded by about 2% a year, well below peers like Brazil and Turkey. Investment
    has never grown strongly. The government says a turnaround is under way, that
    Mexico’s woeful 2025 is just a blip. Vidal Llerenas, an official at the economy
    ministry, says the first year in power is always tricky. New policies are being
    designed. The outgoing government tends to spend in the election year leaving
    the new government short of cash for public investment. The conditions for a turnaround
    are bad. Low investment is holding growth back. It fell by 6.6% in 2025, compared
    with the year before. Public investment alone plunged by 28%, the steepest drop
    in over three decades, as the government slashed construction spending. Private
    purchases of machinery and equipment also fell, as firms held back. Most analysts
    think the economy will grow by between 1.4% and 1.8% in 2026. The projected growth
    would be barely enough to keep pace with the expansion of the population, says
    Gabriela Siller of Banco Base, a local bank. And it is too low to meet a core
    promise of Ms Sheinbaum’s party, Morena, to raise living standards. Mexico’s GDP
    per person has slipped back to what it was in 2017. Donald Trump’s trade policy
    has hurt. Tariffs on cars, steel and aluminium have hit Mexico’s largest export
    sector. Vehicle-export volumes fell by 2.7% in 2025. The United States-Mexico-Canada
    Agreement (USMCA) is now under formal review. By July 1st the parties must decide
    whether to extend the agreement for 16 years or trigger the process which ends
    the deal. Investors dislike this uncertainty. But while external risks generate
    headlines, they are not the main cause of Mexico’s economic slump. Overall exports
    grew by 7.6% in 2025, producing Mexico’s first trade surplus since 2020. This
    stopped the economy slipping into recession. Although overall investment fell,
    foreign direct investment rose by 10.8% in 2025. Local firms are more wary than
    foreign ones. Mexico’s weakness is domestic. Perhaps the biggest problem is informality,
    which has long defined Mexico’s labour market (see chart). Many business owners
    try to stay out of sight of the tax authorities, eschewing investment and credit.
    This allows them to avoid registering their employees and the costs that come
    with that: mandated minimum wages, social-security contributions and tax-compliance
    costs. As a result, about 55% of workers in Mexico are informal, engaged in low-tech,
    unproductive jobs. Due, in part, to this, the productivity of Mexican workers
    is roughly one-third of those in the United States. Buoyed by free trade with
    the United States, Mexico’s formal economy has done well since Morena took control
    in 2018. But the informal sector lags. Morena has not helped. The minimum wage
    was 37% of the median wage in 2014. Morena has increased it to over 75%. This
    eased poverty; wages for informal workers have gone up too, as the new minimum
    makes very low pay less socially acceptable. But it is a brake on formalisation
    and growth. Rather than pursue tax reform—essential, given Mexico’s tax revenue
    as a share of GDP is the lowest in the OECd—Ms Sheinbaum’s government has chased
    large firms for unpaid tax bills, calculated retroactively in a way some firms
    say is arbitrary. Successive Morena governments have also generated worrying uncertainty
    for Mexico’s formal employers with a flurry of constitutional reforms, a complete
    reshaping of the justice system and greater state control over the supply of energy
    and water. “In a short period of time they changed the rules of the game,” says
    Pedro Casas, head of the American Chamber of Commerce in Mexico City. This creates
    vast incentives for the owners of smaller firms to remain off the books. The unreliable
    supply of electricity is also constraining growth, says Antonio Ortiz-Mena of
    Georgetown University. The constitution requires the government to control the
    energy supply. The expansion plans of CFE, the state utility, call for $29bn to
    be spent cumulatively on electricity generation and transmission by 2030. But
    Ms Sheinbaum’s government cannot foot the bill. The fiscal deficit was 5.7% of
    GDP in 2024, the year before she took office, the highest in 36 years. This year
    pensions, social programmes, debt service and mandatory transfers will consume
    the bulk of the 10.2trn peso ($570bn) budget, leaving little for anything else.
    As a result Ms Sheinbaum is trying to court private money to meet CFE’s goal.
    A new framework for “mixed contracts”, published in January, gives private firms
    a way to invest in energy projects alongside CFE. Plan México, Ms Sheinbaum’s
    six-year economic strategy, talks of pushing Mexico up the rankings to become
    one of the ten largest economies by 2030. It aims for investment to reach 28%
    of GDP, and to create 1.5m manufacturing jobs. All this appears out of reach.
    The economy would need to outgrow its peers by 4% annually to break into the top
    ten. Mexico lost 130,000 formal manufacturing jobs in 2025. Ms Sheinbaum is willing
    to make sweeping constitutional changes when her party wants them. But when it
    comes to reviving Mexico’s flatlining economy, she has so far confined herself
    to tinkering. ■ Sign up to El Boletín , our subscriber-only newsletter on Latin
    America, to understand the forces shaping a fascinating and complex region. This
    article was downloaded by zlibrary from https://www.economist.com//the-americas/2026/03/26/mexicos-broken-economy'
