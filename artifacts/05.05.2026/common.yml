    California, and his lab has identified many more peptides. “The rule in my lab
    is, if you discover it, you get to name it—but I have veto power,” he told me.
    “I like Yiddish names.” SHLP stands for “small humanin-like peptide”; SHMOOSE
    stands for “small human mitochondrial ORF over serine tRNA.” Other discoveries
    include MENTSH and PUTZ . His team is best known for identifying MOTS -c, which
    has been called an exercise mimetic: it activates cellular pathways that are usually
