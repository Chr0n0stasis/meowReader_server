  body_text: 'Why Are People Injecting Themselves with Peptides? Brave New World Dept.
    Why Are People Injecting Themselves with Peptides? Health and wellness influencers
    are hawking unapproved treatments on the gray market. The future of the F.D.A.—and
    the health of consumers—is at stake. By Dhruv Khullar April 06, 2026 About a decade
    ago, a group of competitive CrossFitters in Charleston, South Carolina, went looking
    for ways to improve their athletic performance without taking steroids. At the
    time, members of the fitness community were starting to inject themselves with
    peptides—short chains of amino acids, sometimes called microproteins, that often
    act as signalling molecules in the body. Certain peptides were said to enhance
    strength, energy, endurance, and recovery. They hadn’t been officially approved
    for use as drugs, however, and many had never been studied in humans. Some of
    the CrossFitters were patients of a local doctor named Craig Koniver, who had
    trained in family medicine but went on to offer Botox treatments and skin fillers,
    as well as I.V. drips that were supposed to slow aging. “People are really enjoying
    the benefits,” the CrossFitters told Koniver, of peptides. Would he help the group
    figure out which to inject, in what doses, and how often? Koniver began ordering
    peptides from compounding pharmacies, which produce custom medications. He tinkered
    with various doses, often extrapolating from animal studies, and tried some on
    himself. He gained a reputation for peptide wizardry. “My name got passed around,”
    he told me. Rick Rubin, the music producer, introduced Koniver to the neuroscientist
    and podcaster Andrew Huberman, who invited him onto his hugely popular show in
    2024. (“You’re going to get blitzed,” Koniver remembers Huberman saying.) On the
    podcast, Koniver said that “almost everyone I could think of” can benefit from
    peptides, and he highlighted an “awesome, supersafe” example called BPC-157. In
    the month that followed, eight hundred new patients requested appointments. He
    now sees a total of about a thousand; six thousand more are on a wait list. A
    membership to his practice can cost fifteen thousand dollars a year, suggesting
    a revenue in the tens of millions. “I could charge more,” Koniver said. “But I
    want to sleep well at night.” In February, I flew to Charleston and met with Koniver
    in a modern red brick building that houses his clinic. He and his wife, Keli,
    have a sort of his-and-hers practice: she co-founded a wellness spa next door.
    Koniver greeted me in his waiting room, which featured a soft-rock soundtrack
    and brochures for serums and stem cells. His bald head, goatee, and glasses made
    him look like a friendlier version of Walter White, from “Breaking Bad.” “Peptides
    are usually the opening question we get,” Koniver told me, in his office. He described
    many of his clients as “the well who want to be super well”—celebrities, politicians,
    models. “We don’t take insurance, obviously.” I spotted a Raiders helmet signed
    by Howie Long, a defensive end turned Fox Sports analyst, on a bookshelf. On a
    computer, Koniver showed me an electronic ordering system that looked much like
    the one I use to treat hospitalized patients. But his system, unlike mine, allows
    him to request unapproved peptides in bespoke combinations, or “stacks.” Next,
    Koniver led me to the clinic’s I.V.-infusion room, where he offered me a poke
    bowl for lunch. Concoctions were scrawled on a dry-erase board like specials in
    a diner; one was described as “Dr. Koniver’s blend” of vitamins, minerals, and
    amino acids. He asked me if I’d like a complimentary drip of methylene blue, a
    chemical dye that is increasingly marketed for improving longevity and memory.
    I knew it as a last-resort blood-pressure drug that, at high doses, constricts
    blood vessels so much that it can cause gangrene. I accepted the poke but declined
    the drip. After lunch, a new patient, a handsome middle-aged man I’ll call Toby,
    eased into a recliner topped with a fluffy pillow. A nurse inserted an I.V. into
    one arm; Koniver shook his other hand, saying, “Welcome aboard!” Toby and his
    family had recently been in a car accident, but he’d lost trust in most doctors,
    he said, after they became “obsessed” with viruses and vaccinations during the
    pandemic. He was glad that Robert F. Kennedy, Jr., the Secretary of Health and
    Human Services, was getting the country “on the right track.” “I’m not a big vaccine
    guy,” Koniver replied. “A lot of them don’t have the data.” Toby wasn’t here for
    a peptide injection, but Koniver advised him to try one on a future visit. “I’ve
    seen tremendous results,” he said. He also said that one of his I.V. drips, which
    includes methylene blue, makes his patients “feel like they’ve been plugged into
    an electrical socket.” “Love that!” Toby responded. I was puzzled, perhaps naïvely,
    that little-studied peptide shots had earned Koniver’s trust, while meticulously
    studied COVID -19 vaccinations had not. “Anecdotal data means a lot to me,” he
    said. “Two days after a vaccine, someone has a stroke. Two days later, they’re
    dead. . . . You see enough of that, it makes an impression.” In recent years,
    federal efforts to control peptides have placed Koniver at odds with public-health
    agencies. In 2023, during Biden’s Presidency, the Food and Drug Administration
    placed nineteen peptides, including BPC-157, on a “do not compound” list, citing
    “potential significant safety risks” that included immune reactions, pancreatitis,
    and accelerated growth of cancerous cells. In response, Koniver began offering
    a peptide that differed by a single amino acid. “So far, we’re getting very similar
    results,” he told me. In 2024, Koniver was sanctioned by South Carolina public-health
    officials who found, among other things, that he’d failed to maintain his registration
    with the Drug Enforcement Administration while prescribing controlled substances,
    and that he’d neglected to check patient vital signs before administering ketamine.
    Koniver attributed these lapses to charting issues and said that no patients were
    harmed. “There was never a clinical complaint,” he added. He paid a ten-thousand-dollar
    fine and agreed not to administer ketamine or testosterone for a year. The state
    of New York, where he was also allowed to practice, ordered him to surrender his
    medical license there. As far as peptides go, Koniver seemed to support America’s
    public-health agencies coming under new management. “Some of my patients are very
    high up in the government,” he said. “They’re extremely concerned about what the
    F.D.A. is doing to peptides.” In the era of Make America Healthy Again, the popularity
    of peptides has risen. Many compounding pharmacies are experiencing soaring demand;
    the Times reported that U.S. imports of gray-market peptides and hormones from
    China roughly doubled last year. The podcaster Joe Rogan has credited BPC-157
    with healing a case of elbow tendonitis in two weeks. Beauty influencers who want
    deeper tans and enhanced libidos are taking Melanotan II, also known as the “Barbie
    peptide.” Even New York magazine recently published a freelance writer’s account
    of self-injecting peptides, titled “Life on Peptides Feels Amazing,” which failed
    to cite any peer-reviewed research or academic scientists. In February, R.F.K.,
    Jr., said, on Rogan’s podcast, that he had taken peptides himself and that, under
    his leadership, the F.D.A. would stop restricting many of them. Kennedy, who has
    railed against the agency’s “aggressive suppression” of unproven treatments, has
    vowed to “end the war.” The human body produces thousands of peptides. Many are
    portions of proteins which send messages or regulate systems in the body, often
    in ways that scientists don’t fully understand. Researchers have known about some
    peptides for decades, and dozens have been turned into safe and effective drugs.
    The hormone insulin is a peptide that moves sugar from the bloodstream into cells;
    GLP-1, or glucagon-like peptide-1, spurs the pancreas to release insulin and slows
    the passage of food through the gut. (Peptides are usually defined as having about
    fifty amino acids or fewer; more than that and they’re proteins.) But the science
    underpinning the current peptide craze dates to the turn of the century, when
    Pinchas Cohen, a respected pediatric endocrinologist at the University of California,
    Los Angeles, started to focus on age-related diseases. For one project, Cohen
    tried to disrupt a protein associated with insulin resistance and diabetes. By
    injecting human DNA into yeast cells, he was able to produce several chains of
    amino acids that clung to his target. Cohen told me that the first two chains
    were known proteins, but the third was “this ridiculous little thing” made up
    of only twenty-four amino acids. Strangely, he couldn’t figure out where it had
    come from. According to the conventional wisdom of the day, the DNA he’d injected
    shouldn’t have coded for it. The peptide, humanin, was ultimately traced to a
    tiny snippet of mitochondrial DNA—part of the ninety-eight per cent of the human
    genome that had long been dismissed as “junk DNA.” Cohen’s work helped reveal
    that, in the three-billion-letter book that is our genome, even obscure one-liners
    can be an important part of the story. Junk DNA, it turned out, wasn’t junk: it
    contains instructions for numerous peptides and proteins that had never been studied.
    “The public conception of peptides doesn’t grasp what’s going on from a scientific
    perspective,” Cohen told me. “This is not a dozen or so things you can buy at
    the gym. This is a revolution in science. It’s going to start a new era of drug
    discovery.” Cohen had little control over how his groundbreaking research would
    be used, however. After he published a series of animal and cell studies on humanin’s
    potential benefits—the peptide seemed to curb inflammation, control glucose, and
    possibly even provide protection against Alzheimer’s—so-called biohackers began
    ordering it on the gray market. Cohen himself tried to develop it as a drug, but
    the peptide was so unstable that it broke down within minutes. More concerning,
    humanin was eventually linked to breast and brain cancers. Nonetheless, it continued
    to be sold online. Koniver told me that he has taken it. “I have no idea what
    people are injecting,” Cohen said. “Probably fragments of degraded material.”
