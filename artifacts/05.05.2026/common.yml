- article_update_date: 04.02.2026
  body_text: The discovery of high-temperature superconductivity in bulk La 3 Ni 2
    O 7 under high hydrostatic pressure1−4 and biaxial compression in epitaxial thin
    films5−8 has ignited significant interest in understanding the interplay between
    atomic and electronic structure in these compounds. Subtle changes in the nickel-oxygen
    bonding environment are thought to be key drivers for stabilizing superconductivity,
    but specific details of which bonds and which modifications are most relevant
    remains so far unresolved. While direct, atomic-scale structural characterization
    under hydrostatic pressure is beyond current experimental capabilities, static
    stabilization of strained La 3 Ni 2 O 7 films provides a platform well-suited
    to investigation with new picometer-resolution electron microscopy methods. Here,
    we use multislice electron ptychography (MEP)9,10 to directly measure the atomic-scale
    structural evolution of La 3 Ni 2 O 7 thin films across a wide range of biaxial
    strains tuned via substrate choice. By resolving both the cation and oxygen sublattices,
    we study the strain-dependent evolution of atomic bonds, providing the opportunity
    to isolate and disentangle the effects of specific structural motifs for stabilizing
    superconductivity. We identify the lifting of crystalline symmetry through modification
    of the nickel-oxygen octahedral distortions under compressive strain as a key
    structural ingredient for superconductivity and identify in-plane lattice compression
    as a common attribute between bulk and thin film superconductivity. Building upon
    the detailed structures obtained by MEP, we introduce a theoretical framework
    to disentangle coupled structural distortions in corner-sharing octahedra11, which
    suggest that both known superconducting geometries of La 3 Ni 2 O 7 (hydrostatic
    pressure and compressive strain) suppress local t 2g orbital mixing in the low-energy
    Ni bands by raising the octahedral symmetry.
