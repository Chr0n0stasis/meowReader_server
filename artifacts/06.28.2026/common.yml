  body_text: 'How the Treat conquered politics Britain | Bagehot How the Treat conquered
    politics From welfare state to funfair state May 28th 2026 Rachel Reeves entered
    office with a morose message. “If we cannot afford it, we cannot do it,” said
    the new chancellor in July 2024, cancelling an array of transport projects and
    scrapping winter-fuel payments for the elderly for good measure. On May 21st,
    announcing £300m-worth ($403m) of vat cuts on a host of theme parks and children’s
    meals, she struck a very different tone. “Prices have been pushed up,” wrote Ms
    Reeves in the Daily Mirror, “and when that happens, it is life’s little treats
    that can fall by the wayside, such as a meal out, a family holiday or a day trip
    making memories with your kids.” Parliamentarians queued to applaud the “Great
    British Summer Savings”. Why didn’t the chancellor do this sooner? asked a Liberal
    Democrat. A Labour mp invited Ms Reeves to try out the Avikiti, a new £9m gyro-swing
    ride in Blackpool, a seaside resort in north-west England . Ms Reeves was the
    latest politician to surrender to the most powerful force in British politics:
    the Treat. The rise of the Treat began under the Conservatives. During the shocks
    of the 2020s, the state paid people’s wages and then it paid their energy bills.
    In this period, it also did something smaller but more significant: it bought
    everyone lunch. Eat Out To Help Out offered discounts of 50% on meals to encourage
    people back into restaurants. Handing out cash is an everyday event for a state.
    But lunch? This was something new; this was a Treat. It was the beginning of a
    strange evolution of the state, from welfare state to funfair state. In 2026 expectations
    of the state have reached almost absurd levels, with life, death and now the little
    luxuries in between. If people cannot afford a visit to Alton Towers, it is the
    chancellor’s responsibility. Whether governments like it or not, Treats are now
    a matter of state. All in Westminster agree that the “cost-of-living crisis” is,
    by far, the biggest political topic of the moment. It is better understood as
    a “cost-of-treats crisis”. When the phrase first flared up in 2022, calling the
    situation a crisis was justifiable. Inflation was careering along at 11%; typical
    energy bills were set to breach £4,000 a year without government aid. But now
    inflation is at 2.8% (although forecast to rise) and energy bills are less than
    half their terrifying peak. After years of stagnation, real wages are growing,
    though not spectacularly, and have been for three years now. Such economic reality
    comes second to how Britons feel. And how Britons feel depends on Treats. Sit
    through a focus group and people lament that it is small luxuries that have gone—fish
    and chips here, a trip to the cinema there—Luke Tryl, a pollster with More In
    Common, points out. Even anger at energy prices—set to rise by 13% come July—is
    best understood in terms of how they affect treats. For all that the cost of energy
    is high, there are not that many people in the “eating-or-heating” brigade. They
    are far outnumbered by the “heat-or-treats”. It is the Treat economy that just
    about keeps British high streets alive. Corner shops rely on what analysts call
    “the Treat Mission”, where Britons pop out for a little something for themselves.
    (It accounts for one in ten of all shopping trips.) Stroll through Ashton-in-Makerfield,
    one of the towns that make up Makerfield, which is hosting a crucial by-election,
    and treat purveyors are doing well. Nail bars are full on a wet Tuesday afternoon;
    barbers, too, are trading at a clip. Only the Treat can hold the public realm
    together. At this point, one must consider the macroeconomic role of the Treat.
    The Resolution Foundation, a think-tank whose alumni shape British economic policy,
    has argued for higher investment. If Britain wants to invest more, the country
    has to save more and consume less. It had one sector in mind which should shrink:
    hospitality, or rather, Big Treat. Hospitality had gone from 6% of all jobs to
    8% between 1997 and 2024, tutted the think-tank. Treat dominance is a brake on
    productivity growth; someone serving a beer is someone who is not manufacturing
    precision machine-tools. In the Resolution Foundation’s telling, hospitality must
    wither so more productive sectors can thrive. It is the closest thing Labour has
    to a growth strategy. In short the Treat has become both the cause of, and solution
    to, Labour’s problems. Treat politics will not fade. Brexit has only embedded
    it. In the eu, vat exemptions usually require collective sign-off from meetings
    of sour-faced east European finance ministers. It provided the perfect excuse
    for chancellors to declare that, alas, their hands were tied. In Brexit Britain,
    no such binds exist beyond an instinctive scowl from the Treasury’s permanent
    secretary. Now, like an exhausted parent with a nagging child, British ministers
    will give in. Even after the binge, Britain still spends far less than other centre-left
    countries when it comes to the response to Iran. Splurging £300m on theme-park
    bungs is silly. But it is not actively damaging. Spain, whose centre-left prime
    minister, Pedro Sanchèz, makes Labour members go all gooey, spent €5bn (£4.3bn),
    or 0.3% of GDP, on cutting taxes on energy, almost overnight. Even the stingy
    Dutch, who have a liberal-led government, have spent much more. Perhaps looking
    generous is the best way to be frugal. Without more growth, British politicians
    will have to return to Ms Reeves’s original message: if we cannot afford it, we
    cannot do it. Britons have high expectations of a country that is far poorer than
    they think. Fundamentally, the rise of the Treat is a sign of failure, with Britons
    unwilling or unable to provide the joys of life themselves. Labour loudly promised
    higher investment and quietly admitted there would be lower consumption; in the
    end, higher interest rates mean Britons will probably end up with less of both.
    What little economic strategy Labour had has been blown apart. All that is left
    is a discounted ride on the Avikiti. ■ Subscribers to The Economist can sign up
    to our Opinion newsletter , which brings together the best of our leaders, columns,
    guest essays and reader correspondence. This article was downloaded by zlibrary
    from https://www.economist.com//britain/2026/05/28/how-the-treat-conquered-politics'
