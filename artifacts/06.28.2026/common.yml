    menus to be able to cook for vacationers and the population alike. “Ultimately,
    there will be locals who also want food,” Rajput said dryly. After the tea had
    finished its boil, Meraj poured it out, straining the steaming, fragrant liquid
    into small cups. A fugue of car horns rang out from the street—a reminder of the
    squeeze on a country with acute fuel dependencies and little involvement in the
    war, but also of the avidity with which daily life was going on. “The locals are
    facing surging prices,” Rajput said. “But the rest is normal.” ♦'
