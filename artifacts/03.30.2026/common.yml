- article_update_date: 03.27.2026
  body_text: Holly Newson 00:00 Welcome to Working Scientist, a Nature Careers podcast.
    I’m Holly Newson, and in this series, you’ll hear from authors who can help you
    in your career. In this episode, I am joined by Joseph Jebelli, a neuroscientist
    and the author of The Brain at Rest. A book that examines what our brains do when
    we rest, why that rest is so important, and how we can practice different types
    of rest to improve our lives. Joseph, thank you so much for joining me. Joseph
    Jebelli 00:26 Hi Holly, thank you so much for having me. Holly Newson 00:29 So,
    to kick off with, I wanted to ask, what is it about our brains that improves with
    rest? Joseph Jebelli 00:34 So, so much. So, when we rest, when we have true rest
    for the brain. And as I discuss in the book, that could be things like mind wandering,
    daydreaming, having 30-minute naps throughout the day, spending time just staring
    out into space, spending time in nature, in green space, and many other...there
    are many other ways to truly rest your brain. You know, scrolling on your phone,
    I’m afraid to say, doesn’t count or binge-watching Netflix. But we now know that
    when you rest your brain, your brain activates a network that we call the default
    network. And that’s basically a network of neurons that fans out across your brain.
    And the really extraordinary thing is that when you activate your default network
    with rest, and the crucial thing to say here is it only becomes active when you
    rest. So it only becomes active when you step away from your work, when you step
    away from a cognitively-demanding task. I mean, in neuroscience, it’s actually
    called the task-off network. And when you activate that network with rest, we
    now know you improve your intelligence, creativity, memory, problem solving abilities,
    decision making abilities, abilities to predict the future, and like quite a lot
    more. It even lowers your chance of developing diseases like dementia and depression.
    And so, I mean, there’s just an extraordinary amount of benefits and cognitive
    abilities that are gained when you rest your brain. Holly Newson 02:08 And you
    use the term work pandemic in the book. Why is that a term that you think is is
    relevant, is useful? Joseph Jebelli 02:16 Because when you when you dig into statistics,
    the picture of our working lives and the levels of burnout is really quite worrying.
    While it’s true to say that working conditions today are better than they were
    in the past, that there’s no doubt about that. When you actually look at the data,
    we are in a dramatic regression in terms of burnout and overwork. So just to give
    you a few statistics. So we now know that 750,000 people die every year of overwork.
    And the important thing to say is that that is a 20% increase since the year 2000.
    We know that three in five employees now have a lack of energy, motivation and
    really struggle with their work life balance. And that is a 29% increase since
    2019. So, you know, things are moving in the wrong direction. There’s a reason
    we hear a lot about burnout and overwork now. And you know, it’s, it’s, it’s happening,
    you know, all over the world, but it’s particularly prevalent, you know, in America
    and here in England and in Europe. It’s a little bit better in Europe because
    they have better regulations, like, you know, your boss isn’t allowed to bother
    you on the weekends. But in Japan as well, they have a real, they have a big problem
    with it there. They even have a word for working to death called ’karoshi’, which
    I talk about in the book. And so, the reason I call it a pandemic is because,
    you know, when you when you look at the statistics, when you look at the data,
    when you look at all of the really negative health consequences that are coming
    from that. And the fact that we are literally, you know, working ourselves to
    death, I think, you know, a lot of that comes from this, this kind of, I feel
    like it’s a fairly new phenomenon of the hustle mentality. That it’s a kind of
    aspirational thing to be, right, that, you know, the working super hard, that
    it’s that it’s a really good thing for you. And so that’s basically why I describe
    it as a pandemic, because it’s, you know, it’s everywhere, and it’s something
    that some people aren’t noticing, because they just think, well, this is just
    normal, I’m supposed to work really, really hard. But actually, as I explained
    in the book, you know, rest is the real driver of, not only all of your most cherished
    cognitive abilities, but of your best work, and your long-term productivity. So,
    our understanding of work and rest is completely upside down. We, you know, we
    need to be resting a lot more in order to achieve good work. Holly Newson 04:42
    And you write about overwork as well as a condition. So what happens to the brain
    in that state. Joseph Jebelli 04:47 So there’s two ways to look at it. So neurologically,
    we know now that overwork actually thins the frontal cortex in the same way that
    ageing does. So it literally makes the brain older than it is. And it does that
    by basically attacking the dendrites of your neurons. So these are just the fine
    branch, like, branch like projections that come off of the neurons, and they connect
    with other neurons in the brain, and those that basically allows you to think
    and to speak and to feel and to experience everything that your brain, your brain
    does. And those start to basically wither away. And the problem with that is that
    once your dendrites wither away, they’re incredibly hard to regrow, to come back.
    And so we also know that overwork actually, it shrinks the hippocampus, which
    is a region really important for memory, in particular short-term memory. It’s
    one of the first regions attacked by Alzheimer’s disease. And it also strangely
    enlarges the amygdala. And so this is an almond shaped structure deep in the brain
    that’s really important for your fight-or-flight response. And that, that explains
    a great deal as to why overworked people feel very anxious and on edge, and that
    something’s wrong. And there’s an a lot, there’s always, always alarm bells ringing
    in their head. It’s because that their amygdala is enlarged, you know, they’re
    suffering with their their short term memory that because they have, you know,
    the hippocampus is isn’t performing as it should. And so, those are the kind of
