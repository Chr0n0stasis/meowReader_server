  body_text: '| Next | Section menu | Main menu | Previous | Yi-Ling Liu The Big Story
    Jan 20, 2026 6:00 AM Thousands of Companies Are Driving China’s AI Boom. A Government
    Registry Tracks Them All How the Cyberspace Administration of China inadvertently
    made a guide to the country’s homegrown AI revolution. Illustration: Jacqui VanLiew
    When DeepSeek burst onto the global stage in January 2025, it seemed to appear
    out of nowhere. But the large language model was just one of the thousands of
    generative AI tools that have been released in China since 2023—and there’s a
    public archive of every single one of them. The China Issue PHOTOGRAPH: ANDRIA
    LO Here are 23 ways China is rewiring the future . The country’s top internet
    regulator, the Cyberspace Administration of China (CAC), requires that any company
    launching an AI tool with “public opinion properties or social mobilization capabilities"
    first file it in a public database: the algorithm registry. In a submission, developers
    must show how their products avoid 31 categories of risk, from age and gender
    discrimination to psychological harm to “violating core socialist values.” Applicants
    submit their filing to their local CAC (say, the Shanghai CAC for Shanghai-registered
    firms), which forwards applications to the central CAC for final approval. Only
    then is a tool publicly listed in the algorithm registry. While the European Union
    is pursuing a single, comprehensive AI Act, notes Matt Sheehan, a research scholar
    at the Carnegie Endowment for International Peace, China’s approach to regulation
    is more ad hoc, targeting specific algorithms and building up iterative standards.
    (The US has no comparable registration system or centralized regulatory agency.)
    Over time, the CAC has inadvertently created the most detailed map of a nation’s
    AI ecosystem anywhere in the world. Open the CAC’s update from August 2024 and
    you’ll find DeepSeek listed as entry 152, a single row in a neatly packed table.
    Scroll through the table and you’ll find an AI that manages homestays and an AI
    that drafts patents . One assists ob-gyns in a Shanghai maternity ward; another
    helps manage state power grids. Kendra Schaefer and her colleagues at Trivium
    China, a Beijing-based policy consultancy, have been compiling the CAC’s updates
    into a comprehensive database, enriched with their own research. A Broad View
    of the Boom Nearly 80 percent of China’s generative AI registrations are clustered
    in and around its top tech hubs—Beijing, Shenzhen, Shanghai, and Hangzhou. Each
    city has its strengths: Beijing’s elite universities, national labs, and political
    strength give it an edge in large-scale innovation; Shenzhen (in Guangdong) is
    home to a dense hardware supply chain and vast pool of engineering talent; Shanghai,
    close to multinationals, excels at commercialization; and Hangzhou (in Zhejiang)
    is fueled by Alibaba’s ecommerce empire. But innovation spreads far beyond the
    coasts. Chongqing is positioning itself as an AI manufacturing and logistics node;
    and heavy state investment has helped Hefei, in Anhui Province, become known as
    “China’s speech valley” for its cluster of speech-recognition firms, including
    iFlyTek. Filings also originate in less obvious regions like Guizhou, China’s
    “Big Data Valley,” where massive data centers power Huawei’s Pangu model, and
    Inner Mongolia, where state enterprises are integrating AI into mining and agriculture.
    In the Trivium dataset, state-linked listings—from state-owned enterprises to
    government-backed research institutes—make up 22 percent of filings. Many state-linked
    firms partner with Big Tech to build their AI: PetroChina, for example, teamed
    up with Huawei and iFlyTek to create oil and gas applications; State Grid used
    DeepSeek to build a model optimizing power grids. Foreign firms make up just 0.5
    percent of filings. Ikea, for example, has a smart shopper algorithm that generates
    product recommendations. Yum China, the parent company that operates Kentucky
    Fried Chicken in China, listed a model that generates menus and promotional material.
    Zeroing In on the Competition More than half of the listings in the algorithm
    registry are for what Schaefer calls cross-sector technologies. These range from
    foundational models to “general purpose” text generators to a wide array of multimedia
    tools—voice swappers, 3D renderers, image makers. “Nobody wants to be caught in
    a situation where they depend on a competitor’s technology,” Schaefer says. Unlike
    in the US, where OpenAI, Anthropic, and Google DeepMind dominate the market, China’s
    competition to build foundational AI remains diverse and contested. But building
    these models is costly, and the market is beginning to consolidate. China’s six
    “ AI tigers ”—Moonshot, Minimax, Zhipu, Baichuan, 0.1AI, and Stepfun—are all backed
    by Alibaba or Tencent. ByteDance’s Doubao surpassed DeepSeek as China’s most popular
    chatbot, but its spot at the top is not assured. While the giants duke it out
    for chatbot supremacy, startups are hard at work in every sector imaginable. Squirrel
    AI 松鼠 Founder Derek Li says his 12-year-old company is leaps beyond the ed-tech
    competition. They “put wheels on a horse,” he says, bolting AI onto their existing
    stale software. Squirrel claims to diagnose knowledge gaps, measure progress,
    and adjust lessons in real time. When China banned for-profit tutoring in 2021,
    the company’s revenues collapsed overnight. It pivoted to licensing its platform
    to franchisees who also sold the company’s AI-powered tablets. Squirrel’s network
    includes more than 3,000 centers across China, serving 1.2 million students. Now,
    the company is eyeing expansion to the US. Li, who withdrew his sons from a private
    school in Shanghai so that they could be home-schooled on Squirrel’s platform,
    says that “in the future, teachers won’t teach knowledge.” Instead, he says, “they’ll
    become data analysts, understanding learning reports and students’ ability, and
    psychologists, understanding emotions and shaping their personalities.” AI Kanshe
    看舌 AI Kanshe (translated as “AI Sees Tongue”) is a traditional Chinese medicine
    startup that analyzes health through images of the tongue, palms, and face. The
    company was founded by Li Wenhua, a former employee of Yaoshi Bang, one of China’s
    earliest online pharmaceutical platforms. A longtime student of tongue and hand
    diagnosis, Li wanted to combine the diagnostic methods of traditional Chinese
    medicine with modern machine vision. The company serves both consumers and health
    practitioners across clinics, pharmacies, and some hospitals, offering tools to
    support diagnosis and decisionmaking. Its model is trained on more than 100,000
    annotated images of tongues, hands, and faces. Zhongtan Puhui Cloud Technology
    中碳普惠云科技 Founded in 2024 by Wu Song, a former Wall Street quant trader, Zhongtan
    Puhui Cloud Technology develops AI-driven tools for carbon accounting. The green
    transition, Wu says, still relies on cumbersome human labor that could be automated.
    Zhongtan Puhui builds AI agents that handle a number of carbon accounting tasks,
    including carbon footprinting and emissions audits. Its clients range from China
    Minmetals Group and DHL to small and medium-sized exporters in the Yangtze River
    Delta. According to the company, its AI agents can pull real-time data directly
    from power plants, allowing them to complete a task that once took up to 30 days
    in 15 minutes—for a tenth of the price. Zhongtan Puhui plans to expand into European
    countries. It has recently added English, French, Portuguese, and German versions
    and plans to sell the product on Amazon Cloud and Microsoft Azure. UBtech 优必选科技
    Inspired after seeing Honda’s Asimo robot at a tech fair in Japan, Zhou Jian founded
    UBtech in 2012. He spent six years perfecting the robot’s servo actuators—the
    “joints” that enable movement—before unveiling the company''s first robot, Alpha.
    In 2023, UBtech became the first humanoid company to list on the Hong Kong Stock
    Exchange. Based in Shenzhen, the company now produces robots for factories, schools,
    health care facilities, and homes. Its flagship Walker S series, designed for
    industrial and logistics work, is used by automakers like BYD and Zeekr; its Jimu
    and uKIT robotics kits teach students coding and AI; Alpha Mini, its child-friendly
    humanoid, is in nursery schools in Seoul. The company also develops robots for
    elder care and companionship, as well as consumer devices like smart vacuums and
    lawn mowers. UBtech retrains existing foundational models, first through simulated
    environments, then in mock factory environments, before deployment in real production
    lines. The company currently sells to more than 40 countries, with roughly a third
    of its revenue coming from overseas markets. XVerse 元象 XVerse is building lifelike
    virtual worlds for entertainment. The company was founded by former Tencent vice
    president Yao Xing. After leading Tencent to develop a Go-playing AI, Yao concluded
    that AGI progresses fastest when its goals are clear and measurable—as in the
    game of Go—but that most real-world challenges are open-ended. So in 2020, he
    left Tencent to found XVerse, aiming to build complex, simulated worlds where
    AI could learn, act, and evolve. In 2024, the company launched its flagship product,
    Saylo, which turns chat conversations into immersive AI-driven story videos. Users
    create personalized virtual characters and explore branching plots in real time.
    The app has 20 million users worldwide. The company also built its own large-language
    model, XVerse MoE, trained on diverse data sources including news, code, literature,
    and academic papers. The company is also developing an AI-driven game, Zhaoyang
    Legend , set in a fantasy realm where players must ascend to the throne as a young
    crown prince and manage a kingdom. The game evolves dynamically based on players’
    decisions, creating endless possible plots and endings. Haivivi 跃然创新 BubblePal,
    a golf-ball-sized orb, transforms children’s toys into chatty companions. Clip
    it onto a stuffed Peppa Pig and the toy will talk back in Peppa’s voice. The device
    can switch between more than 40 personalities, from Disney’s Buzz Lightyear to
    the Monkey King, and speak in multiple languages and dialects, including French,
    German, Cantonese, and Sichuanese. A companion app lets parents set learning goals,
    such as encouraging more English conversation, and track weekly “growth reports”
    that analyze a child’s conversations, emotions, and interests. Since its launch
    last summer, more than 300,000 units have been sold. The toy is made by Haivivi,
    a Chinese company founded in 2021 by Li Yong, a former Alibaba executive who helped
    develop the company’s smart speaker. Realizing that many of the smart speaker’s
    users were children, Li decided to make children’s toys, and in 2023 pivoted to
    AI companions. He relocated from Beijing to Shenzhen to tap into the city’s electronics
    supply chain. According to the company, its models undergo strict data reviews
    and monitoring to prevent inappropriate speech. In addition to going through the
    rigorous algorithm registry vetting process, it follows the CAC rules for protecting
    minors’ data. BubblePal is also available in the US, Canada, and the UK, with
    plans for further expansion. Haivivi aims to add more popular characters such
    as Lucky Cat and develop product lines for young adults, like AI-powered tarot
    cards. What the Registry Doesn’t Show: Chinese AI Is Going Global In recent years,
    the term chuhai —“to go overseas”—has become a buzzword as Chinese firms look
    abroad to escape slowing consumption and weak capital markets back home. China
    produces about a quarter of the world’s top 100 AI products by revenue, and most
    of them target overseas markets. A top earner for the Hangzhou company Glority,
    for example, is a plant-identification app called PictureThis, which is popular
    outside China. To avoid geopolitical trip wires, some Chinese tech companies have
    been distancing themselves from their roots by hiring foreign staff, setting up
    headquarters in Singapore or California, or leaving China altogether. A company
    called Butterfly Effect, for example, was founded in China and built a general-purpose
    AI agent called Manus. Shortly after the US established export controls on Nvidia
    chips, the company relocated to Singapore, laid off most of its Chinese staff,
    and scrubbed all of its content from Chinese social media. Butterfly Effect’s
    ambiguous identity raises a deeper question: What does it mean to be a “Chinese”
    AI company? What Say You? Let us know what you think about this article in the
    comments below. Alternatively, you can submit a letter to the editor at mail@wired.com
    . This article was downloaded by calibre from https://www.wired.com/story/china-ai-boom-algorithm-registry/
