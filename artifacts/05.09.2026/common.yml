  body_text: 'Who Bankrolled the American Revolution? Books Who Bankrolled the American
    Revolution? Our history too often sidesteps the question of finances. But sonorous
    ideals don’t keep an army supplied with uniforms, guns, and grub. By Adam Gopnik
    March 16, 2026 “Money makes the world go round,” the cynical old maxim, and Broadway
    show tune, runs. “Follow the money,” a maxim minted in the film “All the President’s
    Men,” has become just as familiar. Yet in practice we rarely follow the money
    far enough to discover how it actually moved, or who set it in motion. The financing
    of the material conditions of history—how buses are hired for a great march; who
    pays for the guerrillas’ guns and grub—mostly remains opaque in our chronicles.
    When we look at the famous painting of Washington crossing the Delaware, the last
    question we ask is the first one we should: Who paid for the boat? One reason
    for this absence is that economic history seems boring when compared with military
    history, and that economic forces are hard to dissolve into a stream of stirring,
    distinct individual choices. Money flows more than it leaps; that’s why we follow
    economic change in charts, with slow, incremental movements up and down, and arrows
    telling us what is really going on behind the jumpy shadow puppets of politics.
    Who won the battle ? can be simplified, dramatically, into strategic decisions
    and pivotal moments. Who paid for the soldiers to get there ?—and thus made it
    possible for the battle to be fought at all—usually involves a long-distance jumble
    of government bonds, loans, and guarantees complex enough to send us back to the
    battle itself. “One if by land, and two if by sea” is a memorable phrase as we
    picture Paul Revere on his midnight ride; learning that the British were coming
    by sea because, so to speak, shifts in Amsterdam bond markets affected British
    decisions about financing ships feels too remote and intricate to capture our
    attention. Any number of good books and studies aim to remedy this gap in our
    understanding, and one of the best ways of doing it, paradoxically, is to fix
    complicated impersonal finances into a figure of a single person who can be thought
    to have made military-style strategic decisions. In Richard Vague’s new book,
    “ The Banker Who Made America: Thomas Willing and the Rise of the American Financial
    Aristocracy, 1731-1821 ” (Polity), we have a hero worthy of the enterprise. Indeed,
    it is telling that Willing’s name is presented only in the subtitle, on the understandable
    ground that, without giving the role he played top billing, his name would mean
    nothing. Willing, it turns out, was the very model of a successful Colonial merchant.
    Born in Philadelphia but trained in law at the Inns of Court in London, he returned
    home in the late seventeen-forties to become a leading citizen in what was then
    the unquestioned capital city of the new continent. Philadelphia was founded by
    the Quakers as a utopian project, but thrived as a commercial port—as a city of
    merchants, printers, bankers, and speculators. Willing, an Anglican, kept a sharp,
    cool mind sheathed in a convivial exterior, and moved easily between commerce
    and politics. He was readily elected mayor in 1763, and took pains to insure that
    he and his family intermarried with the other stalwarts of his class. Like Antonio
    in “The Merchant of Venice,” however, Willing had all his fortune out upon the
    water. Along with his younger partner, Robert Morris, he traded in wheat and sugar
    and rum and, occasionally, enslaved Africans. Though the business appeared to
    be a simple exchange of hard goods for hard money—wheat delivered from America
    in return for pounds paid in England—the shipping trade was, in fact, the cradle
    of the market in financial “paper.” The long voyage from home port to market created
    seemingly endless intervals of uncertainty, often stretching to months and sometimes
    years. With your goods out on the water, you had to wait ages to be paid and to
    take your profit. The ocean is an illiquid place. And so merchants like Willing
    would draw up what were, in effect, I.O.U.s anticipating their sale. These “bills
    of exchange” turned goods still on the water into paper that could be traded and
    discounted as investments in their own right. Like the banks that treat bundles
    of mortgages as assets to be sliced, parlayed, and traded independently of the
    condition of the underlying loans, Philadelphia’s maritime merchants could transform
    cargo at sea—and conceivably already beneath it—into financial instruments with
    a speculative life of their own. This was, of course, highly risky: there was
    no guarantee that the goods would ever arrive; if the ships didn’t sink, they
    could be taken by “privateers,” semi-official pirates licensed by rival European
    powers. That risk, in turn, generated a parallel market in maritime-insurance
    policies, which eventually acquired as remote a connection to the actual cargo
    as the bills of exchange themselves. “Derivatives” were the lifeblood of American
    commerce from the very beginning. Willing, though in one sense a cold-blooded,
    high-stakes gambler, played a cautious, centrist part in pre-Revolutionary Pennsylvania
    politics. And those politics prove far more intricate than the patriotic, tricornered-hat
    history a child growing up in Philadelphia today might encounter in the ubiquitous
    sound-and-light shows outside Independence Hall. Quakers still held a special
    role in the city’s and the colony’s politics, yet they had mainly been crowded
    out of power by a new merchant élite, largely Anglican or Presbyterian, and by
    the ascendant farming class in western Pennsylvania. The Quakers, though they
    would become the beating heart of the American abolitionist movement and, later,
    the civil-rights movement, were fiercely anti-patriotic; their principled ban
    on violence of any kind made them wary of even implicit military fervor. Libertarian
    in their quietist way—people should be free to think their own thoughts—they were
    not about to pick up a gun for any cause, however estimable. The farmers and small
    merchants of western Pennsylvania, meanwhile, were egalitarian in affect, at least,
    but also, shaped by their evangelical faith, far more religiously conservative
    than the often British-educated Philadelphians, whose Anglicanism could tilt toward
    an abstract Enlightenment deism. The Pennsylvania farmers and pioneers wanted
    to be free from domination by condescending city people; the city people wanted
    to be free to make money and speak their minds without the farmers’ prejudices.
    The populist farmers believed in equality and called it liberty; the educated
    élite believed in liberty and called it equality. It was a divide that would never
    really end. Vague is especially good at explaining why the British demanded the
    notorious “taxation without representation,” and why the colonists responded so
    furiously. British banks—and, with them, the British government—had, after fighting
    wars in Europe, sunk into an almost absurd level of debt, producing bank failures
    and, in 1772, something like a Great Recession at home. In effect, the mother
    country turned to its thriving colonies to pay the bill for its European wars.
    The so-called Intolerable Acts, as well as the Stamp Act and the tax on tea that
    enraged Boston’s patriots, were efforts by the British government to claw back
    money from the colonies to cover the imperial deficit. The colonists shrieked
    at being asked to pay in ways they never had before, but the British believed
    that this was precisely the point of having colonies: like dutiful children, they
    were meant to acquire, in maturity, the ability to settle accounts when the parents
    faltered. As Samuel Johnson, a paid propagandist for imperial authority, put it,
    “We do not put a calf into the plow; we wait till he is an ox.” This ox was gored,
    or felt itself to be. Yet the proper response was endlessly debated, with agrarian
    radicals pressing for immediate independence, city-bound conservatives searching
    for ways to placate London without surrendering Colonial rights or money, and
    a smaller group remaining loyal to the King. Vague makes much of the inherent
    civil conflict within Pennsylvania. Perhaps he makes too much of it. What is impressive
    is not that the American Revolution in Pennsylvania, as elsewhere, was more divided
    than later patriotic histories and pageants suggest—what else would one expect?—but
    that, unlike the coming French Revolution, or indeed the earlier English one,
    it somehow avoided sliding into a mutual massacre or an authoritarian party seizing
    control. Sectarian disputes were annealed by cultural habits of consensus-building
    and grudging coexistence, possibly rooted in the thinness of Colonial society
    and the brevity of its history, with the brutal frontier and the Indigenous “enemy”
    a constant presence. So the real political question was whether maritime merchants
    like Willing—outraged by British bullying but with little appetite for political
    revolution—would ultimately throw in their lot with the radicals and the idealists.
    Vague is clear that Willing was unwilling. A reluctant delegate to the Continental
    Congress in 1775 and 1776, he voted against the Declaration of Independence and
    then retreated into private life in Philadelphia. And yet, over the next several
    years, he and his firm continued to play a central role in financing the rebels,
    even while cagily keeping their distance from the revolutionary cause. When the
    British invaded Philadelphia during the war, most patriots fled; Willing stayed
    behind, negotiating—and even working closely—with the occupying British authorities.
    Yet even as he played it close to the vest he was throwing tricorne hats to the
    Army. Willing and Morris could ship goods in demand—tobacco, flour, rice—to Europe
    on consignment, while converting the anticipated profits of those voyages into
    bills of exchange, the proceeds of which they passed on to George Washington to
    buy uniforms, guns, and horses for his army. Throughout the war, the good word
    of Willing and Morris was enough to keep the system afloat. How did this work?
    It is startling for a reader to discover that, fully fifteen years ago, the late
    California journalist Charles Rappleye wrote a biography of Morris that essentially
    claimed for him the role Vague reserves for Willing—as the “financier of the American
    Revolution,” to use the earlier book’s subtitle. Although Rappleye & Vague sounds
    like a Colonial law firm dreamed up by Henry James , it is nonetheless odd that
    two books about two conjoined partners should make such different cases. Nor does
    Vague—himself a career financier and once the secretary of banking and securities
    for Pennsylvania—mount any assault on Rappleye’s interpretation. Apart from one
    cryptic aside noting that Morris was always in a subordinate role, Vague simply
    tells his own story, without contesting the truth of the earlier one. It would
    appear, in synthesis and to borrow a pleasing opposition of human types from John
    Milton, that Morris was the active Allegro principle of the firm, while Willing
    was the more withdrawn but vigilant Penseroso. Morris evidently took the lead
    during the war in supplying Washington’s troops; Willing remained the presiding
    presence and, not surprisingly, emerged financially intact, even as Morris ended
    up in bankruptcy. What exactly did they do? The answer seems to be that they took
    advantage of their reputation as solid conservative men of business to finance
    a radical cause. Scaling up the established practice of issuing lines of credit
    for ships out on the water, they took bills of exchange, payable in the ports
    of France and Amsterdam, and sold them, or borrowed against them, in the colonies,
    to pay for uniforms, guns, and horses. They basically took the credit they held
    abroad—Amsterdam being the Hong Kong of the period—and redeployed it locally to
    support Washington’s army. The paradox was that their credit as merchants was
