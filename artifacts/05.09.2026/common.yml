- article_update_date: 05.09.2026
  body_text: 'American subs rule beneath the waves, but China’s are catching up International
    | Which navy’s better, down where it’s wetter? American subs rule beneath the
    waves, but China’s are catching up And underwater drones may supplant them all
    May 7th 2026 THE NETS enclosing the inner harbour draw open. A black-finned predator
    slips out. Minutes later it reaches the open ocean and, with a great exhalation,
    disappears beneath the tropical waters. Getting under way from Apra Harbour in
    Guam, the USS Annapolis, one of the ocean’s apex hunters, is engaged in a silent
    but intensifying contest with China and Russia for dominance of the vast Pacific.
    Warships are noisy, rumbling along like lorries. Not so a nuclear-powered attack
    submarine, which hums like a Tesla. For months on end the Annapolis’s crew of
    145 men (and, when your correspondent visited, one woman) inhabit a surreal world
    of artificial light and recycled air, largely incommunicado—a windowless spaceship
    arcing through suffocating blackness. Nuclear propulsion means that the main limit
    on a voyage is neither fuel nor air nor fresh water, but food. These marvels of
    engineering thus set out like an overloaded caravan, with bananas hanging from
    pipework and jars of peanut butter shoved between the padding of seats. Fathoms
    under water, the galley bakes bread daily, turning compact flour into fluffy rolls.
    Just keeping sailors alive inside a hull squeezed by 24 or more atmospheres of
    pressure is a feat. “Every single ounce of seawater is trying to kill us, every
    second,” says the captain, Commander Clinton Emrich. The sub is officially able
    to dive more than 240 metres and zip along at more than 25 knots (the real numbers
    are secret and probably much higher). It is armed with Tomahawk cruise missiles,
    Mark-48 torpedoes, sea-mines and perhaps other weapons. In the war with Iran,
    American subs fired Tomahawks at targets on land and, for the first time since
    the second world war, a torpedo at an enemy ship, sinking an Iranian frigate,
    the IRIS Dena. Attack submarines operating from Guam, including both Los Angeles-class
    vessels like the Annapolis (in service for 34 years) and newer Virginia-class
    ones, are the “tip of the spear”, American submariners say. In any future war
    with China they would be counted upon to deliver some of the earliest and heaviest
    blows. In the meantime their tasks range from tracking foes’ ballistic-missile
    submarines to gathering intelligence and inserting special forces. Above all,
    their main job is deterrence. One might pop up unexpectedly off Australia or South
    Korea. Or one might surface close to a Chinese warship in a show of stealthiness—or
    perhaps several might appear simultaneously near different Chinese vessels. The
    ocean depth is the last domain where America still has a clear military advantage
    over China. As battlefields fill with sensors, becoming increasingly transparent,
    “being under water matters because it’s one of the last places you can hide,”
    says Thomas Shugart, a former submariner. Yet America’s sub-sea dominion, too,
    is under threat. The “silent service” says little about each side’s capabilities,
    but American submariners talk of roaming the Pacific almost as if it were an American
    lake. Until recently they joked that Chinese subs were so noisy they could be
    heard from America’s west coast. No longer: mockery is turning to alarm. Xi Jinping,
    China’s leader, having built the world’s largest surface navy and its fastest-growing
    nuclear arsenal, is also transforming China’s submarine force. The current fleet
    consists mostly of conventionally powered vessels, with limited speed and endurance,
    useful mainly to attack shipping close to home. However, over the coming decade
    or so, American intelligence reckons, a new generation of nuclear-powered, ocean-going
    subs will come to dominate China’s force, challenging American supremacy in the
    Pacific and Indian oceans, the approaches to the Arctic and perhaps even the Atlantic.
    American military sources say China is developing much quieter submarines with
    the help of Russian technology, whether stolen or bartered in exchange for China’s
    support for Russia’s stuttering war in Ukraine. China’s latest models “are formidable,
    incorporating advanced technologies that challenge the US Navy’s long-standing
    undersea dominance”, said Vice Admiral Richard Seif, the commander of America’s
    submarine force, in recent testimony. America’s head of naval intelligence, Rear
    Admiral Michael Brookes, thinks China will have 70 submarines next year and 80
    by 2035. Crucially, about 40 will be nuclear-powered—substantially more than previously
    estimated. This compares with America’s all-nuclear force of 67 boats. To stay
    ahead, America is supplying nuclear-propulsion technology to Australia under AUKUS,
    a submarine-building partnership that also includes Britain. The AUKUS boats are
    not due for delivery until the 2040s. In the meantime America has promised to
    sell Australia three to five Virginia-class submarines in the 2030s. Australian
    sailors are already training on American subs, which are set to begin regular
    deployments from a base near Perth next year. China’s loud protests suggest alarm.
    Meanwhile, America and South Korea agreed last year to build new “hunter-killer”
    subs (SSNs) together, though the details of how and where they will be built remain
    sketchy. Hanwha, a South Korean conglomerate, is developing a new “smart” shipyard
    in Philadelphia that, it hopes, could become a site for submarine construction.
    Japan, too, has shown interest. America’s submarine-building, though, is being
    hampered by its woeful industrial capacity. America and Australia have invested
    billions in America’s submarine industrial base. “Build Submarines” ads shown
    during big sporting events have urged young Americans to train as welders and
    other roles. Even so, America is falling short of its requirement to build two
    Virginia-class boats a year. To supply Australia, it needs to raise output to
    about 2.33 boats a year. In fact, it manages barely 1.1-1.2 Virginias a year,
    in addition to one Columbia-class SSBN (a bigger vessel capable of launching long-range
    nuclear missiles) to replace ageing Ohio-class subs. America’s submarine fleet
    has shrunk from 70-odd boats a decade ago to 67 today—49 SSNs, 14 SSBNs and 4
    SSGNs (mid-sized subs capable of firing guided missiles). It will shrink further,
    to 63, before in theory growing to 66 by 2054. That will still be well short of
    the navy’s goal of 66 ssns alone. Worse, an agonising maintenance backlog means
    a third of SSNs are in maintenance or idle. The USS Boise has been out of action
    for so long—it was tied up in 2017—that the Pentagon this year decided to decommission
    it. A new dry dock is under construction in Pearl Harbour in Hawaii to speed up
    maintenance and repair from next year. Even so, regular “depot” maintenance can
    take over 18 months. The yard’s wartime feats—it put the USS Yorktown, a badly
    damaged aircraft-carrier, back to sea in three days to fight the battle of Midway
    in 1942—are a fading memory. Britain, too, is struggling. A parliamentary report
    warned last month that “shortcomings and failings”, including delays in upgrading
    the “depleted submarine industrial base”, risked holding up AUKUS, “with serious
    consequences both for UK national security and for credibility with AUKUS partners”.
    Unnerved Australian experts are debating options for “Plan B”. Meanwhile, satellite
    imagery suggests China has been managing to build two attack subs and an ssbn
    a year since 2024, thanks to expanded facilities at Huludao on the Bohai Sea,
    says the International Institute for Strategic Studies, a think-tank in London.
    Nuclear-powered submarines are so expensive and difficult to make—a Virginia-class
    boat costs about $5bn apiece—because they must keep sailors alive in extreme conditions.
    Their hulls must be made of special steel that is strong, tough and ductile, and
    sealed only by expert welders. Controlling buoyancy is tricky: a submarine shrinks
    as it dives, displacing less water, and so sinking ever faster (and vice versa
    as it rises). Uncontrolled by ballast and trim, it will either drop to the sea
    floor (and perhaps be crushed) or bob to the surface. Then there is the problem
    of propulsion. Submarines of the first and second world war used a combination
    of diesel engines, to sail on the surface and charge batteries, and an electric
    motor for short bursts under water. Nuclear propulsion was a game-changer. “Our
    submarines have 30 years of fuel or more on board, so effectively, unlimited endurance,”
    explains Rear Admiral Christopher Cavanaugh, commander of the Pacific Fleet’s
    submarine forces. “That also gives them stealth. They don’t need to come up and
    snorkel.” America’s first nuclear-powered submarine, USS Nautilus, made the first
    journey under the Arctic ice-cap in 1958. In April HMS Vanguard, a British SSBN,
    completed a record 205-day patrol. On the Annapolis, crews are away for so long
    they must tell superiors whether they wish to receive bad news from home while
    at sea. To maintain circadian rhythms, lighting levels follow the day-night cycle
    of Guam. Cribbage and books help pass the time. Tom Clancy’s “Hunt for Red October”
    is a favourite. Water quickly absorbs most light and radio waves, which makes
    submarines stealthy but hard to communicate with. Water readily transmits sound,
    however, be it the songs of whales or the thrumming propeller of an enemy vessel.
    The submariner’s art is to understand the layers of temperature and salinity,
    the vagaries of the seafloor and current, knowing where to hide and where to find
    “sound tunnels” to detect faraway objects. You could shout at the top of your
    lungs and scarcely be heard outside a modern submarine. That is because decks,
    and the machines on them, float on sound-absorbing “rafts”. The boat’s exterior
    is covered with a rubber-like coating to further muffle noise and confound sonar.
    The control room of the Annapolis is a hubbub of loud commands and responses;
    the cramped torpedo room even more so. Before pulling a brass lever to fire a
    “water slug” (a blank torpedo), your correspondent had to don earmuffs. But interior
    noise is most dangerous if there is an “acoustic short”, when a stray object touches
    both a raft and the outer hull, transmitting sound to the water. Officers prowl
    the boat looking for carelessly secured equipment or, say, tins of food stored
    in inviting but forbidden gaps. Pearl Harbour, home to America’s Pacific Fleet,
    is dotted with memorials—not just to those who died in Japan’s attack in 1941,
    but also to the submarine crews that held the line thereafter, as the fleet was
    rebuilt. Unrestricted warfare against Japanese merchant ships in the Pacific,
    announced within hours of the attack, had greater success throttling Japan than
    Nazi Germany’s U-boats managed against Britain. Submarines sank about 55% of Japanese
    vessels lost during the war, including eight aircraft-carriers. China worries
    that American submarines could unleash similar havoc today. About 80% of its oil
    imports pass through the Strait of Malacca. Iran’s closure of the Strait of Hormuz,
    which has caused a global energy crisis, is a salutary warning. There are lessons
    for America, too. Its bases and other fixed targets, including radars and parked
    aircraft, have proved vulnerable to Iranian missiles and drones. China’s missile
    force is formidable, able to rain munitions not only on American bases on the
    “first island chain”, which runs from Japan to Malaysia (see map), but also with
    lesser intensity on rear bases in Guam, Hawaii and Alaska. It can also take aim
    at warships racing across the Pacific to join the fight. If Chinese submarines
    can slip undetected through the passages of the first island chain into the Pacific
    beyond, then American forces would face the additional threat of volleys of cruise
    missiles fired from any direction. A related worry is that Russia is increasingly
    making common cause with China. Their submarines conducted joint exercises last
    year. North Korea’s navy, too, seems to have obtained Russian assistance with
    its own submarine programme. Even if they don’t join the fighting, Russian and
    North Korean forces could cause trouble in a Sino-American war simply by going
    on exercise. All this could stretch America’s submarine force desperately thin.
    At the least, a credible Chinese submarine threat would slow American reinforcements,
    giving Chinese forces more time to subdue Taiwan, say. The more American submarines
    are diverted to hunting Chinese ones, or tracking rival'
