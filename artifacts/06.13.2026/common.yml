  body_text: '| Next | Section menu | Main menu | Previous | The Democrats Aren’t
    Built for This They say they want to save democracy. First they’ll need to get
    out of their own way. by Mark Leibovich Ken Martin has one of those resting dread
    faces, as if he’s bracing for someone to dump a bucket of rocks on his head. His
    nervous eyes make him look chronically unsettled—which is probably appropriate
    for someone trying to run the Democratic National Committee these days. “The political
    equivalent of being a fire hydrant” is how Martin describes his job, and then
    helpfully explains the image to anyone not grasping it: “You get pissed on by
    everyone.” This is a favorite line and recurring theme: the put-upon chairman,
    always being hassled by his easily triggered constituencies. The first time he
    said this to me, the week before Thanksgiving, the triggered included Martin’s
    own employees. He had been dealing with a staff revolt following his November
    12 announcement that the DNC would be ending its generous work-from-home guidelines.
    Everyone would be expected to return to headquarters full-time, Martin told his
    staff, starting in February. This did not go over well. Thumbs-down emoji filled
    the Zoom screen. Employees pelted Martin with questions. He told me that he sympathized,
    but observed that most major public- and private-sector organizations had long
    since compelled their employees to return to their offices. “If it’s unbearable
    and it’s a quality-of-life thing for you, I’m happy to help you find another job,”
    Martin said he told his staff. The complaints persisted. “Shocking” and “callous,”
    the DNC’s employee union said of the chairman’s directive in a statement to The
    New York Times . The squabble underscored how the Democrats can’t help but keep
    playing to a stubborn stereotype—a soft and pampered bunch, unwilling to make
    the gritty sacrifices (such as getting dressed) necessary to prevail in their
    “existential” campaign to save democracy. “The Democrats treat their fucking people
    like kindergartners,” Sarah Longwell, a former Republican consultant who quit
    the party over Donald Trump, told me. Longwell can get exasperated by her new
    allies on the left. When I mentioned the DNC’s in-person-work kerfuffle, it set
    her off. “Republicans are over here being straight-up mercenaries,” Longwell said.
    “Democrats give everybody Fridays off and talk about work-life balance.” She apologized
    for yelling into the phone. Democrats “are not built for when the fascists come,”
    she concluded. Martin has invited similar doubts about himself. A former head
    of the Minnesota Democratic-Farmer-Labor Party, he won an election in February
    2025 for the privilege of leading the divided, despondent, and destitute committee.
    He barely survived the summer after Politico received a leaked audiotape of a
    May 15 meeting in which an anguished Martin can be heard describing the toll of
    his job to DNC officers: “The other night I said to myself for the first time,
    I don’t know if I want to do this anymore .” Ken Martin, chair of the Democratic
    National Committee (Scott Olson / Getty) But things were looking up. Martin and
    I were sipping Diet Cokes at the National Democratic Club, next to the DNC headquarters,
    on the south side of Capitol Hill. The place was bustling, even festive, for a
    late Monday afternoon. Assorted House members, Hill staffers, Democratic donors,
    and lobbyist types clustered around tables of drinks and hors d’oeuvres. Representative
    Gwen Moore of Wisconsin stopped by to say hello to Martin. Others waved as they
    passed our table, and a few congratulated him. It had been a while since he’d
    been congratulated for anything. Despite Martin’s rough start in the job, the
    party’s spirits had brightened considerably after November 4, when Democrats scored
    double-digit wins in the Virginia and New Jersey governor’s races. Although both
    candidates—former House members Abigail Spanberger in Virginia and Mikie Sherrill
    in New Jersey—had been favored to win, their impressive margins, along with other
    overperformances by Democrats across the country, were viewed as hopeful signs
    for the 2026 midterms. A veteran party apparatchik, Martin arrived in Washington
    just as Trump was returning to the White House. Even more than during his first
    go-round, Trump has enjoyed near-unanimous complicity from supine Republican majorities
    in Congress, as well as meek resistance from a dazed opposition. Martin, 52, is
    the harried face of this meek resistance. I had been checking in with him periodically
    since the summer as part of my attempt to assess how the Democrats had managed
    to so thoroughly marginalize themselves. No matter how eager they were to resist
    Trump, they kept living up to their worst image as an overly sensitive, out-of-touch,
    and terminally online band of myopic and overindulged factions. Martin himself
    has a knack for reinforcing these caricatures. Just as I was starting this project,
    he presided over the DNC’s summer meeting in Minneapolis to begin the urgent work
    of rebuilding the Democratic coalition and making the party palatable to American
    voters again. Soon after calling the assembly of more than 400 party officials
    to order, Martin relinquished his mic to a representative of the Saginaw Ojibwe
    Nation for the DNC’s “land acknowledgment” ritual. Switching between English and
    her tribal language, the Indigenous woman affirmed that Minneapolis had been stolen
    from its native Dakota Oyate Tribe (“the original stewards of the lands and waters”).
    The interlude took only a minute or two but received outsize attention—and ridicule—as
    an example of how Democrats remain overly concerned with performative pandering
    to various small identity groups. “It is difficult to imagine more than a handful
    of people looking out over the current hellscape of U.S. policy and thinking to
    themselves: You know what we need to be sure to address today? The Dakota War
    of 1862 ,” Andrew Egger wrote in The Bulwark . “What is Ken Martin doing?” the
    Democrats’ crank emeritus, James Carville, wondered aloud on his Politics War
    Room podcast. It is not the DNC’s job to right the well-documented wrongs of American
    history, Carville said. “It doesn’t exist to make people feel good. It exists—get
    this through your head—to win elections.” I asked Martin if gestures like land
    acknowledgments were worth the trouble. He bristled. “I’ve always felt that it’s
    important to be an inclusive party,” he told me. This suggested that the land
    acknowledgments would continue. “We’re not going to abandon who we are,” Martin
    said. “People can call it ‘woke’ as much as they want.” He disputed the notion
    that he was focused on anything other than winning in 2026. “It’s all gas, no
    brakes,” Martin insisted. And imperative that “we do the work between now and
    November.” Although it seems that many people at the DNC would prefer to “do the
    work” from home. The DNC’s mini-mutiny over the return-to-office mandate ruined
    the brief elation of the off-year victories. Candidates running for office rely
    on massive numbers of volunteers, Virginia’s now-Governor Spanberger told me.
    They work their day jobs and then offer up their spare time because they believe
    in the cause. So it is not a good look for paid party staff to be talking publicly
    “about how hard it is to go into an office to get paid to do things that campaign
    workers do in their volunteer time,” Spanberger said. But perhaps the deeper issue
    is that Democrats have historically focused too much on keeping their many constituent
    groups as happy as possible, sometimes at the expense of their principal goal:
    triumphing in elections so they can implement their policies. “First and foremost,
    Democrats need to get much more ruthless about winning,” Senator Elissa Slotkin
    of Michigan told me. This, she said, is not always compatible with the “weird
    consensus-based leadership” that their leaders tend toward. As Trump has rampaged
    Caligula-like through his second term—draping federal buildings with massive likenesses
    of himself and renaming them in his honor; razing an entire wing of the White
    House; deploying masked agents to snatch brown-skinned people from sidewalks;
    running roughshod over constitutional norms, NATO, Minneapolis, and Venezuela
    alike—rank-and-file Democrats have shown a clear preference for Team Ruthless.
    Unleash the alpha dogs , they keep saying— the more rabid, the better . “They
    want to win so fucking bad,” said Longwell, who has convened hundreds of focus
    groups across the political spectrum. Democratic leaders and political strategists
    need to understand that anything that does not lead to winning elections is extraneous,
    she said. “If you watch the DNC, you still see the pronouns on the name tags and
    the land acknowledgment at the start, and the voters are like, Get that stuff
    out of here .” My assignment was to pick through the Democrats’ post-2024 debris.
    I wanted to see if this once-confident multiracial coalition of working-class
    men and women could somehow get itself together in time for the midterms. Could
    the Democrats make themselves a viable alternative to the bumbling but dangerous
    autocrats on the other side? Are they capable of regaining some measure of power,
    despite themselves? Representative Jasmine Crockett, of Texas’s Thirtieth Congressional
    District, is running for the Republican John Cornyn’s Senate seat. (Michael Nigro
    / AP) I traveled around the country and interviewed about four dozen Democratic
    candidates, elected officials, party leaders, operatives, and voters I met at
    rallies, town halls, and other gatherings. What I encountered was a political
    party on a search: for a winning message; for a fresh identity; for new leaders;
    for the elusive white knight, whatever that might look like. In the past, saviors
    have occasionally materialized, but rarely how a broken party imagined them. No
    one saw Barack Obama coming, sweeping in to define a winning coalition of Democrats
    in 2008. Nor, for that matter, did anyone envisage Donald Trump doing the same
    for Republicans eight years later. Fortunes can turn fast. But Democrats have
    remained stuck in their funk for an unusually long stretch. For much of 2025,
    their doldrums felt much worse than the typical rough patch that parties endure
    after bad election defeats. They were staggered, self-pitying, and seemingly traumatized
    by the denouement of the Joe Biden years. They have wallowed and feuded. They
    have also analyzed themselves to death. If sheer tonnage of voter case studies
    and white papers could rescue a party, Democrats would be set for years. My inbox
    overflowed with the latest theories on how Democrats had lost their way and what
    was needed to revive them. Dueling autopsies were produced by various advocacy
    groups. “How Democrats Lost the White House,” from RootsAction, blamed party leaders.
    “The Working Class Project,” from American Bridge 21st Century, determined that
    the party’s traditional coalition of blue-collar voters has come to “perceive
    Democrats to be woke, weak, and out-of-touch, too focused on social issues.” “Deciding
    to Win,” a data-based dissection published by WelcomePAC, argued that as Democrats
    have moved left on issues such as crime and immigration, self-identified moderates
    and conservatives have abandoned the party. For good measure, the centrist group
    Third Way produced “Was It Something I Said?,” a guide to help Democrats avoid
    speaking “like the extreme, divisive, elitist, and obfuscatory enforcers of wokeness.”
    It included a handy compendium of 45 words and phrases ( dialoguing , microaggression
    , stakeholders , LGBTQIA+ ) that the party should not use, because they create
    “a wall between us and everyday people.” From the April 2023 issue: George Packer
    on how banning words won’t make the world more just Of all the autopsy porn I
    luxuriated in, the most compelling was “How the Democrats Lost America: Making
    Sense of the 2024 Election and the Future of American Politics,” by Scott Ferson,
    a longtime Democratic campaign strategist. The exhaustive report—which will be
    published as a book in April—is based on more than 1,000 interviews that Ferson
    and his team conducted during the Trump and Biden years. Ferson argues that in
    recent decades the Democratic Party has developed an “elitist problem” that has
    caused it to lose its connection to many Americans. The migration of low-income,
    non-college-educated voters to the GOP has accelerated: Scores of Black and Latino
    Americans'
