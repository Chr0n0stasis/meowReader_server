- article_update_date: 04.09.2026
  body_text: A final favour Emmanuel Macron could do for France Europe | Charlemagne
    A final favour Emmanuel Macron could do for France A gracefully timed exit would
    reset France’s awkward electoral calendar April 2nd 2026 If a week is a long time
    in politics, a year can seem like an eternity. The French know this better than
    anyone. They have already been through what feels like aeons of protracted presidential
    campaigning, yet must still endure 12 months of political bickering before they
    get to cast their votes in April 2027. It will then take yet another half-year
    or so, well into the autumn, before whoever moves into the Elysée Palace can begin
    to turn pledges into policy. But presidential terms start sluggishly not because
    the French are reluctant to endure reforms (though they often are). Rather, a
    quirk of history has left the country with an electoral calendar that makes it
    needlessly hard for new presidents to fulfil their promises. There is a counterintuitive
    way to fix this. As he ponders his legacy, Emmanuel Macron ought to consider rejigging
    the electoral calendar. Volunteering to leave the presidency slightly ahead of
    schedule would be worth sacrificing the final sliver of his term. Politicos the
    world over know that a new leader’s first 100 days in office set the tone for
    the rest of their term. Pas en France, sadly. Whoever succeeds Mr Macron (who
    cannot stand for a third consecutive term) will have to bide their time. In practice,
    their first move in office will be to dissolve the gridlocked parliament in order
    to secure a working legislative majority. Cue another nationwide campaign and
    two further rounds of voting in late spring. The new MPs will take their seats
    in the National Assembly the last week of June—just days before the parliament
    breaks for three months. Even if an extraordinary lawmaking session is called,
    as the constitution allows, the rest of Paris disappears on holiday after Bastille
    Day on July 14th; trying to get things done in August is the administrative equivalent
    of shouting into a void. September is scarcely better. The month is dedicated
    to la rentrée sociale, when trade unions flex their muscles by going on strike.
    There are better ways to start a presidency than by provoking mass protests. Thus,
    by the time the president is ready to govern properly, it is October—some 170
    days since voters first trudged to the polls. Some might dismiss the focus on
    the first 100 days as the obsession of a few jumped-up journalists (most of whom
    are on holiday through the summer, too). It is anything but. French presidents
    tend to lose popularity, and thus margins for manoeuvre, at a precipitous pace.
    In June 2017, Mr Macron’s first full month in office, he had the backing of 64%
    of French voters, according to Ifop, a pollster. By October the figure had slumped
    to 42%. Both his predecessors also lost voter support early on and thus their
    political va va voom. Only Mr Macron lasted more than one term. The sequencing
    of the presidential-then-legislative elections is a defensible feature of the
    Fifth Republic, France’s constitutional blueprint since 1958. But the timing of
    these elections—springtime voting followed by a summer of political torpor—is
    no deliberate stratagem put forth by France’s savvy technocrats. Rather it is
    an accident of history. The first presidential elections in the Fifth Republic
    were held in December, with the winner taking office in January (though the first
    president, Charles de Gaulle, had in effect seized power before then). Had that
    continued, it would have been an ideal time for a new figure to impose a set of
    political new year’s resolutions on the country. Alas, that electoral calendar
    has since been amended by happenstance. Georges Pompidou, the general’s successor
    as president, died in office in April 1974. For no other reason, the French have
    voted for a new head of state around that time of year ever since. In most presidential
    systems, like America or Brazil, the scheduling of elections is fixed by law to
    whatever best suits the country. In parliamentary ones, like Britain or India,
    the timing depends on political developments. Only in France is the schedule for
    elections both accidental and, for the past half-century, set for the most awkward
    time of the year. For a time, voting in the spring was manageable. Incoming presidents
    rarely needed to dissolve the assembly, so could at least get started on their
    reforms before les vacances. No longer. In 2000 a constitutional reform cut the
    presidential term from seven to five years, the same as parliament. In practice,
    this has meant fresh legislative elections after every presidential one (they
    can be more often). The upshot is that the ruling apparatus of president, ministers
    and sitting MPs gets its first blush of power at precisely the time the impact
    of its arrival is likely to be blunted. There is a hard way to move the voting
    to a more propitious time, and an easy way. The hard one involves amending the
    constitution, an arcane process. The easy one is for Mr Macron simply to announce
    he will step down a touch early. Say he were to bring forward his retirement to
    February 2027, a couple of months short of his planned exit. That would leave
    his successor and his (or her) team a clean run at a hundred-day burst of action
    before le tout Paris heads to the beach. Such an early exit would trim just 2%
    or so of Mr Macron’s decade in office. Et alors? Though still fizzing with ideas,
    he is a lame duck. If the new date were announced soon enough, it would not meaningfully
    affect the campaign. Against this, it is not only the forthcoming incumbent of
    the Elysée who would get a better chance for a fresh start, but all future presidents
    of the Fifth Republic. Mr Macron’s fans will balk at the idea; not least if the
    next president hails from the populist right. Indeed, the incumbent did a better
    job than most of showing that early reforms are not impossible to push through,
    by unveiling his first salvo quickly. He might argue his successor should promise
    to step down early, not him. But there is no time like the present. Most reforms
    that leave countries better off require a measure of political sacrifice; this
    would be Mr Macron’s. A slightly shorter presidency might yield longer-lasting
    change. ■ Subscribers to The Economist can sign up to our Opinion newsletter ,
    which brings together the best of our leaders, columns, guest essays and reader
    correspondence. This article was downloaded by zlibrary from https://www.economist.com//europe/2026/04/01/a-final-favour-emmanuel-macron-could-do-for-france
