  body_text: 'America’s sermons are becoming op-eds United States | Pulpit partisans
    America’s sermons are becoming op-eds An analysis of nearly 90,000 evangelical
    sermons quantifies how many pastors are endorsing parties May 21st 2026 THE STORY
    goes that Lyndon Johnson was so incensed that some non-profit groups had backed
    his opponent in a 1954 Senate primary election that he proposed a change to the
    tax code to prohibit such groups from endorsing or opposing political candidates.
    Today the Johnson Amendment means that churches can lose their non-profit status
    (and be forced to pay taxes) if clergy engage in political advocacy from the pulpit.
    In practice it is widely flouted. Back in 2016 Donald Trump vowed to “totally
    [knock] out” the amendment, which he has so far failed to do. Yet surveys of churchgoers
    suggest that America’s clergy regularly do engage in political advocacy. Despite
    this there has been little research into the content of such speech, or how common
    it is. Sermons have always been hard to study in a systematic way: they take place
    behind closed doors; congregants may self-censor when surveyed; and texts can
    be edited before being published. Since 2020, though, evangelical pastors have
    been live-streaming their sermons and posting the recordings online, giving researchers
    lots to study. Electioneering happens across denominations: black churches, for
    example, regularly endorse and raise funds for Democrats. But no other church
    has documented itself in this way. Beyond the question of access, evangelical
    churches are worth studying in their own right. They are decentralised, meaning
    pastors are freer than Catholic priests or Mormon bishops to say what they please.
    And no other religious group has mobilised quite so enthusiastically around President
    Trump. In a paper published this week in the Proceedings of the National Academy
    of Sciences, a team of researchers analysed 63,683 hours of unfiltered audio recordings
    from 88,546 evangelical church sermons delivered across the country during the
    2020, 2022 and 2024 election cycles, and a non-election control period. After
    transcribing the sermons, the researchers used a large language model (LLM) to
    screen them for electioneering. It first sorted political from non-political text
    by searching for words to do with politics, such as “elections” and “voting”.
    It looked for references to political figures or parties, like “Trump” and “MAGA”,
    and live questions such as “abortion”. Generic references to “America”, ancient
    governments like “Judea” or spiritual mentions of “the nation” were excluded.
    Text flagged as “political” was then passed through a second filter, which identified
    instances of “political advocacy” as defined by the Internal Revenue Service.
    The LLM was instructed to flag passages such as “Vote for Candidate X” or “Candidate
    X is God’s choice” as well as any calls for campaign contributions. Mentions of
    general political issues or of “voting for God” were ignored. A third step made
    sure that each instance of “political advocacy” referred to a specific party or
    candidate and classified each as either favourable or unfavourable. For example,
    the sermon that contained the passage “if you can vote for Kamala Harris, you
    better ask God to forgive you,” was classified as “opposition: Democrats”, while
    “please, oh Father, make us all vote Republican or libertarian,” was classified
    as “favorability: Republicans”. The study found that nearly 90% of references
    to Republicans were favourable, and more than 70% of references to Democrats were
    unfavourable. Mr Trump was the topic of over 50% of political discussion. In presidential
    election years, around one in seven churches engaged in electioneering—six times
    the rate in non-election periods and twice that of the 2022 midterms. But when
    a human researcher reviewed a random sample of 500 passages that had been flagged
    as political, 380 were judged to contain political advocacy, compared with just
    121 flagged as such by the LLM. This suggests that the true number of evangelical
    churches engaging in political advocacy during elections may be closer to one
    in two. In 2024 pastors in Republican counties were also more than twice as likely
    to engage in political advocacy as those in Democratic ones. ■ Stay on top of
    American politics with The US in brief, our daily newsletter with fast analysis
    of the most important political news, and Checks and Balance , a weekly note that
    examines the state of American democracy and the issues that matter to voters.
    This article was downloaded by zlibrary from https://www.economist.com//united-states/2026/05/21/americas-sermons-are-becoming-op-eds'
