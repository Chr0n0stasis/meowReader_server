  body_text: 'The end of the world’s longest-running Maoist insurgency Asia | India’s
    rebels The end of the world’s longest-running Maoist insurgency A report from
    one of the Naxalites’ final redoubts March 26th 2026 FORMER COMRADE ARAB would
    like to apologise. He is wearing a pink floral shirt and sitting under fluorescent
    lights at a centre for rehabilitated Maoist rebels in Chhattisgarh, a state in
    central India. The 35-year-old was once a commander for the rebels. During 19
    years in the movement, he says, he ordered the execution of hundreds of people
    and led attacks that left thousands of families displaced. For six decades Indian
    security forces have battled Maoist insurgents of the sort led by Comrade Arab,
    especially in areas across India’s central and eastern states. For years Indian
    governments considered the rebels the biggest threat to domestic security. Now
    authorities insist they are on the verge of a historic victory: Amit Shah, the
    home minister, vows that India will be Maoist-rebel-free by March 31st. This deadline
    is “political rhetoric rather than a strategic goal”, cautions Ajai Sahni, a counter-terrorism
    expert; there will doubtless still be Maoist rebels in April. Yet a visit to one
    of their last redoubts shows how much their power has waned. The Maoists are known
    as “Naxalites”—named after Naxalbari, a village in West Bengal where their insurrection
    began in 1967. A police crackdown almost wiped them out, but during the 1980s
    they repaired to remote, densely forested districts, where they thrived. Though
    the early Maoist leaders were students and middle-class, the movement ended up
    drawing most recruits from tribal peoples—among the poorest and most neglected
    in the country. The fighters promised to protect tribal people who risked losing
    land to big projects such as mines and dams. Since 2000 more than 12,000 Indians
    have died in Maoist-related violence. Rebels have blown up politicians and police,
    sabotaged mining projects and torched mobile-phone towers. At a peak around 2010
    there were claimed to be 20,000 fighters operating in a third of India’s districts.
    Yet in recent years security forces have been stepping up their anti-Maoist operations,
    to great effect. Indian forces say they have killed 748 guerrillas since 2024,
    a record tally. They have had particular success picking off the most senior figures.
    Disheartened foot soldiers have surrendered in big batches. By February this year,
    the number of districts with Maoist activity had fallen to only seven out of some
    800 (see map). Until last year the village of Kutul in Chhattisgarh was sometimes
    described as the Maoists’ unofficial capital. But now they have been pushed out.
    Many of the village’s tribal residents seem relieved. They say the Maoists forced
    locals to run errands, donate food and, most tedious of all, attend classes in
    Marxist theory. They blocked efforts to construct health centres and roads. “Their
    ideology was good but they would kill anyone who disobeyed them,” says a local.
    A kangaroo court ruled his brother was a government informant, and had him shot.
    “The Marxists were not here for our welfare, they were only here for themselves,”
    says the headmaster of the village school. He says the rebels prevented people
    gaining more than five years of education. The idea was for youngsters to get
    enough schooling to be useful foot soldiers, but no more than that. Locals who
    joined the Maoists and wished to marry were supposed to get vasectomies. Fighters
    expecting radical equality were surprised to be bossed around by high-caste cadres
    from out of state. The government’s counter-insurgency efforts have involved both
    carrots and sticks. Some rebels have been coaxed into surrender by promises of
    perks, such as cheques worth 50,000 rupees ($530) and housing. When security forces
    came to Kutul, government officials promised to sign locals up to India’s digital-identity
    system (which provides access to public services) and build concrete homes. The
    village was connected to the internet this January. Yet battles against the Maoists
    have also been extremely brutal. Civil-society groups and some politicians have
    accused security forces of killing insurgents they could have captured. The state
    of Chhattisgarh operates a 5,000-strong “District Reserve Guard” drawn from tribal
    people, many of them former Maoists; it infiltrates and attacks the rebels, and
    interrogates those who surrender. Security officials say intelligence from this
    force is the main reason for the state’s recent successes. But observers worry
    it resembles Salwa Judum, a state-sponsored militia from the 2000s that enlisted
    defeated rebels instead of prosecuting them and armed vulnerable youths. It came
    to be as much resented by local people as the Naxalites themselves. In Kutul,
    many villagers worry about what might come next. Buried under tribal groups’ feet
    lie some of India’s most lucrative reserves of iron ore and other minerals. Locals
    fear the government wants to clear the hills of insurgents so that companies can
    grab that treasure, displacing communities. If that happens, former Comrade Arab
    may come to regret his new career—helping hunt his former confederates as part
    of the District Reserve Guard. ■ Stay on top of our India coverage by signing
    up to Essential India , our free weekly newsletter. This article was downloaded
    by zlibrary from https://www.economist.com//asia/2026/03/26/the-end-of-the-worlds-longest-running-maoist-insurgency'
