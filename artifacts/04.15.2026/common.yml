  body_text: '| Next | Section menu | Main menu | Previous | What Happened to Pam
    Bondi? How the attorney general became a person who loves telling Trump yes by
    Stephanie McCrummen Updated at 3:00 p.m. ET on January 20, 2026 B y the time she
    faced her first oversight hearing before the Senate Judiciary Committee, Pam Bondi
    had become a person she never really wanted to be. She had told a reporter once
    that in college she’d wanted to be a pediatrician, but she ended up becoming a
    lawyer. She’d said that she wasn’t sure she wanted to actually practice law, but
    she became a prosecutor. She’d told reporters that she “never dreamed” of running
    for political office, but she did that too, twice winning campaigns for Florida
    attorney general. She’d said that when Donald Trump eventually asked her to be
    U.S. attorney general, she “made it really clear” that she did not want the job.
    During his first term, she had confided to a friend that she wanted to be ambassador
    to Italy. This article was featured in the One Story to Read Today newsletter.
    Sign up for it here. But here she was in a Senate hearing room in October, a person
    who had once seemed so mild, so warm, so kindhearted that she’d earned the nickname
    “Pambi,” opening up a folder full of slap-downs, each tailored to a Democratic
    committee member, with notes on how to deliver them. “I wish you loved Chicago
    as much as you hate President Trump,” she told Senator Dick Durbin, who’d asked
    about the rationale for sending federal troops to his state. “I cannot believe
    that you would accuse me of impropriety when you lied about your military service,”
    she said to Senator Richard Blumenthal, referring to a matter for which he had
    apologized 15 years earlier, while dodging his question about why the Justice
    Department had dropped an antitrust case after lobbying by Bondi’s former firm.
    “ You took money, I believe, did you, from Reid Hoffman, one of Epstein’s closest
    confidants,” she said to Senator Sheldon Whitehouse, who’d asked whether the FBI
    was investigating suspicious financial activities related to the convicted sex
    offender Jeffrey Epstein, and who later said that Bondi had “made up nonsense.”
    “If you worked for me, you would have been fired ,” Bondi told Senator Adam Schiff.
    And on it went for hours, a calculated performance that amounted to a giant middle
    finger to basic notions of decorum and accountability, leaving all sorts of questions
    unanswered, including a fundamental one that some of Bondi’s old friends and colleagues
    back home in Florida had been asking. As one of them put it to me: “I keep asking
    myself, What the fuck happened to Pam? ” At this point, there is little mystery
    about who Pam Bondi has become. She is an attorney general who does not tell Trump
    no. During the first year of her tenure, Bondi has carried out the most stunning
    transformation of the Justice Department in modern American history, turning an
    autonomous agency charged with upholding the U.S. Constitution into one where
    the rule of law is secondary to the wishes of the president. What this has meant
    so far includes firing more than 230 career attorneys and other employees and
    accepting the resignations of at least 6,000 more , gutting the Civil Rights Division
    and units that investigate public corruption, and challenging core American principles
    such as birthright citizenship and due process. It has meant turning the might
    of the department against Trump’s political enemies, a growing list that includes
    former FBI Director James Comey, former CIA Director John Brennan, New York Attorney
    General Letitia James, Federal Reserve Chair Jerome Powell, Senator Schiff, a
    man who threw a sandwich at a federal agent, an Office Depot clerk who refused
    to print flyers for a Charlie Kirk vigil, and reportedly Minnesota Governor Tim
    Walz, Minneapolis Mayor Jacob Frey, and the partner of Renee Nicole Good, who
    was shot and killed by a federal immigration officer on January 7. It has meant
    providing a legal justification for the extrajudicial killings of at least 123
    people suspected of smuggling drugs, and for the operation to capture the Venezuelan
    president, an action that opens the door to a world in which the only law is power.
    And it has meant becoming the face of the Epstein-files scandal, a position that
    could ultimately be Bondi’s undoing. Trump’s previous attorneys general were loyalists
    who pursued a vision of robust executive-branch authority, but they had red lines:
    Jeff Sessions recused himself from the Russia investigation, citing ethics concerns;
    Bill Barr refused to say that the 2020 election had been stolen. Bondi’s willingness
    to do what Trump wants appears to be boundless, and yet that still might not be
    enough for him. Trump has reportedly been complaining in recent weeks that Bondi
    has not been moving as fast as he’d like in pursuing cases against his political
    opponents. His frustration extends to her handling of the Epstein files, a political
    disaster for him that could mean legal jeopardy for her. Bondi has so far failed
    to comply with a federal law that required the release of all the unclassified
    Epstein files by December 19—millions of investigative documents known to contain
    not only references to Trump but potentially compromising information about some
    of the most powerful men in the world. After promising “maximum transparency,”
    Bondi has released only 12,285 out of more than 2 million documents—a delay she
    has blamed on the volume of the files—leading even some of Trump’s supporters
    to abandon him and leaving Bondi under enormous pressure. Arguably, nothing less
    than the future of the MAGA movement and the sanctity of the U.S. Constitution
    depend on what the attorney general is willing to do next. All of which raises
    a question: not so much what happened to Pam Bondi, but why. A ny answer would
    have to come from sources other than Bondi herself. A Justice Department spokesperson
    rejected my requests to interview Bondi. Even as the attorney general has gone
    on Fox News and posted selfies with MAGA-friendly media personalities, she has
    not given any extended interviews with mainstream news outlets since she arrived
    at the Justice Department, where one of her first acts was to move from the traditional
    corner office of the attorney general to a far larger conference room. The space
    is some 100 feet long, with floor-to-ceiling windows, ornate wood paneling, and
    murals called The Triumph of Justice and The Defeat of Justice , the latter depicting
    Lady Justice as a blond woman collapsed on the ground. At this point, Bondi, who
    is 60, has sequestered herself within the MAGA-verse. I went looking for the person
    who existed before all of that, which meant going to Tampa, where Pamela Jo Bondi
    grew up in a middle-class suburb between Busch Gardens and I-75, now a landscape
    of smoke shops, chiropractors, and strip malls moldering in the sun. Temple Terrace,
    a golf-course development of ranch houses and mossy oaks, was not the best or
    the worst neighborhood in Tampa. Bondi came from blank-slate America. She was
    the oldest of three children. Her mother, Patsy, was a teacher, and her father,
    Joe, was also a teacher, as well as an education professor and the mayor of Temple
    Terrace. His grandfather had emigrated from Sicily and was a cigar maker in Ybor
    City, home to Tampa’s large community of Italians, Cubans, and Spaniards. Joe
    Bondi was an FDR Democrat, and by all accounts a generous person and the patriarch
    of the family. In an article in La Gaceta , a local trilingual paper, he spoke
    of himself as “an underdog” who had “lived the American dream,” and said that
    growing up in Ybor City, he’d developed “a strong sense of togetherness—this is
    something I’m happy to say I’ve successfully instilled in my children.” Pam was
    extremely close with her father and, when he died in 2013, referred to him as
    “my beautiful Daddy.” She went to the local public high school down the road,
    also not the best or the worst. The future attorney general had Farrah Fawcett
    hair, served as secretary of the student council, and lost her bid for homecoming
    queen. She went for three years to a college that was also down the road, the
    University of South Florida, where her father worked, before graduating from the
    University of Florida, in Gainesville, with a 3.4 GPA and a degree in criminal
    justice. She often said she loved children, that she wanted to have a big family.
    Bondi went to law school at Stetson University, half an hour outside Tampa, later
    telling Florida’s Business Observer , “I wasn’t certain I wanted to practice law.”
    Her father urged her to try the state attorney’s office in Hillsborough County,
    where he had connections. She said yes, joining dozens of young prosecutors who
    worked in the courthouse in downtown Tampa, many of whom were women. The state
    attorney at the time was known to have a preference for blondes, among other eccentricities;
    one lawyer described the environment as the “Blond Ambition Tour.” Bondi adapted
    to a courthouse buzzing in the ’90s with local corruption scandals and often surreal
    cases involving drugged-out teenagers, fallen baseball stars, the murder of a
    circus performer called Lobster Boy, and flamboyant defense attorneys with names
    like Boom-Boom Benito. Although most prosecutors stayed for five or so years before
    moving into more lucrative private practice, Bondi stayed for nearly 20, rising
    from misdemeanors to the felony section, where she handled high-profile murder
    cases, among others. Her evaluations from that time describe an earnest and hardworking
    prosecutor who sometimes lacked confidence. On a five-point scale, she got fives
    on diligence and threes, fours, and a few fives on legal acumen. “While Pam is
    very capable with good potential, she unnecessarily becomes too intimidated by
    difficult, long, or important cases. She sometimes becomes intimidated by some
    attorneys as well,” read one evaluation. Others said “team player” and “my right
    hand” and “Through some demanding times, she has learned the meaning of the word
    ‘sacrifice.’ ” Colleagues and others who knew Bondi then remember her as a competent,
    at times excellent prosecutor who was good with juries, won many convictions,
    and was able to convey the moral certitude necessary to seek the death penalty.
    A former boyfriend, Billy Howard, called her “The Paminator.” At the same time,
    he told me, “Pam was very well liked—that is something she worked at. She liked
    to be liked.” Howard said that during their time together, he was at a high point
    in his career and also a “big partier.” He said that Pam called his boss, saying
    she was worried about Howard, a moment he now credits with possibly saving his
    life. “A part of her was genuine and caring and concerned, and it helped me,”
    he said. Many others recalled how kind she could be, how accommodating, how Pambi.
    One courthouse colleague remembered how a relative of a crime victim mistook Bondi
    for a secretary and asked her to copy some papers, which Bondi did without hesitating
    or correcting the woman. “She had humility,” said this person, who, like some
    others interviewed for this story, requested anonymity because they feared retribution.
    Patrick Manteiga, the publisher of La Gaceta , remembered seeing Bondi at an annual
    event called the Governor’s Luncheon, part of the kickoff for the state fair.
    She was standing next to the state attorney at the time, Mark Ober, who became
    one of Bondi’s most important mentors. Ober was shaking hands, while Bondi supplied
    him with hand sanitizer. Besides her willing persona, what began to distinguish
    Bondi from the courthouse crowd were her appearances on local television. She
    became the spokesperson for the state attorney’s office, facing cameras during
    big trials, becoming friendly with reporters. Bondi was good at it, and by 2000,
    she was making her first appearance on the Today show, talking about a high-profile
    murder'
